<div class="slideshow-root" 
     gallery-size="200x150"     
     /* LOGIC: Sets the shape. 200x150 stays that size on PC but SHRINKS on mobile. */

     gallery-border="yes"      
     /* LOGIC: Adds a frame. "yes" = 1px border. "no" = no border. */

     gallery-shape="rounded"    
     /* LOGIC: Defines corners. "rounded" = smooth. "square" = sharp. */

     gallery-images="img1,img2" 
     /* LOGIC: List of names. Do not add .jpg or .png. Separate with commas. */

     data-folder="assets/img/"  
     /* LOGIC: Where the files live. Must end with a slash / */

     data-fit="cover"           
     /* LOGIC: "cover" fills the box (crops). "contain" shows full photo (bars). */

     data-interval="4000"      
     /* LOGIC: OVERRIDE. This number kills the 4000ms default in the master code. */
></div>

<hr>
