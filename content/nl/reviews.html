<!-- reviews.html -->
<style>
  .rv-page{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text,#1a1714)}
  .rv-breadcrumb{font-size:.8rem;color:var(--text-muted,#6b6560);margin-bottom:.75rem}
  .rv-breadcrumb a{color:var(--accent,#c8a96e);text-decoration:none}
  .rv-breadcrumb a:hover{text-decoration:underline}
  .rv-title{font-size:1.5rem;font-weight:700;margin:0 0 .2rem}
  .rv-subtitle{font-size:.9rem;color:var(--text-muted,#6b6560);margin:0 0 1.75rem}
  /* summary */
  .rv-summary{display:flex;gap:2rem;align-items:flex-start;background:var(--glass,rgba(255,255,255,.06));border:1px solid var(--border,rgba(255,255,255,.2));border-radius:12px;padding:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
  .rv-summary-score{text-align:center;min-width:90px}
  .rv-big-score{font-size:3.5rem;font-weight:800;line-height:1;color:var(--accent,#c8a96e)}
  .rv-big-stars{font-size:1.3rem;color:#ff9900;letter-spacing:2px;margin:.25rem 0}
  .rv-big-count{font-size:.8rem;color:var(--text-muted,#6b6560)}
  .rv-breakdown{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
  .rv-bar-row{display:flex;align-items:center;gap:8px;font-size:.82rem}
  .rv-bar-label{width:40px;color:var(--accent,#c8a96e);cursor:pointer;white-space:nowrap}
  .rv-bar-label:hover{text-decoration:underline}
  .rv-bar-track{flex:1;height:10px;background:var(--border,rgba(255,255,255,.15));border-radius:99px;overflow:hidden}
  .rv-bar-fill{height:100%;background:#ff9900;border-radius:99px;transition:width .6s ease}
  .rv-bar-num{width:30px;text-align:right;color:var(--text-muted,#6b6560)}
  /* section titles */
  .rv-section-title{font-size:1.1rem;font-weight:700;margin:0 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border,rgba(255,255,255,.15))}
  /* carousel */
  .rv-carousel-wrap{position:relative;margin-bottom:2.5rem}
  .rv-carousel-viewport{overflow:hidden;border-radius:10px;cursor:grab;user-select:none}
  .rv-carousel-viewport:active{cursor:grabbing}
  .rv-carousel-track{display:flex;transition:transform .38s cubic-bezier(.4,0,.2,1)}
  .rv-video-card{flex:0 0 100%;background:var(--glass,rgba(255,255,255,.06));border:1px solid var(--border,rgba(255,255,255,.15));border-radius:10px;overflow:hidden;box-sizing:border-box}
  .rv-video-embed{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
  .rv-video-embed iframe,.rv-video-embed video{position:absolute;inset:0;width:100%;height:100%;border:none}
  .rv-video-thumb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.35);transition:background .2s}
  .rv-video-thumb:hover{background:rgba(0,0,0,.5)}
  .rv-play-btn{width:56px;height:56px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;padding-left:5px;box-shadow:0 2px 16px rgba(0,0,0,.5);transition:transform .15s}
  .rv-video-thumb:hover .rv-play-btn{transform:scale(1.1)}
  .rv-tiktok-badge{position:absolute;top:8px;left:8px;background:#000;color:#fff;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
  .rv-video-info{padding:.85rem 1rem}
  .rv-video-info strong{display:block;font-size:.92rem;margin-bottom:.25rem}
  .rv-video-info span{font-size:.8rem;color:var(--text-muted,#6b6560)}
  .rv-video-link{display:inline-block;margin-top:.4rem;font-size:.8rem;color:var(--accent,#c8a96e);text-decoration:none}
  .rv-video-link:hover{text-decoration:underline}
  /* carousel nav */
  .rv-carousel-btn{position:absolute;top:calc(50% - 44px);width:42px;height:42px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s,transform .15s;backdrop-filter:blur(4px)}
  .rv-carousel-btn:hover{background:rgba(0,0,0,.85);transform:scale(1.08)}
  .rv-carousel-btn:disabled{opacity:.2;pointer-events:none}
  .rv-carousel-btn--prev{left:10px}
  .rv-carousel-btn--next{right:10px}
  .rv-carousel-dots{display:flex;justify-content:center;gap:7px;margin-top:10px}
  .rv-carousel-dot{width:8px;height:8px;border-radius:50%;border:none;background:var(--border,rgba(255,255,255,.25));cursor:pointer;padding:0;transition:background .2s,transform .2s}
  .rv-carousel-dot.active{background:var(--accent,#c8a96e);transform:scale(1.35)}
  .rv-carousel-counter{position:absolute;bottom:52px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:.75rem;padding:3px 9px;border-radius:99px;pointer-events:none}
  /* filter/sort */
  .rv-filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem}
  .rv-filter-label{font-size:.85rem;color:var(--text-muted,#6b6560)}
  .rv-sort-select{padding:6px 10px;border:1px solid var(--border,rgba(255,255,255,.2));border-radius:6px;background:var(--glass,rgba(255,255,255,.06));color:var(--text,#1a1714);font-size:.85rem;cursor:pointer}
  .rv-star-filter{display:flex;gap:6px;flex-wrap:wrap}
  .rv-star-btn{padding:5px 10px;border:1px solid var(--border,rgba(255,255,255,.2));border-radius:6px;background:transparent;color:var(--text,#1a1714);font-size:.82rem;cursor:pointer;transition:all .15s}
  .rv-star-btn.active,.rv-star-btn:hover{border-color:var(--accent,#c8a96e);background:color-mix(in srgb,var(--accent,#c8a96e) 12%,transparent)}
  /* review cards */
  .rv-list{display:flex;flex-direction:column}
  .rv-card{padding:1.25rem 0;border-bottom:1px solid var(--border,rgba(255,255,255,.1))}
  .rv-card:last-child{border-bottom:none}
  .rv-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem}
  .rv-author-row{display:flex;align-items:center;gap:.6rem}
  .rv-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent,#c8a96e);color:var(--bg,#1a3a2a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
  .rv-author-info strong{display:block;font-size:.9rem}
  .rv-author-info span{font-size:.78rem;color:var(--text-muted,#6b6560)}
  .rv-card-stars{color:#ff9900;font-size:1rem;letter-spacing:1px}
  .rv-verified{display:inline-flex;align-items:center;gap:4px;font-size:.75rem;color:#2e7d32;background:rgba(46,125,50,.1);padding:2px 8px;border-radius:99px}
  .rv-card-title{font-weight:700;font-size:1rem;margin:.5rem 0 .35rem}
  .rv-card-body{font-size:.9rem;line-height:1.65;opacity:.9}
  .rv-card-footer{display:flex;align-items:center;gap:1rem;margin-top:.75rem;flex-wrap:wrap}
  .rv-date{font-size:.78rem;color:var(--text-muted,#6b6560)}
  .rv-helpful{font-size:.8rem;color:var(--text-muted,#6b6560);display:flex;align-items:center;gap:6px}
  .rv-helpful-btn{padding:3px 10px;border:1px solid var(--border,rgba(255,255,255,.2));border-radius:99px;background:transparent;color:var(--text,#1a1714);font-size:.78rem;cursor:pointer;transition:all .15s}
  .rv-helpful-btn:hover{border-color:var(--accent,#c8a96e)}
  .rv-empty,.rv-loading{text-align:center;padding:3rem 1rem;color:var(--text-muted,#6b6560);font-size:.95rem}
  @media(max-width:600px){
    .rv-summary{flex-direction:column;gap:1.25rem}
    .rv-carousel-btn{width:34px;height:34px;font-size:1rem}
  }
</style>

<div class="rv-page" id="rv-page">
  <div class="rv-loading">Loading reviews…</div>
</div>

<script>
(function(){
  var BASE = (window.SHOP_CONFIG && window.SHOP_CONFIG.basePath) ? window.SHOP_CONFIG.basePath : '../../';
  var params = new URLSearchParams(window.location.search);
  var pid = window.__PRODUCT_ID__ || params.get('id') || null;
  window.__PRODUCT_ID__ = null;

  /* ── helpers ── */
  function stars(n){
    var f=Math.floor(n),h=(n-f)>=.5;
    return '★'.repeat(f)+(h?'½':'')+'☆'.repeat(5-f-(h?1:0));
  }
  function fmtDate(d){
    try{return new Date(d).toLocaleDateString(window.LANG==='nl'?'nl-NL':'en-GB',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;}
  }
  function initials(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}

  /* ── video card inner HTML (no outer .rv-video-card wrapper — carousel adds that) ── */
  function videoCardInner(v){
    if(v.type==='youtube'){
      var vid=(v.url.match(/embed\/([^?]+)/)||[])[1]||'';
      var thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';
      var watch=v.url.replace('embed/','watch?v=');
      return '<div class="rv-video-embed" data-src="'+v.url+'?autoplay=1&rel=0">'
        +'<img src="'+thumb+'" alt="'+v.title+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">'
        +'<div class="rv-video-thumb" onclick="rvPlay(this)"><div class="rv-play-btn">▶</div></div>'
        +'</div>'
        +'<div class="rv-video-info"><strong>'+v.title+'</strong><span>'+v.author+'</span>'
        +'<a href="'+watch+'" target="_blank" rel="noopener" class="rv-video-link">Watch on YouTube ↗</a></div>';
    }
    if(v.type==='tiktok'){
      return '<div class="rv-video-embed">'
        +'<div class="rv-tiktok-badge">TikTok</div>'
        +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#fff;gap:.75rem;padding:1rem;text-align:center;">'
        +'<span style="font-size:2.5rem;">🎵</span>'
        +'<span style="font-size:.85rem;">'+v.title+'</span>'
        +'<a href="'+v.url+'" target="_blank" rel="noopener" style="color:#fe2c55;font-weight:700;text-decoration:none;font-size:.9rem;">Watch on TikTok ↗</a>'
        +'</div></div>'
        +'<div class="rv-video-info"><strong>'+v.title+'</strong><span>'+v.author+'</span>'
        +'<a href="'+v.url+'" target="_blank" rel="noopener" class="rv-video-link">Open TikTok ↗</a></div>';
    }
    if(v.type==='mp4'){
      var src=v.url.startsWith('/')?BASE+v.url.slice(1):v.url;
      return '<div class="rv-video-embed">'
        +'<video preload="metadata" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">'
        +'<source src="'+src+'" type="video/mp4"></video>'
        +'<div class="rv-video-thumb" onclick="rvPlay(this)"><div class="rv-play-btn">▶</div></div>'
        +'</div>'
        +'<div class="rv-video-info"><strong>'+v.title+'</strong><span>'+v.author+'</span></div>';
    }
    return '';
  }

  /* ── review card ── */
  function reviewCard(r){
    var vf=r.verified?'<span class="rv-verified">✓ Verified Purchase</span>':'';
    return '<div class="rv-card" data-rating="'+r.rating+'" data-helpful="'+(r.helpful||0)+'" data-date="'+(r.date||'')+'">'
      +'<div class="rv-card-top">'
      +'<div class="rv-author-row">'
      +'<div class="rv-avatar">'+initials(r.author)+'</div>'
      +'<div class="rv-author-info"><strong>'+r.author+'</strong><span>'+(r.location||'')+'</span></div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'
      +'<span class="rv-card-stars">'+stars(r.rating)+'</span>'+vf
      +'</div></div>'
      +'<div class="rv-card-title">'+r.title+'</div>'
      +'<div class="rv-card-body">'+r.body+'</div>'
      +'<div class="rv-card-footer">'
      +'<span class="rv-date">'+fmtDate(r.date)+'</span>'
      +'<span class="rv-helpful">Helpful? <button class="rv-helpful-btn" data-base="'+(r.helpful||0)+'" onclick="rvHelpful(this)">👍 '+(r.helpful||0)+'</button></span>'
      +'</div></div>';
  }

  /* ── render full page ── */
  function renderPage(product, rd){
    var pName=product.label||product.name||product.id;
    /* rating/reviewCount come from products.json, breakdown/videos/reviews from reviews.json */
    var rating=product.rating||5;
    var total=product.reviewCount||0;
    var breakdown=rd.ratingBreakdown||{};
    var reviews=rd.reviews||[];
    var videos=rd.videos||[];

    /* breakdown bars */
    var totalV=Object.values(breakdown).reduce(function(a,b){return a+b;},0)||1;
    var barsHTML=[5,4,3,2,1].map(function(n){
      var c=breakdown[n]||0,p=Math.round(c/totalV*100);
      return '<div class="rv-bar-row">'
        +'<span class="rv-bar-label" onclick="rvFilterStars('+n+')">'+n+' ★</span>'
        +'<div class="rv-bar-track"><div class="rv-bar-fill" style="width:'+p+'%"></div></div>'
        +'<span class="rv-bar-num">'+c+'</span></div>';
    }).join('');

    /* carousel */
    var carouselHTML='';
    if(videos.length){
      var trackCards=videos.map(function(v,i){
        return '<div class="rv-video-card" data-idx="'+i+'">'+videoCardInner(v)+'</div>';
      }).join('');
      var dotsHTML=videos.length>1?'<div class="rv-carousel-dots" id="rv-dots">'
        +videos.map(function(_,i){return '<button class="rv-carousel-dot'+(i===0?' active':'')+'" data-idx="'+i+'" onclick="rvGo('+i+')"></button>';}).join('')
        +'</div>':'';
      carouselHTML='<h2 class="rv-section-title">Video Reviews</h2>'
        +'<div class="rv-carousel-wrap">'
        +(videos.length>1?'<button class="rv-carousel-btn rv-carousel-btn--prev" id="rv-prev" onclick="rvStep(-1)" aria-label="Previous">&#8592;</button>':'')
        +(videos.length>1?'<button class="rv-carousel-btn rv-carousel-btn--next" id="rv-next" onclick="rvStep(1)" aria-label="Next">&#8594;</button>':'')
        +(videos.length>1?'<span class="rv-carousel-counter" id="rv-counter">1 / '+videos.length+'</span>':'')
        +'<div class="rv-carousel-viewport" id="rv-viewport">'
        +'<div class="rv-carousel-track" id="rv-track">'+trackCards+'</div>'
        +'</div>'+dotsHTML+'</div>';
    }

    /* written reviews */
    var writtenHTML=reviews.length
      ?reviews.map(reviewCard).join('')
      :'<div class="rv-empty">No written reviews yet.</div>';

    document.getElementById('rv-page').innerHTML=
      '<div class="rv-breadcrumb"><a href="#" onclick="if(window.viewPage)window.viewPage(\'product\',\''+product.id+'\');return false;">← '+pName+'</a> › Customer Reviews</div>'
      +'<h1 class="rv-title">Customer Reviews</h1>'
      +'<p class="rv-subtitle">'+pName+'</p>'
      +'<div class="rv-summary">'
      +'<div class="rv-summary-score">'
      +'<div class="rv-big-score">'+rating+'</div>'
      +'<div class="rv-big-stars">'+stars(rating)+'</div>'
      +'<div class="rv-big-count">'+Number(total).toLocaleString()+' reviews</div>'
      +'</div>'
      +'<div class="rv-breakdown">'+barsHTML+'</div>'
      +'</div>'
      +carouselHTML
      +'<h2 class="rv-section-title">Written Reviews</h2>'
      +'<div class="rv-filter-bar">'
      +'<span class="rv-filter-label">Filter:</span>'
      +'<div class="rv-star-filter">'
      +'<button class="rv-star-btn active" data-stars="0" onclick="rvFilterStars(0)">All</button>'
      +[5,4,3,2,1].map(function(n){return '<button class="rv-star-btn" data-stars="'+n+'" onclick="rvFilterStars('+n+')">'+n+' ★</button>';}).join('')
      +'</div>'
      +'<select class="rv-sort-select" onchange="rvSort(this.value)">'
      +'<option value="recent">Most recent</option>'
      +'<option value="helpful">Most helpful</option>'
      +'<option value="high">Highest rated</option>'
      +'<option value="low">Lowest rated</option>'
      +'</select></div>'
      +'<div class="rv-list" id="rv-list">'+writtenHTML+'</div>';

    setTimeout(rvInitCarousel, 60);
  }

  /* ── play handler ── */
  window.rvPlay=function(thumb){
    var wrap=thumb.closest('.rv-video-embed');
    var vid=wrap.querySelector('video');
    if(vid){thumb.style.display='none';vid.controls=true;vid.play();return;}
    var src=wrap.dataset.src;
    if(!src)return;
    var f=document.createElement('iframe');
    f.src=src;f.setAttribute('allow','autoplay;encrypted-media;picture-in-picture');f.allowFullscreen=true;
    f.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;';
    wrap.innerHTML='';wrap.appendChild(f);
  };

  /* ── carousel ── */
  var _idx=0,_total=0;

  function rvStop(){
    var t=document.getElementById('rv-track');if(!t)return;
    t.querySelectorAll('iframe').forEach(function(f){var s=f.src;f.src='';f.src=s;});
    t.querySelectorAll('video').forEach(function(v){v.pause();});
  }

  function rvUpdate(idx){
    var track=document.getElementById('rv-track');if(!track)return;
    rvStop();
    _idx=idx;
    track.style.transform='translateX(-'+(idx*100)+'%)';
    document.querySelectorAll('.rv-carousel-dot').forEach(function(d){d.classList.toggle('active',+d.dataset.idx===idx);});
    var ctr=document.getElementById('rv-counter');if(ctr)ctr.textContent=(idx+1)+' / '+_total;
    var p=document.getElementById('rv-prev'),n=document.getElementById('rv-next');
    if(p)p.disabled=idx===0;if(n)n.disabled=idx===_total-1;
    /* autoplay */
    var card=track.querySelectorAll('.rv-video-card')[idx];if(!card)return;
    var vid=card.querySelector('video');
    if(vid){var th=card.querySelector('.rv-video-thumb');if(th)th.style.display='none';vid.controls=true;vid.play().catch(function(){});}
    else{
      var embed=card.querySelector('.rv-video-embed[data-src]');
      if(embed&&embed.dataset.src){
        var f=document.createElement('iframe');
        f.src=embed.dataset.src;f.setAttribute('allow','autoplay;encrypted-media;picture-in-picture');f.allowFullscreen=true;
        f.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;';
        embed.innerHTML='';embed.appendChild(f);
      }
    }
  }

  window.rvGo=function(i){rvUpdate(i);};
  window.rvStep=function(d){rvUpdate(Math.max(0,Math.min(_total-1,_idx+d)));};

  function rvInitCarousel(){
    var track=document.getElementById('rv-track');if(!track)return;
    _total=track.querySelectorAll('.rv-video-card').length;
    if(!_total)return;
    var vp=document.getElementById('rv-viewport');if(!vp)return;
    var sx=0,drag=false,moved=false;
    vp.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;drag=true;moved=false;},{passive:true});
    vp.addEventListener('touchmove',function(e){if(Math.abs(e.touches[0].clientX-sx)>8)moved=true;},{passive:true});
    vp.addEventListener('touchend',function(e){if(drag&&moved){var d=e.changedTouches[0].clientX-sx;if(Math.abs(d)>40)rvStep(d<0?1:-1);}drag=false;});
    vp.addEventListener('mousedown',function(e){sx=e.clientX;drag=true;moved=false;});
    vp.addEventListener('mousemove',function(e){if(drag&&Math.abs(e.clientX-sx)>8)moved=true;});
    vp.addEventListener('mouseup',function(e){if(drag&&moved&&Math.abs(e.clientX-sx)>40)rvStep(e.clientX-sx<0?1:-1);drag=false;});
    vp.addEventListener('mouseleave',function(){drag=false;});
    var p=document.getElementById('rv-prev');if(p)p.disabled=true;
    /* don't autoplay first on load — let user choose */
  }

  /* ── filter / sort ── */
  window.rvFilterStars=function(n){
    document.querySelectorAll('.rv-star-btn').forEach(function(b){b.classList.toggle('active',+b.dataset.stars===n);});
    document.querySelectorAll('.rv-card').forEach(function(c){c.style.display=(n===0||+c.dataset.rating===n)?'':'none';});
  };
  window.rvSort=function(v){
    var list=document.getElementById('rv-list');if(!list)return;
    var cards=[].slice.call(list.querySelectorAll('.rv-card'));
    cards.sort(function(a,b){
      if(v==='helpful')return +b.dataset.helpful - +a.dataset.helpful;
      if(v==='high')   return +b.dataset.rating  - +a.dataset.rating;
      if(v==='low')    return +a.dataset.rating  - +b.dataset.rating;
      return new Date(b.dataset.date)-new Date(a.dataset.date);
    });
    cards.forEach(function(c){list.appendChild(c);});
  };
  window.rvHelpful=function(btn){
    if(btn.dataset.voted)return;
    btn.dataset.voted='1';
    btn.textContent='👍 '+(+btn.dataset.base+1);
    btn.style.borderColor='var(--accent)';
  };

  /* ── load ── */
  async function load(){
    try{
      var pr=await fetch(BASE+'data/products.json');
      var rr=await fetch(BASE+'data/reviews.json');
      var products=await pr.json();
      var allReviews=await rr.json();
      var product=pid?products.find(function(p){return p.id===pid;}):null;
      if(!product){
        document.getElementById('rv-page').innerHTML='<div class="rv-empty">No product specified. Please open this page from a product page.</div>';
        return;
      }
      /* reviews.json only holds ratingBreakdown, videos, reviews — NOT rating/reviewCount */
      var rd=allReviews[pid]||{};
      renderPage(product,rd);
    }catch(e){
      console.error(e);
      document.getElementById('rv-page').innerHTML='<div class="rv-empty">Could not load reviews. Please try again.</div>';
    }
  }
  load();
})();
</script>
