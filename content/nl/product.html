<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <link rel="stylesheet" href="../../css/shop.css">
  <style>
    /* ── Magnifier ── */
    .pdp-magnifier {
      position: fixed; pointer-events: none; z-index: 1000;
      background: var(--c-surface); box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      border-radius: 12px; overflow: hidden; border: 2px solid var(--c-accent); display: none;
    }
    .pdp-magnifier img { position: absolute; top: 0; left: 0; max-width: none; display: block; }

    /* ── Gallery ── */
    .pdp-gallery__main-wrap { cursor: crosshair; position: relative; overflow: hidden; }
    .pdp-gallery__main-wrap.video-active { cursor: pointer; }
    .pdp-gallery__main-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Sticky gallery / scrollable details ── */
    .pdp-main { align-items: start !important; }
    .pdp-details {
      overflow-y: auto;
      max-height: calc(100vh - 80px);
      padding-right: 6px;
      scrollbar-width: thin;
    }
    .pdp-details::-webkit-scrollbar { width: 4px; }
    .pdp-details::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    /* ── Amazon-style detail panel ── */
    .amz-breadcrumb { font-size: 12px; color: #666; margin-bottom: 12px; }
    .amz-breadcrumb a { color: #0066c0; text-decoration: none; }
    .amz-title { font-size: 26px; font-weight: bold; line-height: 1.3; margin: 0 0 14px; color: #111; }
    .amz-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 14px; }
    .amz-stars { color: #ff9900; font-size: 16px; }
    .amz-rating-link { color: #0066c0; text-decoration: none; }
    .amz-price-section { padding: 14px 0; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; margin-bottom: 18px; }
    .amz-price-row { display: flex; align-items: baseline; gap: 14px; margin: 10px 0; }
    .amz-price-label { color: #666; font-size: 13px; width: 110px; flex-shrink: 0; }
    .amz-price-main { font-size: 30px; font-weight: bold; color: #111; }
    .amz-price-old { text-decoration: line-through; color: #666; font-size: 14px; }
    .amz-discount-badge { background: #cc0c39; color: white; padding: 3px 7px; border-radius: 3px; font-weight: bold; font-size: 12px; }
    .amz-savings { color: #111; font-weight: bold; }
    .amz-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .amz-badge { background: #cc0c39; color: white; padding: 5px 10px; border-radius: 3px; font-size: 12px; font-weight: bold; }
    .amz-badge--info { background: #0066c0; }
    .amz-info-table { width: 100%; margin-bottom: 20px; }
    .amz-info-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; border-bottom: 1px solid #eee; }
    .amz-info-label { color: #666; }
    .amz-info-value { font-weight: 500; color: #111; }
    .amz-variants-section { margin-bottom: 20px; }
    .amz-variants-label { font-weight: bold; margin-bottom: 10px; font-size: 14px; }
    .amz-variants-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .amz-variant-btn { padding: 9px 14px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-size: 13px; }
    .amz-variant-btn.active { border-color: #0066c0; background: #eef6ff; font-weight: bold; }
    .amz-variant-btn:hover { border-color: #0066c0; }
    .amz-qty-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .amz-qty-label { font-weight: bold; font-size: 14px; }
    .amz-qty-control { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; }
    .amz-qty-btn { border: none; background: white; padding: 8px 14px; cursor: pointer; font-size: 16px; font-weight: bold; color: #0066c0; }
    .amz-qty-btn:hover { background: #f0f0f0; }
    .amz-qty-input { border: none; width: 54px; text-align: center; padding: 8px; font-size: 14px; font-weight: bold; }
    .amz-qty-input::-webkit-outer-spin-button,
    .amz-qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .amz-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
    .amz-btn-cart { background: #ff9900; color: white; padding: 12px 24px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 15px; flex: 1; transition: background 0.2s; }
    .amz-btn-cart:hover { background: #e88700; }
    .amz-btn-buy { background: #ffc700; color: #111; padding: 12px 24px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 15px; flex: 1; transition: background 0.2s; }
    .amz-btn-buy:hover { background: #ffb700; }

    /* ── 2-column accordion ── */
    .pdp-related-card__buy-btn { text-transform: uppercase; font-weight: 700; letter-spacing: 0.08em; }
    .amz-specs-section { margin: 40px 0; padding-top: 30px; border-top: 1px solid #e0e0e0; }
    .amz-specs-title { font-size: 20px; font-weight: bold; margin-bottom: 18px; color: #111; }
    .amz-accordion {
      display: grid; grid-template-columns: 1fr 1fr;
      border: 1px solid #ddd; border-radius: 4px; overflow: hidden;
    }
    @media (max-width: 680px) { .amz-accordion { grid-template-columns: 1fr; } }
    .amz-accordion-item { border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; }
    .amz-accordion-item:nth-child(even) { border-right: none; }
    .amz-accordion-item:nth-last-child(1),
    .amz-accordion-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }
    @media (max-width: 680px) {
      .amz-accordion-item { border-right: none; }
      .amz-accordion-item:last-child { border-bottom: none; }
      .amz-accordion-item:nth-last-child(2):nth-child(odd) { border-bottom: 1px solid #ddd; }
    }
    .amz-accordion-header { padding: 14px 16px; background: #f8f8f8; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px; user-select: none; transition: background 0.2s; }
    .amz-accordion-header:hover { background: #f0f0f0; }
    .amz-accordion-item.open .amz-accordion-header { background: #f0f0f0; }
    .amz-toggle-icon { transition: transform 0.3s; font-size: 16px; }
    .amz-accordion-item.open .amz-toggle-icon { transform: rotate(180deg); }
    .amz-accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .amz-accordion-item.open .amz-accordion-body { max-height: 2000px; }
    .amz-accordion-inner { padding: 16px 20px; }
    .amz-spec-table { width: 100%; border-collapse: collapse; }
    .amz-spec-table td { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .amz-spec-table td:first-child { font-weight: bold; width: 45%; color: #666; }
    .amz-spec-table tr:last-child td { border-bottom: none; }

    /* ── existing accordion (kept for compatibility) ── */
    .pdp-accordion-item .pdp-accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .pdp-accordion-item.open .pdp-accordion-body { max-height: 600px; }
    .pdp-accordion-item.open .pdp-accordion-trigger svg { transform: rotate(180deg); }
  </style>
</head>
<body>

  <div class="pdp-magnifier" id="magnifier">
    <img id="magnifier-img" src="" alt="">
  </div>

  <div class="pdp-lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="pdp-lightbox__inner">
      <button class="pdp-lightbox__close" id="lightbox-close" aria-label="Sluiten">✕</button>
      <div class="pdp-lightbox__tabs">
        <button class="pdp-lightbox__tab active" data-tab="images">Afbeeldingen</button>
        <button class="pdp-lightbox__tab" data-tab="video">Video</button>
      </div>
      <div class="pdp-lightbox__body">
        <div id="tab-images">
          <div class="pdp-lightbox-gallery">
            <div class="pdp-lightbox-main"><img id="lb-main-img" src="" alt=""></div>
            <div class="pdp-lightbox-thumbs" id="lb-thumbs"></div>
            <div class="pdp-lightbox-details" id="lb-details"></div>
          </div>
        </div>
        <div id="tab-video" style="display:none;">
          <div class="pdp-video-wrap" id="video-container"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="webshop-page-header">
    <div class="webshop-container">
      <div class="webshop-page-header__inner">
        <a href="index.html" class="webshop-logo">WEBSHOP</a>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="webshop-lang-switcher" id="lang-switcher-slot"></div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="webshop-page-main">
    <div class="webshop-container">
      <div class="pdp-wrapper">

        <div class="pdp-main webshop-fade-in" id="pdp-main-section">
          <div class="pdp-gallery" id="pdp-gallery">
            <div class="pdp-gallery__main-wrap" id="gallery-main-wrap">
              <img class="pdp-gallery__main-img" id="gallery-main-img" src="" alt="">
              <div class="pdp-gallery__main-video" id="gallery-main-video" style="display:none;position:absolute;inset:0;background:#000;border-radius:inherit;">
                <video id="gallery-video-player" style="width:100%;height:100%;object-fit:contain;" controls></video>
                <div id="gallery-yt-frame" style="display:none;position:absolute;inset:0;">
                  <iframe id="gallery-yt-iframe" style="width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                </div>
              </div>
            </div>
            <div class="pdp-gallery__thumbs" id="gallery-thumbs"></div>
            <button class="pdp-fullview-btn" id="fullview-btn" aria-hidden="true" tabindex="-1"></button>
          </div>

          <div class="pdp-details" id="pdp-details">
            <div class="amz-breadcrumb" id="amz-breadcrumb"></div>
            <h1 class="amz-title" id="pdp-name"></h1>

            <div class="amz-rating">
              <span class="amz-stars">★★★★★</span>
              <a href="#reviews" class="amz-rating-link" id="amz-rating-count"></a>
            </div>

            <div class="amz-price-section">
              <div class="amz-price-row">
                <span class="amz-price-label">Prijs:</span>
                <span class="amz-price-main" id="pdp-price"></span>
              </div>
              <div class="amz-price-row" id="amz-list-price-row" style="display:none;">
                <span class="amz-price-label">Adviesprijs:</span>
                <span class="amz-price-old" id="amz-list-price"></span>
              </div>
              <div class="amz-price-row" id="amz-savings-row" style="display:none;">
                <span class="amz-price-label">Bespaar:</span>
                <span class="amz-savings" id="amz-savings"></span>
                <span class="amz-discount-badge" id="amz-discount-pct"></span>
              </div>
            </div>

            <div class="amz-badges" id="amz-badges"></div>

            <div class="amz-info-table">
              <div class="amz-info-row">
                <span class="amz-info-label">Beschikbaarheid:</span>
                <span class="amz-info-value" id="amz-availability">In voorraad</span>
              </div>
              <div class="amz-info-row">
                <span class="amz-info-label">Verzonden door:</span>
                <span class="amz-info-value" id="amz-ships-from">Winkel</span>
              </div>
              <div class="amz-info-row">
                <span class="amz-info-label">Verkocht door:</span>
                <span class="amz-info-value" id="amz-sold-by">Winkel</span>
              </div>
              <div class="amz-info-row">
                <span class="amz-info-label">Retourbeleid:</span>
                <span class="amz-info-value" id="amz-returns">30-daagse teruggave/vervanging</span>
              </div>
            </div>

            <p class="pdp-desc" id="pdp-desc"></p>

            <div class="amz-variants-section" id="amz-variants-section" style="display:none;">
              <div class="amz-variants-label" id="amz-variants-label">Optie selecteren:</div>
              <div class="amz-variants-grid" id="amz-variants-grid"></div>
            </div>

            <div class="amz-qty-row">
              <span class="amz-qty-label">Hoeveelheid:</span>
              <div class="amz-qty-control">
                <button class="amz-qty-btn" id="qty-minus">−</button>
                <input type="number" class="amz-qty-input" id="qty-val-input" value="1" min="1">
                <button class="amz-qty-btn" id="qty-plus">+</button>
              </div>
            </div>

            <div class="amz-buttons">
              <button class="amz-btn-cart" id="atc-btn" data-i18n="add_to_cart">In winkelwagen</button>
              <button class="amz-btn-buy" id="buy-now-btn">Nu kopen</button>
            </div>

            <div class="pdp-perks" id="pdp-perks"></div>
          </div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-1" id="bundle-section" style="display:none;">
          <h2 class="pdp-section-title" id="bundle-title" data-i18n="frequently_bought_together">Frequently Bought Together</h2>
          <div class="pdp-bundle-items-list" id="bundle-items"></div>
          <div class="pdp-bundle-actions">
            <div id="bundle-price-info" style="font-size:0.93em;color:var(--c-text-muted);"></div>
            <button class="webshop-btn webshop-btn--primary pdp-bundle-add-all-btn" id="bundle-add-all" data-i18n="add_both_to_cart">Add Bundle to Cart</button>
          </div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-2" id="related-section" style="display:none;">
          <h2 class="pdp-section-title" data-i18n="related_products_title">Products Related to This Item</h2>
          <div class="pdp-related-grid" id="related-grid"></div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-3 amz-specs-section" id="specs-section" style="display:none;">
          <h2 class="amz-specs-title">Productinformatie</h2>
          <div class="amz-accordion" id="specs-accordion"></div>
        </div>

      </div>
    </div>
  </main>

  <script src="../../js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script"); s.src = src;
          s.onload = resolve; s.onerror = function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("webshop:ready")); });
    })();
  </script>

  <script>
  document.addEventListener("webshop:ready", async function() {

    /* ── resolve product ID from URL (?id=arc-floor-lamp) ── */
    const params  = new URLSearchParams(window.location.search);
    const prodId  = params.get("id") || "arc-floor-lamp";

    /* ── load lang + all products, then look up this product ── */
    await Shop.loadLang();
    const allProducts = await Shop.loadProducts();          /* populates internal cache */
    const PRODUCT = allProducts.find(p => p.id === prodId) || allProducts[0];

    if (!PRODUCT) {
      document.getElementById("pdp-name").textContent = "Product niet gevonden";
      return;
    }

    /* ── helpers to resolve a product-ID reference to a full product object ── */
    function resolveById(id) {
      return allProducts.find(p => p.id === id) || null;
    }

    /* ── update page title ── */
    document.title = "WEBSHOP – " + Shop.pName(PRODUCT);

    /* ── state ── */
    let selectedVariant = PRODUCT.variants?.[0]?.id || null;
    let qty = 1;
    let currentImgIdx = 0;

    /* ── init modules ── */
    if (typeof Currency !== "undefined") Currency.init();
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    buildLangSwitcher();
    renderMeta();
    renderVariants();
    updatePrice();
    renderPerks();
    renderGallery();
    renderBundle();
    renderRelated();
    renderSpecs();
    applyI18n();
    initMagnifier();
    initLightbox();
    initQty();
    initAtc();

    document.addEventListener("currency:changed", updatePrice);
    document.addEventListener("shop:langChanged", () => {
      buildLangSwitcher();
      renderMeta();
      renderPerks();
      renderBundle();
      renderRelated();
      renderSpecs();
      applyI18n();
    });

    /* ════════════════════════════════════════════════════
       LANG SWITCHER
    ════════════════════════════════════════════════════ */
    function buildLangSwitcher() {
      const slot = document.getElementById("lang-switcher-slot"); if (!slot) return;
      const langs   = CONFIG.supportedLanguages || ["en"];
      const current = CONFIG.language || "nl";
      slot.innerHTML = langs.map(l =>
        `<button class="webshop-lang-btn${l === current ? " active" : ""}" data-lang="${l}">${l.toUpperCase()}</button>`
      ).join("");
      Shop.wireLanguageSwitcher(".webshop-lang-btn");
    }

    function applyI18n() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const v = Shop.t(el.dataset.i18n); if (v) el.textContent = v;
      });
    }

    /* ════════════════════════════════════════════════════
       META (name, category, description)
    ════════════════════════════════════════════════════ */
    function renderMeta() {
      document.getElementById("pdp-name").textContent     = Shop.pName(PRODUCT);
      document.getElementById("pdp-desc").textContent     = Shop.pDesc(PRODUCT);

      // Breadcrumb
      const bc = document.getElementById("amz-breadcrumb");
      if (bc) bc.innerHTML = `<a href="../winkel/">Winkel</a> › <span>${PRODUCT.category || "Producten"}</span>`;

      // Rating count
      const rc = document.getElementById("amz-rating-count");
      if (rc) rc.innerHTML = `<span style="color:#0066c0;">(2.547 Beoordelingen)</span>`;

      // Availability / shipping info
      const stock = PRODUCT.stock !== undefined ? PRODUCT.stock : 99;
      const av = document.getElementById("amz-availability");
      if (av) av.textContent = stock > 0 ? "In voorraad" : "Niet beschikbaar";
      const sf = document.getElementById("amz-ships-from");
      if (sf) sf.textContent = PRODUCT.shipsFrom || "Winkel";
      const sb = document.getElementById("amz-sold-by");
      if (sb) sb.textContent = PRODUCT.soldBy || "Winkel";
      const ri = document.getElementById("amz-returns");
      if (ri) ri.textContent = PRODUCT.returns || "30-daagse teruggave/vervanging";

      // Badges
      const badgesEl = document.getElementById("amz-badges");
      if (badgesEl) {
        badgesEl.innerHTML =
          (PRODUCT.featured ? '<div class="amz-badge">#1 Best Seller</div>' : '') +
          (PRODUCT.new      ? '<div class="amz-badge amz-badge--info">New</div>' : '');
      }
    }

    /* ════════════════════════════════════════════════════
       PRICE
    ════════════════════════════════════════════════════ */
    function fmt(n) { return (typeof Shop !== "undefined" && Shop.fmt) ? Shop.fmt(n) : "€" + n.toFixed(2); }

    function updatePrice() {
      const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
      const basePrice = v ? v.price : PRODUCT.price;
      const listPrice = PRODUCT.listPrice || (basePrice * 1.2);
      document.getElementById("pdp-price").textContent = fmt(basePrice);

      const discount = Math.round((1 - basePrice / listPrice) * 100);
      const savings  = listPrice - basePrice;
      const listRow  = document.getElementById("amz-list-price-row");
      const savRow   = document.getElementById("amz-savings-row");
      if (discount > 0 && listRow && savRow) {
        document.getElementById("amz-list-price").textContent   = fmt(listPrice);
        document.getElementById("amz-savings").textContent      = fmt(savings);
        document.getElementById("amz-discount-pct").textContent = `-${discount}%`;
        listRow.style.display = "flex";
        savRow.style.display  = "flex";
      }
    }

    /* ════════════════════════════════════════════════════
       VARIANTS
    ════════════════════════════════════════════════════ */
    function renderVariants() {
      const wrap = document.getElementById("amz-variants-section");
      const el   = document.getElementById("amz-variants-grid");
      if (!PRODUCT.variants?.length) { if (wrap) wrap.style.display = "none"; return; }
      if (wrap) wrap.style.display = "";
      el.innerHTML = PRODUCT.variants.map(v =>
        `<button class="amz-variant-btn${v.id === selectedVariant ? " active" : ""}" data-vid="${v.id}">${v.label}</button>`
      ).join("");
      el.querySelectorAll(".amz-variant-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedVariant = btn.dataset.vid;
          el.querySelectorAll(".amz-variant-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const v = PRODUCT.variants.find(v => v.id === selectedVariant);
          if (v?.image) {
            document.getElementById("gallery-main-img").src = v.image;
            document.getElementById("magnifier-img").src = v.image.replace("w=800", "w=1600");
          }
          updatePrice();
        });
      });
    }

    /* ════════════════════════════════════════════════════
       PERKS
    ════════════════════════════════════════════════════ */
    function renderPerks() {
      const el = document.getElementById("pdp-perks"); if (!el) return;
      const keys      = ["perk_free_shipping", "perk_returns", "perk_warranty"];
      const fallbacks = ["Free shipping over €150", "30-day returns", "2-year warranty"];
      el.innerHTML = keys.map((k, i) => `<span>${Shop.t(k) || fallbacks[i]}</span>`).join("");
    }

    /* ════════════════════════════════════════════════════
       GALLERY  (images + video thumbnails)
    ════════════════════════════════════════════════════ */
    function renderGallery() {
      const mainImg      = document.getElementById("gallery-main-img");
      const mainVideoWrap= document.getElementById("gallery-main-video");
      const videoPlayer  = document.getElementById("gallery-video-player");
      const ytFrame      = document.getElementById("gallery-yt-frame");
      const ytIframe     = document.getElementById("gallery-yt-iframe");
      const thumbsEl     = document.getElementById("gallery-thumbs");
      const mainWrap     = document.getElementById("gallery-main-wrap");

      // Combined media list: images first, then videos
      const images = PRODUCT.images || [];
      const videos = PRODUCT.videos || [];
      // Each item: { type: 'image'|'video', src, thumb }
      const mediaItems = [
        ...images.map(src => ({ type: "image", src, thumb: src })),
        ...videos.map(src => {
          const isYT = /youtube\.com|youtu\.be/.test(src);
          return { type: "video", src, isYT,
            thumb: isYT
              ? `https://img.youtube.com/vi/${extractYTId(src)}/mqdefault.jpg`
              : null
          };
        })
      ];

      function extractYTId(url) {
        const m = url.match(/embed\/([^?]+)/) || url.match(/youtu\.be\/([^?]+)/);
        return m ? m[1] : "";
      }

      let activeIdx = 0;
      let activeType = "image"; // 'image' or 'video'

      function showImage(idx) {
        activeIdx = idx; activeType = "image";
        currentImgIdx = idx;
        const src = mediaItems[idx].src;
        // Stop any playing video
        videoPlayer.pause(); videoPlayer.src = "";
        ytIframe.src = "";
        mainVideoWrap.style.display = "none";
        mainWrap.classList.remove("video-active");
        mainImg.style.opacity = "1";
        mainImg.src = src;
        document.getElementById("magnifier-img").src = src.replace("w=800","w=1600");
        // Sync lightbox image
        const lbMain = document.getElementById("lb-main-img");
        if (lbMain) lbMain.src = src;
        document.querySelectorAll(".pdp-lightbox-thumb").forEach((t, i) =>
          t.classList.toggle("active", i === idx)
        );
        buildThumbs();
      }

      function showVideo(idx) {
        activeIdx = idx; activeType = "video";
        const item = mediaItems[idx];
        // Hide image, show video overlay
        mainImg.style.opacity = "0";
        mainVideoWrap.style.display = "block";
        mainWrap.classList.add("video-active");
        if (item.isYT) {
          videoPlayer.style.display = "none";
          ytFrame.style.display = "block";
          ytIframe.src = item.src + "?autoplay=1";
        } else {
          ytFrame.style.display = "none";
          ytIframe.src = "";
          videoPlayer.style.display = "block";
          videoPlayer.src = item.src;
          videoPlayer.play().catch(()=>{});
        }
        buildThumbs();
      }

      function buildThumbs() {
        thumbsEl.innerHTML = mediaItems.map((item, i) => {
          const isActive = i === activeIdx;
          if (item.type === "image") {
            return `<div class="pdp-gallery__thumb-wrap${isActive?" active":""}" data-idx="${i}" data-type="image">
              <img class="pdp-gallery__thumb" src="${item.src}" alt="View ${i+1}">
            </div>`;
          } else {
            // Video thumb — play icon overlay
            const thumbStyle = item.thumb
              ? `style="background-image:url('${item.thumb}');background-size:cover;background-position:center;"`
              : `style="background:var(--c-surface-2);"`;
            return `<div class="pdp-gallery__thumb-wrap pdp-gallery__thumb-wrap--video${isActive?" active":""}" data-idx="${i}" data-type="video" ${thumbStyle}>
              <span class="pdp-thumb-play">▶</span>
            </div>`;
          }
        }).join("");

        thumbsEl.querySelectorAll(".pdp-gallery__thumb-wrap").forEach(el => {
          el.addEventListener("click", () => {
            const idx = +el.dataset.idx;
            if (el.dataset.type === "video") showVideo(idx);
            else showImage(idx);
          });
        });
      }

      // Expose for variant switching
      window._selectImage = function(idx) { showImage(idx); };

      // Init
      if (images.length) {
        mainImg.src = images[0];
        mainImg.alt = Shop.pName(PRODUCT);
        document.getElementById("magnifier-img").src = (images[0]||"").replace("w=800","w=1600");
      }
      buildThumbs();

      // Main wrap click: image → lightbox images, video → lightbox video tab
      mainWrap.addEventListener("click", e => {
        // Don't open lightbox if clicking video controls
        if (e.target.closest("video") || e.target.closest("iframe")) return;
        if (activeType === "video") {
          // Stop inline playback and open lightbox video tab
          videoPlayer.pause();
          ytIframe.src = "";
          openLightbox("video");
        } else {
          openLightbox("images");
        }
      });
    }

    /* ════════════════════════════════════════════════════
       MAGNIFIER
    ════════════════════════════════════════════════════ */
    function initMagnifier() {
      const magEl   = document.getElementById("magnifier");
      const magImg  = document.getElementById("magnifier-img");
      const mainWrap = document.getElementById("gallery-main-wrap");
      magImg.src = (PRODUCT.images[0] || "").replace("w=800", "w=1600");

      function updateMagnifierSize() {
        const rect  = mainWrap.getBoundingClientRect();
        const size  = Math.min(Math.min(window.innerWidth * 0.45, 600), rect.width * 1.2);
        magEl.style.width = size + "px"; magEl.style.height = size + "px";
      }

      mainWrap.addEventListener("mousemove", e => {
        // Don't show magnifier when a video is active
        if (document.getElementById("gallery-main-video").style.display !== "none") {
          magEl.style.display = "none"; return;
        }
        const rect = mainWrap.getBoundingClientRect();
        const xPct = (e.clientX - rect.left)  / rect.width;
        const yPct = (e.clientY - rect.top)   / rect.height;
        updateMagnifierSize();
        const lensW = magEl.offsetWidth, lensH = magEl.offsetHeight;
        let mLeft = rect.right + 20, mTop = rect.top + (rect.height / 2) - (lensH / 2);
        if (mLeft + lensW > window.innerWidth - 20) mLeft = rect.left - lensW - 20;
        mLeft = Math.max(10, Math.min(mLeft, window.innerWidth  - lensW - 10));
        mTop  = Math.max(10, Math.min(mTop,  window.innerHeight - lensH - 10));
        magEl.style.left = mLeft + "px"; magEl.style.top = mTop + "px";
        magEl.style.display = "block";
        const nW = magImg.naturalWidth, nH = magImg.naturalHeight;
        if (nW && nH) {
          const ca = rect.width / rect.height, ia = nW / nH;
          let dW, dH, ox = 0, oy = 0;
          if (ia > ca) { dH = rect.height; dW = dH * ia; ox = (rect.width - dW) / 2; }
          else         { dW = rect.width;  dH = dW / ia; oy = (rect.height - dH) / 2; }
          const imgX = ((xPct * dW - ox) / dW) * nW;
          const imgY = ((yPct * dH - oy) / dH) * nH;
          const zoom = 2;
          magImg.style.width  = (nW * zoom) + "px";
          magImg.style.height = (nH * zoom) + "px";
          magImg.style.left   = -(imgX * zoom - lensW / 2) + "px";
          magImg.style.top    = -(imgY * zoom - lensH / 2) + "px";
        }
      });
      mainWrap.addEventListener("mouseleave", () => { magEl.style.display = "none"; });
      window.addEventListener("resize", () => { if (magEl.style.display === "block") updateMagnifierSize(); });
    }

    /* ════════════════════════════════════════════════════
       LIGHTBOX
    ════════════════════════════════════════════════════ */
    function initLightbox() {
      const lightbox = document.getElementById("lightbox");
      let activeTab  = "images";

      window.openLightbox = function(tab) {
        activeTab = tab || "images";
        buildLightbox();
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
      };

      function closeLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
      }

      function buildLightbox() {
        document.querySelectorAll(".pdp-lightbox__tab").forEach(t =>
          t.classList.toggle("active", t.dataset.tab === activeTab)
        );
        document.getElementById("tab-images").style.display = activeTab === "images" ? "" : "none";
        document.getElementById("tab-video").style.display  = activeTab === "video"  ? "" : "none";

        if (activeTab === "images") {
          document.getElementById("lb-main-img").src = PRODUCT.images[currentImgIdx];
          const lbThumbs = document.getElementById("lb-thumbs");
          lbThumbs.innerHTML = PRODUCT.images.map((src, i) =>
            `<img class="pdp-lightbox-thumb${i === currentImgIdx ? " active" : ""}" src="${src}" alt="View ${i+1}" data-idx="${i}">`
          ).join("");
          lbThumbs.querySelectorAll(".pdp-lightbox-thumb").forEach(t => {
            t.addEventListener("click", () => {
              currentImgIdx = +t.dataset.idx;
              document.getElementById("lb-main-img").src = PRODUCT.images[currentImgIdx];
              lbThumbs.querySelectorAll(".pdp-lightbox-thumb").forEach((x, j) =>
                x.classList.toggle("active", j === currentImgIdx)
              );
            });
          });
          const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
          const perksHtml = ["perk_free_shipping","perk_returns","perk_warranty"].map((k, i) =>
            `<span>${Shop.t(k) || ["Gratis verzending boven €150","30-daagse retournering","2 jaar garantie"][i]}</span>`
          ).join("");
          document.getElementById("lb-details").innerHTML = `
            <p class="pdp-category">${Shop.pCategory(PRODUCT)}</p>
            <h2 class="pdp-name">${Shop.pName(PRODUCT)}</h2>
            <p class="pdp-price">${fmt(v ? v.price : PRODUCT.price)}</p>
            <p class="pdp-desc">${Shop.pDesc(PRODUCT)}</p>
            <div class="pdp-perks">${perksHtml}</div>`;
        }
        if (activeTab === "video") {
          const videos = PRODUCT.videos || [];
          function renderVideo(url) {
            const isYT = /youtube\.com\/embed\/|youtu\.be\//.test(url);
            if (isYT) {
              return `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
                <iframe src="${url}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
              </div>`;
            }
            return `<video src="${url}" controls style="width:100%;max-height:70vh;border-radius:12px;display:block;"></video>`;
          }
          document.getElementById("video-container").innerHTML = videos.length
            ? videos.map(renderVideo).join("")
            : `<div class="pdp-no-video">📽 Geen video beschikbaar voor dit product.</div>`;
        }
      }

      document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
      document.querySelectorAll(".pdp-lightbox__tab").forEach(t =>
        t.addEventListener("click", () => { activeTab = t.dataset.tab; buildLightbox(); })
      );
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
    }

    /* ════════════════════════════════════════════════════
       QTY + ATC + BUY NOW
    ════════════════════════════════════════════════════ */
    function initQty() {
      const qtyInput = document.getElementById("qty-val-input");
      document.getElementById("qty-minus").addEventListener("click", () => {
        if (qty > 1) { qty--; qtyInput.value = qty; }
      });
      document.getElementById("qty-plus").addEventListener("click", () => {
        const v     = PRODUCT.variants?.find(v => v.id === selectedVariant);
        const stock = v?.stock ?? PRODUCT.stock ?? 99;
        if (qty < stock) { qty++; qtyInput.value = qty; }
      });
      qtyInput.addEventListener("change", () => {
        const v     = PRODUCT.variants?.find(v => v.id === selectedVariant);
        const stock = v?.stock ?? PRODUCT.stock ?? 99;
        qty = Math.max(1, Math.min(parseInt(qtyInput.value) || 1, stock));
        qtyInput.value = qty;
      });
    }

    function initAtc() {
      document.getElementById("atc-btn").addEventListener("click", () => {
        const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
        Shop.addToCart(PRODUCT, qty, selectedVariant, null, v?.image || PRODUCT.image);
        Shop.toast(`${Shop.pName(PRODUCT)}${v ? " – " + v.label : ""} ${Shop.t("added", "toegevoegd aan winkelwagen")}`);
      });
      const buyBtn = document.getElementById("buy-now-btn");
      if (buyBtn) {
        buyBtn.addEventListener("click", () => {
          const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
          Shop.addToCart(PRODUCT, qty, selectedVariant, null, v?.image || PRODUCT.image);
          const lang     = window.LANG || localStorage.getItem("dornori-lang") || "nl";
          const basePath = (window.SHOP_CONFIG && window.SHOP_CONFIG.basePath) || "/";
          const slug     = (window.T && window.T.url_slugs && window.T.url_slugs.cart) || "winkelwagen";
          window.location.href = `${basePath}${lang}/${slug}/`;
        });
      }
    }

    /* ════════════════════════════════════════════════════
       FREQUENTLY BOUGHT TOGETHER (bundle)
    ════════════════════════════════════════════════════ */
    function renderBundle() {
      const section  = document.getElementById("bundle-section");
      const bundleEl = document.getElementById("bundle-items");
      const priceEl  = document.getElementById("bundle-price-info");
      const bundleIds = PRODUCT.bundled || [];
      if (!bundleIds.length) { section.style.display = "none"; return; }

      const bundleProducts = bundleIds.map(id => resolveById(id)).filter(Boolean);
      if (!bundleProducts.length) { section.style.display = "none"; return; }
      section.style.display = "";

      bundleEl.innerHTML = bundleProducts.map(item => {
        const name = Shop.pName(item);
        const desc = Shop.pDesc(item);
        return `
        <div class="pdp-bundle-item">
          <img src="${item.image}" alt="${name}" onerror="this.style.background='var(--c-bg-alt)'">
          <div class="pdp-bundle-item__info">
            <div class="pdp-bundle-item__name">${name}</div>
            <div class="pdp-bundle-item__price">${fmt(item.price)}${desc ? " · " + desc : ""}</div>
          </div>
        </div>`;
      }).join("");

      /* bundle pricing */
      const mainPrice    = PRODUCT.variants?.[0]?.price ?? PRODUCT.price;
      const addonsTotal  = bundleProducts.reduce((s, p) => s + p.price, 0);
      const fullTotal    = mainPrice + addonsTotal;
      const discount     = PRODUCT.bundleDiscount || 0;
      const discounted   = discount > 0 ? fullTotal * (1 - discount / 100) : null;
      if (discount > 0 && discounted) {
        priceEl.innerHTML =
          `<span style="margin-right:5px;">🏷️</span>${Shop.t("bundle_full_price","Full price")}: <s>${fmt(fullTotal)}</s> &nbsp;→&nbsp; ` +
          `<strong>${fmt(discounted)}</strong> &nbsp;<span style="color:var(--c-accent);font-weight:600;">(${discount}% ${Shop.t("bundle_off","off")})</span>`;
      } else {
        priceEl.textContent = `${Shop.t("bundle_total","Bundle total")}: ${fmt(fullTotal)}`;
      }

      document.getElementById("bundle-add-all").onclick = () => {
        const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
        Shop.addToCart(PRODUCT, 1, selectedVariant, null, v?.image || PRODUCT.image);
        bundleProducts.forEach(item => Shop.addToCart(item, 1, null, null, item.image));
        Shop.toast(`${Shop.pName(PRODUCT)} + ${Shop.t("bundle_added","bundle added to cart")}`);
      };
    }

    /* ════════════════════════════════════════════════════
       RELATED PRODUCTS
    ════════════════════════════════════════════════════ */
    function renderRelated() {
      const section   = document.getElementById("related-section");
      const relatedEl = document.getElementById("related-grid");
      const relatedIds = PRODUCT.related || [];
      const relatedProducts = relatedIds.map(id => resolveById(id)).filter(Boolean);
      if (!relatedProducts.length) { section.style.display = "none"; return; }
      section.style.display = "";

      relatedEl.innerHTML = relatedProducts.map(r => {
        const name = Shop.pName(r);
        const price = r.variants?.[0]?.price ?? r.price;
        return `
        <div class="pdp-related-card">
          <div class="pdp-related-card__img-wrap">
            <img src="${r.image}" alt="${name}">
            <div class="pdp-related-card__overlay">
              <button class="pdp-related-card__buy-btn"
                data-rid="${r.id}"
                data-rimg="${r.image}">${Shop.t("buy_now","BUY NOW")}</button>
            </div>
          </div>
          <div class="pdp-related-card__info">
            <div class="pdp-related-card__name">${name}</div>
            <div class="pdp-related-card__price">${fmt(price)}</div>
          </div>
        </div>`;
      }).join("");

      relatedEl.querySelectorAll(".pdp-related-card").forEach(card => {
        // Add click handler for the card itself (image/info) to navigate
        const imgWrap = card.querySelector(".pdp-related-card__img-wrap");
        const infoWrap = card.querySelector(".pdp-related-card__info");
        const rid = card.querySelector(".pdp-related-card__buy-btn")?.dataset.rid;
        
        if (imgWrap && rid) {
          imgWrap.style.cursor = "pointer";
          imgWrap.addEventListener("click", e => {
            e.stopPropagation();
            const basePath = (window.SHOP_CONFIG && window.SHOP_CONFIG.basePath) || '/';
            const lang = window.LANG || localStorage.getItem('dornori-lang') || 'en';
            const slug = (window.T && window.T.url_slugs && window.T.url_slugs.product) || 'product';
            window.location.href = `${basePath}${lang}/${slug}/?id=${rid}`;
          });
        }
        
        if (infoWrap && rid) {
          infoWrap.style.cursor = "pointer";
          infoWrap.addEventListener("click", e => {
            e.stopPropagation();
            const basePath = (window.SHOP_CONFIG && window.SHOP_CONFIG.basePath) || '/';
            const lang = window.LANG || localStorage.getItem('dornori-lang') || 'en';
            const slug = (window.T && window.T.url_slugs && window.T.url_slugs.product) || 'product';
            window.location.href = `${basePath}${lang}/${slug}/?id=${rid}`;
          });
        }
      });

      relatedEl.querySelectorAll(".pdp-related-card__buy-btn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const item = resolveById(btn.dataset.rid);
          if (!item) return;
          Shop.addToCart(item, 1, null, null, btn.dataset.rimg);
          Shop.toast(`${Shop.pName(item)} ${Shop.t("added","toegevoegd aan winkelwagen")}`);
        });
      });
    }

    /* ════════════════════════════════════════════════════
       SPECS ACCORDION
    ════════════════════════════════════════════════════ */
    function renderSpecs() {
      const section     = document.getElementById("specs-section");
      const accordionEl = document.getElementById("specs-accordion");
      const specs = PRODUCT.specs || [];
      if (!specs.length) { section.style.display = "none"; return; }
      section.style.display = "";

      function specTitle(sec) {
        if (sec.title_key) {
          /* check per-product specs object in the lang files */
          const pl    = Shop.getProductLang?.()   || {};
          const plEn  = Shop.getProductLangEn?.() || {};
          const specs = pl[PRODUCT.id]?.specs || plEn[PRODUCT.id]?.specs || {};
          if (specs[sec.title_key]) return specs[sec.title_key];
          /* fall back to UI string with same key */
          const uiStr = Shop.t(sec.title_key);
          if (uiStr && uiStr !== sec.title_key) return uiStr;
        }
        return sec.title;
      }

      accordionEl.innerHTML = specs.map((sec, idx) => `
        <div class="amz-accordion-item${idx === 0 ? " open" : ""}">
          <div class="amz-accordion-header">
            <span>${specTitle(sec)}</span>
            <span class="amz-toggle-icon">▼</span>
          </div>
          <div class="amz-accordion-body">
            <div class="amz-accordion-inner">
              <table class="amz-spec-table"><tbody>
                ${sec.rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}
              </tbody></table>
            </div>
          </div>
        </div>`
      ).join("");

      accordionEl.querySelectorAll(".amz-accordion-header").forEach(hdr => {
        hdr.addEventListener("click", () => hdr.parentElement.classList.toggle("open"));
      });
    }

  }); /* end webshop:ready */
  </script>
