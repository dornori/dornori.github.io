<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Form with Queue</title>
    <style>
        body { font-family: sans-serif; padding: 1rem; }
        input, textarea, button { display: block; width: 100%; margin: 0.5rem 0; padding: 0.5rem; }
        button { background: #0066cc; color: white; border: none; cursor: pointer; }
        button:hover { background: #0055aa; }
        .test-btn { background: #28a745; }
        .test-btn:hover { background: #218838; }
        #status { padding: 1rem; margin-top: 1rem; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .sending { background: #fff3cd; color: #856404; }
        hr { margin: 2rem 0; }
        .note { background: #e9ecef; padding: 1rem; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

<h2>Contact Form with Queue</h2>

<div class="note">
    <strong>Testing:</strong> Use the green "Test (Instant)" button to bypass rate limiting.<br>
    <strong>Production:</strong> Use the blue button — rate limited to ~100 emails/day.
</div>

<input type="text" id="name" placeholder="Your name">
<input type="email" id="email" placeholder="Your email">
<textarea id="message" rows="4" placeholder="Your message"></textarea>

<button id="testBtn" class="test-btn">🧪 Test (Instant - no rate limit)</button>
<button id="submitBtn">📧 Send (Rate limited: ~100/day)</button>

<div id="status"></div>

<script>
const workerUrl = "https://edge-form-handler-api.dornori-info.workers.dev";
const statusDiv = document.getElementById("status");

async function sendMessage(category, isTest = false) {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    if (!email || !message) {
        statusDiv.className = "error";
        statusDiv.textContent = "✗ Please fill in email and message";
        return;
    }

    statusDiv.className = "sending";
    statusDiv.textContent = "Sending...";

    const payload = {
        category: category,
        name: name,
        email: email,
        message: message
    };

    if (isTest) {
        payload.test = true;
    }

    try {
        const response = await fetch(workerUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await response.text();

        if (response.ok) {
            statusDiv.className = "success";
            if (isTest) {
                statusDiv.textContent = "✓ TEST email sent instantly! Check your inbox.";
            } else {
                statusDiv.textContent = "✓ Message queued! Will be sent within 24 hours (rate limited).";
            }
            // Clear form
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("message").value = "";
        } else {
            statusDiv.className = "error";
            statusDiv.textContent = "✗ Error: " + result;
        }
    } catch (err) {
        statusDiv.className = "error";
        statusDiv.textContent = "✗ Network error: " + err.message;
    }
}

document.getElementById("submitBtn").addEventListener("click", () => sendMessage("contact", false));
document.getElementById("testBtn").addEventListener("click", () => sendMessage("test", true));
</script>

</body>
</html>
<script>window.scrollTo(0,0);</script>
