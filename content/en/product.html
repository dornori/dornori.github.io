<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <link rel="stylesheet" href="../../css/shop.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #f5f5f5; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    .product-page { padding: 20px 0; background: white; }
    .product-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

    /* ── Two-column product grid ── */
    .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 30px 0; align-items: start; }
    @media (max-width: 900px) { .product-grid { grid-template-columns: 1fr; gap: 20px; padding: 20px 0; } }

    /* ── Sticky gallery ── */
    .product-gallery { position: sticky; top: 20px; height: fit-content; }
    .gallery-main {
      position: relative; aspect-ratio: 1; overflow: hidden;
      border: 1px solid #e0e0e0; margin-bottom: 15px; background: white;
      cursor: zoom-in;
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-thumbs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .gallery-thumb { aspect-ratio: 1; border: 1px solid #ddd; cursor: pointer; overflow: hidden; background: white; position: relative; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb.active { border: 2px solid #0066c0; }
    .gallery-thumb--video { background: #111; display: flex; align-items: center; justify-content: center; }
    .gallery-thumb--video::after { content: "▶"; position: absolute; color: white; font-size: 1.2rem; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
    .gallery-main-video { display: none; position: absolute; inset: 0; background: #000; }
    .gallery-main-video video, .gallery-main-video iframe { width: 100%; height: 100%; object-fit: contain; border: 0; }

    /* ── Scrollable product details ── */
    .product-details { overflow-y: auto; max-height: calc(100vh - 60px); padding-right: 6px; scrollbar-width: thin; }
    .product-details::-webkit-scrollbar { width: 4px; }
    .product-details::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    .breadcrumb { font-size: 12px; color: #666; margin-bottom: 15px; }
    .breadcrumb a { color: #0066c0; text-decoration: none; }
    .product-title { font-size: 28px; font-weight: bold; line-height: 1.3; margin: 15px 0; color: #111; }
    .product-rating { display: flex; align-items: center; gap: 12px; margin: 20px 0; font-size: 14px; }
    .stars { color: #ff9900; font-size: 16px; }
    .rating-link { color: #0066c0; text-decoration: none; }

    .price-section { padding: 15px 0; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; margin: 20px 0; }
    .price-block { margin: 15px 0; display: flex; align-items: baseline; gap: 15px; }
    .price-label { color: #666; font-size: 13px; width: 120px; }
    .price-main { font-size: 32px; font-weight: bold; color: #111; }
    .price-old { text-decoration: line-through; color: #666; font-size: 14px; }
    .discount-badge { background: #cc0c39; color: white; padding: 4px 8px; border-radius: 3px; font-weight: bold; font-size: 12px; }
    .savings { color: #111; font-weight: bold; }

    .badges-row { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { display: inline-block; background: #cc0c39; color: white; padding: 6px 12px; border-radius: 3px; font-size: 12px; font-weight: bold; }
    .badge-info { background: #0066c0; }

    .info-section { margin: 20px 0; }
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 14px; border-bottom: 1px solid #eee; }
    .info-label { color: #666; }
    .info-value { font-weight: 500; color: #111; }
    .info-value a { color: #0066c0; text-decoration: none; }

    .variants-section { margin: 25px 0; }
    .variants-label { font-weight: bold; margin-bottom: 12px; }
    .variants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .variant-btn { padding: 10px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-size: 13px; text-align: center; }
    .variant-btn.active { border-color: #0066c0; background: #eef6ff; font-weight: bold; }
    .variant-btn:hover { border-color: #0066c0; }

    .product-actions { margin: 30px 0; }
    .qty-selector { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
    .qty-label { font-weight: bold; font-size: 14px; }
    .qty-control { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; width: fit-content; }
    .qty-btn { border: none; background: white; padding: 8px 14px; cursor: pointer; font-size: 14px; font-weight: bold; color: #0066c0; }
    .qty-btn:hover { background: #f0f0f0; }
    .qty-input { border: none; width: 60px; text-align: center; padding: 8px; font-size: 14px; font-weight: bold; }
    .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .buttons-row { display: flex; gap: 15px; margin: 20px 0; }
    .btn-primary { background: #ff9900; color: white; padding: 12px 30px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 15px; flex: 1; transition: background 0.2s; }
    .btn-primary:hover { background: #e88700; }
    .btn-secondary { background: #ffc700; color: #111; padding: 12px 30px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 15px; flex: 1; transition: background 0.2s; }
    .btn-secondary:hover { background: #ffb700; }

    /* ── Product information / 2-column accordion ── */
    .product-info-section { margin: 50px 0; padding: 30px 0; border-top: 1px solid #e0e0e0; }
    .section-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #111; }

    .accordion {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    @media (max-width: 700px) { .accordion { grid-template-columns: 1fr; } }

    .accordion-item { border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; }
    .accordion-item:nth-child(even) { border-right: none; }
    .accordion-item:nth-last-child(1) { border-bottom: none; }
    .accordion-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }
    @media (max-width: 700px) {
      .accordion-item { border-right: none; }
      .accordion-item:last-child { border-bottom: none; }
      .accordion-item:nth-last-child(2):nth-child(odd) { border-bottom: 1px solid #ddd; }
    }

    .accordion-header { padding: 16px; background: #f8f8f8; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; user-select: none; transition: background 0.2s; }
    .accordion-header:hover { background: #f0f0f0; }
    .accordion-item.open .accordion-header { background: #f0f0f0; }
    .toggle-icon { transition: transform 0.3s; font-size: 18px; }
    .accordion-item.open .toggle-icon { transform: rotate(180deg); }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .accordion-item.open .accordion-content { max-height: 2000px; }
    .accordion-content-inner { padding: 20px; }
    .spec-table { width: 100%; border-collapse: collapse; }
    .spec-table td { padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .spec-table td:first-child { font-weight: bold; width: 45%; color: #666; }
    .spec-table tr:last-child td { border-bottom: none; }

    /* ── Magnifier ── */
    .magnifier {
      position: fixed; pointer-events: none; z-index: 1000;
      background: white; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      border-radius: 8px; overflow: hidden; border: 2px solid #0066c0;
      display: none;
    }
    .magnifier img { position: absolute; top: 0; left: 0; max-width: none; display: block; }

    /* ── Lightbox ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      background: white; border-radius: 12px; width: 90vw; max-width: 1100px;
      max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
      position: relative;
    }
    .lightbox-close {
      position: absolute; top: 12px; right: 16px; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #333; z-index: 10; line-height: 1;
    }
    .lightbox-close:hover { color: #000; }
    .lightbox-tabs { display: flex; border-bottom: 1px solid #ddd; padding: 0 20px; background: #f8f8f8; }
    .lightbox-tab { padding: 14px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: bold; color: #666; border-bottom: 3px solid transparent; margin-bottom: -1px; }
    .lightbox-tab.active { color: #0066c0; border-bottom-color: #0066c0; }
    .lightbox-body { display: flex; flex: 1; overflow: hidden; }
    .lightbox-gallery { display: flex; flex: 1; overflow: hidden; }
    .lightbox-main { flex: 1; display: flex; align-items: center; justify-content: center; background: #f5f5f5; padding: 20px; overflow: hidden; }
    .lightbox-main img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 4px; }
    .lightbox-sidebar { width: 120px; overflow-y: auto; padding: 10px; border-left: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .lightbox-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 4px; }
    .lightbox-thumb.active { border-color: #0066c0; }
    .lightbox-thumb--video { background: #111; display: flex; align-items: center; justify-content: center; border-radius: 4px; aspect-ratio: 1; cursor: pointer; border: 2px solid transparent; position: relative; }
    .lightbox-thumb--video::after { content: "▶"; color: white; font-size: 1.1rem; }
    .lightbox-thumb--video.active { border-color: #0066c0; }
    .lightbox-video-wrap { flex: 1; padding: 20px; display: flex; align-items: center; justify-content: center; }
    .lightbox-video-wrap video, .lightbox-video-wrap iframe { width: 100%; max-height: 70vh; border-radius: 8px; border: 0; }
    @media (max-width: 600px) {
      .lightbox-sidebar { width: 70px; }
      .lightbox-inner { width: 98vw; max-height: 95vh; }
    }
  </style>
</head>
<body>

  <!-- Magnifier -->
  <div class="magnifier" id="magnifier"><img id="magnifier-img" src="" alt=""></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
      <div class="lightbox-tabs">
        <button class="lightbox-tab active" data-tab="images">Images</button>
        <button class="lightbox-tab" data-tab="video">Video</button>
      </div>
      <div class="lightbox-body" id="lightbox-body">
        <!-- built by JS -->
      </div>
    </div>
  </div>

  <div class="product-page">
    <div class="product-container">
      <div class="product-grid">

        <!-- LEFT: sticky gallery -->
        <div class="product-gallery">
          <div class="gallery-main" id="gallery-main">
            <img id="main-image" src="" alt="Product">
            <div class="gallery-main-video" id="gallery-main-video">
              <video id="gallery-video-player" controls></video>
              <div id="gallery-yt-frame" style="display:none;position:absolute;inset:0;">
                <iframe id="gallery-yt-iframe" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" style="width:100%;height:100%;"></iframe>
              </div>
            </div>
          </div>
          <div class="gallery-thumbs" id="thumbs-container"></div>
        </div>

        <!-- RIGHT: scrollable details -->
        <div class="product-details">
          <div class="breadcrumb" id="breadcrumb"></div>
          <h1 class="product-title" id="product-title"></h1>

          <div class="product-rating">
            <span class="stars" id="rating-stars">★★★★★</span>
            <a href="#reviews" class="rating-link" id="rating-count"></a>
          </div>

          <div class="price-section">
            <div class="price-block">
              <span class="price-label">Price:</span>
              <span class="price-main" id="price-current">€0,00</span>
            </div>
            <div class="price-block" id="price-old-block" style="display:none;">
              <span class="price-label">List price:</span>
              <span class="price-old" id="price-old">€0,00</span>
            </div>
            <div class="price-block" id="savings-block" style="display:none;">
              <span class="price-label">Save:</span>
              <span class="savings" id="savings-amount">€0,00</span>
              <span class="discount-badge" id="discount-pct">-10%</span>
            </div>
          </div>

          <div class="badges-row" id="badges-row"></div>

          <div class="info-section">
            <div class="info-row">
              <span class="info-label">Availability:</span>
              <span class="info-value" id="availability">In stock</span>
            </div>
            <div class="info-row">
              <span class="info-label">Shipped by:</span>
              <span class="info-value" id="ships-from">Store</span>
            </div>
            <div class="info-row">
              <span class="info-label">Sold by:</span>
              <span class="info-value" id="sold-by">Store</span>
            </div>
            <div class="info-row">
              <span class="info-label">Return policy:</span>
              <span class="info-value" id="returns-info">30-day return/replacement</span>
            </div>
          </div>

          <div class="variants-section" id="variants-section" style="display:none;">
            <div class="variants-label" id="variants-label">Select colour:</div>
            <div class="variants-grid" id="variants-grid"></div>
          </div>

          <div class="product-actions">
            <div class="qty-selector">
              <span class="qty-label">Quantity:</span>
              <div class="qty-control">
                <button class="qty-btn" id="qty-minus">−</button>
                <input type="number" class="qty-input" id="qty-value" value="1" min="1">
                <button class="qty-btn" id="qty-plus">+</button>
              </div>
            </div>
            <div class="buttons-row">
              <button class="btn-primary" id="add-to-cart">Add to cart</button>
              <button class="btn-secondary" id="buy-now">Buy now</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 2-column accordion specs -->
      <div class="product-info-section" id="specs-section" style="display:none;">
        <h2 class="section-title">Product information</h2>
        <div class="accordion" id="specs-accordion"></div>
      </div>
    </div>
  </div>

  <script src="../../js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script");
          s.src = src; s.onload = resolve; s.onerror = resolve;
          document.head.appendChild(s);
        });
      }
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("webshop:ready")); });
    })();
  </script>

  <script>
  document.addEventListener("webshop:ready", async function() {
    await Shop.loadLang();
    const allProducts = await Shop.loadProducts();
    const params = new URLSearchParams(window.location.search);
    const prodId = params.get("id") || allProducts[0]?.id || "pre-assembled";

    let PRODUCT = allProducts.find(p => p.id === prodId);
    if (!PRODUCT) {
      document.querySelector(".product-details").innerHTML = "<h1>Product not found</h1>";
      return;
    }

    let selectedVariant = PRODUCT.variants?.[0]?.id || null;
    let qty = 1;
    let stock = PRODUCT.stock !== undefined ? PRODUCT.stock : 99;
    let currentImgIdx = 0;
    let activeMediaType = "image";

    document.title = Shop.pName(PRODUCT);

    document.getElementById("breadcrumb").innerHTML =
      `<a href="../shop/">Shop</a> › <span>${PRODUCT.category || "Producten"}</span>`;

    document.getElementById("product-title").textContent = Shop.pName(PRODUCT);
    document.getElementById("rating-stars").textContent = "★★★★★";
    document.getElementById("rating-count").innerHTML = `<span style="color:#0066c0;">(2.547 Reviews)</span>`;

    const basePrice = PRODUCT.variants?.[0]?.price ?? PRODUCT.price;
    const listPrice = PRODUCT.listPrice || (basePrice * 1.2);

    function updatePrice() {
      const cp = (typeof Currency !== "undefined") ? Currency.convert(basePrice) : basePrice;
      const lp = (typeof Currency !== "undefined") ? Currency.convert(listPrice) : listPrice;
      const cs = (typeof Currency !== "undefined" && Currency.getSymbol) ? Currency.getSymbol() : "€";
      document.getElementById("price-current").textContent = cs + cp.toFixed(2);
      const discount = Math.round((1 - basePrice / listPrice) * 100);
      const savings = lp - cp;
      if (discount > 0) {
        document.getElementById("price-old").textContent = cs + lp.toFixed(2);
        document.getElementById("savings-amount").textContent = cs + savings.toFixed(2);
        document.getElementById("discount-pct").textContent = `-${discount}%`;
        document.getElementById("price-old-block").style.display = "flex";
        document.getElementById("savings-block").style.display = "flex";
      }
    }
    updatePrice();

    const badgesHtml = PRODUCT.featured ? '<div class="badge">#1 Best Seller</div>' : '';
    const moreBadges = PRODUCT.new ? '<div class="badge badge-info">New</div>' : '';
    document.getElementById("badges-row").innerHTML = badgesHtml + moreBadges;

    document.getElementById("availability").textContent = stock > 0 ? "In stock" : "Not available";
    document.getElementById("ships-from").textContent = PRODUCT.shipsFrom || "Store";
    document.getElementById("sold-by").textContent = PRODUCT.soldBy || "Store";
    document.getElementById("returns-info").textContent = PRODUCT.returns || "30-day return/replacement";

    // Variants
    if (PRODUCT.variants && PRODUCT.variants.length > 0) {
      document.getElementById("variants-section").style.display = "block";
      const grid = document.getElementById("variants-grid");
      grid.innerHTML = PRODUCT.variants.map((v, idx) =>
        `<button class="variant-btn${idx === 0 ? " active" : ""}" data-vid="${v.id}" data-vimg="${v.image || PRODUCT.image}">${v.label}</button>`
      ).join("");
      grid.querySelectorAll(".variant-btn").forEach(btn => {
        btn.addEventListener("click", function() {
          grid.querySelectorAll(".variant-btn").forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          selectedVariant = this.dataset.vid;
          const vimg = this.dataset.vimg;
          if (vimg) { showImage(0, vimg); }
        });
      });
    }

    // Build media list
    const images = PRODUCT.images || (PRODUCT.image ? [PRODUCT.image] : []);
    const videos = PRODUCT.videos || [];

    function extractYTId(url) {
      const m = url.match(/embed\/([^?]+)/) || url.match(/youtu\.be\/([^?]+)/);
      return m ? m[1] : "";
    }

    const mediaItems = [
      ...images.map(src => ({ type: "image", src })),
      ...videos.map(src => {
        const isYT = /youtube\.com|youtu\.be/.test(src);
        return { type: "video", src, isYT, thumb: isYT ? `https://img.youtube.com/vi/${extractYTId(src)}/mqdefault.jpg` : null };
      })
    ];

    // Gallery rendering
    const thumbsEl = document.getElementById("thumbs-container");
    const mainImg = document.getElementById("main-image");
    const mainVideoWrap = document.getElementById("gallery-main-video");
    const videoPlayer = document.getElementById("gallery-video-player");
    const ytIframe = document.getElementById("gallery-yt-iframe");
    const ytFrame = document.getElementById("gallery-yt-frame");

    function showImage(idx, overrideSrc) {
      currentImgIdx = idx;
      activeMediaType = "image";
      const src = overrideSrc || (mediaItems[idx] && mediaItems[idx].src) || "";
      videoPlayer.pause(); videoPlayer.src = "";
      ytIframe.src = "";
      mainVideoWrap.style.display = "none";
      mainImg.style.opacity = "1";
      mainImg.src = src;
      document.getElementById("magnifier-img").src = src;
      buildThumbs();
    }

    function showVideo(idx) {
      activeMediaType = "video";
      const item = mediaItems[idx];
      mainImg.style.opacity = "0";
      mainVideoWrap.style.display = "block";
      if (item.isYT) {
        videoPlayer.style.display = "none";
        ytFrame.style.display = "block";
        ytIframe.src = item.src + "?autoplay=1";
      } else {
        ytFrame.style.display = "none";
        ytIframe.src = "";
        videoPlayer.style.display = "block";
        videoPlayer.src = item.src;
        videoPlayer.play().catch(()=>{});
      }
      buildThumbs();
    }

    function buildThumbs() {
      thumbsEl.innerHTML = mediaItems.map((item, i) => {
        const isActive = i === currentImgIdx && (item.type === "image" ? activeMediaType === "image" : activeMediaType === "video");
        if (item.type === "image") {
          return `<div class="gallery-thumb${isActive ? " active" : ""}" data-idx="${i}" data-type="image">
            <img src="${item.src}" alt="">
          </div>`;
        } else {
          const bgStyle = item.thumb ? `style="background-image:url('${item.thumb}');background-size:cover;background-position:center;"` : "";
          return `<div class="gallery-thumb gallery-thumb--video${isActive ? " active" : ""}" data-idx="${i}" data-type="video" ${bgStyle}></div>`;
        }
      }).join("");
      thumbsEl.querySelectorAll(".gallery-thumb").forEach(t => {
        t.addEventListener("click", function() {
          const idx = +this.dataset.idx;
          if (this.dataset.type === "video") showVideo(idx);
          else showImage(idx);
        });
      });
    }

    // Init gallery
    if (images.length) {
      mainImg.src = images[0];
      document.getElementById("magnifier-img").src = images[0];
    }
    buildThumbs();

    // Click main image → open lightbox
    document.getElementById("gallery-main").addEventListener("click", function(e) {
      if (e.target.closest("video") || e.target.closest("iframe")) return;
      openLightbox(activeMediaType === "video" ? "video" : "images");
    });

    // ── Magnifier ──
    (function() {
      const magEl  = document.getElementById("magnifier");
      const magImg = document.getElementById("magnifier-img");
      const wrap   = document.getElementById("gallery-main");

      function updateSize() {
        const rect = wrap.getBoundingClientRect();
        const size = Math.min(window.innerWidth * 0.45, 560, rect.width * 1.2);
        magEl.style.width = size + "px"; magEl.style.height = size + "px";
      }

      wrap.addEventListener("mousemove", function(e) {
        if (mainVideoWrap.style.display !== "none") { magEl.style.display = "none"; return; }
        const rect = wrap.getBoundingClientRect();
        const xPct = (e.clientX - rect.left) / rect.width;
        const yPct = (e.clientY - rect.top)  / rect.height;
        updateSize();
        const lW = magEl.offsetWidth, lH = magEl.offsetHeight;
        let mLeft = rect.right + 20, mTop = rect.top + rect.height / 2 - lH / 2;
        if (mLeft + lW > window.innerWidth - 20) mLeft = rect.left - lW - 20;
        mLeft = Math.max(10, Math.min(mLeft, window.innerWidth  - lW - 10));
        mTop  = Math.max(10, Math.min(mTop,  window.innerHeight - lH - 10));
        magEl.style.left = mLeft + "px"; magEl.style.top = mTop + "px";
        magEl.style.display = "block";
        const nW = magImg.naturalWidth, nH = magImg.naturalHeight;
        if (nW && nH) {
          const ca = rect.width / rect.height, ia = nW / nH;
          let dW, dH, ox = 0, oy = 0;
          if (ia > ca) { dH = rect.height; dW = dH * ia; ox = (rect.width - dW) / 2; }
          else         { dW = rect.width;  dH = dW / ia; oy = (rect.height - dH) / 2; }
          const imgX = ((xPct * dW - ox) / dW) * nW;
          const imgY = ((yPct * dH - oy) / dH) * nH;
          const zoom = 2;
          magImg.style.width  = (nW * zoom) + "px";
          magImg.style.height = (nH * zoom) + "px";
          magImg.style.left   = -(imgX * zoom - lW / 2) + "px";
          magImg.style.top    = -(imgY * zoom - lH / 2) + "px";
        }
      });
      wrap.addEventListener("mouseleave", () => { magEl.style.display = "none"; });
    })();

    // ── Lightbox ──
    let lightboxTab = "images";

    function openLightbox(tab) {
      lightboxTab = tab || "images";
      buildLightbox();
      document.getElementById("lightbox").classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
      document.body.style.overflow = "";
      // Stop any video in lightbox
      document.querySelectorAll("#lightbox video").forEach(v => { v.pause(); v.src = ""; });
      document.querySelectorAll("#lightbox iframe").forEach(f => { f.src = ""; });
    }

    function buildLightbox() {
      document.querySelectorAll(".lightbox-tab").forEach(t =>
        t.classList.toggle("active", t.dataset.tab === lightboxTab)
      );
      const body = document.getElementById("lightbox-body");

      if (lightboxTab === "images") {
        const imgItems = mediaItems.filter(m => m.type === "image");
        const vidItems = mediaItems.filter(m => m.type === "video");
        let lbIdx = currentImgIdx < imgItems.length ? currentImgIdx : 0;

        function renderLBImages() {
          const thumbsHtml = imgItems.map((item, i) =>
            `<img class="lightbox-thumb${i === lbIdx ? " active" : ""}" src="${item.src}" data-idx="${i}" alt="">`
          ).join("") + vidItems.map((item, i) => {
            const bgStyle = item.thumb ? `style="background-image:url('${item.thumb}');background-size:cover;"` : "";
            return `<div class="lightbox-thumb--video" data-vidx="${i}" ${bgStyle}></div>`;
          }).join("");

          body.innerHTML = `
            <div class="lightbox-gallery">
              <div class="lightbox-main"><img id="lb-main-img" src="${imgItems[lbIdx]?.src || ""}" alt=""></div>
              <div class="lightbox-sidebar" id="lb-thumbs">${thumbsHtml}</div>
            </div>`;

          body.querySelectorAll(".lightbox-thumb").forEach(t => {
            t.addEventListener("click", () => {
              lbIdx = +t.dataset.idx;
              document.getElementById("lb-main-img").src = imgItems[lbIdx].src;
              body.querySelectorAll(".lightbox-thumb").forEach((x, j) => x.classList.toggle("active", j === lbIdx));
            });
          });
          body.querySelectorAll(".lightbox-thumb--video").forEach(t => {
            t.addEventListener("click", () => { lightboxTab = "video"; buildLightbox(); });
          });
        }
        renderLBImages();

      } else {
        // Video tab
        const vidItems = mediaItems.filter(m => m.type === "video");
        function renderVideo(item) {
          if (item.isYT) {
            return `<div style="position:relative;padding-bottom:56.25%;height:0;border-radius:8px;overflow:hidden;">
              <iframe src="${item.src}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>`;
          }
          return `<video src="${item.src}" controls style="width:100%;max-height:65vh;border-radius:8px;display:block;"></video>`;
        }
        body.innerHTML = `<div class="lightbox-video-wrap">${
          vidItems.length
            ? vidItems.map(renderVideo).join("")
            : `<p style="color:#666;">No video available.</p>`
        }</div>`;
      }
    }

    document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
    document.getElementById("lightbox").addEventListener("click", e => {
      if (e.target === document.getElementById("lightbox")) closeLightbox();
    });
    document.querySelectorAll(".lightbox-tab").forEach(t =>
      t.addEventListener("click", () => { lightboxTab = t.dataset.tab; buildLightbox(); })
    );
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

    // Qty
    const qtyInput = document.getElementById("qty-value");
    document.getElementById("qty-minus").addEventListener("click", () => {
      if (qty > 1) { qty--; qtyInput.value = qty; }
    });
    document.getElementById("qty-plus").addEventListener("click", () => {
      if (qty < stock) { qty++; qtyInput.value = qty; }
    });
    qtyInput.addEventListener("change", () => {
      qty = Math.max(1, Math.min(parseInt(qtyInput.value) || 1, stock));
      qtyInput.value = qty;
    });

    // Cart / Buy
    document.getElementById("add-to-cart").addEventListener("click", () => {
      const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
      Shop.addToCart(PRODUCT, qty, selectedVariant, null, v?.image || PRODUCT.image);
      Shop.toast(`${Shop.pName(PRODUCT)} added to cart`);
    });
    document.getElementById("buy-now").addEventListener("click", () => {
      const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
      Shop.addToCart(PRODUCT, qty, selectedVariant, null, v?.image || PRODUCT.image);
      const lang = window.LANG || localStorage.getItem("dornori-lang") || "en";
      const basePath = (window.SHOP_CONFIG && window.SHOP_CONFIG.basePath) || "/";
      window.location.href = `${basePath}${lang}/cart/`;
    });

    // ── 2-column accordion ──
    const specsSection = document.getElementById("specs-section");
    const accordion = document.getElementById("specs-accordion");
    const specs = PRODUCT.specs || [];

    if (specs.length > 0) {
      specsSection.style.display = "block";
      accordion.innerHTML = specs.map((spec, idx) => `
        <div class="accordion-item${idx === 0 ? " open" : ""}">
          <div class="accordion-header">
            <span>${spec.title}</span>
            <span class="toggle-icon">▼</span>
          </div>
          <div class="accordion-content">
            <div class="accordion-content-inner">
              <table class="spec-table"><tbody>
                ${(spec.rows || []).map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}
              </tbody></table>
            </div>
          </div>
        </div>
      `).join("");

      accordion.querySelectorAll(".accordion-header").forEach(header => {
        header.addEventListener("click", function() {
          this.parentElement.classList.toggle("open");
        });
      });
    }

    document.addEventListener("currency:changed", updatePrice);
    document.addEventListener("shop:langChanged", () => {
      document.getElementById("product-title").textContent = Shop.pName(PRODUCT);
    });
  });
  </script>
</body>
</html>
