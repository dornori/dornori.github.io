<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WEBSHOP | Sticky Image · Right Panel</title>
  <link rel="stylesheet" href="../../css/shop.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: var(--c-bg, #0a0c10);
    }

    .webshop-page-main {
      width: 100%;
      background: var(--c-bg, #0a0c10);
    }

    .webshop-container {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      padding: 0 24px !important;
    }

    /* NO .pdp-wrapper — removed entirely */
    /* DIRECT GRID LAYOUT: image left, panel right */
    .pdp-main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      width: 100%;
      padding: 24px 0 48px 0;
    }

    /* LEFT: STICKY IMAGE — stays below header (top: 80px accounts for banner) */
    .pdp-gallery {
      position: sticky;
      top: 80px;
      align-self: start;
    }

    .pdp-gallery__main-wrap {
      border-radius: 20px;
      background: #0a0c10;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 1px solid var(--c-border, #2a2e36);
    }
    .pdp-gallery__main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pdp-gallery__thumbs {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pdp-gallery__thumb-wrap {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
    }
    .pdp-gallery__thumb-wrap.active {
      border-color: #ff9900;
    }
    .pdp-gallery__thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* RIGHT COLUMN — contains details AND buy box, both in flow */
    .pdp-right-col {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Details panel — normal flow */
    .pdp-details {
      background: transparent;
    }

    /* BUY BOX — now properly in the right column, NOT below description */
    .pdp-buybox {
      border: 1px solid var(--c-border, #2a2e36);
      border-radius: 16px;
      padding: 20px;
      background: var(--c-surface, #111317);
      position: sticky;
      top: 80px;
    }

    /* Typography & Components */
    .amz-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; color: var(--c-text, #f0f2f5); }
    .amz-breadcrumb { font-size: 13px; color: #9ca3af; margin-bottom: 12px; }
    .amz-breadcrumb a { color: #ff9900; text-decoration: none; }
    .amz-rating { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .amz-stars { color: #ffaa33; font-size: 16px; }
    .amz-badges { display: flex; gap: 8px; margin-bottom: 16px; }
    .amz-badge { background: #cc0c39; color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .pdp-desc { font-size: 14px; line-height: 1.5; color: #b5b9c4; margin-bottom: 20px; }
    .amz-variants-section { margin: 16px 0; }
    .amz-variants-label { font-weight: 600; margin-bottom: 10px; font-size: 14px; }
    .amz-variants-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .amz-variant-btn { padding: 8px 16px; border: 2px solid var(--c-border); background: transparent; color: #e1e4ea; cursor: pointer; border-radius: 8px; }
    .amz-variant-btn.active { border-color: #ff9900; background: rgba(255,153,0,0.1); }
    .amz-price-section { border-top: 1px solid var(--c-border); border-bottom: 1px solid var(--c-border); padding: 12px 0; margin-bottom: 16px; }
    .amz-price-main { font-size: 28px; font-weight: bold; color: #ffc107; }
    .amz-price-row { display: flex; align-items: baseline; gap: 12px; margin: 8px 0; }
    .amz-price-label { width: 80px; font-size: 13px; color: #9ca3af; }
    .amz-info-table { margin-bottom: 16px; }
    .amz-info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--c-border); }
    .amz-qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .amz-qty-control { display: flex; border: 1px solid var(--c-border); border-radius: 8px; }
    .amz-qty-btn { background: transparent; border: none; padding: 8px 14px; cursor: pointer; color: #ff9900; font-size: 16px; }
    .amz-qty-input { width: 50px; text-align: center; background: transparent; border: none; color: white; }
    .amz-buttons { display: flex; gap: 12px; margin: 16px 0; }
    .amz-btn-cart, .amz-btn-buy { flex: 1; padding: 12px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; }
    .amz-btn-cart { background: #ff9900; color: #111; }
    .amz-btn-buy { background: #ffc700; color: #111; }
    .pdp-perks { display: flex; gap: 12px; font-size: 11px; color: #9ca3af; margin-top: 12px; }

    /* Bottom sections */
    .post-scroll-sections {
      margin-top: 60px;
      border-top: 1px solid var(--c-border);
      padding-top: 48px;
    }
    .pdp-related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 20px; margin-top: 20px; }
    .pdp-related-card { background: var(--c-surface); border-radius: 16px; border: 1px solid var(--c-border); overflow: hidden; }
    .pdp-related-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .pdp-related-card__info { padding: 12px; }
    .pdp-related-card__buy-btn { background: #ff9900; border: none; padding: 8px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 8px; }

    @media (max-width: 900px) {
      .pdp-main { grid-template-columns: 1fr; gap: 32px; }
      .pdp-gallery { position: relative; top: 0; max-width: 450px; margin: 0 auto; }
      .pdp-buybox { position: relative; top: 0; }
    }
  </style>
</head>
<body>

<main class="webshop-page-main">
  <div class="webshop-container">
    <!-- NO .pdp-wrapper — direct children -->
    <div class="pdp-main" id="pdp-main-section">
      
      <!-- LEFT: STICKY IMAGE -->
      <div class="pdp-gallery" id="pdp-gallery">
        <div class="pdp-gallery__main-wrap" id="gallery-main-wrap">
          <img class="pdp-gallery__main-img" id="gallery-main-img" src="" alt="">
        </div>
        <div class="pdp-gallery__thumbs" id="gallery-thumbs"></div>
      </div>

      <!-- RIGHT: DETAILS + BUY BOX (both in same column, buy box appears below description but within right panel) -->
      <div class="pdp-right-col">
        <div class="pdp-details" id="pdp-details">
          <div class="amz-breadcrumb" id="amz-breadcrumb"></div>
          <h1 class="amz-title" id="pdp-name"></h1>
          <div class="amz-rating">
            <span class="amz-stars" id="amz-stars">★★★★★</span>
            <span id="amz-rating-count"></span>
          </div>
          <div class="amz-badges" id="amz-badges"></div>
          <p class="pdp-desc" id="pdp-desc"></p>
          <div class="amz-variants-section" id="amz-variants-section" style="display:none;">
            <div class="amz-variants-label">Select option:</div>
            <div class="amz-variants-grid" id="amz-variants-grid"></div>
          </div>
        </div>

        <!-- BUY BOX — now inside right column, aligned to far right of screen -->
        <div class="pdp-buybox" id="pdp-buybox">
          <div class="amz-price-section">
            <div class="amz-price-row">
              <span class="amz-price-label">Price:</span>
              <span class="amz-price-main" id="pdp-price"></span>
            </div>
          </div>
          <div class="amz-info-table">
            <div class="amz-info-row"><span class="amz-info-label">Availability:</span><span id="amz-availability">In stock</span></div>
            <div class="amz-info-row"><span class="amz-info-label">Shipping:</span><span id="amz-ships-from">Free shipping</span></div>
          </div>
          <div class="amz-qty-row">
            <span class="amz-qty-label">Qty:</span>
            <div class="amz-qty-control">
              <button class="amz-qty-btn" id="qty-minus">−</button>
              <input type="number" class="amz-qty-input" id="qty-val-input" value="1" min="1">
              <button class="amz-qty-btn" id="qty-plus">+</button>
            </div>
          </div>
          <div class="amz-buttons">
            <button class="amz-btn-cart" id="atc-btn">Add to Cart</button>
            <button class="amz-btn-buy" id="buy-now-btn">Buy Now</button>
          </div>
          <div class="pdp-perks" id="pdp-perks"></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM SECTIONS -->
    <div class="post-scroll-sections">
      <div id="related-section" style="display:none;">
        <h2>Related Products</h2>
        <div class="pdp-related-grid" id="related-grid"></div>
      </div>
    </div>
  </div>
</main>

<script src="../../js/config.js"></script>
<script>
  document.addEventListener("webshop:ready", async function() {
    const params = new URLSearchParams(window.location.search);
    const prodId = params.get("id");
    
    await Shop.loadLang();
    const allProducts = await Shop.loadProducts();
    const PRODUCT = allProducts.find(p => p.id === prodId);
    
    if (!PRODUCT) {
      document.getElementById("pdp-name").textContent = "Product not found";
      return;
    }

    // Basic rendering
    document.getElementById("pdp-name").textContent = PRODUCT.name || PRODUCT.title;
    document.getElementById("pdp-desc").textContent = PRODUCT.description || "";
    document.getElementById("pdp-price").textContent = `€${(PRODUCT.price || 0).toFixed(2)}`;
    
    // Gallery
    const mainImg = document.getElementById("gallery-main-img");
    const images = PRODUCT.images || [PRODUCT.image];
    if (images.length) mainImg.src = images[0];
    
    const thumbsEl = document.getElementById("gallery-thumbs");
    thumbsEl.innerHTML = images.map((src, i) => `
      <div class="pdp-gallery__thumb-wrap" data-img="${src}">
        <img class="pdp-gallery__thumb" src="${src}">
      </div>
    `).join("");
    
    thumbsEl.querySelectorAll(".pdp-gallery__thumb-wrap").forEach((thumb, idx) => {
      thumb.addEventListener("click", () => {
        mainImg.src = thumb.dataset.img;
        thumbsEl.querySelectorAll(".pdp-gallery__thumb-wrap").forEach(t => t.classList.remove("active"));
        thumb.classList.add("active");
      });
    });
    if (thumbsEl.firstChild) thumbsEl.firstChild.classList.add("active");
    
    // Quantity
    let qty = 1;
    const qtyInput = document.getElementById("qty-val-input");
    document.getElementById("qty-minus").onclick = () => { if (qty > 1) { qty--; qtyInput.value = qty; } };
    document.getElementById("qty-plus").onclick = () => { qty++; qtyInput.value = qty; };
    qtyInput.onchange = () => { qty = Math.max(1, parseInt(qtyInput.value) || 1); qtyInput.value = qty; };
    
    // Add to cart
    document.getElementById("atc-btn").onclick = () => {
      Shop.addToCart(PRODUCT, qty);
      Shop.toast(`${PRODUCT.name} added to cart`);
    };
    
    // Perks
    document.getElementById("pdp-perks").innerHTML = ["Free shipping", "30-day returns", "2-year warranty"].map(p => `<span>${p}</span>`).join("");
    
    // Related products
    if (PRODUCT.related && PRODUCT.related.length) {
      const relatedIds = PRODUCT.related;
      const relatedProducts = relatedIds.map(id => allProducts.find(p => p.id === id)).filter(Boolean);
      if (relatedProducts.length) {
        document.getElementById("related-section").style.display = "";
        document.getElementById("related-grid").innerHTML = relatedProducts.map(r => `
          <div class="pdp-related-card">
            <img src="${r.image}" alt="${r.name}">
            <div class="pdp-related-card__info">
              <div>${r.name}</div>
              <div>€${(r.price || 0).toFixed(2)}</div>
              <button class="pdp-related-card__buy-btn" data-id="${r.id}">Buy Now</button>
            </div>
          </div>
        `).join("");
        
        document.querySelectorAll(".pdp-related-card__buy-btn").forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            const item = allProducts.find(p => p.id === btn.dataset.id);
            if (item) Shop.addToCart(item, 1);
            Shop.toast(`${item.name} added`);
          };
        });
      }
    }
  });
</script>
</body>
</html>
