<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WEBSHOP | Sticky Image · Right Buy Box · Clean Layout</title>
  <link rel="stylesheet" href="../../css/shop.css">
  <style>
    /* RESET — full viewport, no inner wrappers with unwanted padding */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: var(--c-bg, #0a0c10);
      scroll-behavior: smooth;
    }

    /* main container — completely flat, no extra divs */
    .webshop-page-main {
      width: 100%;
      background: var(--c-bg, #0a0c10);
    }

    .webshop-container {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      padding: 0 32px !important;
    }

    /* remove ALL pdp-wrapper remnants — no extra wrapper */
    .pdp-wrapper {
      display: block;
      padding: 0;
      margin: 0;
      max-width: 100%;
    }

    /* MAIN GRID: left (sticky image) + right (details + buybox) */
    .pdp-main {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 48px;
      align-items: start;
      width: 100%;
      min-height: 100vh;
      padding: 24px 0 48px 0;
    }

    /* LEFT COLUMN: IMAGE GALLERY — fixed position sticky directly below header/banner */
    .pdp-gallery {
      position: sticky;
      top: 80px;          /* accounts for typical banner/header height, image stays visible right after header */
      align-self: start;
      background: transparent;
      border-radius: 24px;
      overflow: hidden;
      transition: none;
    }

    /* RIGHT COLUMN: details + buy box, aligned to the right edge naturally */
    .pdp-scroll-area {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 100%;
    }

    /* Details — original style, natural flow */
    .pdp-details {
      background: transparent;
      padding-right: 0;
      max-height: none !important;
      overflow-y: visible !important;
      text-align: left;
    }

    /* BUY BOX — now properly aligned to the far right, always visible in the right column */
    .pdp-buybox {
      border: 1px solid var(--c-border, #2a2e36);
      border-radius: 20px;
      padding: 22px 20px;
      background: var(--c-surface, #111317);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      position: sticky;
      top: 80px;
      width: 100%;
    }

    /* Gallery styling — rounded corners preserved */
    .pdp-gallery__main-wrap {
      border-radius: 24px;
      background: #0a0c10;
      aspect-ratio: 1 / 1;
      cursor: crosshair;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--c-border, #2a2e36);
    }
    .pdp-gallery__main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .pdp-gallery__thumbs {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pdp-gallery__thumb-wrap {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.1s;
      background: #1e1f24;
      overflow: hidden;
    }
    .pdp-gallery__thumb-wrap.active {
      border-color: #ff9900;
    }
    .pdp-gallery__thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pdp-thumb-play {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 24px;

    /* Amazon-inspired typography & components */
    .amz-breadcrumb { font-size: 13px; color: var(--c-text-muted, #9ca3af); margin-bottom: 12px; }
    .amz-breadcrumb a { color: var(--c-accent, #ff9900); text-decoration: none; }
    .amz-title { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; color: var(--c-text, #f0f2f5); }
    .amz-rating { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .amz-stars { color: #ffaa33; font-size: 18px; letter-spacing: 1px; }
    .amz-rating-link { color: var(--c-accent, #ff9900); text-decoration: none; font-size: 14px; }
    .amz-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }

    .amz-badge--info { background: var(--c-accent, #ff9900); color: #111; }
    .pdp-desc { font-size: 15px; line-height: 1.5; color: #b5b9c4; margin-bottom: 24px; }

    .amz-variants-section { margin: 20px 0; }

    .amz-buttons { display: flex; gap: 14px; margin: 18px 0; }

    .pdp-perks { display: flex; gap: 16px; font-size: 12px; color: #9ca3af; margin-top: 14px; flex-wrap: wrap; }

    /* Bottom sections — original design with rounded corners */
    .post-scroll-sections {
      margin-top: 70px;
      border-top: 1px solid var(--c-border);

    .pdp-related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 28px; margin-top: 24px; }
    .pdp-related-card { background: var(--c-surface); border-radius: 24px; border: 1px solid var(--c-border); overflow: hidden; transition: 0.2s; }
    .pdp-related-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .pdp-related-card__info { padding: 16px; }
    .pdp-related-card__name { font-weight: 500; margin-bottom: 6px; }
    .pdp-related-card__price { color: #ffc107; font-weight: 700; }
    .pdp-related-card__buy-btn { background: #ff9900; border: none; padding: 10px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 12px; color: #111; }
    .amz-accordion { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    .amz-accordion-item { border-radius: 20px; border: 1px solid var(--c-border); background: var(--c-surface); overflow: hidden; }
    .amz-accordion-header { padding: 18px 22px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; background: var(--c-surface-2, #1a1c22); }
    .amz-accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s; border-top: 1px solid var(--c-border); }
    .amz-accordion-item.open .amz-accordion-body { max-height: 800px; }
    .amz-accordion-inner { padding: 18px 22px; }
    .amz-spec-table td { padding: 10px 0; border-bottom: 1px solid var(--c-border); font-size: 13px; }
    .amz-spec-table td:first-child { font-weight: 600; width: 40%; color: #9ca3af; }

    /* Responsive: on smaller screens, adjust sticky behavior */
    @media (max-width: 1100px) {
      .pdp-main {
        grid-template-columns: 1fr 380px;
        gap: 32px;
      }
    }
    @media (max-width: 900px) {
      .pdp-main {
        grid-template-columns: 1fr;
        gap: 36px;
      }
      .pdp-gallery {
        position: relative;
        top: 0;
        max-width: 500px;
        margin: 0 auto;
      }
      .pdp-buybox {
        position: relative;
        top: 0;
      }
      .webshop-container {
        padding: 0 20px !important;
      }
    }
    .pdp-magnifier { border-radius: 20px; border: 2px solid #ff9900; }
  </style>
</head>

<script>
  (function() {
    function loadScript(src) {
      return new Promise(function(resolve) {
        var s = document.createElement("script"); s.src = src;
        s.onload = resolve; s.onerror = function(){ resolve(); };
        document.head.appendChild(s);
      });
    }
    var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
    var chain = Promise.resolve();
    modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
    chain.then(function(){ document.dispatchEvent(new Event("webshop:ready")); });
  })();
</script>

<script>
document.addEventListener("webshop:ready", async function() {
  const params = new URLSearchParams(window.location.search);
  const prodId = window.__PRODUCT_ID__ || params.get("id") || null;
  window.__PRODUCT_ID__ = null;
  await Shop.loadLang();
  const allProducts = await Shop.loadProducts();
  const PRODUCT = allProducts.find(p => p.id === prodId);
  if (!PRODUCT) { document.getElementById("pdp-name").textContent = "Product not found"; return; }

  document.title = "WEBSHOP – " + Shop.pName(PRODUCT);
  let selectedVariant = PRODUCT.variants?.[0]?.id || null;
  let qty = 1;
  let currentImgIdx = 0;

  if (typeof Currency !== "undefined") Currency.init();
  buildLangSwitcher();
  renderMeta();
  renderVariants();
  updatePrice();
  renderPerks();
  renderGallery();
  renderBundle();
  renderRelated();
  renderSpecs();
  applyI18n();
  initMagnifier();
  initLightbox();
  initQty();
  initAtc();

  document.addEventListener("currency:changed", updatePrice);
  document.addEventListener("shop:langChanged", () => { buildLangSwitcher(); renderMeta(); renderPerks(); renderBundle(); renderRelated(); renderSpecs(); applyI18n(); });

  function buildLangSwitcher() { const slot = document.getElementById("lang-switcher-slot"); if (!slot) return; const langs = CONFIG.supportedLanguages || ["en"]; const current = CONFIG.language || "en"; slot.innerHTML = langs.map(l => `<button class="webshop-lang-btn${l === current ? " active" : ""}" data-lang="${l}">${l.toUpperCase()}</button>`).join(""); Shop.wireLanguageSwitcher(".webshop-lang-btn"); }
  function applyI18n() { document.querySelectorAll("[data-i18n]").forEach(el => { const v = Shop.t(el.dataset.i18n); if (v) el.textContent = v; }); }
  
  function renderMeta() {
    document.getElementById("pdp-name").textContent = Shop.pName(PRODUCT);
    document.getElementById("pdp-desc").textContent = Shop.pDesc(PRODUCT);
    document.getElementById("amz-breadcrumb").innerHTML = `<a href="../shop/">Shop</a> › <span>${PRODUCT.category || "Products"}</span>`;
    const rating = PRODUCT.rating; const reviewCount = PRODUCT.reviewCount;
    const starsEl = document.getElementById("amz-stars");
    if (starsEl && rating) { const full = Math.floor(rating); const half = rating - full >= 0.5; starsEl.textContent = "★".repeat(full) + (half ? "½" : "") + "☆".repeat(5 - full - (half ? 1 : 0)); }
    const rc = document.getElementById("amz-rating-count"); if(rc && reviewCount) rc.innerHTML = `<span style="color:#ff9900;">(${reviewCount.toLocaleString()} Reviews)</span>`;
    const stock = PRODUCT.stock !== undefined ? PRODUCT.stock : 99;
    document.getElementById("amz-availability").textContent = stock > 0 ? "In stock" : "Out of stock";
    document.getElementById("amz-ships-from").textContent = PRODUCT.shipsFrom || "Store";
    document.getElementById("amz-sold-by").textContent = PRODUCT.soldBy || "Store";
    document.getElementById("amz-returns").textContent = PRODUCT.returns || "30-day returns";
    const badgesEl = document.getElementById("amz-badges");
    if(badgesEl){ const best = PRODUCT.bestseller || PRODUCT.badge === "best_seller"; const newp = PRODUCT.badge === "new" || PRODUCT.new; const sum = PRODUCT.summaryBadge; badgesEl.innerHTML = (sum ? `<div class="amz-badge">${sum}</div>` : '') + (best ? '<div class="amz-badge">#1 Best Seller</div>' : '') + (newp ? '<div class="amz-badge amz-badge--info">New</div>' : ''); }
  }
  function fmt(n) { return (typeof Shop !== "undefined" && Shop.fmt) ? Shop.fmt(n) : "€" + n.toFixed(2); }
  function updatePrice() {
    const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
    const basePrice = v ? v.price : PRODUCT.price;
    const discountPercent = PRODUCT.discount || 0;
    const discountedPrice = discountPercent > 0 ? basePrice * (1 - discountPercent / 100) : basePrice;
    document.getElementById("pdp-price").textContent = fmt(discountedPrice);
    const listRow = document.getElementById("amz-list-price-row"), savRow = document.getElementById("amz-savings-row");
    if (discountPercent > 0 && listRow && savRow) {
      document.getElementById("amz-list-price").textContent = fmt(basePrice);
      document.getElementById("amz-savings").textContent = fmt(basePrice - discountedPrice);
      document.getElementById("amz-discount-pct").textContent = `-${discountPercent}%`;
      listRow.style.display = "flex"; savRow.style.display = "flex";
    } else { if(listRow) listRow.style.display = "none"; if(savRow) savRow.style.display = "none"; }
  }
  function renderVariants() {
    const wrap = document.getElementById("amz-variants-section"), el = document.getElementById("amz-variants-grid");
    if (!PRODUCT.variants?.length) { if (wrap) wrap.style.display = "none"; return; }
    if (wrap) wrap.style.display = ""; el.innerHTML = PRODUCT.variants.map(v => `<button class="amz-variant-btn${v.id === selectedVariant ? " active" : ""}" data-vid="${v.id}">${v.label}</button>`).join("");
    el.querySelectorAll(".amz-variant-btn").forEach(btn => btn.addEventListener("click", () => { selectedVariant = btn.dataset.vid; el.querySelectorAll(".amz-variant-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); const v = PRODUCT.variants.find(v => v.id === selectedVariant); if (v?.image) { document.getElementById("gallery-main-img").src = v.image; document.getElementById("magnifier-img").src = v.image.replace("w=800","w=1600"); } updatePrice(); }));
  }
  function renderPerks() { const el = document.getElementById("pdp-perks"); if(el) el.innerHTML = ["Free shipping over €150","30-day returns","2-year warranty"].map(t => `<span>${t}</span>`).join(""); }
  
  function renderGallery() {
    const images = PRODUCT.images || [], videos = PRODUCT.videos || [];
    const mediaItems = [...images.map(src => ({ type: "image", src, thumb: src })), ...videos.map(src => ({ type: "video", src, isYT: /youtube\.com|youtu\.be/.test(src), thumb: /youtube\.com|youtu\.be/.test(src) ? `https://img.youtube.com/vi/${(src.match(/embed\/([^?]+)/)||src.match(/youtu\.be\/([^?]+)/))?.[1]||""}/mqdefault.jpg` : null }))];
    let activeIdx = 0, activeType = "image";
    const mainImg = document.getElementById("gallery-main-img"), mainVideoWrap = document.getElementById("gallery-main-video"), videoPlayer = document.getElementById("gallery-video-player"), ytFrame = document.getElementById("gallery-yt-frame"), ytIframe = document.getElementById("gallery-yt-iframe"), thumbsEl = document.getElementById("gallery-thumbs"), mainWrap = document.getElementById("gallery-main-wrap");
    function showImage(idx) { activeIdx = idx; activeType = "image"; currentImgIdx = idx; videoPlayer.pause(); videoPlayer.src = ""; ytIframe.src = ""; mainVideoWrap.style.display = "none"; mainWrap.classList.remove("video-active"); mainImg.style.opacity = "1"; mainImg.src = mediaItems[idx].src; document.getElementById("magnifier-img").src = mediaItems[idx].src.replace("w=800","w=1600"); const lbMain = document.getElementById("lb-main-img"); if (lbMain) lbMain.src = mediaItems[idx].src; buildThumbs(); }
    function showVideo(idx) { activeIdx = idx; activeType = "video"; const item = mediaItems[idx]; mainImg.style.opacity = "0"; mainVideoWrap.style.display = "block"; mainWrap.classList.add("video-active"); if (item.isYT) { videoPlayer.style.display = "none"; ytFrame.style.display = "block"; ytIframe.src = item.src + "?autoplay=1"; } else { ytFrame.style.display = "none"; ytIframe.src = ""; videoPlayer.style.display = "block"; videoPlayer.src = item.src; videoPlayer.play().catch(()=>{}); } buildThumbs(); }
    function buildThumbs() { thumbsEl.innerHTML = mediaItems.map((item,i) => `<div class="pdp-gallery__thumb-wrap${i === activeIdx ? " active" : ""}" data-idx="${i}" data-type="${item.type}">${item.type === "image" ? `<img class="pdp-gallery__thumb" src="${item.src}">` : `<div class="pdp-thumb-play">▶</div>`}</div>`).join("");
      thumbsEl.querySelectorAll(".pdp-gallery__thumb-wrap").forEach(el => el.addEventListener("click", () => { const idx = +el.dataset.idx; if (el.dataset.type === "video") showVideo(idx); else showImage(idx); })); }
    if (images.length) { mainImg.src = images[0]; document.getElementById("magnifier-img").src = images[0].replace("w=800","w=1600"); }
    buildThumbs(); mainWrap.addEventListener("click", e => { if(e.target.closest("video")||e.target.closest("iframe")) return; openLightbox(activeType === "video" ? "video" : "images"); });
  }
  function initMagnifier() { const mag = document.getElementById("magnifier"), wrap = document.getElementById("gallery-main-wrap"); if(!mag) return; }
  function initLightbox() { window.openLightbox = function(tab) { const lb = document.getElementById("lightbox"); lb.classList.add("open"); document.body.style.overflow = "hidden"; }; document.getElementById("lightbox-close")?.addEventListener("click",()=>{ document.getElementById("lightbox").classList.remove("open"); document.body.style.overflow = ""; }); }
  function initQty() { const input = document.getElementById("qty-val-input"); document.getElementById("qty-minus").addEventListener("click",()=>{ if(qty>1){qty--; input.value=qty;} }); document.getElementById("qty-plus").addEventListener("click",()=>{ const stock = PRODUCT.variants?.find(v=>v.id===selectedVariant)?.stock??PRODUCT.stock??99; if(qty<stock){qty++; input.value=qty;} }); input.addEventListener("change",()=>{ const stock = PRODUCT.variants?.find(v=>v.id===selectedVariant)?.stock??PRODUCT.stock??99; qty = Math.max(1,Math.min(parseInt(input.value)||1,stock)); input.value=qty; }); }
  function initAtc() { document.getElementById("atc-btn").addEventListener("click",()=>{ const v = PRODUCT.variants?.find(v=>v.id===selectedVariant); Shop.addToCart(PRODUCT,qty,selectedVariant,null,v?.image||PRODUCT.image); Shop.toast(`${Shop.pName(PRODUCT)} added to cart`); }); document.getElementById("buy-now-btn")?.addEventListener("click",()=>{ const v = PRODUCT.variants?.find(v=>v.id===selectedVariant); Shop.addToCart(PRODUCT,qty,selectedVariant,null,v?.image||PRODUCT.image); const lang = window.LANG||localStorage.getItem("dornori-lang")||"en", basePath = (window.SHOP_CONFIG?.basePath)||"/", slug = (window.T?.url_slugs?.cart)||"cart"; window.location.href = `${basePath}${lang}/${slug}/`; }); }
  function renderBundle() { const sec = document.getElementById("bundle-section"), bids = PRODUCT.bundled||[]; if(!bids.length){ sec.style.display="none"; return; } const bp = bids.map(id=>allProducts.find(p=>p.id===id)).filter(Boolean); if(!bp.length){ sec.style.display="none"; return; } sec.style.display=""; document.getElementById("bundle-items").innerHTML = bp.map(p=>`<div class="pdp-bundle-item"><img src="${p.image}" style="width:70px;height:70px;object-fit:cover;border-radius:16px;"><div><strong>${Shop.pName(p)}</strong><div>${fmt(p.price)}</div></div></div>`).join(""); document.getElementById("bundle-add-all").onclick = ()=>{ const v = PRODUCT.variants?.find(v=>v.id===selectedVariant); Shop.addToCart(PRODUCT,1,selectedVariant,null,v?.image||PRODUCT.image); bp.forEach(p=>Shop.addToCart(p,1)); Shop.toast("Bundle added"); }; }
  function renderRelated() { const sec = document.getElementById("related-section"), rids = PRODUCT.related||[]; const rp = rids.map(id=>allProducts.find(p=>p.id===id)).filter(Boolean); if(!rp.length){ sec.style.display="none"; return; } sec.style.display=""; document.getElementById("related-grid").innerHTML = rp.map(r=>`<div class="pdp-related-card"><img src="${r.image}"><div class="pdp-related-card__info"><div class="pdp-related-card__name">${Shop.pName(r)}</div><div class="pdp-related-card__price">${fmt(r.price)}</div><button class="pdp-related-card__buy-btn" data-rid="${r.id}">Buy Now</button></div></div>`).join(""); document.querySelectorAll(".pdp-related-card__buy-btn").forEach(btn=>btn.addEventListener("click",(e)=>{ e.stopPropagation(); const item = allProducts.find(p=>p.id===btn.dataset.rid); if(item){ Shop.addToCart(item,1); Shop.toast(`${Shop.pName(item)} added`); } })); }
  function renderSpecs() { const sec = document.getElementById("specs-section"), specs = PRODUCT.specs||[]; if(!specs.length){ sec.style.display="none"; return; } sec.style.display=""; const acc = document.getElementById("specs-accordion"); acc.innerHTML = specs.map((s,i)=>`<div class="amz-accordion-item"><div class="amz-accordion-header"><span>${s.title}</span><span>▼</span></div><div class="amz-accordion-body"><div class="amz-accordion-inner"><table class="amz-spec-table">${s.rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("")}</table></div></div></div>`).join(""); acc.querySelectorAll(".amz-accordion-header").forEach(h=>h.addEventListener("click",()=>h.closest(".amz-accordion-item").classList.toggle("open"))); }
});
</script>
