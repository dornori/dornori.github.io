<!-- content/en/product.html -->
<div id="product-detail-container" class="product-detail-container"></div>
<div id="product-error" class="product-error" style="display:none;"></div>

<style>
.product-detail-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
.product-error {
  text-align: center;
  padding: 3rem;
  color: #c0392b;
  font-family: var(--font-body);
}
.loading-spinner {
  text-align: center;
  padding: 3rem;
}
.loading-spinner::after {
  content: "";
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  align-items: start;
}
@media (max-width: 768px) {
  .product-grid { grid-template-columns: 1fr; gap: 2rem; }
}
.gallery-main {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: var(--c-bg-alt);
  cursor: zoom-in;
}
.gallery-main img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}
.gallery-thumbs {
  display: flex;
  gap: 0.75rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}
.gallery-thumb {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s, border 0.2s;
  border: 2px solid transparent;
}
.gallery-thumb.active {
  opacity: 1;
  border-color: var(--accent);
}
.gallery-thumb:hover { opacity: 1; }
.product-category {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.product-name {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3vw, 2.5rem);
  font-weight: 400;
  margin-bottom: 0.75rem;
}
.product-price {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 1rem;
}
.product-description {
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.variant-group { margin-bottom: 1.5rem; }
.variant-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}
.variant-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.variant-btn {
  padding: 0.5rem 1.2rem;
  border: 1.5px solid var(--border);
  border-radius: 40px;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.85rem;
}
.variant-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}
.qty-btn {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  font-size: 1.2rem;
}
.qty-value {
  min-width: 40px;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 500;
}
.add-to-cart-btn {
  width: 100%;
  padding: 1rem;
  font-size: 1rem;
  font-weight: 600;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1rem;
}
.add-to-cart-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
.product-meta {
  display: flex;
  gap: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-muted);
}
.related-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.related-title {
  font-size: 1.2rem;
  margin-bottom: 1rem;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1.5rem;
}
.related-card {
  background: var(--c-surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.2s;
  cursor: pointer;
}
.related-card:hover { transform: translateY(-4px); }
.related-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
}
.related-card-info {
  padding: 0.75rem;
}
.related-card-name {
  font-weight: 600;
  font-size: 0.9rem;
}
.related-card-price {
  font-size: 0.85rem;
  color: var(--accent);
  margin-top: 0.25rem;
}
</style>

<script>
(function() {
  // ------------------------------------------------------------
  // Get product ID from URL
  // ------------------------------------------------------------
  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    if (id) return id;
    // Pretty URL: /en/product/ufo-assembled
    const match = window.location.pathname.match(/\/product\/([^\/?#]+)/);
    if (match) return match[1];
    return null;
  }

  const productId = getProductId();
  const container = document.getElementById('product-detail-container');
  const errorDiv = document.getElementById('product-error');

  if (!productId) {
    errorDiv.innerHTML = 'No product specified. Use ?id=product-id in the URL.';
    errorDiv.style.display = 'block';
    return;
  }

  // ------------------------------------------------------------
  // Wait for Shop to be ready
  // ------------------------------------------------------------
  let product = null;
  let allProducts = [];

  async function loadProduct() {
    // Show loading spinner
    container.innerHTML = '<div class="loading-spinner"></div>';

    // Wait for Shop
    if (typeof Shop === 'undefined') {
      await new Promise(resolve => {
        const check = setInterval(() => {
          if (typeof Shop !== 'undefined') {
            clearInterval(check);
            resolve();
          }
        }, 50);
        setTimeout(() => clearInterval(check), 5000);
      });
    }

    if (typeof Shop === 'undefined') {
      errorDiv.innerHTML = 'Shop engine not loaded. Please refresh the page.';
      errorDiv.style.display = 'block';
      container.innerHTML = '';
      return;
    }

    try {
      // Load language and products
      await Shop.loadLang();
      allProducts = await Shop.loadProducts();
      product = allProducts.find(p => p.id === productId);
      
      if (!product) {
        throw new Error(`Product "${productId}" not found`);
      }
      
      // Render the product page
      renderProductPage();
    } catch (err) {
      console.error('Product load error:', err);
      errorDiv.innerHTML = err.message;
      errorDiv.style.display = 'block';
      container.innerHTML = '';
    }
  }

  // ------------------------------------------------------------
  // Render full product page
  // ------------------------------------------------------------
  let currentQty = 1;
  let selectedVariantId = null;
  let selectedVariant = null;
  let currentImages = [];

  function renderProductPage() {
    const hasVariants = product.variants && product.variants.length > 0;
    selectedVariantId = hasVariants ? product.variants[0].id : null;
    selectedVariant = hasVariants ? product.variants[0] : null;
    const displayPrice = selectedVariant ? selectedVariant.price : product.price;
    const images = product.images && product.images.length ? product.images : [product.image];
    currentImages = images;

    const html = `
      <div class="product-grid" data-product-id="${product.id}">
        <div class="gallery-column">
          <div class="gallery-main">
            <img id="product-main-img" src="${images[0]}" alt="${product.name}">
          </div>
          <div class="gallery-thumbs" id="product-thumbs">
            ${images.map((src, i) => `<img class="gallery-thumb ${i === 0 ? 'active' : ''}" src="${src}" data-index="${i}">`).join('')}
          </div>
        </div>
        <div class="details-column">
          <div class="product-category">${product.category || ''}</div>
          <h1 class="product-name">${product.name}</h1>
          <div class="product-price" id="product-price">${Shop.fmt ? Shop.fmt(displayPrice) : '€' + displayPrice.toFixed(2)}</div>
          <div class="product-description">${product.description || ''}</div>
          
          ${hasVariants ? `
          <div class="variant-group">
            <label class="variant-label">Choose Finish</label>
            <div class="variant-buttons" id="variant-buttons">
              ${product.variants.map((v, i) => `
                <button class="variant-btn ${i === 0 ? 'active' : ''}" data-variant-id="${v.id}" data-price="${v.price}" data-image="${v.image || images[0]}">
                  ${v.label}
                </button>
              `).join('')}
            </div>
          </div>
          ` : ''}
          
          <div class="qty-control">
            <button class="qty-btn" id="qty-minus">−</button>
            <span class="qty-value" id="qty-value">1</span>
            <button class="qty-btn" id="qty-plus">+</button>
          </div>
          
          <button class="add-to-cart-btn" id="add-to-cart">Add to Cart</button>
          
          <div class="product-meta">
            <span>⚡ Free shipping over €150</span>
            <span>🔄 30-day returns</span>
            <span>🔧 2-year warranty</span>
          </div>
        </div>
      </div>
    `;

    container.innerHTML = html;
    attachEventListeners(hasVariants);
    loadRelatedProducts();
  }

  function attachEventListeners(hasVariants) {
    // Thumbnail clicks
    const thumbs = document.querySelectorAll('.gallery-thumb');
    const mainImg = document.getElementById('product-main-img');
    thumbs.forEach(thumb => {
      thumb.addEventListener('click', () => {
        thumbs.forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        const src = thumb.getAttribute('src');
        if (mainImg) mainImg.src = src;
      });
    });

    // Variant selection
    if (hasVariants) {
      const variantBtns = document.querySelectorAll('.variant-btn');
      variantBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          variantBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const variantId = btn.dataset.variantId;
          const variant = product.variants.find(v => v.id === variantId);
          if (variant) {
            selectedVariantId = variant.id;
            selectedVariant = variant;
            const priceEl = document.getElementById('product-price');
            if (priceEl) priceEl.textContent = Shop.fmt ? Shop.fmt(variant.price) : '€' + variant.price.toFixed(2);
            if (variant.image && mainImg) {
              mainImg.src = variant.image;
              // Also update active thumb if image matches
              thumbs.forEach((thumb, i) => {
                if (thumb.getAttribute('src') === variant.image) {
                  thumbs.forEach(t => t.classList.remove('active'));
                  thumb.classList.add('active');
                }
              });
            }
          }
        });
      });
    }

    // Quantity controls
    const qtyValue = document.getElementById('qty-value');
    const qtyMinus = document.getElementById('qty-minus');
    const qtyPlus = document.getElementById('qty-plus');
    const maxStock = selectedVariant ? (selectedVariant.stock || 99) : (product.stock || 99);
    
    qtyMinus?.addEventListener('click', () => {
      if (currentQty > 1) {
        currentQty--;
        qtyValue.textContent = currentQty;
      }
    });
    qtyPlus?.addEventListener('click', () => {
      if (currentQty < maxStock) {
        currentQty++;
        qtyValue.textContent = currentQty;
      }
    });

    // Add to cart
    const atcBtn = document.getElementById('add-to-cart');
    atcBtn?.addEventListener('click', () => {
      const image = mainImg?.src || product.image;
      Shop.addToCart(product, currentQty, selectedVariantId, null, image);
      if (Shop.toast) {
        Shop.toast(`${product.name} added to cart`);
      } else {
        alert(`${product.name} added to cart`);
      }
    });
  }

  async function loadRelatedProducts() {
    if (!product.related || product.related.length === 0) return;
    
    const relatedIds = product.related;
    const relatedProducts = allProducts.filter(p => relatedIds.includes(p.id));
    if (relatedProducts.length === 0) return;

    const relatedHtml = `
      <div class="related-section">
        <h3 class="related-title">You May Also Like</h3>
        <div class="related-grid" id="related-grid">
          ${relatedProducts.map(rp => `
            <div class="related-card" data-product-id="${rp.id}">
              <img src="${rp.image}" alt="${rp.name}" loading="lazy">
              <div class="related-card-info">
                <div class="related-card-name">${rp.name}</div>
                <div class="related-card-price">${Shop.fmt ? Shop.fmt(rp.price) : '€' + rp.price.toFixed(2)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    
    container.insertAdjacentHTML('beforeend', relatedHtml);
    
    // Wire related product clicks
    document.querySelectorAll('.related-card').forEach(card => {
      card.addEventListener('click', () => {
        const relatedId = card.dataset.productId;
        if (relatedId) {
          window.location.href = `/en/product/?id=${relatedId}`;
        }
      });
    });
  }

  // Start loading
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadProduct);
  } else {
    loadProduct();
  }
})();
</script>
