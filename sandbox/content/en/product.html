<!-- content/en/product.html -->
<div id="product-detail-container" class="product-detail-container"></div>

<style>
.product-detail-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  align-items: start;
}
@media (max-width: 768px) {
  .product-grid { grid-template-columns: 1fr; gap: 2rem; }
}
.gallery-main {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: var(--c-bg-alt);
  cursor: pointer;
}
.gallery-main img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}
.gallery-thumbs {
  display: flex;
  gap: 0.75rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}
.gallery-thumb {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  opacity: 0.6;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.gallery-thumb.active {
  opacity: 1;
  border-color: var(--accent);
}
.product-category {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.product-name {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 3vw, 2.5rem);
  font-weight: 400;
  margin-bottom: 0.75rem;
}
.product-price {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 1rem;
}
.product-description {
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.variant-group { margin-bottom: 1.5rem; }
.variant-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}
.variant-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.variant-btn {
  padding: 0.5rem 1.2rem;
  border: 1.5px solid var(--border);
  border-radius: 40px;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.85rem;
}
.variant-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}
.variant-btn.soldout {
  opacity: 0.4;
  cursor: not-allowed;
  text-decoration: line-through;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}
.qty-btn {
  width: 40px;
  height: 40px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  font-size: 1.2rem;
}
.qty-value {
  min-width: 50px;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 500;
}
.add-to-cart-btn {
  width: 100%;
  padding: 1rem;
  font-size: 1rem;
  font-weight: 600;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1rem;
}
.add-to-cart-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
.add-to-cart-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.product-meta {
  display: flex;
  gap: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-muted);
}
.related-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.5rem;
  margin-top: 1rem;
}
.related-card {
  background: var(--c-surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}
.related-card:hover { transform: translateY(-4px); }
.related-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
}
.related-card-info {
  padding: 0.75rem;
}
.related-card-name {
  font-weight: 500;
  font-size: 0.85rem;
}
.related-card-price {
  font-size: 0.8rem;
  color: var(--accent);
  margin-top: 0.25rem;
}
.loading {
  text-align: center;
  padding: 3rem;
}
.loading::after {
  content: "";
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.error {
  text-align: center;
  padding: 3rem;
  color: #c0392b;
}
.stock-low {
  color: #e67e22;
  font-size: 0.85rem;
  margin-bottom: 1rem;
}
.stock-out {
  color: #c0392b;
  font-size: 0.85rem;
  margin-bottom: 1rem;
}
</style>

<script>
(function() {
  const container = document.getElementById('product-detail-container');
  let product = null;
  let allProducts = [];
  let currentQty = 1;
  let selectedVariantId = null;
  let selectedVariant = null;

  // Get product ID from URL
  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    if (id) return id;
    const match = window.location.pathname.match(/\/product\/([^\/?#]+)/);
    if (match) return match[1];
    return null;
  }

  const productId = getProductId();

  if (!productId) {
    container.innerHTML = '<div class="error">No product specified. Use ?id=product-id in the URL.</div>';
    return;
  }

  // Format price (safe fallback)
  function formatPrice(price) {
    if (typeof Shop !== 'undefined' && Shop.fmt) {
      return Shop.fmt(price);
    }
    return '€' + price.toFixed(2);
  }

  // Get product name (safe)
  function getProductName(p) {
    if (typeof Shop !== 'undefined' && Shop.pName) {
      return Shop.pName(p);
    }
    return p.name || p.id;
  }

  // Get product description (safe)
  function getProductDesc(p) {
    if (typeof Shop !== 'undefined' && Shop.pDesc) {
      return Shop.pDesc(p);
    }
    return p.description || '';
  }

  // Get product category (safe)
  function getProductCategory(p) {
    if (typeof Shop !== 'undefined' && Shop.pCategory) {
      return Shop.pCategory(p);
    }
    return p.category || '';
  }

  // Main render function
  async function renderProduct() {
    container.innerHTML = '<div class="loading"></div>';

    // Wait for Shop to be available
    if (typeof Shop === 'undefined') {
      await new Promise((resolve) => {
        const check = setInterval(() => {
          if (typeof Shop !== 'undefined') {
            clearInterval(check);
            resolve();
          }
        }, 50);
        setTimeout(() => clearInterval(check), 5000);
      });
    }

    if (typeof Shop === 'undefined') {
      container.innerHTML = '<div class="error">Shop engine not loaded. Please refresh the page.</div>';
      return;
    }

    try {
      // Ensure language is loaded
      await Shop.loadLang();
      
      // Load product using Shop.getProduct (more reliable)
      product = await Shop.getProduct(productId);
      
      if (!product) {
        throw new Error(`Product "${productId}" not found`);
      }

      // Set up variants
      const hasVariants = product.variants && product.variants.length > 0;
      if (hasVariants) {
        selectedVariantId = product.variants[0].id;
        selectedVariant = product.variants[0];
      }

      const images = product.images && product.images.length ? product.images : [product.image];
      const currentPrice = selectedVariant ? selectedVariant.price : product.price;
      const currentImage = selectedVariant && selectedVariant.image ? selectedVariant.image : images[0];
      const currentName = getProductName(product);
      const currentDesc = getProductDesc(product);
      const currentCategory = getProductCategory(product);
      const inStock = selectedVariant ? (selectedVariant.stock > 0) : (product.stock > 0);
      const lowStock = selectedVariant ? (selectedVariant.stock <= 5 && selectedVariant.stock > 0) : (product.stock <= 5 && product.stock > 0);

      // Build HTML
      let html = `
        <div class="product-grid" data-product-id="${product.id}">
          <div class="gallery-column">
            <div class="gallery-main">
              <img id="product-main-img" src="${currentImage}" alt="${currentName}">
            </div>
            <div class="gallery-thumbs" id="product-thumbs">
      `;

      images.forEach((src, i) => {
        html += `<img class="gallery-thumb ${i === 0 ? 'active' : ''}" src="${src}" data-index="${i}">`;
      });

      html += `
            </div>
          </div>
          <div class="details-column">
            <div class="product-category">${currentCategory}</div>
            <h1 class="product-name">${currentName}</h1>
            <div class="product-price" id="product-price">${formatPrice(currentPrice)}</div>
      `;

      if (!inStock) {
        html += `<div class="stock-out">❌ Out of Stock</div>`;
      } else if (lowStock) {
        html += `<div class="stock-low">⚠️ Only ${selectedVariant?.stock || product.stock} left in stock! Order soon.</div>`;
      }

      html += `
            <div class="product-description">${currentDesc}</div>
      `;

      // Variants
      if (hasVariants) {
        html += `
            <div class="variant-group">
              <label class="variant-label">Choose Option</label>
              <div class="variant-buttons" id="variant-buttons">
        `;
        product.variants.forEach((v, i) => {
          const isSoldOut = v.stock === 0;
          html += `<button class="variant-btn ${i === 0 ? 'active' : ''} ${isSoldOut ? 'soldout' : ''}" data-variant-id="${v.id}" data-price="${v.price}" data-image="${v.image || images[0]}" ${isSoldOut ? 'disabled' : ''}>${v.label}${isSoldOut ? ' (Sold Out)' : ''}</button>`;
        });
        html += `
              </div>
            </div>
        `;
      }

      // Quantity and Add to Cart
      html += `
            <div class="qty-control">
              <button class="qty-btn" id="qty-minus">−</button>
              <span class="qty-value" id="qty-value">1</span>
              <button class="qty-btn" id="qty-plus">+</button>
            </div>
            <button class="add-to-cart-btn" id="add-to-cart" ${!inStock ? 'disabled' : ''}>${inStock ? 'Add to Cart' : 'Out of Stock'}</button>
            <div class="product-meta">
              <span>🚚 Free shipping over €150</span>
              <span>🔄 30-day returns</span>
              <span>🔧 2-year warranty</span>
            </div>
          </div>
        </div>
      `;

      container.innerHTML = html;

      // Attach event listeners
      attachEvents(hasVariants);
      
      // Load related products
      if (product.related && product.related.length) {
        loadRelatedProducts();
      }

    } catch (err) {
      console.error('Product error:', err);
      container.innerHTML = `<div class="error">${err.message}</div>`;
    }
  }

  function attachEvents(hasVariants) {
    const mainImg = document.getElementById('product-main-img');
    const priceEl = document.getElementById('product-price');
    const qtyValue = document.getElementById('qty-value');
    const qtyMinus = document.getElementById('qty-minus');
    const qtyPlus = document.getElementById('qty-plus');
    const atcBtn = document.getElementById('add-to-cart');

    // Thumbnail clicks
    const thumbs = document.querySelectorAll('.gallery-thumb');
    thumbs.forEach(thumb => {
      thumb.addEventListener('click', () => {
        thumbs.forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
        const src = thumb.getAttribute('src');
        if (mainImg) mainImg.src = src;
      });
    });

    // Variant selection
    if (hasVariants) {
      const variantBtns = document.querySelectorAll('.variant-btn:not([disabled])');
      variantBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          variantBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const variantId = btn.dataset.variantId;
          const variant = product.variants.find(v => v.id === variantId);
          if (variant) {
            selectedVariantId = variant.id;
            selectedVariant = variant;
            if (priceEl) priceEl.textContent = formatPrice(variant.price);
            if (variant.image && mainImg) mainImg.src = variant.image;
            const inStock = variant.stock > 0;
            const lowStock = variant.stock <= 5 && variant.stock > 0;
            atcBtn.disabled = !inStock;
            atcBtn.textContent = inStock ? 'Add to Cart' : 'Out of Stock';
          }
        });
      });
    }

    // Quantity controls
    let currentQty = 1;
    const maxStock = selectedVariant ? (selectedVariant.stock || 99) : (product.stock || 99);
    
    if (qtyMinus) {
      qtyMinus.addEventListener('click', () => {
        if (currentQty > 1) {
          currentQty--;
          if (qtyValue) qtyValue.textContent = currentQty;
        }
      });
    }
    
    if (qtyPlus) {
      qtyPlus.addEventListener('click', () => {
        if (currentQty < maxStock) {
          currentQty++;
          if (qtyValue) qtyValue.textContent = currentQty;
        }
      });
    }

    // Add to cart
    if (atcBtn) {
      atcBtn.addEventListener('click', () => {
        const image = mainImg?.src || product.image;
        Shop.addToCart(product, currentQty, selectedVariantId, null, image);
        if (Shop.toast) {
          Shop.toast(`${getProductName(product)} added to cart`);
        } else {
          alert(`${getProductName(product)} added to cart`);
        }
      });
    }
  }

  async function loadRelatedProducts() {
    if (!product.related || product.related.length === 0) return;
    
    try {
      const relatedProducts = [];
      for (const id of product.related) {
        const p = await Shop.getProduct(id);
        if (p) relatedProducts.push(p);
      }
      
      if (relatedProducts.length === 0) return;

      let relatedHtml = `
        <div class="related-section">
          <h3>You May Also Like</h3>
          <div class="related-grid" id="related-grid">
      `;
      
      relatedProducts.forEach(rp => {
        relatedHtml += `
          <div class="related-card" data-product-id="${rp.id}">
            <img src="${rp.image}" alt="${getProductName(rp)}" loading="lazy">
            <div class="related-card-info">
              <div class="related-card-name">${getProductName(rp)}</div>
              <div class="related-card-price">${formatPrice(rp.price)}</div>
            </div>
          </div>
        `;
      });
      
      relatedHtml += `</div></div>`;
      container.insertAdjacentHTML('beforeend', relatedHtml);
      
      document.querySelectorAll('.related-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.productId;
          if (id) {
            window.location.href = `/en/product/?id=${id}`;
          }
        });
      });
    } catch (err) {
      console.warn('Related products error:', err);
    }
  }

  // Start rendering when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderProduct);
  } else {
    renderProduct();
  }
})();
</script>
