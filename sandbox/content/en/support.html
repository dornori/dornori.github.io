<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Support</title>
    <style>
        .sf-wrap { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--text); }
        .sf-header { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #000 45%) 100%);
                      padding: 2rem; border-radius: 1.25rem 1.25rem 0 0; color: #fff; display:flex; align-items:center; gap:1rem; }
        .sf-header i { font-size: 2.25rem; }
        .sf-body { background: var(--glass); border: 1px solid var(--border); border-top:none;
                    border-radius: 0 0 1.25rem 1.25rem; padding: 2rem; }
        .sf-progress-track { height:.5rem; background:color-mix(in srgb,var(--border) 50%,transparent 50%);
                             border-radius:9999px; overflow:hidden; margin-bottom:2rem; }
        .sf-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#ea580c 40%));
                             transition:width .3s; }
        .sf-progress-row { display:flex; justify-content:space-between; margin-bottom:.5rem; font-size:.85rem; }
        .sf-progress-step { color:var(--accent); font-weight:600; }
        .sf-progress-note { color:var(--text-muted); }
        .sf-cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.85rem; }
        .sf-btn, .sf-opt { width:100%; text-align:left; padding:1rem 1.25rem; border:1px solid var(--border);
                          border-radius:.875rem; background:transparent; color:var(--text); cursor:pointer;
                          display:flex; align-items:center; gap:.75rem; font-weight:500; font-size:.95rem;
                          transition:border-color .15s, background .15s; }
        .sf-btn:hover, .sf-opt:hover { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent 92%); }
        .sf-q-label { font-size:.8rem; color:var(--accent); margin-bottom:.5rem; }
        .sf-q-text { font-size:1.1rem; font-weight:600; color:var(--text); margin-bottom:1.25rem; }
        .sf-input { width:100%; padding:.8rem 1.1rem; border:1px solid var(--border); border-radius:.875rem;
                    background:color-mix(in srgb,var(--bg) 70%,transparent 30%); color:var(--text);
                    font-size:.95rem; outline:none; transition:border-color .15s, box-shadow .15s; box-sizing:border-box; }
        .sf-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent 80%); }
        .sf-input.sf-input-error { border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.18); }
        .sf-label { display:block; font-size:.85rem; font-weight:600; color:var(--text); margin-bottom:.25rem; }
        .sf-field-error { font-size:.78rem; color:#ef4444; margin-top:.3rem; min-height:1rem; }
        .sf-submit { width:100%; background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#ea580c 45%));
                      color:var(--bg); font-weight:700; padding:.875rem; border-radius:.875rem; border:none;
                      font-size:1rem; cursor:pointer; transition:opacity .15s; }
        .sf-submit:hover { opacity:.88; }
        .sf-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .sf-reset { font-size:.82rem; background:transparent; border:1px solid var(--border); color:var(--text-muted);
                    border-radius:9999px; padding:.35rem .9rem; cursor:pointer; transition:color .15s; }
        .sf-hidden { display:none !important; }
        .sf-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
        .sf-field { display:flex; flex-direction:column; gap:.25rem; margin-bottom:1.25rem; }
        .sf-note { font-size:.82rem; color:var(--text-muted); text-align:center; margin-top:1.5rem; }
        .sf-loading { text-align:center; padding:2.5rem; color:var(--text-muted); }
        .sf-toast { position:fixed; bottom:20px; right:20px; z-index:9999; background:var(--header-bg);
                    color:var(--text); border:1px solid var(--border); padding:10px 18px;
                    border-radius:40px; font-size:.88rem; opacity:0; transition:opacity .2s; pointer-events:none; }
        .resolved-screen { text-align:center; padding:3rem 1rem; }
        @media(max-width:520px){ .sf-grid2{ grid-template-columns:1fr; } .sf-cat-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="sf-toast" class="sf-toast"></div>
<div class="sf-wrap">
    <div class="sf-header">
        <i class="fas fa-headset"></i>
        <div>
            <div id="sf-title" style="font-size:1.4rem;font-weight:700;"></div>
            <div id="sf-subtitle" style="opacity:.8;font-size:.9rem;margin-top:.2rem;"></div>
        </div>
    </div>

    <div class="sf-body">
        <div class="sf-progress-row">
            <span class="sf-progress-note"><i class="far fa-clock"></i> <span id="avg-resolution"></span></span>
            <span id="sf-step-label" class="sf-progress-step"></span>
        </div>
        <div class="sf-progress-track"><div id="sf-prog" class="sf-progress-fill" style="width:5%"></div></div>

        <div id="sf-loading" class="sf-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:1.75rem;color:var(--accent)"></i>
            <p style="margin-top:.75rem" id="loading-text">Loading…</p>
        </div>

        <div id="sf-s1" class="sf-hidden">
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;" id="select-issue"></div>
            <div id="sf-cats" class="sf-cat-grid"></div>
            <p class="sf-note"><i class="fas fa-shield-alt"></i> <span id="most-issues"></span></p>
        </div>

        <div id="sf-s2" class="sf-hidden"></div>

        <div id="sf-s3" class="sf-hidden">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                <i class="fas fa-headset" style="font-size:1.4rem;color:var(--accent)"></i>
                <span style="font-size:1.25rem;font-weight:700;" id="need-help"></span>
            </div>
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem;" id="response-time"></p>

            <div class="sf-grid2">
                <div class="sf-field">
                    <label class="sf-label" for="sf-name" id="label-name"></label>
                    <input id="sf-name" type="text" class="sf-input" autocomplete="name" maxlength="120" required>
                    <span class="sf-field-error" id="sf-name-err"></span>
                </div>
                <div class="sf-field">
                    <label class="sf-label" for="sf-email" id="label-email"></label>
                    <input id="sf-email" type="email" class="sf-input" autocomplete="email" maxlength="254" required>
                    <span class="sf-field-error" id="sf-email-err"></span>
                </div>
            </div>

            <div class="sf-field">
                <label class="sf-label" for="sf-order" id="label-order"></label>
                <input id="sf-order" type="text" class="sf-input" inputmode="numeric" maxlength="20" placeholder="e.g. 100234">
                <span class="sf-field-error" id="sf-order-err"></span>
            </div>

            <div class="sf-field">
                <label class="sf-label" id="label-summary"></label>
                <div id="sf-summary-box" style="padding:.8rem 1.1rem;border:1px solid var(--border);border-radius:.875rem;background:color-mix(in srgb,var(--bg) 40%,transparent 60%);font-size:.85rem;color:var(--text-muted);white-space:pre-wrap;line-height:1.6;min-height:80px;"></div>
            </div>

            <div class="sf-field">
                <label class="sf-label" id="label-comments"></label>
                <textarea id="sf-desc" rows="3" class="sf-input" style="resize:vertical" maxlength="2000" placeholder=""></textarea>
                <span class="sf-field-error" id="sf-desc-err"></span>
            </div>

            <div class="sf-turnstile-wrap">
                <div id="sf-turnstile-container"></div>
                <span class="sf-turnstile-error sf-hidden" id="sf-turnstile-err"></span>
            </div>

            <button id="sf-submit" class="sf-submit"></button>
            <div id="sf-status"></div>
        </div>
    </div>
</div>

<div style="text-align:right;margin-top:.75rem;">
    <button class="sf-reset" onclick="sfReset()"><i class="fas fa-redo-alt"></i> <span id="start-over-btn"></span></button>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="config.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script>
// ==================== FULL SCRIPT ====================
let formData = {};
let currentCategory = null;
let currentQuestions = [];
let currentQIndex = 0;
let summary = [];
let turnstileWidgetId = null;
let turnstileToken = null;

const workerUrl = CONFIG?.queue?.endpoint || "https://edge-form-handler-api.dornori-info.workers.dev";
const TURNSTILE_SITE_KEY = CONFIG?.turnstile?.sitekey || "1x00000000000000000000AA";

// ==================== HELPERS ====================
function stripHtml(str) {
    if (typeof str !== 'string') return '';
    let clean = str.replace(/<[^>]*>/g, '');
    return clean.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
                .replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&nbsp;/g,' ').trim();
}

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email) && email.length <= 254;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
}

function showToast(msg, ms = 3000) {
    const t = document.getElementById('sf-toast');
    if (t) {
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', ms);
    }
}

// ==================== VALIDATION WITH SCROLL ====================
function setFieldError(inputId, errorId, message) {
    const input = document.getElementById(inputId);
    const errEl = document.getElementById(errorId);
    if (message) {
        input.classList.add('sf-input-error');
        errEl.textContent = message;
        return true;
    } else {
        input.classList.remove('sf-input-error');
        errEl.textContent = '';
        return false;
    }
}

function validateForm() {
    let hasError = false;
    let firstError = null;

    // Name
    const name = stripHtml(document.getElementById('sf-name').value).slice(0, 120);
    if (!name) {
        hasError = setFieldError('sf-name', 'sf-name-err', formData.fullNameRequired || 'Full name is required.') || hasError;
        firstError = firstError || document.getElementById('sf-name');
    }

    // Email
    const email = stripHtml(document.getElementById('sf-email').value).trim();
    if (!email) {
        hasError = setFieldError('sf-email', 'sf-email-err', formData.emailRequired || 'Email address is required.') || hasError;
        firstError = firstError || document.getElementById('sf-email');
    } else if (!isValidEmail(email)) {
        hasError = setFieldError('sf-email', 'sf-email-err', formData.emailInvalid || 'Please enter a valid email address.') || hasError;
        firstError = firstError || document.getElementById('sf-email');
    }

    // Order
    const order = stripHtml(document.getElementById('sf-order').value).trim();
    if (order && !/^\d+$/.test(order)) {
        hasError = setFieldError('sf-order', 'sf-order-err', formData.orderDigitsOnly || 'Order number must contain digits only.') || hasError;
        firstError = firstError || document.getElementById('sf-order');
    }

    // Turnstile
    if (!turnstileToken) {
        document.getElementById('sf-turnstile-err').classList.remove('sf-hidden');
        hasError = true;
        if (!firstError) firstError = document.getElementById('sf-turnstile-container');
    } else {
        document.getElementById('sf-turnstile-err').classList.add('sf-hidden');
    }

    if (hasError && firstError) {
        firstError.scrollIntoView({ behavior: "smooth", block: "center" });
        if (firstError.focus) firstError.focus();
    }

    return {
        valid: !hasError,
        sanitised: {
            name,
            email,
            order,
            message: stripHtml(document.getElementById('sf-desc').value).slice(0, 4000)
        }
    };
}

// ==================== TURNSTILE ====================
function initTurnstile() {
    const container = document.getElementById('sf-turnstile-container');
    if (!container) return;

    if (turnstileWidgetId && window.turnstile) {
        window.turnstile.reset(turnstileWidgetId);
        return;
    }
    if (!window.turnstile) {
        setTimeout(initTurnstile, 200);
        return;
    }

    turnstileWidgetId = window.turnstile.render(container, {
        sitekey: TURNSTILE_SITE_KEY,
        theme: 'auto',
        callback: (token) => turnstileToken = token,
        'expired-callback': () => turnstileToken = null,
        'error-callback': () => turnstileToken = null
    });
}

// ==================== FORM LOADING ====================
async function loadFormData() {
    try {
        const res = await fetch('lang/en/form.json', { cache: 'no-store' });
        formData = await res.json();

        // Populate texts
        document.getElementById('sf-title').textContent = formData.title || "Dornori Support";
        document.getElementById('sf-subtitle').textContent = formData.subtitle || "We're here to help";
        document.getElementById('avg-resolution').textContent = formData.avgResolution || "Avg. resolution 2 min";
        document.getElementById('select-issue').textContent = formData.selectIssue || "Select your issue";
        document.getElementById('most-issues').textContent = formData.mostIssuesResolved || "Most issues resolved in under 2 minutes";
        document.getElementById('need-help').textContent = formData.needHumanHelp || "Need human help?";
        document.getElementById('response-time').textContent = formData.responseTime || "Our support team responds within 4 hours (Mon–Fri).";
        document.getElementById('loading-text').textContent = formData.loading || "Loading…";
        document.getElementById('start-over-btn').textContent = formData.startOver || "Start over";
        document.getElementById('sf-submit').textContent = formData.submitButton || "📧 Submit";
        document.getElementById('sf-turnstile-err').textContent = formData.turnstileError || "Please complete the security check.";

        document.getElementById('label-name').innerHTML = `${formData.fullName} <span style="color:#ef4444">*</span>`;
        document.getElementById('label-email').innerHTML = `${formData.email} <span style="color:#ef4444">*</span>`;
        document.getElementById('label-order').innerHTML = `${formData.orderNumber} <span style="color:var(--text-muted);font-weight:400;">${formData.orderNumberHelp}</span>`;
        document.getElementById('label-summary').textContent = formData.troubleshootingSummary;
        document.getElementById('label-comments').textContent = formData.additionalComments;
        document.getElementById('sf-desc').placeholder = formData.commentsPlaceholder;

        // Categories
        const container = document.getElementById('sf-cats');
        container.innerHTML = '';
        formData.categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'sf-btn';
            btn.innerHTML = `<i class="fas fa-chevron-circle-right"></i> ${escapeHtml(cat.title)}`;
            btn.onclick = () => startCategory(cat);
            container.appendChild(btn);
        });

        document.getElementById('sf-loading').style.display = 'none';
        document.getElementById('sf-s1').classList.remove('sf-hidden');
        updateProgress(5, formData.step1);

    } catch (err) {
        console.error(err);
        document.getElementById('sf-loading').innerHTML = `<p style="color:red">Failed to load. Please refresh.</p>`;
    }
}

function updateProgress(percent, label) {
    document.getElementById('sf-prog').style.width = percent + '%';
    document.getElementById('sf-step-label').textContent = label;
}

// ==================== FLOW FUNCTIONS ====================
function startCategory(cat) {
    currentCategory = cat;
    currentQuestions = cat.questions || [];
    currentQIndex = 0;
    summary = ['Category: ' + cat.title, '---'];
    showQuestion();
}

function showQuestion() {
    if (!currentQuestions.length || currentQIndex >= currentQuestions.length) {
        showContactForm();
        return;
    }
    const q = currentQuestions[currentQIndex];
    let html = `<div class="sf-q-label"><i class="fas fa-question-circle"></i> Question ${currentQIndex + 1}/${currentQuestions.length}</div>`;
    html += `<div class="sf-q-text">${escapeHtml(q.text)}</div>`;

    q.options.forEach((opt, idx) => {
        html += `<button class="sf-opt" onclick="selectAnswer(${idx})"><span>${escapeHtml(opt.text)}</span><i class="fas fa-arrow-right"></i></button>`;
    });

    html += `<div style="margin-top:1rem"><button class="sf-reset" onclick="sfReset()"><i class="fas fa-undo-alt"></i> ${formData.startOver}</button></div>`;

    document.getElementById('sf-s2').innerHTML = html;
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.remove('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    updateProgress(45, formData.step2);
}

window.selectAnswer = function(optionIndex) {
    const q = currentQuestions[currentQIndex];
    const opt = q.options[optionIndex];
    summary.push('Q: ' + q.text);
    summary.push('A: ' + opt.text);

    if (opt.resolves === true || opt.next === 'resolved_end') {
        showResolvedScreen();
        return;
    }
    if (opt.next === 'contact') {
        showContactForm();
        return;
    }
    currentQIndex++;
    showQuestion();
};

function showResolvedScreen() {
    const html = `
        <div class="resolved-screen">
            <i class="fas fa-check-circle" style="font-size:5rem;color:#22c55e;margin-bottom:1.5rem;"></i>
            <h2>${formData.resolvedTitle || "Issue Resolved!"}</h2>
            <p style="color:var(--text-muted); max-width:420px; margin:1rem auto;">${formData.resolvedText}</p>
            <button onclick="window.location.href='/'" class="sf-submit" style="width:auto;padding:1rem 2.5rem;">${formData.backToHome}</button>
        </div>`;
    document.getElementById('sf-s2').innerHTML = html;
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.remove('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    updateProgress(100, "Resolved");
}

function showContactForm() {
    document.getElementById('sf-summary-box').textContent = summary.join('\n') || '(No troubleshooting steps recorded)';
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.remove('sf-hidden');
    updateProgress(85, formData.step3);
    initTurnstile();
}

// ==================== SUBMISSION ====================
async function sendSupportRequest() {
    const statusDiv = document.getElementById('sf-status');
    const { valid, sanitised } = validateForm();
    if (!valid) {
        statusDiv.className = 'sf-status-error';
        statusDiv.textContent = formData.errorFixAbove || '✗ Please fix the errors above before submitting.';
        return;
    }

    const submitBtn = document.getElementById('sf-submit');
    submitBtn.disabled = true;
    statusDiv.className = 'sf-status-sending';
    statusDiv.textContent = 'Sending…';

    const payload = {
        category: 'ticket',
        name: sanitised.name,
        email: sanitised.email,
        order: sanitised.order,
        summary: document.getElementById('sf-summary-box').textContent,
        message: sanitised.message,
        ua: navigator.userAgent,
        cfTurnstileToken: turnstileToken
    };

    try {
        const response = await fetch(workerUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            statusDiv.className = 'sf-status-success';
            statusDiv.textContent = formData.successMessage;
        } else {
            statusDiv.className = 'sf-status-error';
            statusDiv.textContent = '✗ Error sending request.';
        }
    } catch (err) {
        statusDiv.className = 'sf-status-error';
        statusDiv.textContent = '✗ Network error.';
    } finally {
        submitBtn.disabled = false;
    }
}

document.addEventListener('click', e => {
    if (e.target.closest('#sf-submit')) {
        sendSupportRequest();
    }
});

window.sfReset = function() {
    location.reload();
};

// ==================== BOOT ====================
loadFormData();
</script>
</body>
</html>
