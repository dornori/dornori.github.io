<!-- FILE: sandbox/content/en/support.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Support</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --border: #e5e7eb;
            --glass: #ffffff;
            --header-bg: #1f2937;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --accent: #60a5fa;
                --border: #334155;
                --glass: #1e293b;
                --header-bg: #0f172a;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); padding: 2rem 1rem; font-family: ui-sans-serif, system-ui, sans-serif; }
        .sf-wrap { max-width: 800px; margin: 0 auto; }
        .sf-header { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #000 45%) 100%); padding: 2rem; border-radius: 1.25rem 1.25rem 0 0; color: #fff; display: flex; align-items: center; gap: 1rem; }
        .sf-header i { font-size: 2.25rem; }
        .sf-body { background: var(--glass); border: 1px solid var(--border); border-top: none; border-radius: 0 0 1.25rem 1.25rem; padding: 2rem; }
        .sf-progress-track { height: .5rem; background: color-mix(in srgb, var(--border) 50%, transparent 50%); border-radius: 9999px; overflow: hidden; margin-bottom: 2rem; }
        .sf-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #ea580c 40%)); transition: width .3s; }
        .sf-progress-row { display: flex; justify-content: space-between; margin-bottom: .5rem; font-size: .85rem; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .sf-progress-step { color: var(--accent); font-weight: 600; }
        .sf-progress-note { color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
        .sf-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: .85rem; }
        .sf-btn, .sf-opt { width: 100%; text-align: left; padding: 1rem 1.25rem; border: 1px solid var(--border); border-radius: .875rem; background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: .75rem; font-weight: 500; font-size: .95rem; transition: border-color .15s, background .15s; }
        .sf-btn:hover, .sf-opt:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent 92%); }
        .sf-q-label { font-size: .8rem; color: var(--accent); margin-bottom: .5rem; letter-spacing: 0.3px; }
        .sf-q-text { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 1.25rem; }
        .sf-input { width: 100%; padding: .8rem 1.1rem; border: 1px solid var(--border); border-radius: .875rem; background: color-mix(in srgb, var(--bg) 70%, transparent 30%); color: var(--text); font-size: .95rem; outline: none; transition: border-color .15s, box-shadow .15s; box-sizing: border-box; }
        .sf-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent 80%); }
        .sf-input.sf-input-error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.18); }
        .sf-label { display: block; font-size: .85rem; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
        .sf-field-error { font-size: .78rem; color: #ef4444; margin-top: .3rem; min-height: 1rem; }
        .sf-submit { width: 100%; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #ea580c 45%)); color: var(--bg); font-weight: 700; padding: .875rem; border-radius: .875rem; border: none; font-size: 1rem; cursor: pointer; transition: opacity .15s; }
        .sf-submit:hover { opacity: .88; }
        .sf-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .sf-reset { font-size: .82rem; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 9999px; padding: .35rem .9rem; cursor: pointer; transition: color .15s; }
        .sf-reset:hover { border-color: var(--accent); color: var(--accent); }
        .sf-hidden { display: none !important; }
        .sf-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .sf-field { display: flex; flex-direction: column; gap: .25rem; margin-bottom: 1.25rem; }
        .sf-note { font-size: .82rem; color: var(--text-muted); text-align: center; margin-top: 1.5rem; }
        .sf-loading { text-align: center; padding: 2.5rem; color: var(--text-muted); }
        .sf-toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: var(--header-bg); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: 40px; font-size: .88rem; opacity: 0; transition: opacity .2s; pointer-events: none; }
        .resolved-screen { text-align: center; padding: 3rem 1rem; }
        .sf-nav-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: space-between; }
        .sf-nav-back { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .sf-nav-next { background: var(--accent); border: none; color: white; padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        @media(max-width:520px){ .sf-grid2{ grid-template-columns:1fr; } .sf-cat-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div id="sf-toast" class="sf-toast"></div>
<div class="sf-wrap">
    <div class="sf-header">
        <i class="fas fa-headset"></i>
        <div>
            <div id="sf-title" style="font-size:1.4rem;font-weight:700;"></div>
            <div id="sf-subtitle" style="opacity:.8;font-size:.9rem;margin-top:.2rem;"></div>
        </div>
    </div>

    <div class="sf-body">
        <div class="sf-progress-row">
            <span class="sf-progress-note"><i class="far fa-clock"></i> <span id="avg-resolution"></span></span>
            <div style="display: flex; gap: 12px; align-items: center;">
                <span id="sf-step-label" class="sf-progress-step"></span>
                <button id="sf-start-over" class="sf-reset" style="display: none;"><i class="fas fa-undo-alt"></i> Start over</button>
            </div>
        </div>
        <div class="sf-progress-track"><div id="sf-prog" class="sf-progress-fill" style="width:5%"></div></div>

        <div id="sf-loading" class="sf-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:1.75rem;color:var(--accent)"></i>
            <p style="margin-top:.75rem" id="loading-text">Loading…</p>
        </div>

        <div id="sf-s1" class="sf-hidden">
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;" id="select-issue"></div>
            <div id="sf-cats" class="sf-cat-grid"></div>
            <p class="sf-note"><i class="fas fa-shield-alt"></i> <span id="most-issues"></span></p>
        </div>

        <div id="sf-s2" class="sf-hidden"></div>

        <div id="sf-s3" class="sf-hidden">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                <i class="fas fa-headset" style="font-size:1.4rem;color:var(--accent)"></i>
                <span style="font-size:1.25rem;font-weight:700;" id="need-help"></span>
            </div>
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem;" id="response-time"></p>

            <div class="sf-grid2">
                <div class="sf-field">
                    <label class="sf-label" for="sf-name" id="label-name"></label>
                    <input id="sf-name" type="text" class="sf-input" autocomplete="name" maxlength="120" required>
                    <span class="sf-field-error" id="sf-name-err"></span>
                </div>
                <div class="sf-field">
                    <label class="sf-label" for="sf-email" id="label-email"></label>
                    <input id="sf-email" type="email" class="sf-input" autocomplete="email" maxlength="254" required>
                    <span class="sf-field-error" id="sf-email-err"></span>
                </div>
            </div>

            <div class="sf-field">
                <label class="sf-label" for="sf-order" id="label-order"></label>
                <input id="sf-order" type="text" class="sf-input" inputmode="numeric" maxlength="20" placeholder="e.g. 100234">
                <span class="sf-field-error" id="sf-order-err"></span>
            </div>

            <div class="sf-field">
                <label class="sf-label" id="label-summary"></label>
                <div id="sf-summary-box" style="padding:.8rem 1.1rem;border:1px solid var(--border);border-radius:.875rem;background:color-mix(in srgb,var(--bg) 40%,transparent 60%);font-size:.85rem;color:var(--text-muted);white-space:pre-wrap;line-height:1.6;min-height:80px;"></div>
            </div>

            <div class="sf-field">
                <label class="sf-label" id="label-comments"></label>
                <textarea id="sf-desc" rows="3" class="sf-input" style="resize:vertical" maxlength="2000" placeholder=""></textarea>
                <span class="sf-field-error" id="sf-desc-err"></span>
            </div>

            <div class="sf-turnstile-wrap">
                <div id="sf-turnstile-container"></div>
                <span class="sf-turnstile-error sf-hidden" id="sf-turnstile-err"></span>
            </div>

            <button id="sf-submit" class="sf-submit"></button>
            <div id="sf-status" style="margin-top: 12px; font-size: 0.85rem;"></div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="../../config.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script>
// ==================== FULLY FUNCTIONAL SCRIPT ====================
let formData = {};
let turnstileWidgetId = null;
let currentCategory = null;
let currentQuestions = [];
let currentQIndex = 0;
let answers = {};      // Store answers per question id
let summaryLines = [];

const workerUrl = CONFIG.queue.endpoint;
const TURNSTILE_SITE_KEY = CONFIG.turnstile.sitekey;
const formJsonPath = CONFIG.formJsonPath;

// DOM elements
const loadingDiv = document.getElementById('sf-loading');
const step1Div = document.getElementById('sf-s1');
const step2Div = document.getElementById('sf-s2');
const step3Div = document.getElementById('sf-s3');
const progFill = document.getElementById('sf-prog');
const stepLabelSpan = document.getElementById('sf-step-label');
const startOverBtn = document.getElementById('sf-start-over');

// Helper functions
function showToast(msg, ms = 3000) {
    const t = document.getElementById('sf-toast');
    if (t) {
        t.textContent = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', ms);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
}

function updateProgress(percent, label) {
    progFill.style.width = `${percent}%`;
    if (label) stepLabelSpan.textContent = label;
}

function resetToStep1() {
    // Reset all state
    currentCategory = null;
    currentQuestions = [];
    currentQIndex = 0;
    answers = {};
    summaryLines = [];
    if (turnstileWidgetId !== null) {
        try { turnstile.reset(turnstileWidgetId); } catch(e) {}
        turnstileWidgetId = null;
    }
    document.getElementById('sf-turnstile-container').innerHTML = '';
    document.getElementById('sf-status').innerHTML = '';
    // clear form fields
    document.getElementById('sf-name').value = '';
    document.getElementById('sf-email').value = '';
    document.getElementById('sf-order').value = '';
    document.getElementById('sf-desc').value = '';
    ['sf-name-err','sf-email-err','sf-order-err','sf-desc-err'].forEach(id => document.getElementById(id).innerHTML = '');
    // show step1
    step1Div.classList.remove('sf-hidden');
    step2Div.classList.add('sf-hidden');
    step3Div.classList.add('sf-hidden');
    updateProgress(5, formData.step1 || "Select category");
    startOverBtn.style.display = 'none';
}

async function loadFormData() {
    try {
        console.log("Loading form.json from:", formJsonPath);
        const res = await fetch(formJsonPath, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        formData = await res.json();
        populateUI();
    } catch (err) {
        console.error(err);
        loadingDiv.innerHTML = `<p style="color:red">❌ Failed to load form data.<br>Path: ${formJsonPath}<br>Check console.</p>`;
    }
}

function populateUI() {
    document.getElementById('sf-title').textContent = formData.title || "Support Center";
    document.getElementById('sf-subtitle').textContent = formData.subtitle || "We're here to help";
    document.getElementById('avg-resolution').textContent = formData.avgResolution || "< 2 hours";
    document.getElementById('select-issue').textContent = formData.selectIssue || "What can we help with?";
    document.getElementById('most-issues').textContent = formData.mostIssuesResolved || "Most issues resolved within 24h";
    document.getElementById('need-help').textContent = formData.needHumanHelp || "Need human help?";
    document.getElementById('response-time').textContent = formData.responseTime || "Usually respond within 2 hours";
    document.getElementById('loading-text').textContent = formData.loading || "Loading...";
    document.getElementById('sf-submit').textContent = formData.submitButton || "Submit ticket";
    document.getElementById('sf-turnstile-err').textContent = formData.turnstileError || "Please verify you're human";
    
    document.getElementById('label-name').innerHTML = `${formData.fullName || "Full name"} <span style="color:#ef4444">*</span>`;
    document.getElementById('label-email').innerHTML = `${formData.email || "Email address"} <span style="color:#ef4444">*</span>`;
    document.getElementById('label-order').innerHTML = `${formData.orderNumber || "Order number"} <span style="color:var(--text-muted);font-weight:400;">${formData.orderNumberHelp || "(optional)"}</span>`;
    document.getElementById('label-summary').textContent = formData.troubleshootingSummary || "Troubleshooting summary";
    document.getElementById('label-comments').textContent = formData.additionalComments || "Additional comments";
    document.getElementById('sf-desc').placeholder = formData.commentsPlaceholder || "Describe your issue in detail...";
    
    const container = document.getElementById('sf-cats');
    container.innerHTML = '';
    (formData.categories || []).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'sf-btn';
        btn.innerHTML = `<i class="fas fa-chevron-circle-right"></i> ${escapeHtml(cat.title)}`;
        btn.onclick = () => startCategory(cat);
        container.appendChild(btn);
    });
    
    loadingDiv.classList.add('sf-hidden');
    step1Div.classList.remove('sf-hidden');
    updateProgress(5, formData.step1 || "Select category");
    startOverBtn.style.display = 'none';
    startOverBtn.onclick = () => resetToStep1();
}

function startCategory(cat) {
    currentCategory = cat;
    currentQuestions = cat.questions || [];
    currentQIndex = 0;
    answers = {};
    summaryLines = [];
    step1Div.classList.add('sf-hidden');
    step2Div.classList.remove('sf-hidden');
    startOverBtn.style.display = 'inline-flex';
    renderQuestion();
}

function renderQuestion() {
    if (!currentQuestions.length || currentQIndex >= currentQuestions.length) {
        finishQuestions();
        return;
    }
    const q = currentQuestions[currentQIndex];
    const percent = 5 + Math.floor((currentQIndex / (currentQuestions.length || 1)) * 35);
    updateProgress(percent, `Question ${currentQIndex+1} of ${currentQuestions.length}`);
    
    step2Div.innerHTML = `
        <div class="sf-q-label">${escapeHtml(q.label || 'Question')}</div>
        <div class="sf-q-text">${escapeHtml(q.text)}</div>
        ${q.type === 'textarea' ? `<textarea id="sf-q-input" class="sf-input" rows="3" placeholder="${escapeHtml(q.placeholder || 'Your answer...')}" maxlength="500"></textarea>` : 
          q.type === 'select' && q.options ? `<select id="sf-q-input" class="sf-input"><option value="">Select...</option>${q.options.map(opt => `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}</select>` :
          `<input type="text" id="sf-q-input" class="sf-input" placeholder="${escapeHtml(q.placeholder || 'Type your answer')}" maxlength="300">`}
        <div class="sf-nav-buttons">
            <button id="sf-back-btn" class="sf-nav-back" ${currentQIndex === 0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i> Back</button>
            <button id="sf-next-btn" class="sf-nav-next">${currentQIndex === currentQuestions.length-1 ? 'Finish' : 'Next'} <i class="fas fa-arrow-right"></i></button>
        </div>
    `;
    if (answers[q.id]) document.getElementById('sf-q-input').value = answers[q.id];
    document.getElementById('sf-back-btn').onclick = () => { if(currentQIndex > 0) { currentQIndex--; renderQuestion(); } };
    document.getElementById('sf-next-btn').onclick = () => {
        const val = document.getElementById('sf-q-input').value.trim();
        if (!val && q.required !== false) {
            showToast("Please provide an answer", 1500);
            return;
        }
        answers[q.id] = val;
        summaryLines.push(`${q.text}: ${val}`);
        if (currentQIndex < currentQuestions.length-1) {
            currentQIndex++;
            renderQuestion();
        } else {
            finishQuestions();
        }
    };
}

function finishQuestions() {
    // show summary screen (step3)
    step2Div.classList.add('sf-hidden');
    step3Div.classList.remove('sf-hidden');
    updateProgress(75, "Review & submit");
    // populate summary box
    const summaryBox = document.getElementById('sf-summary-box');
    summaryBox.innerHTML = summaryLines.map(line => `<div>• ${escapeHtml(line)}</div>`).join('') || "<em>No troubleshooting steps recorded.</em>";
    // Render turnstile if not rendered
    if (!turnstileWidgetId && window.turnstile) {
        turnstileWidgetId = turnstile.render('#sf-turnstile-container', {
            sitekey: TURNSTILE_SITE_KEY,
            callback: function(token) {
                document.getElementById('sf-turnstile-err').classList.add('sf-hidden');
                turnstileToken = token;
            },
            'error-callback': function() {
                document.getElementById('sf-turnstile-err').classList.remove('sf-hidden');
                turnstileToken = null;
            }
        });
    }
    startOverBtn.style.display = 'inline-flex';
}

async function submitTicket() {
    const name = document.getElementById('sf-name').value.trim();
    const email = document.getElementById('sf-email').value.trim();
    const order = document.getElementById('sf-order').value.trim();
    const comments = document.getElementById('sf-desc').value.trim();
    let isValid = true;
    
    document.getElementById('sf-name-err').innerHTML = '';
    document.getElementById('sf-email-err').innerHTML = '';
    document.getElementById('sf-order-err').innerHTML = '';
    document.getElementById('sf-desc-err').innerHTML = '';
    if (!name) { document.getElementById('sf-name-err').innerHTML = 'Name is required'; isValid=false; }
    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { document.getElementById('sf-email-err').innerHTML = 'Valid email required'; isValid=false; }
    if (!turnstileToken) { document.getElementById('sf-turnstile-err').classList.remove('sf-hidden'); isValid=false; }
    if (!isValid) return;
    
    const payload = {
        category: currentCategory?.title || "General",
        troubleshooting: summaryLines,
        name, email, orderNumber: order,
        additionalComments: comments,
        timestamp: new Date().toISOString(),
        turnstileToken: turnstileToken
    };
    
    const submitBtn = document.getElementById('sf-submit');
    const statusDiv = document.getElementById('sf-status');
    submitBtn.disabled = true;
    statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
    try {
        const res = await fetch(workerUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            statusDiv.innerHTML = '<span style="color: #10b981;">✓ Ticket submitted! We’ll email you shortly.</span>';
            showToast("Ticket sent successfully", 4000);
            // Optionally reset after success
            setTimeout(() => resetToStep1(), 3000);
        } else {
            throw new Error(data.error || "Submission failed");
        }
    } catch (err) {
        statusDiv.innerHTML = `<span style="color: #ef4444;">❌ ${err.message}. Please try again.</span>`;
        if (turnstileWidgetId) turnstile.reset(turnstileWidgetId);
        turnstileToken = null;
    } finally {
        submitBtn.disabled = false;
    }
}

// Event listeners
document.getElementById('sf-submit').addEventListener('click', submitTicket);

// Initial load
loadFormData();
</script>
</body>
</html>
