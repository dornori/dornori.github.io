<!-- content/en/showcase.html -->
<!-- Professional Showcase – all products, cart sidebar, quick‑view -->
<div class="showcase-page">
  
  <!-- Hero section -->
  <div class="showcase-hero">
    <div class="showcase-hero__text">
      <h1>✨ Complete Collection</h1>
      <p>Every lamp, kit, and component we offer – click any product to see details, choose your finish, and add to cart.</p>
    </div>
    <div class="showcase-hero__action">
      <button id="showcase-cart-btn" class="webshop-btn webshop-btn--outline">
        🛒 Cart (<span id="showcase-cart-count">0</span>)
      </button>
    </div>
  </div>

  <!-- Product grid – automatically populated by mountShopEmbeds -->
  <div class="showcase-grid-wrapper">
    <div data-shop-products="all" class="showcase-grid"></div>
  </div>

  <!-- Cart sidebar (slide‑out) -->
  <div id="showcase-cart-sidebar" class="showcase-cart-sidebar">
    <div class="showcase-cart-header">
      <h3>Shopping Cart</h3>
      <button id="showcase-close-cart" class="showcase-close-btn" aria-label="Close">&times;</button>
    </div>
    <div id="showcase-cart-items" class="showcase-cart-items"></div>
    <div class="showcase-cart-footer">
      <div id="showcase-cart-total" class="showcase-cart-total"></div>
      <button id="showcase-checkout" class="webshop-btn webshop-btn--primary showcase-checkout-btn">
        Proceed to Checkout →
      </button>
    </div>
  </div>
  <div id="showcase-cart-overlay" class="showcase-cart-overlay"></div>

</div>

<style>
/* Professional styling – clean, rounded, well‑spaced */
.showcase-page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 16px;
}

/* Hero section – two‑column on desktop */
.showcase-hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 2rem;
  background: var(--c-surface);
  border-radius: 28px;
  padding: 2rem 2rem;
  margin-bottom: 2.5rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  border: 1px solid var(--border);
}

.showcase-hero__text h1 {
  font-family: var(--font-display, 'DM Serif Display', serif);
  font-size: 1.8rem;
  font-weight: 400;
  margin: 0 0 0.5rem 0;
  color: var(--text);
}

.showcase-hero__text p {
  color: var(--text-muted);
  margin: 0;
  font-size: 0.95rem;
  line-height: 1.5;
  max-width: 560px;
}

.showcase-hero__action button {
  white-space: nowrap;
  padding: 12px 24px;
  font-weight: 600;
  background: var(--c-surface);
  border: 1.5px solid var(--accent);
  border-radius: 40px;
}

/* Grid wrapper – ensures proper spacing for product cards */
.showcase-grid-wrapper {
  margin-bottom: 3rem;
}

/* Override shop grid to have consistent rounded cards */
.showcase-grid .webshop-product-card {
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  background: var(--c-surface);
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}

.showcase-grid .webshop-product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 32px -12px rgba(0,0,0,0.12);
}

/* Ensure product images are nicely proportioned */
.showcase-grid .webshop-card-img {
  border-radius: 16px 16px 0 0;
}

/* Cart sidebar styles */
.showcase-cart-sidebar {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  height: 100%;
  background: var(--c-surface);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,0.12);
  z-index: 10001;
  transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  display: flex;
  flex-direction: column;
  font-family: var(--font-body);
}

.showcase-cart-sidebar.open {
  right: 0;
}

.showcase-cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
}

.showcase-cart-header h3 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 1.4rem;
}

.showcase-close-btn {
  background: none;
  border: none;
  font-size: 1.8rem;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.2s;
  line-height: 1;
  padding: 0 8px;
}

.showcase-close-btn:hover {
  color: var(--text);
}

.showcase-cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.5rem;
}

.showcase-cart-item {
  display: flex;
  gap: 14px;
  margin-bottom: 1.2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.showcase-cart-item img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 12px;
  background: var(--c-bg-alt);
}

.showcase-cart-item-details {
  flex: 1;
}

.showcase-cart-item-name {
  font-weight: 600;
  font-size: 0.9rem;
}

.showcase-cart-item-variant {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.showcase-cart-item-price {
  font-size: 0.85rem;
  margin-top: 6px;
  color: var(--accent-dark);
}

.showcase-cart-item-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1.1rem;
  padding: 0 6px;
  transition: color 0.2s;
}

.showcase-cart-item-remove:hover {
  color: #c0392b;
}

.showcase-cart-footer {
  padding: 1.2rem 1.5rem 1.8rem;
  border-top: 1px solid var(--border);
  background: var(--c-surface);
}

.showcase-cart-total {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 1rem;
  text-align: right;
}

.showcase-checkout-btn {
  width: 100%;
  justify-content: center;
  background: var(--accent);
  color: var(--c-white);
  border: none;
  padding: 14px;
  font-weight: 600;
  border-radius: 40px;
}

.showcase-cart-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(2px);
  z-index: 10000;
  display: none;
  cursor: pointer;
}

.showcase-cart-overlay.active {
  display: block;
}

/* Empty cart message */
.showcase-cart-empty {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Responsive */
@media (max-width: 680px) {
  .showcase-cart-sidebar {
    width: 100%;
    right: -100%;
  }
  .showcase-hero {
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    padding: 1.5rem;
  }
  .showcase-hero__action button {
    width: 100%;
    justify-content: center;
  }
}
</style>

<script>
(function() {
  // Wait for Shop global (loaded by parent site)
  if (typeof Shop === 'undefined') {
    const retry = setInterval(() => {
      if (typeof Shop !== 'undefined') {
        clearInterval(retry);
        initShowcaseFeatures();
      }
    }, 100);
    return;
  }
  initShowcaseFeatures();

  function initShowcaseFeatures() {
    if (window._showcaseInited) return;
    window._showcaseInited = true;

    // DOM elements
    const sidebar = document.getElementById('showcase-cart-sidebar');
    const overlay = document.getElementById('showcase-cart-overlay');
    const openBtn = document.getElementById('showcase-cart-btn');
    const closeBtn = document.getElementById('showcase-close-cart');
    const checkoutBtn = document.getElementById('showcase-checkout');
    const cartCountSpan = document.getElementById('showcase-cart-count');
    const itemsContainer = document.getElementById('showcase-cart-items');
    const totalSpan = document.getElementById('showcase-cart-total');

    // Helper: render cart contents
    function renderCartSidebar() {
      if (!itemsContainer) return;
      const cart = Shop.getCart();
      const itemCount = cart.reduce((s, i) => s + i.qty, 0);
      if (cartCountSpan) cartCountSpan.innerText = itemCount;

      if (cart.length === 0) {
        itemsContainer.innerHTML = '<div class="showcase-cart-empty">Your cart is empty.</div>';
        totalSpan.innerHTML = '€0.00';
        return;
      }

      let total = 0;
      let html = '';
      cart.forEach(item => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
          <div class="showcase-cart-item" data-cartkey="${item.cartKey}">
            <img src="${item.image}" alt="${item.name}" loading="lazy">
            <div class="showcase-cart-item-details">
              <div class="showcase-cart-item-name">${escapeHtml(item.name)}</div>
              ${item.selectedColor ? `<div class="showcase-cart-item-variant">${escapeHtml(item.selectedColor)}</div>` : ''}
              <div class="showcase-cart-item-price">€${item.price.toFixed(2)} × ${item.qty} = €${itemTotal.toFixed(2)}</div>
            </div>
            <button class="showcase-cart-item-remove" data-cartkey="${item.cartKey}" aria-label="Remove">✕</button>
          </div>
        `;
      });
      itemsContainer.innerHTML = html;
      totalSpan.innerHTML = `€${total.toFixed(2)}`;

      // bind remove buttons
      document.querySelectorAll('.showcase-cart-item-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const key = btn.getAttribute('data-cartkey');
          Shop.removeFromCart(key);
          renderCartSidebar();
          // trigger global update for any other cart UI
          document.dispatchEvent(new CustomEvent('shop:cartUpdated', { detail: { cart: Shop.getCart() } }));
        });
      });
    }

    // Open / close sidebar
    function openSidebar() {
      if (sidebar) {
        sidebar.classList.add('open');
        overlay.classList.add('active');
        renderCartSidebar();
      }
    }
    function closeSidebar() {
      if (sidebar) {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      }
    }

    if (openBtn) openBtn.addEventListener('click', openSidebar);
    if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
    if (overlay) overlay.addEventListener('click', closeSidebar);
    if (checkoutBtn) checkoutBtn.addEventListener('click', () => {
      const cart = Shop.getCart();
      if (cart.length === 0) {
        alert('Your cart is empty. Add some products first!');
      } else {
        alert(`✨ Demo checkout\n\nItems: ${cart.length}\nTotal: ${Shop.fmt(cart.reduce((s,i)=>s+i.price*i.qty,0))}\n\n(Full checkout integration would happen here.)`);
      }
    });

    // Listen to cart updates from any source (add to cart, etc.)
    document.addEventListener('shop:cartUpdated', renderCartSidebar);
    renderCartSidebar();

    // Enhance product cards with quick‑view on image click
    if (typeof ProductViewer !== 'undefined') {
      // ProductViewer already set up its listeners, but we need to add .product-viewer-trigger class to image wrappers
      const addTriggerClass = () => {
        document.querySelectorAll('.webshop-card-img-wrap').forEach(wrap => {
          if (!wrap.classList.contains('product-viewer-trigger')) {
            wrap.classList.add('product-viewer-trigger');
            // extract product ID from card
            const card = wrap.closest('.webshop-product-card');
            if (card) {
              const titleEl = card.querySelector('.webshop-card-title');
              if (titleEl && titleEl.innerText) {
                // map product name to ID? easier: look for data attribute or use id from shop data
                // actual product id can be found in the card's inner structure if we set data-product-id
                // we'll rely on ProductViewer's own matching logic (it uses Shop cache and product id)
                // but the trigger needs data-product-id. We'll try to fetch from product data
                const productName = titleEl.innerText.trim();
                // Quick workaround: find product id from Shop._products by name matching
                if (typeof Shop !== 'undefined' && Shop._products) {
                  const match = Object.values(Shop._products).find(p => p.name === productName || (p.i18n?.en?.name === productName));
                  if (match) wrap.setAttribute('data-product-id', match.id);
                }
              }
            }
          }
        });
      };
      addTriggerClass();
      // re-run after each shop cart update (cards might re-render)
      document.addEventListener('shop:cartUpdated', addTriggerClass);
      setTimeout(() => ProductViewer.init(), 300);
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }
})();
</script>
