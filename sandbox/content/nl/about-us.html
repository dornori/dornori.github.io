<!-- content/en/showcase.html -->
<!-- Full shop showcase – product grid + cart sidebar + quick‑view -->
<!-- Relies on global Shop, Currency, ProductViewer (already loaded by parent index.html) -->

<div style="margin-bottom: 2rem;">
  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
    <h2 style="font-family: var(--font-display); font-size: 1.8rem;">✨ All Products</h2>
    <button id="showcase-cart-btn" class="webshop-btn webshop-btn--outline" style="padding: 8px 20px;">
      🛒 View Cart (<span id="showcase-cart-count">0</span>)
    </button>
  </div>
  <p style="color: var(--text-muted); margin-top: 0.5rem;">Click any image for quick view – variants, prices, and cart work live.</p>
</div>

<!-- Product grid – mountShopEmbeds will render all products from /data/products.json -->
<div data-shop-products="all"></div>

<!-- Cart sidebar (slide‑out) -->
<div id="showcase-cart-sidebar" style="
  position: fixed; top: 0; right: -400px; width: 380px; height: 100%;
  background: var(--c-surface); border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,0.1); z-index: 10001;
  transition: right 0.25s ease; padding: 1.5rem; overflow-y: auto;
">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
    <h3 style="margin: 0;">Your Cart</h3>
    <button id="showcase-close-cart" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
  </div>
  <div id="showcase-cart-items"></div>
  <div id="showcase-cart-total" style="font-weight: bold; margin-top: 1rem;"></div>
  <button id="showcase-checkout" class="webshop-btn webshop-btn--primary" style="width: 100%; margin-top: 1.5rem;">
    Checkout →
  </button>
</div>

<!-- Overlay for sidebar (optional) -->
<div id="showcase-cart-overlay" style="
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 10000; display: none;
"></div>

<script>
  (function() {
    // Wait for Shop to be available (already loaded by parent page)
    if (typeof Shop === 'undefined') {
      console.warn('[showcase] Shop not ready, retrying...');
      document.addEventListener('lumio:booted', initShowcase);
      document.addEventListener('webshop:ready', initShowcase);
      setTimeout(initShowcase, 1000);
      return;
    }
    initShowcase();

    function initShowcase() {
      if (window._showcaseInited) return;
      window._showcaseInited = true;

      const sidebar = document.getElementById('showcase-cart-sidebar');
      const overlay = document.getElementById('showcase-cart-overlay');
      const openBtn = document.getElementById('showcase-cart-btn');
      const closeBtn = document.getElementById('showcase-close-cart');
      const checkoutBtn = document.getElementById('showcase-checkout');
      const cartCountSpan = document.getElementById('showcase-cart-count');
      const itemsDiv = document.getElementById('showcase-cart-items');
      const totalDiv = document.getElementById('showcase-cart-total');

      function renderCartSidebar() {
        if (!itemsDiv) return;
        const cart = Shop.getCart();
        if (cart.length === 0) {
          itemsDiv.innerHTML = '<p style="color: var(--text-muted);">Your cart is empty.</p>';
          totalDiv.innerHTML = '€0';
          if (cartCountSpan) cartCountSpan.innerText = '0';
          return;
        }
        let total = 0;
        let html = '';
        cart.forEach(item => {
          const itemTotal = item.price * item.qty;
          total += itemTotal;
          html += `
            <div style="display: flex; gap: 12px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
              <img src="${item.image}" style="width: 56px; height: 56px; object-fit: cover; border-radius: 8px;">
              <div style="flex: 1;">
                <strong>${item.name}</strong> ${item.selectedColor ? `<small>(${item.selectedColor})</small>` : ''}<br>
                €${item.price} × ${item.qty} = €${itemTotal.toFixed(2)}
              </div>
              <button class="showcase-remove-item" data-cartkey="${item.cartKey}" style="background: none; border: none; cursor: pointer;">✕</button>
            </div>
          `;
        });
        itemsDiv.innerHTML = html;
        totalDiv.innerHTML = `Total: €${total.toFixed(2)}`;
        if (cartCountSpan) cartCountSpan.innerText = cart.reduce((s,i)=>s+i.qty,0);
        // attach remove handlers
        document.querySelectorAll('.showcase-remove-item').forEach(btn => {
          btn.addEventListener('click', (e) => {
            Shop.removeFromCart(btn.dataset.cartkey);
            renderCartSidebar();
            // also refresh any other cart UI (hover panel, mini cart)
            document.dispatchEvent(new CustomEvent('shop:cartUpdated', { detail: { cart: Shop.getCart() } }));
          });
        });
      }

      function openSidebar() {
        if (sidebar && overlay) {
          sidebar.style.right = '0';
          overlay.style.display = 'block';
          renderCartSidebar();
        }
      }
      function closeSidebar() {
        if (sidebar && overlay) {
          sidebar.style.right = '-400px';
          overlay.style.display = 'none';
        }
      }

      if (openBtn) openBtn.addEventListener('click', openSidebar);
      if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
      if (overlay) overlay.addEventListener('click', closeSidebar);
      if (checkoutBtn) checkoutBtn.addEventListener('click', () => {
        alert('✨ Demo checkout – your cart: ' + JSON.stringify(Shop.getCart(), null, 2));
        closeSidebar();
      });

      // Listen to cart updates from any source (add to cart, remove, etc.)
      document.addEventListener('shop:cartUpdated', renderCartSidebar);
      renderCartSidebar();

      // Ensure ProductViewer quick-view works on dynamically added cards
      if (typeof ProductViewer !== 'undefined') {
        // ProductViewer already listens for DOMContentLoaded, but cards are added after.
        // Re-run init to attach triggers to new .product-viewer-trigger elements
        setTimeout(() => ProductViewer.init(), 200);
      }
    }
  })();
</script>

<style>
  /* Ensure product cards have pointer cursor for quick‑view */
  .webshop-card-img-wrap {
    cursor: pointer;
  }
  /* Sidebar scroll */
  #showcase-cart-sidebar {
    font-family: var(--font-body);
  }
</style>
