<!-- content/en/showcase.html -->
<!-- Professional Showcase – compact, responsive, all products -->
<div class="showcase-container">
  
  <!-- Header -->
  <div class="showcase-header">
    <div>
      <h1>✨ Complete Collection</h1>
      <p>All lamps, kits, and components – click any image to see details, choose finish, and add to cart.</p>
    </div>
    <button id="showcase-cart-btn" class="webshop-btn webshop-btn--outline">
      🛒 Cart (<span id="showcase-cart-count">0</span>)
    </button>
  </div>

  <!-- Product grid – injected by mountShopEmbeds -->
  <div data-shop-products="all" class="showcase-product-grid"></div>

  <!-- Cart sidebar -->
  <div id="showcase-cart-sidebar" class="showcase-sidebar">
    <div class="showcase-sidebar-header">
      <h3>Your Cart</h3>
      <button id="showcase-close-cart" class="showcase-sidebar-close">×</button>
    </div>
    <div id="showcase-cart-items" class="showcase-sidebar-items"></div>
    <div class="showcase-sidebar-footer">
      <div id="showcase-cart-total" class="showcase-sidebar-total"></div>
      <button id="showcase-checkout" class="webshop-btn webshop-btn--primary">Checkout →</button>
    </div>
  </div>
  <div id="showcase-cart-overlay" class="showcase-overlay"></div>

</div>

<style>
/* Reset any overflow issues */
.showcase-container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 1rem 1rem 3rem;
  overflow-x: hidden;
}

/* Header – flexible */
.showcase-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1.5rem;
  background: var(--c-surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 1.5rem 2rem;
  margin-bottom: 2rem;
  box-shadow: 0 2px 6px rgba(0,0,0,0.03);
}

.showcase-header h1 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 400;
  margin: 0 0 0.25rem;
}

.showcase-header p {
  margin: 0;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Force product grid to be clean */
.showcase-product-grid {
  margin-bottom: 2rem;
}

/* Override shop grid to keep cards contained */
.showcase-product-grid .webshop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.5rem;
  margin: 0;
}

/* Product card styling – ensure consistent sizing */
.showcase-product-grid .webshop-product-card {
  background: var(--c-surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  height: 100%;
}

.showcase-product-grid .webshop-product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15);
}

/* Force images to be square and contained */
.showcase-product-grid .webshop-card-img-wrap {
  aspect-ratio: 1 / 1;
  background: var(--c-bg-alt);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.showcase-product-grid .webshop-card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.showcase-product-grid .webshop-product-card:hover .webshop-card-img {
  transform: scale(1.03);
}

/* Card body padding */
.showcase-product-grid .webshop-card-body {
  padding: 1rem 1rem 1.2rem;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.showcase-product-grid .webshop-card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.showcase-product-grid .webshop-card-footer {
  margin: 0.5rem 0 0.75rem;
}

.showcase-product-grid .webshop-card-price {
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent);
}

/* Variant buttons – compact */
.showcase-product-grid .webshop-variants {
  gap: 0.5rem;
  margin: 0.5rem 0;
}

.showcase-product-grid .webshop-variant-btn {
  padding: 4px 10px;
  font-size: 0.7rem;
}

/* Add to cart button */
.showcase-product-grid .webshop-card-atc {
  padding: 10px;
  font-size: 0.8rem;
  margin-top: 0.5rem;
}

/* Sidebar styles */
.showcase-sidebar {
  position: fixed;
  top: 0;
  right: -420px;
  width: 380px;
  height: 100%;
  background: var(--c-surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  z-index: 10002;
  transition: right 0.25s ease;
  display: flex;
  flex-direction: column;
  font-family: var(--font-body);
}

.showcase-sidebar.open {
  right: 0;
}

.showcase-sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.showcase-sidebar-header h3 {
  margin: 0;
  font-size: 1.3rem;
}

.showcase-sidebar-close {
  background: none;
  border: none;
  font-size: 1.8rem;
  cursor: pointer;
  line-height: 1;
  color: var(--text-muted);
}

.showcase-sidebar-items {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.5rem;
}

.showcase-cart-item {
  display: flex;
  gap: 12px;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.showcase-cart-item img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 10px;
  background: var(--c-bg-alt);
}

.showcase-cart-item-details {
  flex: 1;
}

.showcase-cart-item-name {
  font-weight: 600;
  font-size: 0.85rem;
}

.showcase-cart-item-variant {
  font-size: 0.7rem;
  color: var(--text-muted);
}

.showcase-cart-item-price {
  font-size: 0.8rem;
  margin-top: 4px;
}

.showcase-cart-item-remove {
  background: none;
  border: none;
  font-size: 1.1rem;
  cursor: pointer;
  color: var(--text-muted);
  padding: 0 4px;
}

.showcase-sidebar-footer {
  padding: 1rem 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}

.showcase-sidebar-total {
  font-weight: 700;
  font-size: 1.1rem;
  text-align: right;
  margin-bottom: 1rem;
}

.showcase-checkout-btn {
  width: 100%;
  justify-content: center;
}

.showcase-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(2px);
  z-index: 10001;
  display: none;
}

.showcase-overlay.active {
  display: block;
}

/* Responsive */
