<!-- content/en/product.html ─────────────────────────────────────────────────
     Full Product Detail Page — embedded in the Dornori site shell.
     Loaded by page-loader.js into #page-content-inner when slug = 'product'.
     Product ID is read from URL ?id= parameter.
     Uses Shop.getProduct() to load from your existing products.json.
     ──────────────────────────────────────────────────────────────────────── -->

<style>
  .pdp-magnifier {
    position: fixed; pointer-events: none; z-index: 9999;
    background: var(--c-surface, #faf8f5);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    border-radius: 12px; overflow: hidden;
    border: 2px solid var(--c-accent, #7aad8e); display: none;
  }
  .pdp-magnifier img { position: absolute; top: 0; left: 0; max-width: none; display: block; }
  .pdp-gallery__main-wrap { cursor: crosshair; position: relative; overflow: hidden; }
  .pdp-gallery__main-wrap.video-active { cursor: pointer; }
  .pdp-gallery__main-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pdp-related-card__buy-btn { text-transform: uppercase; font-weight: 700; letter-spacing: 0.08em; }
  .pdp-accordion-item .pdp-accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .pdp-accordion-item.open .pdp-accordion-body { max-height: 600px; }
  .pdp-accordion-item.open .pdp-accordion-trigger svg { transform: rotate(180deg); }
  .pdp-loading { text-align: center; padding: 3rem; }
  .pdp-loading::after { content: ""; display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pdp-error { text-align: center; padding: 3rem; color: #c0392b; }
</style>

<!-- Magnifier -->
<div class="pdp-magnifier" id="magnifier">
  <img id="magnifier-img" src="" alt="">
</div>

<!-- Lightbox -->
<div class="pdp-lightbox" id="lightbox" role="dialog" aria-modal="true" style="display:none;">
  <div class="pdp-lightbox__inner">
    <button class="pdp-lightbox__close" id="lightbox-close" aria-label="Close">✕</button>
    <div class="pdp-lightbox__tabs">
      <button class="pdp-lightbox__tab active" data-tab="images">Images</button>
      <button class="pdp-lightbox__tab" data-tab="video">Video</button>
    </div>
    <div class="pdp-lightbox__body">
      <div id="tab-images">
        <div class="pdp-lightbox-gallery">
          <div class="pdp-lightbox-main"><img id="lb-main-img" src="" alt=""></div>
          <div class="pdp-lightbox-thumbs" id="lb-thumbs"></div>
          <div class="pdp-lightbox-details" id="lb-details"></div>
        </div>
      </div>
      <div id="tab-video" style="display:none;">
        <div class="pdp-video-wrap" id="video-container"></div>
      </div>
    </div>
  </div>
</div>

<!-- Back button -->
<div style="margin-bottom:1.5rem;">
  <button class="nav-link" style="font-size:.82rem;opacity:.6;padding:0;border:none;background:none;cursor:pointer;" onclick="history.back()">← Back</button>
</div>

<!-- PDP Container -->
<div id="pdp-container">
  <div class="pdp-loading"></div>
</div>

<script>
(function() {
  const container = document.getElementById('pdp-container');
  let product = null;
  let selectedVariantId = null;
  let currentQty = 1;
  let currentImgIdx = 0;

  // Get product ID from URL
  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    if (id) return id;
    const match = window.location.pathname.match(/\/product\/([^\/?#]+)/);
    return match ? match[1] : null;
  }

  const productId = getProductId();

  if (!productId) {
    container.innerHTML = '<div class="pdp-error">No product specified. Use ?id=product-id in the URL.</div>';
    return;
  }

  function fmt(price) {
    if (typeof Shop !== 'undefined' && Shop.fmt) return Shop.fmt(price);
    return '€' + Number(price).toFixed(2);
  }

  function resolveById(id, allProducts) {
    return allProducts.find(function(p) { return p.id === id; }) || null;
  }

  async function loadAndRender() {
    container.innerHTML = '<div class="pdp-loading"></div>';

    // Wait for Shop
    if (typeof Shop === 'undefined') {
      await new Promise(resolve => {
        const check = setInterval(() => {
          if (typeof Shop !== 'undefined') {
            clearInterval(check);
            resolve();
          }
        }, 50);
        setTimeout(() => clearInterval(check), 5000);
      });
    }

    if (typeof Shop === 'undefined') {
      container.innerHTML = '<div class="pdp-error">Shop engine not loaded. Please refresh the page.</div>';
      return;
    }

    try {
      // Load language
      await Shop.loadLang();
      
      // Load product using Shop.getProduct (uses your CONFIG.data.productsJson path)
      product = await Shop.getProduct(productId);
      
      if (!product) {
        throw new Error('Product not found: ' + productId);
      }

      // Set up initial variant
      if (product.variants && product.variants.length) {
        selectedVariantId = product.variants[0].id;
      }

      // Render the PDP
      renderFullPDP();

    } catch (err) {
      console.error('PDP error:', err);
      container.innerHTML = '<div class="pdp-error">Failed to load product: ' + err.message + '</div>';
    }
  }

  function renderFullPDP() {
    const hasVariants = product.variants && product.variants.length > 0;
    const currentVariant = hasVariants ? product.variants.find(v => v.id === selectedVariantId) : null;
    const currentPrice = currentVariant ? currentVariant.price : product.price;
    const images = product.images && product.images.length ? product.images : [product.image];
    const videos = product.videos || [];
    const currentImage = (currentVariant && currentVariant.image) ? currentVariant.image : images[0];

    // Build HTML
    let html = `
      <div class="pdp-wrapper">
        <!-- Main 2-col layout -->
        <div class="pdp-main webshop-fade-in">
          <!-- Gallery -->
          <div class="pdp-gallery" id="pdp-gallery">
            <div class="pdp-gallery__main-wrap" id="gallery-main-wrap">
              <img class="pdp-gallery__main-img" id="gallery-main-img" src="${currentImage}" alt="${product.name}">
              <div class="pdp-gallery__main-video" id="gallery-main-video" style="display:none;position:absolute;inset:0;background:#000;border-radius:inherit;">
                <video id="gallery-video-player" style="width:100%;height:100%;object-fit:contain;" controls></video>
                <div id="gallery-yt-frame" style="display:none;position:absolute;inset:0;">
                  <iframe id="gallery-yt-iframe" style="width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                </div>
              </div>
            </div>
            <div class="pdp-gallery__thumbs" id="gallery-thumbs"></div>
          </div>

          <!-- Details -->
          <div class="pdp-details" id="pdp-details">
            <p class="pdp-category" id="pdp-category">${product.category || ''}</p>
            <h1 class="pdp-name" id="pdp-name">${product.name}</h1>
            <p class="pdp-price" id="pdp-price">${fmt(currentPrice)}</p>
            <p class="pdp-desc" id="pdp-desc">${product.description || ''}</p>
    `;

    // Variants
    if (hasVariants) {
      html += `
            <div id="pdp-variants-wrap">
              <p class="pdp-option-label">Finish</p>
              <div class="pdp-variants" id="pdp-variants">
                ${product.variants.map((v, i) => `
                  <button class="pdp-variant-btn ${i === 0 ? 'active' : ''}" data-variant-id="${v.id}">${v.label}</button>
                `).join('')}
              </div>
            </div>
      `;
    }

    // Quantity + Add to Cart
    html += `
            <div class="pdp-atc-row" style="display:flex;gap:10px;align-items:center;margin-bottom:20px;">
              <div class="webshop-qty-control webshop-qty-control--lg">
                <button class="webshop-qty-btn webshop-qty-btn--minus" id="qty-minus">−</button>
                <span class="webshop-qty-val" id="qty-val">1</span>
                <button class="webshop-qty-btn webshop-qty-btn--plus" id="qty-plus">+</button>
              </div>
              <button class="webshop-btn webshop-btn--primary pdp-atc-btn" id="atc-btn">Add to Cart</button>
            </div>
            <div class="pdp-perks" id="pdp-perks">
              <span>🚚 Free shipping over €150</span>
              <span>🔄 30-day returns</span>
              <span>🔧 2-year warranty</span>
            </div>
          </div>
        </div>
    `;

    // Bundle section
    if (product.bundled && product.bundled.length) {
      html += `
        <div class="pdp-section webshop-fade-in webshop-fade-in-1" id="bundle-section">
          <h2 class="pdp-section-title">Frequently Bought Together</h2>
          <div class="pdp-bundle-items-list" id="bundle-items"></div>
          <div class="pdp-bundle-actions">
            <div id="bundle-price-info" style="font-size:0.93em;color:var(--c-text-muted);"></div>
            <button class="webshop-btn webshop-btn--primary pdp-bundle-add-all-btn" id="bundle-add-all">Add Bundle to Cart</button>
          </div>
        </div>
      `;
    }

    // Related section
    if (product.related && product.related.length) {
      html += `
        <div class="pdp-section webshop-fade-in webshop-fade-in-2" id="related-section">
          <h2 class="pdp-section-title">You May Also Like</h2>
          <div class="pdp-related-grid" id="related-grid"></div>
        </div>
      `;
    }

    html += `</div>`; // close pdp-wrapper
    container.innerHTML = html;

    // Now attach all event handlers
    buildGallery(images, videos);
    attachVariantHandlers(hasVariants);
    attachQtyHandlers();
    attachAtcHandler(currentVariant);
    if (product.bundled && product.bundled.length) {
      renderBundle();
    }
    if (product.related && product.related.length) {
      renderRelated();
    }
    initMagnifier();
    initLightbox(images, videos);
  }

  function buildGallery(images, videos) {
    const thumbsEl = document.getElementById('gallery-thumbs');
    const mainImg = document.getElementById('gallery-main-img');
    const mainVideoWrap = document.getElementById('gallery-main-video');
    const videoPlayer = document.getElementById('gallery-video-player');
    const ytFrame = document.getElementById('gallery-yt-frame');
    const ytIframe = document.getElementById('gallery-yt-iframe');
    const mainWrap = document.getElementById('gallery-main-wrap');

    // Combine media items
    const mediaItems = images.map(src => ({ type: 'image', src: src }));
    videos.forEach(vsrc => {
      const isYT = /youtube\.com|youtu\.be/.test(vsrc);
      const ytId = isYT ? ((vsrc.match(/embed\/([^?]+)/) || vsrc.match(/youtu\.be\/([^?]+)/) || ['',''])[1]) : '';
      mediaItems.push({
        type: 'video',
        src: vsrc,
        isYT: isYT,
        thumb: isYT ? 'https://img.youtube.com/vi/' + ytId + '/mqdefault.jpg' : null
      });
    });

    let activeIdx = 0;
    let activeType = 'image';

    function showImage(idx) {
      activeIdx = idx;
      activeType = 'image';
      currentImgIdx = idx;
      if (videoPlayer) { videoPlayer.pause(); videoPlayer.src = ''; }
      if (ytIframe) ytIframe.src = '';
      mainVideoWrap.style.display = 'none';
      mainWrap.classList.remove('video-active');
      mainImg.style.display = 'block';
      mainImg.src = mediaItems[idx].src;
      document.getElementById('magnifier-img').src = (mediaItems[idx].src || '').replace('w=800', 'w=1600');
      buildThumbnails();
    }

    function showVideo(idx) {
      activeIdx = idx;
      activeType = 'video';
      const item = mediaItems[idx];
      mainImg.style.display = 'none';
      mainVideoWrap.style.display = 'block';
      mainWrap.classList.add('video-active');
      if (item.isYT) {
        videoPlayer.style.display = 'none';
        ytFrame.style.display = 'block';
        ytIframe.src = item.src + '?autoplay=1';
      } else {
        ytFrame.style.display = 'none';
        ytIframe.src = '';
        videoPlayer.style.display = 'block';
        videoPlayer.src = item.src;
        videoPlayer.play().catch(() => {});
      }
      buildThumbnails();
    }

    function buildThumbnails() {
      thumbsEl.innerHTML = mediaItems.map((item, i) => {
        const isActive = i === activeIdx;
        if (item.type === 'image') {
          return `<div class="pdp-gallery__thumb-wrap${isActive ? ' active' : ''}" data-idx="${i}" data-type="image">
                    <img class="pdp-gallery__thumb" src="${item.src}" alt="View ${i+1}">
                  </div>`;
        } else {
          const tbStyle = item.thumb ? `style="background-image:url('${item.thumb}');background-size:cover;background-position:center;"` : 'style="background:var(--c-surface-2);"';
          return `<div class="pdp-gallery__thumb-wrap pdp-gallery__thumb-wrap--video${isActive ? ' active' : ''}" data-idx="${i}" data-type="video" ${tbStyle}>
                    <span class="pdp-thumb-play">▶</span>
                  </div>`;
        }
      }).join('');

      thumbsEl.querySelectorAll('.pdp-gallery__thumb-wrap').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx);
          if (el.dataset.type === 'video') showVideo(idx);
          else showImage(idx);
        });
      });
    }

    // Click main area to open lightbox
    mainWrap.addEventListener('click', (e) => {
      if (e.target.closest('video') || e.target.closest('iframe')) return;
      openLightbox(activeType === 'video' ? 'video' : 'images');
    });

    // Build initial thumbnails and show first image
    if (images.length) {
      mainImg.src = images[0];
      document.getElementById('magnifier-img').src = (images[0] || '').replace('w=800', 'w=1600');
    }
    buildThumbnails();
  }

  function attachVariantHandlers(hasVariants) {
    if (!hasVariants) return;
    const variantBtns = document.querySelectorAll('.pdp-variant-btn');
    const priceEl = document.getElementById('pdp-price');
    const mainImg = document.getElementById('gallery-main-img');

    variantBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        variantBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedVariantId = btn.dataset.variantId;
        const variant = product.variants.find(v => v.id === selectedVariantId);
        if (variant) {
          if (priceEl) priceEl.textContent = fmt(variant.price);
          if (variant.image && mainImg) {
            mainImg.src = variant.image;
            document.getElementById('magnifier-img').src = variant.image.replace('w=800', 'w=1600');
          }
        }
      });
    });
  }

  function attachQtyHandlers() {
    const qtyVal = document.getElementById('qty-val');
    const qtyMinus = document.getElementById('qty-minus');
    const qtyPlus = document.getElementById('qty-plus');

    qtyMinus?.addEventListener('click', () => {
      if (currentQty > 1) {
        currentQty--;
        qtyVal.textContent = currentQty;
      }
    });

    qtyPlus?.addEventListener('click', () => {
      const variant = product.variants?.find(v => v.id === selectedVariantId);
      const maxStock = variant ? (variant.stock || 99) : (product.stock || 99);
      if (currentQty < maxStock) {
        currentQty++;
        qtyVal.textContent = currentQty;
      }
    });
  }

  function attachAtcHandler(currentVariant) {
    const atcBtn = document.getElementById('atc-btn');
    const mainImg = document.getElementById('gallery-main-img');
    atcBtn?.addEventListener('click', () => {
      const image = mainImg?.src || product.image;
      Shop.addToCart(product, currentQty, selectedVariantId, null, image);
      if (Shop.toast) Shop.toast(`${product.name} added to cart`);
    });
  }

  async function renderBundle() {
    const bundleEl = document.getElementById('bundle-items');
    const priceEl = document.getElementById('bundle-price-info');
    const bundleIds = product.bundled || [];
    
    const bundleProducts = [];
    for (const id of bundleIds) {
      const p = await Shop.getProduct(id);
      if (p) bundleProducts.push(p);
    }
    
    if (!bundleProducts.length) return;
    
    bundleEl.innerHTML = bundleProducts.map(item => `
      <div class="pdp-bundle-item">
        <img src="${item.image}" alt="${item.name}" onerror="this.style.background='var(--c-bg-alt)'">
        <div class="pdp-bundle-item__info">
          <div class="pdp-bundle-item__name">${item.name}</div>
          <div class="pdp-bundle-item__price">${fmt(item.price)}</div>
        </div>
      </div>
    `).join('');
    
    const mainPrice = product.variants?.[0]?.price || product.price;
    const addonsTotal = bundleProducts.reduce((s, p) => s + p.price, 0);
    const fullTotal = mainPrice + addonsTotal;
    priceEl.textContent = 'Bundle total: ' + fmt(fullTotal);
    
    document.getElementById('bundle-add-all').onclick = () => {
      Shop.addToCart(product, 1, selectedVariantId, null, product.image);
      bundleProducts.forEach(item => Shop.addToCart(item, 1));
      if (Shop.toast) Shop.toast('Bundle added to cart');
    };
  }

  async function renderRelated() {
    const relatedEl = document.getElementById('related-grid');
    const relatedIds = product.related || [];
    
    const relatedProducts = [];
    for (const id of relatedIds) {
      const p = await Shop.getProduct(id);
      if (p) relatedProducts.push(p);
    }
    
    if (!relatedProducts.length) return;
    
    relatedEl.innerHTML = relatedProducts.map(r => `
      <div class="pdp-related-card">
        <div class="pdp-related-card__img-wrap">
          <img src="${r.image}" alt="${r.name}">
          <div class="pdp-related-card__overlay">
            <button class="pdp-related-card__buy-btn" data-rid="${r.id}" data-rimg="${r.image}">BUY NOW</button>
          </div>
        </div>
        <div class="pdp-related-card__info">
          <div class="pdp-related-card__name">${r.name}</div>
          <div class="pdp-related-card__price">${fmt(r.price)}</div>
        </div>
      </div>
    `).join('');
    
    relatedEl.querySelectorAll('.pdp-related-card__buy-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const item = await Shop.getProduct(btn.dataset.rid);
        if (item) {
          Shop.addToCart(item, 1);
          if (Shop.toast) Shop.toast(`${item.name} added to cart`);
        }
      });
    });
  }

  function initMagnifier() {
    const magEl = document.getElementById('magnifier');
    const magImg = document.getElementById('magnifier-img');
    const mainWrap = document.getElementById('gallery-main-wrap');
    if (!magEl || !mainWrap) return;
    
    function updateSize() {
      const rect = mainWrap.getBoundingClientRect();
      const size = Math.min(Math.min(window.innerWidth * 0.45, 600), rect.width * 1.2);
      magEl.style.width = size + 'px';
      magEl.style.height = size + 'px';
    }
    
    mainWrap.addEventListener('mousemove', (e) => {
      const videoDiv = document.getElementById('gallery-main-video');
      if (videoDiv && videoDiv.style.display !== 'none') {
        magEl.style.display = 'none';
        return;
      }
      const rect = mainWrap.getBoundingClientRect();
      const xPct = (e.clientX - rect.left) / rect.width;
      const yPct = (e.clientY - rect.top) / rect.height;
      updateSize();
      const lensW = magEl.offsetWidth, lensH = magEl.offsetHeight;
      let mLeft = rect.right + 20, mTop = rect.top + rect.height/2 - lensH/2;
      if (mLeft + lensW > window.innerWidth - 20) mLeft = rect.left - lensW - 20;
      mLeft = Math.max(10, Math.min(mLeft, window.innerWidth - lensW - 10));
      mTop = Math.max(10, Math.min(mTop, window.innerHeight - lensH - 10));
      magEl.style.left = mLeft + 'px';
      magEl.style.top = mTop + 'px';
      magEl.style.display = 'block';
      
      const nW = magImg.naturalWidth, nH = magImg.naturalHeight;
      if (nW && nH) {
        const zoom = 2.5;
        magImg.style.width = (nW * zoom) + 'px';
        magImg.style.height = (nH * zoom) + 'px';
        magImg.style.left = -(xPct * nW * zoom - lensW/2) + 'px';
        magImg.style.top = -(yPct * nH * zoom - lensH/2) + 'px';
      }
    });
    
    mainWrap.addEventListener('mouseleave', () => {
      magEl.style.display = 'none';
    });
  }

  function initLightbox(images, videos) {
    const lightbox = document.getElementById('lightbox');
    let activeTab = 'images';
    
    window.openLightbox = function(tab) {
      activeTab = tab || 'images';
      buildLightbox();
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };
    
    function closeLightbox() {
      lightbox.style.display = 'none';
      document.body.style.overflow = '';
    }
    
    function buildLightbox() {
      document.querySelectorAll('.pdp-lightbox__tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === activeTab);
      });
      document.getElementById('tab-images').style.display = activeTab === 'images' ? '' : 'none';
      document.getElementById('tab-video').style.display = activeTab === 'video' ? '' : 'none';
      
      if (activeTab === 'images') {
        document.getElementById('lb-main-img').src = images[currentImgIdx] || images[0] || '';
        const lbThumbs = document.getElementById('lb-thumbs');
        lbThumbs.innerHTML = images.map((src, i) => `
          <img class="pdp-lightbox-thumb${i === currentImgIdx ? ' active' : ''}" src="${src}" data-idx="${i}">
        `).join('');
        lbThumbs.querySelectorAll('.pdp-lightbox-thumb').forEach(t => {
          t.addEventListener('click', () => {
            currentImgIdx = parseInt(t.dataset.idx);
            document.getElementById('lb-main-img').src = images[currentImgIdx];
            lbThumbs.querySelectorAll('.pdp-lightbox-thumb').forEach((x, j) => {
              x.classList.toggle('active', j === currentImgIdx);
            });
          });
        });
        
        const variant = product.variants?.find(v => v.id === selectedVariantId);
        document.getElementById('lb-details').innerHTML = `
          <p class="pdp-category">${product.category || ''}</p>
          <h2 class="pdp-name">${product.name}</h2>
          <p class="pdp-price">${fmt(variant ? variant.price : product.price)}</p>
          <p class="pdp-desc">${product.description || ''}</p>
          <div class="pdp-perks">
            <span>🚚 Free shipping over €150</span>
            <span>🔄 30-day returns</span>
            <span>🔧 2-year warranty</span>
          </div>
        `;
      }
      
      if (activeTab === 'video') {
        const videoContainer = document.getElementById('video-container');
        videoContainer.innerHTML = videos.length ? videos.map(url => {
          const isYT = /youtube\.com\/embed\/|youtu\.be\//.test(url);
          if (isYT) {
            return `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
                      <iframe src="${url}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen></iframe>
                    </div>`;
          }
          return `<video src="${url}" controls style="width:100%;max-height:70vh;border-radius:12px;"></video>`;
        }).join('') : '<div>No video available</div>';
      }
    }
    
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.querySelectorAll('.pdp-lightbox__tab').forEach(t => {
      t.addEventListener('click', () => { activeTab = t.dataset.tab; buildLightbox(); });
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
  }

  // Start loading when DOM ready and Shop is available
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadAndRender);
  } else {
    loadAndRender();
  }
})();
</script>
