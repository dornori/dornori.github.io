
  <main class="webshop-page-main">
    <div class="webshop-container">
      <div class="pdp-wrapper">

        <div class="pdp-main webshop-fade-in" id="pdp-main-section">
          <div class="pdp-gallery" id="pdp-gallery">
            <div class="pdp-gallery__main-wrap" id="gallery-main-wrap">
              <img class="pdp-gallery__main-img" id="gallery-main-img" src="" alt="">
              <div class="pdp-gallery__main-video" id="gallery-main-video" style="display:none;position:absolute;inset:0;background:#000;border-radius:inherit;">
                <video id="gallery-video-player" style="width:100%;height:100%;object-fit:contain;" controls></video>
                <div id="gallery-yt-frame" style="display:none;position:absolute;inset:0;">
                  <iframe id="gallery-yt-iframe" style="width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
                </div>
              </div>
            </div>
            <div class="pdp-gallery__thumbs" id="gallery-thumbs"></div>
            <button class="pdp-fullview-btn" id="fullview-btn" aria-hidden="true" tabindex="-1"></button>
          </div>

          <div class="pdp-details" id="pdp-details">
            <p class="pdp-category" id="pdp-category"></p>
            <h1 class="pdp-name" id="pdp-name"></h1>
            <p class="pdp-price" id="pdp-price"></p>
            <p class="pdp-desc" id="pdp-desc"></p>
            <div id="pdp-variants-wrap" style="display:none;">
              <p class="pdp-option-label" id="pdp-option-label">Finish</p>
              <div class="pdp-variants" id="pdp-variants"></div>
            </div>
            <div class="pdp-atc-row" style="display:flex;gap:10px;align-items:center;margin-bottom:20px;">
              <div class="webshop-qty-control webshop-qty-control--lg">
                <button class="webshop-qty-btn webshop-qty-btn--minus" id="qty-minus">−</button>
                <span class="webshop-qty-val" id="qty-val">1</span>
                <button class="webshop-qty-btn webshop-qty-btn--plus" id="qty-plus">+</button>
              </div>
              <button class="webshop-btn webshop-btn--primary pdp-atc-btn" id="atc-btn" data-i18n="add_to_cart">Add to Cart</button>
            </div>
            <div class="pdp-perks" id="pdp-perks"></div>
          </div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-1" id="bundle-section" style="display:none;">
          <h2 class="pdp-section-title" id="bundle-title" data-i18n="frequently_bought_together">Frequently Bought Together</h2>
          <div class="pdp-bundle-items-list" id="bundle-items"></div>
          <div class="pdp-bundle-actions">
            <div id="bundle-price-info" style="font-size:0.93em;color:var(--c-text-muted);"></div>
            <button class="webshop-btn webshop-btn--primary pdp-bundle-add-all-btn" id="bundle-add-all" data-i18n="add_both_to_cart">Add Bundle to Cart</button>
          </div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-2" id="related-section" style="display:none;">
          <h2 class="pdp-section-title" data-i18n="related_products_title">Products Related to This Item</h2>
          <div class="pdp-related-grid" id="related-grid"></div>
        </div>

        <div class="pdp-section webshop-fade-in webshop-fade-in-3" id="specs-section" style="display:none;">
          <div id="specs-accordion"></div>
        </div>

      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script"); s.src = src;
          s.onload = resolve; s.onerror = function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("webshop:ready")); });
    })();
  </script>

  <script>
  document.addEventListener("webshop:ready", async function() {

    /* ── resolve product ID from URL (?id=arc-floor-lamp) ── */
    const params  = new URLSearchParams(window.location.search);
    const prodId  = params.get("id") || "arc-floor-lamp";

    /* ── load lang + all products, then look up this product ── */
    await Shop.loadLang();
    const allProducts = await Shop.loadProducts();          /* populates internal cache */
    const PRODUCT = allProducts.find(p => p.id === prodId) || allProducts[0];

    if (!PRODUCT) {
      document.getElementById("pdp-name").textContent = "Product not found";
      return;
    }

    /* ── helpers to resolve a product-ID reference to a full product object ── */
    function resolveById(id) {
      return allProducts.find(p => p.id === id) || null;
    }

    /* ── update page title ── */
    document.title = "WEBSHOP – " + Shop.pName(PRODUCT);

    /* ── state ── */
    let selectedVariant = PRODUCT.variants?.[0]?.id || null;
    let qty = 1;
    let currentImgIdx = 0;

    /* ── init modules ── */
    if (typeof Currency !== "undefined") Currency.init();
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    buildLangSwitcher();
    renderMeta();
    renderVariants();
    updatePrice();
    renderPerks();
    renderGallery();
    renderBundle();
    renderRelated();
    renderSpecs();
    applyI18n();
    initMagnifier();
    initLightbox();
    initQty();
    initAtc();

    document.addEventListener("currency:changed", updatePrice);
    document.addEventListener("shop:langChanged", () => {
      buildLangSwitcher();
      renderMeta();
      renderPerks();
      renderBundle();
      renderRelated();
      renderSpecs();
      applyI18n();
    });

    /* ════════════════════════════════════════════════════
       LANG SWITCHER
    ════════════════════════════════════════════════════ */
    function buildLangSwitcher() {
      const slot = document.getElementById("lang-switcher-slot"); if (!slot) return;
      const langs   = CONFIG.supportedLanguages || ["en"];
      const current = CONFIG.language || "en";
      slot.innerHTML = langs.map(l =>
        `<button class="webshop-lang-btn${l === current ? " active" : ""}" data-lang="${l}">${l.toUpperCase()}</button>`
      ).join("");
      Shop.wireLanguageSwitcher(".webshop-lang-btn");
    }

    function applyI18n() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const v = Shop.t(el.dataset.i18n); if (v) el.textContent = v;
      });
    }

    /* ════════════════════════════════════════════════════
       META (name, category, description)
    ════════════════════════════════════════════════════ */
    function renderMeta() {
      document.getElementById("pdp-name").textContent     = Shop.pName(PRODUCT);
      document.getElementById("pdp-category").textContent = Shop.pCategory(PRODUCT);
      document.getElementById("pdp-desc").textContent     = Shop.pDesc(PRODUCT);
    }

    /* ════════════════════════════════════════════════════
       PRICE
    ════════════════════════════════════════════════════ */
    function fmt(n) { return (typeof Shop !== "undefined" && Shop.fmt) ? Shop.fmt(n) : "€" + n.toFixed(2); }

    function updatePrice() {
      const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
      document.getElementById("pdp-price").textContent = fmt(v ? v.price : PRODUCT.price);
    }

    /* ════════════════════════════════════════════════════
       VARIANTS
    ════════════════════════════════════════════════════ */
    function renderVariants() {
      const wrap = document.getElementById("pdp-variants-wrap");
      const el   = document.getElementById("pdp-variants");
      if (!PRODUCT.variants?.length) { wrap.style.display = "none"; return; }
      wrap.style.display = "";
      el.innerHTML = PRODUCT.variants.map(v =>
        `<button class="pdp-variant-btn${v.id === selectedVariant ? " active" : ""}" data-vid="${v.id}">${v.label}</button>`
      ).join("");
      el.querySelectorAll(".pdp-variant-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedVariant = btn.dataset.vid;
          el.querySelectorAll(".pdp-variant-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const v = PRODUCT.variants.find(v => v.id === selectedVariant);
          if (v?.image) {
            document.getElementById("gallery-main-img").src = v.image;
            let hi = v.image.replace("w=800", "w=1600");
            document.getElementById("magnifier-img").src = hi;
          }
          updatePrice();
        });
      });
    }

    /* ════════════════════════════════════════════════════
       PERKS
    ════════════════════════════════════════════════════ */
    function renderPerks() {
      const el = document.getElementById("pdp-perks"); if (!el) return;
      const keys      = ["perk_free_shipping", "perk_returns", "perk_warranty"];
      const fallbacks = ["Free shipping over €150", "30-day returns", "2-year warranty"];
      el.innerHTML = keys.map((k, i) => `<span>${Shop.t(k) || fallbacks[i]}</span>`).join("");
    }

    /* ════════════════════════════════════════════════════
       GALLERY  (images + video thumbnails)
    ════════════════════════════════════════════════════ */
    function renderGallery() {
      const mainImg      = document.getElementById("gallery-main-img");
      const mainVideoWrap= document.getElementById("gallery-main-video");
      const videoPlayer  = document.getElementById("gallery-video-player");
      const ytFrame      = document.getElementById("gallery-yt-frame");
      const ytIframe     = document.getElementById("gallery-yt-iframe");
      const thumbsEl     = document.getElementById("gallery-thumbs");
      const mainWrap     = document.getElementById("gallery-main-wrap");

      // Combined media list: images first, then videos
      const images = PRODUCT.images || [];
      const videos = PRODUCT.videos || [];
      // Each item: { type: 'image'|'video', src, thumb }
      const mediaItems = [
        ...images.map(src => ({ type: "image", src, thumb: src })),
        ...videos.map(src => {
          const isYT = /youtube\.com|youtu\.be/.test(src);
          return { type: "video", src, isYT,
            thumb: isYT
              ? `https://img.youtube.com/vi/${extractYTId(src)}/mqdefault.jpg`
              : null
          };
        })
      ];

      function extractYTId(url) {
        const m = url.match(/embed\/([^?]+)/) || url.match(/youtu\.be\/([^?]+)/);
        return m ? m[1] : "";
      }

      let activeIdx = 0;
      let activeType = "image"; // 'image' or 'video'

      function showImage(idx) {
        activeIdx = idx; activeType = "image";
        currentImgIdx = idx;
        const src = mediaItems[idx].src;
        // Stop any playing video
        videoPlayer.pause(); videoPlayer.src = "";
        ytIframe.src = "";
        mainVideoWrap.style.display = "none";
        mainWrap.classList.remove("video-active");
        mainImg.style.opacity = "1";
        mainImg.src = src;
        document.getElementById("magnifier-img").src = src.replace("w=800","w=1600");
        // Sync lightbox image
        const lbMain = document.getElementById("lb-main-img");
        if (lbMain) lbMain.src = src;
        document.querySelectorAll(".pdp-lightbox-thumb").forEach((t, i) =>
          t.classList.toggle("active", i === idx)
        );
        buildThumbs();
      }

      function showVideo(idx) {
        activeIdx = idx; activeType = "video";
        const item = mediaItems[idx];
        // Hide image, show video overlay
        mainImg.style.opacity = "0";
        mainVideoWrap.style.display = "block";
        mainWrap.classList.add("video-active");
        if (item.isYT) {
          videoPlayer.style.display = "none";
          ytFrame.style.display = "block";
          ytIframe.src = item.src + "?autoplay=1";
        } else {
          ytFrame.style.display = "none";
          ytIframe.src = "";
          videoPlayer.style.display = "block";
          videoPlayer.src = item.src;
          videoPlayer.play().catch(()=>{});
        }
        buildThumbs();
      }

      function buildThumbs() {
        thumbsEl.innerHTML = mediaItems.map((item, i) => {
          const isActive = i === activeIdx;
          if (item.type === "image") {
            return `<div class="pdp-gallery__thumb-wrap${isActive?" active":""}" data-idx="${i}" data-type="image">
              <img class="pdp-gallery__thumb" src="${item.src}" alt="View ${i+1}">
            </div>`;
          } else {
            // Video thumb — play icon overlay
            const thumbStyle = item.thumb
              ? `style="background-image:url('${item.thumb}');background-size:cover;background-position:center;"`
              : `style="background:var(--c-surface-2);"`;
            return `<div class="pdp-gallery__thumb-wrap pdp-gallery__thumb-wrap--video${isActive?" active":""}" data-idx="${i}" data-type="video" ${thumbStyle}>
              <span class="pdp-thumb-play">▶</span>
            </div>`;
          }
        }).join("");

        thumbsEl.querySelectorAll(".pdp-gallery__thumb-wrap").forEach(el => {
          el.addEventListener("click", () => {
            const idx = +el.dataset.idx;
            if (el.dataset.type === "video") showVideo(idx);
            else showImage(idx);
          });
        });
      }

      // Expose for variant switching
      window._selectImage = function(idx) { showImage(idx); };

      // Init
      if (images.length) {
        mainImg.src = images[0];
        mainImg.alt = Shop.pName(PRODUCT);
        document.getElementById("magnifier-img").src = (images[0]||"").replace("w=800","w=1600");
      }
      buildThumbs();

      // Main wrap click: image → lightbox images, video → lightbox video tab
      mainWrap.addEventListener("click", e => {
        // Don't open lightbox if clicking video controls
        if (e.target.closest("video") || e.target.closest("iframe")) return;
        if (activeType === "video") {
          // Stop inline playback and open lightbox video tab
          videoPlayer.pause();
          ytIframe.src = "";
          openLightbox("video");
        } else {
          openLightbox("images");
        }
      });
    }

    /* ════════════════════════════════════════════════════
       MAGNIFIER
    ════════════════════════════════════════════════════ */
    function initMagnifier() {
      const magEl   = document.getElementById("magnifier");
      const magImg  = document.getElementById("magnifier-img");
      const mainWrap = document.getElementById("gallery-main-wrap");
      magImg.src = (PRODUCT.images[0] || "").replace("w=800", "w=1600");

      function updateMagnifierSize() {
        const rect  = mainWrap.getBoundingClientRect();
        const size  = Math.min(Math.min(window.innerWidth * 0.45, 600), rect.width * 1.2);
        magEl.style.width = size + "px"; magEl.style.height = size + "px";
      }

      mainWrap.addEventListener("mousemove", e => {
        // Don't show magnifier when a video is active
        if (document.getElementById("gallery-main-video").style.display !== "none") {
          magEl.style.display = "none"; return;
        }
        const rect = mainWrap.getBoundingClientRect();
        const xPct = (e.clientX - rect.left)  / rect.width;
        const yPct = (e.clientY - rect.top)   / rect.height;
        updateMagnifierSize();
        const lensW = magEl.offsetWidth, lensH = magEl.offsetHeight;
        let mLeft = rect.right + 20, mTop = rect.top + (rect.height / 2) - (lensH / 2);
        if (mLeft + lensW > window.innerWidth - 20) mLeft = rect.left - lensW - 20;
        mLeft = Math.max(10, Math.min(mLeft, window.innerWidth  - lensW - 10));
        mTop  = Math.max(10, Math.min(mTop,  window.innerHeight - lensH - 10));
        magEl.style.left = mLeft + "px"; magEl.style.top = mTop + "px";
        magEl.style.display = "block";
        const nW = magImg.naturalWidth, nH = magImg.naturalHeight;
        if (nW && nH) {
          const ca = rect.width / rect.height, ia = nW / nH;
          let dW, dH, ox = 0, oy = 0;
          if (ia > ca) { dH = rect.height; dW = dH * ia; ox = (rect.width - dW) / 2; }
          else         { dW = rect.width;  dH = dW / ia; oy = (rect.height - dH) / 2; }
          const imgX = ((xPct * dW - ox) / dW) * nW;
          const imgY = ((yPct * dH - oy) / dH) * nH;
          const zoom = 2;
          magImg.style.width  = (nW * zoom) + "px";
          magImg.style.height = (nH * zoom) + "px";
          magImg.style.left   = -(imgX * zoom - lensW / 2) + "px";
          magImg.style.top    = -(imgY * zoom - lensH / 2) + "px";
        }
      });
      mainWrap.addEventListener("mouseleave", () => { magEl.style.display = "none"; });
      window.addEventListener("resize", () => { if (magEl.style.display === "block") updateMagnifierSize(); });
    }

    /* ════════════════════════════════════════════════════
       LIGHTBOX
    ════════════════════════════════════════════════════ */
    function initLightbox() {
      const lightbox = document.getElementById("lightbox");
      let activeTab  = "images";

      window.openLightbox = function(tab) {
        activeTab = tab || "images";
        buildLightbox();
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
      };

      function closeLightbox() {
        lightbox.classList.remove("open");
        document.body.style.overflow = "";
      }

      function buildLightbox() {
        document.querySelectorAll(".pdp-lightbox__tab").forEach(t =>
          t.classList.toggle("active", t.dataset.tab === activeTab)
        );
        document.getElementById("tab-images").style.display = activeTab === "images" ? "" : "none";
        document.getElementById("tab-video").style.display  = activeTab === "video"  ? "" : "none";

        if (activeTab === "images") {
          document.getElementById("lb-main-img").src = PRODUCT.images[currentImgIdx];
          const lbThumbs = document.getElementById("lb-thumbs");
          lbThumbs.innerHTML = PRODUCT.images.map((src, i) =>
            `<img class="pdp-lightbox-thumb${i === currentImgIdx ? " active" : ""}" src="${src}" alt="View ${i+1}" data-idx="${i}">`
          ).join("");
          lbThumbs.querySelectorAll(".pdp-lightbox-thumb").forEach(t => {
            t.addEventListener("click", () => {
              currentImgIdx = +t.dataset.idx;
              document.getElementById("lb-main-img").src = PRODUCT.images[currentImgIdx];
              lbThumbs.querySelectorAll(".pdp-lightbox-thumb").forEach((x, j) =>
                x.classList.toggle("active", j === currentImgIdx)
              );
            });
          });
          const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
          const perksHtml = ["perk_free_shipping","perk_returns","perk_warranty"].map((k, i) =>
            `<span>${Shop.t(k) || ["Free shipping over €150","30-day returns","2-year warranty"][i]}</span>`
          ).join("");
          document.getElementById("lb-details").innerHTML = `
            <p class="pdp-category">${Shop.pCategory(PRODUCT)}</p>
            <h2 class="pdp-name">${Shop.pName(PRODUCT)}</h2>
            <p class="pdp-price">${fmt(v ? v.price : PRODUCT.price)}</p>
            <p class="pdp-desc">${Shop.pDesc(PRODUCT)}</p>
            <div class="pdp-perks">${perksHtml}</div>`;
        }
        if (activeTab === "video") {
          const videos = PRODUCT.videos || [];
          function renderVideo(url) {
            const isYT = /youtube\.com\/embed\/|youtu\.be\//.test(url);
            if (isYT) {
              return `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;">
                <iframe src="${url}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
              </div>`;
            }
            return `<video src="${url}" controls style="width:100%;max-height:70vh;border-radius:12px;display:block;"></video>`;
          }
          document.getElementById("video-container").innerHTML = videos.length
            ? videos.map(renderVideo).join("")
            : `<div class="pdp-no-video">📽 No video available for this product.</div>`;
        }
      }

      document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
      document.querySelectorAll(".pdp-lightbox__tab").forEach(t =>
        t.addEventListener("click", () => { activeTab = t.dataset.tab; buildLightbox(); })
      );
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });
    }

    /* ════════════════════════════════════════════════════
       QTY + ATC
    ════════════════════════════════════════════════════ */
    function initQty() {
      const qtyVal = document.getElementById("qty-val");
      document.getElementById("qty-minus").addEventListener("click", () => {
        if (qty > 1) { qty--; qtyVal.textContent = qty; }
      });
      document.getElementById("qty-plus").addEventListener("click", () => {
        const v     = PRODUCT.variants?.find(v => v.id === selectedVariant);
        const stock = v?.stock ?? PRODUCT.stock;
        if (qty < stock) { qty++; qtyVal.textContent = qty; }
      });
    }

    function initAtc() {
      document.getElementById("atc-btn").addEventListener("click", () => {
        const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
        Shop.addToCart(PRODUCT, qty, selectedVariant, null, v?.image || PRODUCT.image);
        Shop.toast(`${Shop.pName(PRODUCT)}${v ? " – " + v.label : ""} ${Shop.t("added","added to cart")}`);
      });
    }

    /* ════════════════════════════════════════════════════
       FREQUENTLY BOUGHT TOGETHER (bundle)
    ════════════════════════════════════════════════════ */
    function renderBundle() {
      const section  = document.getElementById("bundle-section");
      const bundleEl = document.getElementById("bundle-items");
      const priceEl  = document.getElementById("bundle-price-info");
      const bundleIds = PRODUCT.bundled || [];
      if (!bundleIds.length) { section.style.display = "none"; return; }

      const bundleProducts = bundleIds.map(id => resolveById(id)).filter(Boolean);
      if (!bundleProducts.length) { section.style.display = "none"; return; }
      section.style.display = "";

      bundleEl.innerHTML = bundleProducts.map(item => {
        const name = Shop.pName(item);
        const desc = Shop.pDesc(item);
        return `
        <div class="pdp-bundle-item">
          <img src="${item.image}" alt="${name}" onerror="this.style.background='var(--c-bg-alt)'">
          <div class="pdp-bundle-item__info">
            <div class="pdp-bundle-item__name">${name}</div>
            <div class="pdp-bundle-item__price">${fmt(item.price)}${desc ? " · " + desc : ""}</div>
          </div>
        </div>`;
      }).join("");

      /* bundle pricing */
      const mainPrice    = PRODUCT.variants?.[0]?.price ?? PRODUCT.price;
      const addonsTotal  = bundleProducts.reduce((s, p) => s + p.price, 0);
      const fullTotal    = mainPrice + addonsTotal;
      const discount     = PRODUCT.bundleDiscount || 0;
      const discounted   = discount > 0 ? fullTotal * (1 - discount / 100) : null;
      if (discount > 0 && discounted) {
        priceEl.innerHTML =
          `<span style="margin-right:5px;">🏷️</span>${Shop.t("bundle_full_price","Full price")}: <s>${fmt(fullTotal)}</s> &nbsp;→&nbsp; ` +
          `<strong>${fmt(discounted)}</strong> &nbsp;<span style="color:var(--c-accent);font-weight:600;">(${discount}% ${Shop.t("bundle_off","off")})</span>`;
      } else {
        priceEl.textContent = `${Shop.t("bundle_total","Bundle total")}: ${fmt(fullTotal)}`;
      }

      document.getElementById("bundle-add-all").onclick = () => {
        const v = PRODUCT.variants?.find(v => v.id === selectedVariant);
        Shop.addToCart(PRODUCT, 1, selectedVariant, null, v?.image || PRODUCT.image);
        bundleProducts.forEach(item => Shop.addToCart(item, 1, null, null, item.image));
        Shop.toast(`${Shop.pName(PRODUCT)} + ${Shop.t("bundle_added","bundle added to cart")}`);
      };
    }

    /* ════════════════════════════════════════════════════
       RELATED PRODUCTS
    ════════════════════════════════════════════════════ */
    function renderRelated() {
      const section   = document.getElementById("related-section");
      const relatedEl = document.getElementById("related-grid");
      const relatedIds = PRODUCT.related || [];
      const relatedProducts = relatedIds.map(id => resolveById(id)).filter(Boolean);
      if (!relatedProducts.length) { section.style.display = "none"; return; }
      section.style.display = "";

      relatedEl.innerHTML = relatedProducts.map(r => {
        const name = Shop.pName(r);
        const price = r.variants?.[0]?.price ?? r.price;
        return `
        <div class="pdp-related-card">
          <div class="pdp-related-card__img-wrap">
            <img src="${r.image}" alt="${name}">
            <div class="pdp-related-card__overlay">
              <button class="pdp-related-card__buy-btn"
                data-rid="${r.id}"
                data-rimg="${r.image}">${Shop.t("buy_now","BUY NOW")}</button>
            </div>
          </div>
          <div class="pdp-related-card__info">
            <div class="pdp-related-card__name">${name}</div>
            <div class="pdp-related-card__price">${fmt(price)}</div>
          </div>
        </div>`;
      }).join("");

      relatedEl.querySelectorAll(".pdp-related-card__buy-btn").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const item = resolveById(btn.dataset.rid);
          if (!item) return;
          Shop.addToCart(item, 1, null, null, btn.dataset.rimg);
          Shop.toast(`${Shop.pName(item)} ${Shop.t("added","added to cart")}`);
        });
      });
    }

    /* ════════════════════════════════════════════════════
       SPECS ACCORDION
    ════════════════════════════════════════════════════ */
    function renderSpecs() {
      const section     = document.getElementById("specs-section");
      const accordionEl = document.getElementById("specs-accordion");
      const specs = PRODUCT.specs || [];
      if (!specs.length) { section.style.display = "none"; return; }
      section.style.display = "";

      function specTitle(sec) {
        if (sec.title_key) {
          /* check per-product specs object in the lang files */
          const pl    = Shop.getProductLang?.()   || {};
          const plEn  = Shop.getProductLangEn?.() || {};
          const specs = pl[PRODUCT.id]?.specs || plEn[PRODUCT.id]?.specs || {};
          if (specs[sec.title_key]) return specs[sec.title_key];
          /* fall back to UI string with same key */
          const uiStr = Shop.t(sec.title_key);
          if (uiStr && uiStr !== sec.title_key) return uiStr;
        }
        return sec.title;
      }

      accordionEl.innerHTML = specs.map(sec => `
        <div class="pdp-accordion-item">
          <button class="pdp-accordion-trigger">
            <span>${specTitle(sec)}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="pdp-accordion-body">
            <table class="pdp-spec-table"><tbody>
              ${sec.rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}
            </tbody></table>
          </div>
        </div>`
      ).join("");

      accordionEl.querySelectorAll(".pdp-accordion-trigger").forEach(btn => {
        btn.addEventListener("click", () => btn.closest(".pdp-accordion-item").classList.toggle("open"));
      });
    }

  }); /* end webshop:ready */
  </script>
