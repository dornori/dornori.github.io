<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Color Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1f15;
            color: #e8f2ec;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #112b1e;
            border-right: 1px solid rgba(255,255,255,0.15);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #a8d5b5;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        .open-btn {
            background: rgba(168, 213, 181, 0.15);
            border: 2px dashed #a8d5b5;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .open-btn:hover {
            background: rgba(168, 213, 181, 0.25);
        }

        .folder-info {
            background: rgba(168, 213, 181, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.65rem;
            text-align: center;
            border: 1px solid rgba(168, 213, 181, 0.3);
            word-break: break-all;
        }

        .profile-list {
            flex: 1;
        }

        .profile-item {
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .profile-item:hover {
            background: rgba(168, 213, 181, 0.2);
            border-color: #a8d5b5;
        }

        .profile-item.active {
            background: #a8d5b5;
            color: #112b1e;
            font-weight: 600;
        }

        .status {
            font-size: 0.7rem;
            color: #9dc8ae;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .editor {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .color-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 16px;
        }

        .color-name {
            font-weight: 600;
            color: #a8d5b5;
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .color-preview {
            height: 60px;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        input[type="color"] {
            width: 100%;
            height: 45px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
        }

        .value {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 5px 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.7rem;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        button {
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .save-btn {
            background: #a8d5b5;
            color: #112b1e;
            border: none;
        }

        .discard-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #e8f2ec;
        }

        .save-all-btn {
            background: #a8d5b5;
            color: #112b1e;
            border: none;
            padding: 8px 20px;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: #9dc8ae;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a3a2a;
            color: #a8d5b5;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #a8d5b5;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🎨 Color Editor</h2>
        
        <div class="open-btn" id="openBtn">
            📂 Open Site Folder
        </div>

        <div class="folder-info" id="folderInfo">
            No folder selected
        </div>

        <div class="profile-list" id="profileList">
            <div style="text-align: center; color: #9dc8ae; padding: 20px;">
                Open a folder to start
            </div>
        </div>

        <div class="status" id="status">
            Ready
        </div>
    </div>

    <div class="editor">
        <div class="header">
            <h1 id="profileTitle">No file loaded</h1>
            <div class="header-actions">
                <button id="saveAllBtn" class="save-all-btn" disabled>💾 Save All Changes</button>
            </div>
        </div>

        <div id="colorGrid" class="color-grid">
            <div class="no-data">Open your site folder to start editing colors</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let dirHandle = null;
        let originalCssContent = '';
        let profiles = [];
        let currentProfileIndex = -1;
        let currentColors = {};
        let originalColors = {};

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#3a1a1a' : '#1a3a2a';
            toast.style.color = isError ? '#ff8888' : '#a8d5b5';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setStatus(text, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = text;
            statusDiv.className = `status ${type}`;
        }

        async function readFile(path) {
            const parts = path.split('/').filter(Boolean);
            let h = dirHandle;
            for (const p of parts.slice(0, -1)) {
                try { h = await h.getDirectoryHandle(p); }
                catch { return null; }
            }
            try {
                const fh = await h.getFileHandle(parts.at(-1));
                return await (await fh.getFile()).text();
            } catch { return null; }
        }

        async function writeFile(path, content) {
            const parts = path.split('/').filter(Boolean);
            let h = dirHandle;
            for (const p of parts.slice(0, -1)) {
                h = await h.getDirectoryHandle(p, { create: true });
            }
            const fh = await h.getFileHandle(parts.at(-1), { create: true });
            const w = await fh.createWritable();
            await w.write(content);
            await w.close();
        }

        async function openFolder() {
            try {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('folderInfo').innerHTML = `📁 ${dirHandle.name}<br>${dirHandle.name}/css/profiles.css`;
                localStorage.setItem('color-editor-folder', dirHandle.name);
                await loadCSS();
            } catch (err) {
                showToast('Failed to open folder: ' + err.message, true);
            }
        }

        async function loadCSS() {
            if (!dirHandle) return;
            setStatus('Loading profiles.css...', 'loading');
            
            try {
                const content = await readFile('css/profiles.css');
                if (!content) {
                    setStatus('❌ css/profiles.css not found', 'error');
                    showToast('css/profiles.css not found', true);
                    return;
                }
                
                originalCssContent = content;
                profiles = parseProfiles(content);
                
                if (profiles.length === 0) {
                    setStatus('No profiles found in CSS', 'error');
                    return;
                }
                
                setStatus(`✅ Loaded ${profiles.length} profiles`, 'success');
                showToast(`Loaded ${profiles.length} profiles`);
                loadProfile(0);
                
            } catch (err) {
                setStatus('Error loading CSS: ' + err.message, 'error');
                showToast('Error loading CSS', true);
            }
        }

        function parseProfiles(cssText) {
            const profilesList = [];
            
            const profileRegex = /\[data-theme="([^"]+)"\]\s*\{([^}]+)\}/g;
            let match;
            while ((match = profileRegex.exec(cssText)) !== null) {
                const profileName = match[1];
                const blockContent = match[2];
                const colors = {};
                const varRegex = /--([^:]+):\s*([^;]+);/g;
                let varMatch;
                while ((varMatch = varRegex.exec(blockContent)) !== null) {
                    colors[`--${varMatch[1].trim()}`] = varMatch[2].trim();
                }
                profilesList.push({ name: profileName, colors: colors });
            }
            
            const rootMatch = cssText.match(/:root\s*\{([^}]+)\}/);
            if (rootMatch) {
                const rootColors = {};
                const varRegex = /--([^:]+):\s*([^;]+);/g;
                let varMatch;
                while ((varMatch = varRegex.exec(rootMatch[1])) !== null) {
                    rootColors[`--${varMatch[1].trim()}`] = varMatch[2].trim();
                }
                profilesList.unshift({ name: 'default', colors: rootColors });
            }
            
            return profilesList;
        }

        function renderProfileList() {
            const container = document.getElementById('profileList');
            if (profiles.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #9dc8ae; padding: 20px;">No profiles found</div>';
                return;
            }
            
            container.innerHTML = profiles.map((profile, idx) => `
                <div class="profile-item ${idx === currentProfileIndex ? 'active' : ''}" data-index="${idx}">
                    ${profile.name === 'default' ? '🌙 Default (Root)' : '🎨 ' + profile.name}
                </div>
            `).join('');
            
            document.querySelectorAll('.profile-item').forEach(el => {
                el.addEventListener('click', () => {
                    loadProfile(parseInt(el.dataset.index));
                });
            });
        }

        function loadProfile(index) {
            currentProfileIndex = index;
            const profile = profiles[currentProfileIndex];
            currentColors = { ...profile.colors };
            originalColors = { ...profile.colors };
            
            document.getElementById('profileTitle').textContent = profile.name === 'default' ? 'Default (:root) Theme' : profile.name;
            document.getElementById('saveAllBtn').disabled = false;
            setStatus(`Editing: ${profile.name}`, 'success');
            
            renderColorCards();
            renderProfileList();
        }

        function renderColorCards() {
            const container = document.getElementById('colorGrid');
            if (!currentColors || Object.keys(currentColors).length === 0) {
                container.innerHTML = '<div class="no-data">No color variables found</div>';
                return;
            }
            
            container.innerHTML = '';
            for (const [name, value] of Object.entries(currentColors)) {
                const card = document.createElement('div');
                card.className = 'color-card';
                card.innerHTML = `
                    <div class="color-name">${name}</div>
                    <div class="color-preview" style="background: ${value}">${value}</div>
                    <input type="color" value="${value.startsWith('#') ? value : '#a8d5b5'}">
                    <div class="value">${value}</div>
                    <div class="actions">
                        <button class="save-btn">Save</button>
                        <button class="discard-btn">Discard</button>
                    </div>
                `;
                
                const colorInput = card.querySelector('input');
                const preview = card.querySelector('.color-preview');
                const valueDiv = card.querySelector('.value');
                const saveBtn = card.querySelector('.save-btn');
                const discardBtn = card.querySelector('.discard-btn');
                
                colorInput.addEventListener('change', (e) => {
                    const newVal = e.target.value;
                    currentColors[name] = newVal;
                    preview.style.background = newVal;
                    preview.textContent = newVal;
                    valueDiv.textContent = newVal;
                });
                
                saveBtn.addEventListener('click', () => {
                    originalColors[name] = currentColors[name];
                    showToast(`✅ Saved ${name} locally`);
                });
                
                discardBtn.addEventListener('click', () => {
                    if (originalColors[name]) {
                        currentColors[name] = originalColors[name];
                        preview.style.background = originalColors[name];
                        preview.textContent = originalColors[name];
                        valueDiv.textContent = originalColors[name];
                        colorInput.value = originalColors[name].startsWith('#') ? originalColors[name] : '#a8d5b5';
                        showToast(`↺ Discarded changes to ${name}`);
                    }
                });
                
                container.appendChild(card);
            }
        }

        function getTimestamp() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
        }

        function generateUpdatedCSS() {
            let css = originalCssContent;
            
            for (const profile of profiles) {
                if (profile.name === 'default') {
                    const rootRegex = /(:root\s*\{)([^}]*)(\})/s;
                    let block = '\n';
                    for (const [key, val] of Object.entries(profile.colors)) {
                        block += `    ${key}: ${val};\n`;
                    }
                    css = css.replace(rootRegex, `$1${block}$3`);
                } else {
                    const themeRegex = new RegExp(`(\\[data-theme="${profile.name}"\\]\\s*\\{)([^}]*)(\\})`, 's');
                    let block = '\n';
                    for (const [key, val] of Object.entries(profile.colors)) {
                        block += `    ${key}: ${val};\n`;
                    }
                    css = css.replace(themeRegex, `$1${block}$3`);
                }
            }
            
            return css;
        }

        async function saveAllChanges() {
            if (currentProfileIndex === -1 || !dirHandle) {
                showToast('No profile loaded or folder not open', true);
                return;
            }
            
            setStatus('Saving...', 'loading');
            document.getElementById('saveAllBtn').disabled = true;
            
            try {
                profiles[currentProfileIndex].colors = { ...currentColors };
                const updatedCss = generateUpdatedCSS();
                
                // Create timestamped backup
                const timestamp = getTimestamp();
                const backupPath = `css/profiles-backup-${timestamp}.css`;
                await writeFile(backupPath, originalCssContent);
                showToast(`📦 Backup saved to ${backupPath}`);
                
                // Save main file
                await writeFile('css/profiles.css', updatedCss);
                
                originalCssContent = updatedCss;
                
                for (const profile of profiles) {
                    if (profile.name === profiles[currentProfileIndex].name) {
                        originalColors = { ...currentColors };
                        profile.colors = { ...currentColors };
                    }
                }
                
                setStatus(`✅ All changes saved`, 'success');
                showToast(`✅ Saved to css/profiles.css (backup created)`);
                
            } catch (err) {
                console.error('Save failed:', err);
                setStatus(`❌ Save failed: ${err.message}`, 'error');
                showToast(`Save failed: ${err.message}`, true);
            } finally {
                document.getElementById('saveAllBtn').disabled = false;
            }
        }

        document.getElementById('openBtn').addEventListener('click', openFolder);
        document.getElementById('saveAllBtn').addEventListener('click', saveAllChanges);
        
        // Check if we have a saved folder reference
        (async function() {
            const saved = localStorage.getItem('color-editor-folder');
            if (saved) {
                try {
                    const handles = await window.showDirectoryPicker();
                    // This requires user interaction, can't auto-open
                } catch {}
            }
        })();
    </script>
</body>
</html>
