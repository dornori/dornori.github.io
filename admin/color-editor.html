<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Color Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1f15;
            color: #e8f2ec;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 200px;
            background: #112b1e;
            border-right: 1px solid rgba(255,255,255,0.15);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 0 20px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #a8d5b5;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px;
        }

        .nav-item {
            padding: 10px 20px;
            margin: 2px 0;
            cursor: pointer;
            font-size: 0.85rem;
            color: #9dc8ae;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(168, 213, 181, 0.1);
            color: #a8d5b5;
        }

        .nav-item.active {
            background: #a8d5b5;
            color: #112b1e;
            font-weight: 500;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 12px 24px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-badge {
            background: rgba(168,213,181,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .save-btn {
            background: #a8d5b5;
            color: #112b1e;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #8cc29b;
            transform: translateY(-1px);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .editor-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .color-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
        }

        .color-name {
            font-weight: 600;
            color: #a8d5b5;
            font-family: monospace;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .color-preview {
            height: 55px;
            border-radius: 8px;
            margin: 8px 0;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
        }

        .value {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.65rem;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-save {
            background: #a8d5b5;
            color: #112b1e;
            border: none;
        }

        .btn-discard {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #e8f2ec;
        }

        /* Settings Panel */
        .settings-panel {
            display: none;
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .settings-card h3 {
            font-size: 0.9rem;
            color: #a8d5b5;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-row {
            background: rgba(0,0,0,0.3);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .open-folder-btn {
            background: rgba(168, 213, 181, 0.2);
            border: 1px solid #a8d5b5;
            color: #a8d5b5;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-size: 0.8rem;
        }

        .open-folder-btn:hover {
            background: rgba(168, 213, 181, 0.3);
        }

        .backup-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .backup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .backup-item:hover {
            background: rgba(0,0,0,0.4);
        }

        .restore-btn {
            background: rgba(168, 213, 181, 0.2);
            border: 1px solid #a8d5b5;
            color: #a8d5b5;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .restore-btn:hover {
            background: #a8d5b5;
            color: #112b1e;
        }

        .status {
            font-size: 0.7rem;
            color: #9dc8ae;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a3a2a;
            color: #a8d5b5;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #a8d5b5;
            font-size: 0.75rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #9dc8ae;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🎨 Color Editor</div>
        <div class="nav-item active" data-view="editor">🎨 Editor</div>
        <div class="nav-item" data-view="settings">⚙️ Settings</div>
    </div>

    <div class="main">
        <div class="toolbar">
            <div class="profile-selector">
                <span class="profile-badge" id="profileBadge">No profile</span>
            </div>
            <button id="saveAllBtn" class="save-btn" disabled>💾 Save All Changes</button>
        </div>

        <!-- Editor View -->
        <div id="editorView" class="editor-area">
            <div id="colorGrid" class="color-grid">
                <div class="no-data">Open a folder in Settings to start editing colors</div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settingsView" class="settings-panel">
            <div class="settings-card">
                <h3>📂 Folder Access</h3>
                <div id="folderInfo" class="folder-row">No folder selected</div>
                <button id="openFolderBtn" class="open-folder-btn">📂 Open Site Folder</button>
            </div>

            <div class="settings-card">
                <h3>📁 Current Path</h3>
                <div id="cssPath" class="folder-row">css/profiles.css</div>
            </div>

            <div class="settings-card">
                <h3>💾 Backups</h3>
                <div id="backupLocation" class="folder-row">admin/profile-backups/</div>
                <div id="backupList" class="backup-list">
                    <div class="no-data">Open a folder to see backups</div>
                </div>
            </div>

            <div class="status" id="status">Ready</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let dirHandle = null;
        let originalCssContent = '';
        let profiles = [];
        let currentProfileIndex = -1;
        let currentColors = {};
        let originalColors = {};

        // IndexedDB setup
        const DB_NAME = 'ColorEditorDB';
        const STORE_NAME = 'folderHandle';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        async function saveHandle(id, handle) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(handle, id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getHandle(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#3a1a1a' : '#1a3a2a';
            toast.style.color = isError ? '#ff8888' : '#a8d5b5';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function setStatus(text, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = text;
            statusDiv.className = `status ${type}`;
        }

        async function ensureDirectory(path) {
            const parts = path.split('/').filter(Boolean);
            let current = dirHandle;
            for (const part of parts) {
                current = await current.getDirectoryHandle(part, { create: true });
            }
            return current;
        }

        async function readFile(path) {
            const parts = path.split('/').filter(Boolean);
            let h = dirHandle;
            for (const p of parts.slice(0, -1)) {
                try { h = await h.getDirectoryHandle(p); }
                catch { return null; }
            }
            try {
                const fh = await h.getFileHandle(parts.at(-1));
                return await (await fh.getFile()).text();
            } catch { return null; }
        }

        async function writeFile(path, content) {
            const parts = path.split('/').filter(Boolean);
            let h = dirHandle;
            for (const p of parts.slice(0, -1)) {
                h = await h.getDirectoryHandle(p, { create: true });
            }
            const fh = await h.getFileHandle(parts.at(-1), { create: true });
            const w = await fh.createWritable();
            await w.write(content);
            await w.close();
        }

        async function listBackups() {
            try {
                const backupDir = await ensureDirectory('admin/profile-backups');
                const backups = [];
                for await (const entry of backupDir.values()) {
                    if (entry.kind === 'file' && entry.name.startsWith('profiles-backup-')) {
                        const stats = await entry.getFile();
                        backups.push({
                            name: entry.name,
                            path: `admin/profile-backups/${entry.name}`,
                            size: stats.size,
                            modified: stats.lastModified
                        });
                    }
                }
                backups.sort((a, b) => b.modified - a.modified);
                return backups;
            } catch {
                return [];
            }
        }

        async function renderBackupList() {
            const container = document.getElementById('backupList');
            const backups = await listBackups();
            
            if (backups.length === 0) {
                container.innerHTML = '<div class="no-data">No backups found</div>';
                return;
            }
            
            container.innerHTML = backups.map(b => `
                <div class="backup-item">
                    <span>📄 ${b.name}</span>
                    <span style="font-size:0.6rem">${(b.size/1024).toFixed(1)} KB</span>
                    <button class="restore-btn" data-backup="${b.path}">Restore</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.restore-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const backupPath = btn.dataset.backup;
                    await restoreBackup(backupPath);
                });
            });
        }

        async function restoreBackup(backupPath) {
            if (!dirHandle) {
                showToast('No folder open', true);
                return;
            }
            
            try {
                const backupContent = await readFile(backupPath);
                if (!backupContent) {
                    showToast('Could not read backup', true);
                    return;
                }
                
                await writeFile('css/profiles.css', backupContent);
                showToast(`✅ Restored from ${backupPath.split('/').pop()}`);
                await loadCSS();
                setStatus(`Restored from backup`, 'success');
            } catch (err) {
                showToast(`Restore failed: ${err.message}`, true);
            }
        }

        async function openAndSaveFolder() {
            try {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await saveHandle('folderHandle', dirHandle);
                document.getElementById('folderInfo').innerHTML = `📁 ${dirHandle.name}`;
                await ensureDirectory('admin/profile-backups');
                await loadCSS();
                await renderBackupList();
                setStatus(`Connected to ${dirHandle.name}`, 'success');
                showToast(`Connected to ${dirHandle.name}`);
            } catch (err) {
                if (err.name !== 'AbortError') {
                    showToast('Failed to open folder: ' + err.message, true);
                }
            }
        }

        async function reconnectFromSaved() {
            try {
                const savedHandle = await getHandle('folderHandle');
                if (savedHandle) {
                    const permission = await savedHandle.requestPermission({ mode: 'readwrite' });
                    if (permission === 'granted') {
                        dirHandle = savedHandle;
                        document.getElementById('folderInfo').innerHTML = `📁 ${dirHandle.name}`;
                        await ensureDirectory('admin/profile-backups');
                        await loadCSS();
                        await renderBackupList();
                        setStatus(`Connected to ${dirHandle.name}`, 'success');
                        return true;
                    }
                }
            } catch (err) {
                console.log('No saved folder or reconnect failed');
            }
            return false;
        }

        async function loadCSS() {
            if (!dirHandle) return;
            setStatus('Loading profiles.css...', 'loading');
            
            try {
                const content = await readFile('css/profiles.css');
                if (!content) {
                    setStatus('❌ css/profiles.css not found', 'error');
                    showToast('css/profiles.css not found', true);
                    return;
                }
                
                originalCssContent = content;
                profiles = parseProfiles(content);
                
                if (profiles.length === 0) {
                    setStatus('No profiles found in CSS', 'error');
                    return;
                }
                
                setStatus(`✅ Loaded ${profiles.length} profiles`, 'success');
                showToast(`Loaded ${profiles.length} profiles`);
                loadProfile(0);
                
            } catch (err) {
                setStatus('Error loading CSS: ' + err.message, 'error');
                showToast('Error loading CSS', true);
            }
        }

        function parseProfiles(cssText) {
            const profilesList = [];
            
            const profileRegex = /\[data-theme="([^"]+)"\]\s*\{([^}]+)\}/g;
            let match;
            while ((match = profileRegex.exec(cssText)) !== null) {
                const profileName = match[1];
                const blockContent = match[2];
                const colors = {};
                const varRegex = /--([^:]+):\s*([^;]+);/g;
                let varMatch;
                while ((varMatch = varRegex.exec(blockContent)) !== null) {
                    colors[`--${varMatch[1].trim()}`] = varMatch[2].trim();
                }
                profilesList.push({ name: profileName, colors: colors });
            }
            
            const rootMatch = cssText.match(/:root\s*\{([^}]+)\}/);
            if (rootMatch) {
                const rootColors = {};
                const varRegex = /--([^:]+):\s*([^;]+);/g;
                let varMatch;
                while ((varMatch = varRegex.exec(rootMatch[1])) !== null) {
                    rootColors[`--${varMatch[1].trim()}`] = varMatch[2].trim();
                }
                profilesList.unshift({ name: 'default', colors: rootColors });
            }
            
            return profilesList;
        }

        function renderProfileList() {
            const badge = document.getElementById('profileBadge');
            if (currentProfileIndex >= 0 && profiles[currentProfileIndex]) {
                badge.textContent = profiles[currentProfileIndex].name === 'default' ? '🌙 Default' : `🎨 ${profiles[currentProfileIndex].name}`;
            } else {
                badge.textContent = 'No profile';
            }
        }

        function loadProfile(index) {
            currentProfileIndex = index;
            const profile = profiles[currentProfileIndex];
            currentColors = { ...profile.colors };
            originalColors = { ...profile.colors };
            
            document.getElementById('saveAllBtn').disabled = false;
            setStatus(`Editing: ${profile.name}`, 'success');
            
            renderColorCards();
            renderProfileList();
        }

        function renderColorCards() {
            const container = document.getElementById('colorGrid');
            if (!currentColors || Object.keys(currentColors).length === 0) {
                container.innerHTML = '<div class="no-data">No color variables found</div>';
                return;
            }
            
            container.innerHTML = '';
            for (const [name, value] of Object.entries(currentColors)) {
                const card = document.createElement('div');
                card.className = 'color-card';
                card.innerHTML = `
                    <div class="color-name">${name}</div>
                    <div class="color-preview" style="background: ${value}">${value}</div>
                    <input type="color" value="${value.startsWith('#') ? value : '#a8d5b5'}">
                    <div class="value">${value}</div>
                    <div class="actions">
                        <button class="btn-small btn-save">Save</button>
                        <button class="btn-small btn-discard">Discard</button>
                    </div>
                `;
                
                const colorInput = card.querySelector('input');
                const preview = card.querySelector('.color-preview');
                const valueDiv = card.querySelector('.value');
                const saveBtn = card.querySelector('.btn-save');
                const discardBtn = card.querySelector('.btn-discard');
                
                colorInput.addEventListener('change', (e) => {
                    const newVal = e.target.value;
                    currentColors[name] = newVal;
                    preview.style.background = newVal;
                    preview.textContent = newVal;
                    valueDiv.textContent = newVal;
                });
                
                saveBtn.addEventListener('click', () => {
                    originalColors[name] = currentColors[name];
                    showToast(`✅ Saved ${name}`);
                });
                
                discardBtn.addEventListener('click', () => {
                    if (originalColors[name]) {
                        currentColors[name] = originalColors[name];
                        preview.style.background = originalColors[name];
                        preview.textContent = originalColors[name];
                        valueDiv.textContent = originalColors[name];
                        colorInput.value = originalColors[name].startsWith('#') ? originalColors[name] : '#a8d5b5';
                        showToast(`↺ Discarded ${name}`);
                    }
                });
                
                container.appendChild(card);
            }
        }

        function getTimestamp() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
        }

        function generateUpdatedCSS() {
            let css = originalCssContent;
            
            for (const profile of profiles) {
                if (profile.name === 'default') {
                    const rootRegex = /(:root\s*\{)([^}]*)(\})/s;
                    let block = '\n';
                    for (const [key, val] of Object.entries(profile.colors)) {
                        block += `    ${key}: ${val};\n`;
                    }
                    css = css.replace(rootRegex, `$1${block}$3`);
                } else {
                    const themeRegex = new RegExp(`(\\[data-theme="${profile.name}"\\]\\s*\\{)([^}]*)(\\})`, 's');
                    let block = '\n';
                    for (const [key, val] of Object.entries(profile.colors)) {
                        block += `    ${key}: ${val};\n`;
                    }
                    css = css.replace(themeRegex, `$1${block}$3`);
                }
            }
            
            return css;
        }

        async function saveAllChanges() {
            if (currentProfileIndex === -1 || !dirHandle) {
                showToast('No profile loaded or folder not open', true);
                return;
            }
            
            setStatus('Saving...', 'loading');
            document.getElementById('saveAllBtn').disabled = true;
            
            try {
                profiles[currentProfileIndex].colors = { ...currentColors };
                const updatedCss = generateUpdatedCSS();
                
                const timestamp = getTimestamp();
                const backupPath = `admin/profile-backups/profiles-backup-${timestamp}.css`;
                await writeFile(backupPath, originalCssContent);
                
                await writeFile('css/profiles.css', updatedCss);
                
                originalCssContent = updatedCss;
                
                for (const profile of profiles) {
                    if (profile.name === profiles[currentProfileIndex].name) {
                        originalColors = { ...currentColors };
                        profile.colors = { ...currentColors };
                    }
                }
                
                await renderBackupList();
                setStatus(`✅ Saved`, 'success');
                showToast(`✅ Saved with backup`);
                
            } catch (err) {
                setStatus(`❌ Save failed: ${err.message}`, 'error');
                showToast(`Save failed: ${err.message}`, true);
            } finally {
                document.getElementById('saveAllBtn').disabled = false;
            }
        }

        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                document.getElementById('editorView').style.display = view === 'editor' ? 'block' : 'none';
                document.getElementById('settingsView').classList.toggle('active', view === 'settings');
                if (view === 'settings') {
                    renderBackupList();
                }
            });
        });

        document.getElementById('openFolderBtn').addEventListener('click', openAndSaveFolder);
        document.getElementById('saveAllBtn').addEventListener('click', saveAllChanges);

        // Initialize editor view as block, settings as hidden
        document.getElementById('editorView').style.display = 'block';
        document.getElementById('settingsView').classList.remove('active');

        (async function() {
            await initDB();
            await reconnectFromSaved();
        })();
    </script>
</body>
</html>
