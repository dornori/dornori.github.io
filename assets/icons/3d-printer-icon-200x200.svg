<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base platform -->
  <rect x="30" y="160" width="140" height="12" rx="2" fill="#2C3E50" stroke="#2C3E50" stroke-width="8"/>
  
  <!-- Printer body / frame -->
  <rect x="45" y="80" width="110" height="85" rx="4" fill="#ECF0F1" stroke="#2C3E50" stroke-width="10"/>
  
  <!-- Build plate / print bed -->
  <rect x="52" y="145" width="96" height="10" rx="1" fill="#3498DB" stroke="#2C3E50" stroke-width="4"/>
  
  <!-- Left vertical support -->
  <rect x="40" y="70" width="12" height="95" rx="2" fill="#2C3E50"/>
  
  <!-- Right vertical support -->
  <rect x="148" y="70" width="12" height="95" rx="2" fill="#2C3E50"/>
  
  <!-- Top horizontal beam -->
  <rect x="40" y="65" width="120" height="12" rx="2" fill="#2C3E50"/>
  
  <!-- Print head / extruder carriage -->
  <rect x="65" y="55" width="70" height="14" rx="3" fill="#E74C3C" stroke="#2C3E50" stroke-width="4"/>
  
  <!-- Nozzle / hotend -->
  <rect x="92" y="68" width="16" height="22" rx="2" fill="#E74C3C" stroke="#2C3E50" stroke-width="4"/>
  <!-- Nozzle tip -->
  <polygon points="95,90 105,90 100,98" fill="#E74C3C" stroke="#2C3E50" stroke-width="3"/>

  <!-- Side control panel -->
  <rect x="125" y="95" width="22" height="18" rx="2" fill="#34495E" stroke="#2C3E50" stroke-width="3"/>

  <!-- Filament roll (spool) on the right side - improved -->
  <!-- Outer spool -->
  <circle cx="165" cy="48" r="18" fill="#ECF0F1" stroke="#2C3E50" stroke-width="8"/>
  <!-- Inner hub -->
  <circle cx="165" cy="48" r="9" fill="#2C3E50"/>
  <!-- Spool highlight lines -->
  <circle cx="165" cy="48" r="14" fill="none" stroke="#34495E" stroke-width="3"/>

  <!-- Filament string coming from the spool to the print head -->
  <!-- Curving filament path (orange color) -->
  <path 
    d="M165 38 Q 175 25 155 20 Q 130 18 105 48" 
    fill="none" 
    stroke="#F39C12" 
    stroke-width="4" 
    stroke-linecap="round"/>

  <!-- Small filament segment entering the nozzle (for continuity) -->
  <line 
    x1="99" y1="52" 
    x2="95" y2="68" 
    stroke="#F39C12" 
    stroke-width="3.5" 
    stroke-linecap="round"/>
</svg>