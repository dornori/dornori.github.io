<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dornori — Build your own Star-A rising kinetic lamp. Real engineering for kids 7–12.">
    
    <title>Dornori — Loading...</title>
    
    <!-- Favicons and manifest -->
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="assets/icons/site.webmanifest">

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profiles.css">
</head>
<body>
    
    <!-- Header / Banner -->
    <header id="main-header">
        <img id="banner-img" src="assets/images/dornori_header.jpg" alt="Dornori Banner" class="billboard-logo">
        
        <!-- Desktop Navigation -->
        <nav class="top-nav"></nav>
        
        <!-- Mobile Navigation -->
        <nav id="mobile-nav" class="mobile-nav"></nav>
    </header>

    <!-- Top settings bar -->
    <div id="topBar"></div>

    <!-- Main Content -->
    <main>
        <!-- Home View -->
        <div id="home-view">
            <div class="headline">
                "In darkness let's shine a light,<br>
                to brighten the world and illuminate minds."
            </div>
            
            <!-- Subscribe form -->
            <div class="waitlist-card">
                <div class="embed-form-root"></div>
            </div>
        </div>

        <!-- Dynamic Page View -->
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
        </div>
    </main>

    <!-- Social Dock -->
    <div id="social-dock" class="social-dock"></div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            
            <div class="footer-bottom">
                <div class="copyright-text">
                    © 2026 DORNORI. ALL RIGHTS RESERVED.
                </div>
                <div class="technical-credits">
                    <div class="credit-item">
                        Performance &amp; Security by Cloudflare
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- All your JavaScript files -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/nav-loader.js"></script>
    <script type="module" src="js/page-loader.js"></script>
    <script type="module" src="js/footer-loader.js"></script>
    <script type="module" src="js/social-loader.js"></script>
    <script type="module" src="js/sticky-banner.js"></script>
    <script type="module" src="js/embed-form.js"></script>

    <!-- SEO + Auto-load correct page when loaded via 404 -->
    <script>
        function updateSEO() {
            const mainDomain = 'https://dornori.com';
            let path = window.location.pathname;
            if (path === '' || path === '/') path = '';
            
            // Update canonical
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.rel = 'canonical';
                document.head.appendChild(canonical);
            }
            canonical.href = mainDomain + (path === '' ? '' : path);

            // Update title (basic fallback)
            document.title = 'Dornori';
        }

        // Run SEO immediately
        updateSEO();

        // Auto-detect URL and load the correct page after everything is ready
        window.addEventListener('load', () => {
            const slug = window.location.pathname.replace(/^\/|\/$/g, '');
            
            // If we're not on the homepage, try to load the page
            if (slug && typeof window.viewPage === 'function') {
                setTimeout(() => {
                    window.viewPage(slug);
                }, 150);   // Small delay to let other scripts initialize
            } else {
                // On homepage or root
                if (typeof window.showHome === 'function') {
                    window.showHome();
                }
            }
        });

        // Also listen for popstate (back/forward buttons)
        window.addEventListener('popstate', () => {
            const slug = window.location.pathname.replace(/^\/|\/$/g, '');
            if (slug && typeof window.viewPage === 'function') {
                window.viewPage(slug);
            } else if (typeof window.showHome === 'function') {
                window.showHome();
            }
        });
    </script>
</body>
</html>
