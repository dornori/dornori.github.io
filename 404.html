<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Dornori...</title>
    <link rel="canonical" href="https://dornori.com/">
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background: #050505; color: #BED4E1; }
        a { color: #F5F29B; }
    </style>
    <script>
        // Redirect back to index.html while keeping the path
        const path = window.location.pathname + window.location.search;
        window.location.replace('https://dornori.com' + (path === '/' ? '' : path));
    </script>
</head>
<body>
    <h1>Page not found</h1>
    <p>Redirecting you to Dornori...</p>
    <p>If nothing happens, <a href="https://dornori.com">click here</a>.</p>
</body>
</html>
