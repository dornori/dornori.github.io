<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Dornori</title>
    <meta name="description" content="This page could not be found.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/profiles.css">

    <style>
        .not-found-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 60px 24px;
        }
        .not-found-code {
            font-size: clamp(5rem, 20vw, 10rem);
            font-weight: 800;
            line-height: 1;
            color: var(--accent, #a8d5b5);
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }
        .not-found-title {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text, #e8f2ec);
        }
        .not-found-msg {
            font-size: 0.95rem;
            color: var(--text-muted, #9dc8ae);
            max-width: 380px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .not-found-home {
            display: inline-block;
            padding: 0.65rem 1.75rem;
            border-radius: 8px;
            background: var(--accent, #a8d5b5);
            color: var(--bg, #1a3a2a);
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .not-found-home:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="location.href='/en/'">
            <img id="banner-img" class="billboard-logo" alt="Dornori">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation">
            <div id="cart-icon-slot" class="cart-icon-header-slot"></div>
        </nav>
    </header>

    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport">
        <div class="not-found-wrap">
            <div class="not-found-code">404</div>
            <div class="not-found-title">Page not found</div>
            <p class="not-found-msg">The page you're looking for doesn't exist or may have moved.</p>
            <a href="/en/" class="not-found-home">Go to homepage</a>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        window.__PAGE_LANG__ = 'en';
        window.__PAGE_SLUG__ = '404';
    </script>
    <script src="/js/page-init.js" defer></script>
    <script src="/js/site-boot.js" defer></script>
</body>
</html>
