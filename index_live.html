<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

    <nav class="top-nav"></nav>

    <header id="main-header">
        <img src="assets/images/dornori_header.jpg" class="billboard-logo" alt="Dornori" id="banner-img">
    </header>

    <main>
        <h2 class="headline">Illuminate Mankind</h2>
        <div class="waitlist-card" id="newsletter">
            <div id="form-container">
                <form id="waitlist-form" method="POST">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC" data-theme="dark"></div>
                    <div class="input-row">
                        <input type="email" name="email" placeholder="Subscribe to Newsletter" required>
                        <button type="submit" class="submit-btn" id="sub-btn">Join</button>
                    </div>
                </form>
            </div>
            <div id="success-container" class="hidden">
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px;">THANKS FOR SUBSCRIBING</p>
            </div>
        </div>
    </main>

    <div class="social-dock" id="social-dock"></div>

    <script type="module">
        import { initNavigation } from './js/nav-loader.js';
        import { initStickyBanner } from './js/sticky-banner.js';
        import { initSocials } from './js/social-loader.js';
        import { initFormHandler } from './js/form-handler.js';

        initNavigation();
        initStickyBanner();
        initSocials();
        initFormHandler();
    </script>
</body>
</html>
