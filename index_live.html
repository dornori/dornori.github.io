<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>

    <nav class="top-nav"></nav>

    <div id="view-layer" class="view-overlay hidden">
        <div class="view-controls"><button id="close-view">CLOSE [ESC]</button></div>
        <div id="view-content" class="view-inner"></div>
    </div>

    <div id="main-content">
        <header id="main-header">
            <img src="assets/images/dornori_header.jpg" class="billboard-logo" alt="Dornori" id="banner-img">
        </header>

        <main>
            <h2 class="headline">Illuminate Mankind</h2>
            <div class="waitlist-card" id="newsletter">
                <div id="form-container">
                    <form id="waitlist-form">
                        <div id="captcha-container"></div>
                        <div class="input-row">
                            <input type="email" name="email" placeholder="Subscribe to Newsletter" required>
                            <button type="submit" class="submit-btn" id="sub-btn">Join</button>
                        </div>
                        <p class="disclaimer-text">
                            By subscribing, you accept our 
                            <button type="button" class="link-btn" onclick="window.viewPage('terms')">Terms</button> & 
                            <button type="button" class="link-btn" onclick="window.viewPage('privacy')">Privacy Policy</button>.
                        </p>
                    </form>
                </div>
                <div id="success-container" class="hidden">
                    <p class="success-msg">THANKS FOR SUBSCRIBING</p>
                </div>
            </div>
            <div class="social-dock" id="social-dock"></div>
        </main>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <p class="copyright-text">&copy; 2026 DORNORI. All Rights Reserved.</p>
            <div class="service-badges">
                <span>Protected by <strong>Cloudflare</strong></span>
                <span>|</span>
                <span>Powered by <strong>Formspree</strong></span>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initNavigation } from './js/nav-loader.js';
        import { initStickyBanner } from './js/sticky-banner.js';
        import { initSocials } from './js/social-loader.js';
        import { initFormHandler } from './js/form-handler.js';
        import { initPageLoader } from './js/page-loader.js';

        initNavigation();
        initStickyBanner();
        initSocials();
        initFormHandler();
        initPageLoader();
    </script>
</body>
</html>
