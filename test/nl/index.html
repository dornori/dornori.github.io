<!DOCTYPE html>
<html lang="nl" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Bouw je eigen Rising Star Lamp</title>
    <meta name="description" content="Ontdek de Dornori Star-A: een echte kinetische buitenlamp die jij zelf bouwt. DC-motor, 3D-geprinte onderdelen, echte elektronica. Voor kinderen van 7–12 en hun ouders.">
    <link rel="icon"             href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon"             href="/assets/icons/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest"         href="/assets/icons/site.webmanifest">
    <link rel="canonical"        href="https://dornori.com/nl/">
    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">
    <link rel="stylesheet" href="/test/shop/css/shop.css">
    <link rel="stylesheet" href="/test/css/shop-bridge.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
    <div id="topBar"></div>
    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Hoofdnavigatie"></nav>
        <a id="site-cart-btn" class="lumio-cart-icon" href="/test/shop/cart.html" aria-label="Shopping cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="lumio-cart-icon__badge lumio-cart-icon__badge--hidden" id="site-cart-badge" aria-live="polite">0</span>
        </a>
    </header>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobiele navigatie"></nav>
    <main id="viewport">
        <div id="home-view">
            <div style="text-align:center;padding:60px 20px;">
                <div style="display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin .8s linear infinite;"></div>
                <p style="margin-top:20px;font-family:var(--font-mono);">Laden&hellip;</p>
            </div>
        </div>
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top:50px;">
                <button class="nav-link" style="border:1px solid var(--border);padding:10px 20px;" onclick="window.showHome()">Terug naar home</button>
            </div>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>
    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALLE RECHTEN VOORBEHOUDEN.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Prestaties &amp; Beveiliging door <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script>window.__PAGE_LANG__ = 'nl';</script>
    <script type="module">
        import { initI18n }         from '/test/js/i18n.js';
        import { initNavigation }   from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials }      from '/test/js/social-loader.js';
        import { initEmbedForms }   from '/test/js/embed-form.js';
        import { initPageLoader }   from '/test/js/page-loader.js';
        import { initFooter }       from '/test/js/footer-loader.js';
        import { initShop }         from '/test/js/shop-loader.js';
        async function init() {
            localStorage.setItem('dornori-lang', 'nl');
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
            initShop();
        }
        init();
    </script>
</body>
</html>
