    <!--
    ═══════════════════════════════════════════════════════════════════════════
    SPA DEEP-LINK REDIRECT — Static host compatibility
    ═══════════════════════════════════════════════════════════════════════════
    Static hosts (GitHub Pages, Netlify static, Apache without mod_rewrite)
    return a 404 for any URL that doesn't map to a real file, e.g. /de/about.

    The standard fix is a custom 404.html that immediately redirects back to
    index.html, encoding the intended path as a query-string so it survives
    the redirect.  This script decodes it and restores the correct path via
    history.replaceState before any JS runs, so the page-loader sees the real
    URL and loads the right language + page.

    HOW TO ENABLE:
      • GitHub Pages:  copy index.html → 404.html  (same file, or a symlink)
      • Netlify:       add  [[redirects]]  in netlify.toml  (see below)
      • Apache:        ErrorDocument 404 /index.html
      • Nginx:         try_files $uri $uri/ /index.html;
      • Vercel:        add  routes  in vercel.json  (see below)

    Netlify netlify.toml:
        [[redirects]]
          from = "/*"
          to   = "/index.html"
          status = 200

    Vercel vercel.json:
        { "routes": [{ "src": "/(.*)", "dest": "/index.html" }] }

    GitHub Pages 404.html redirect script (put this in 404.html):
        <script>
          // Encode full path+query+hash into ?p= and redirect to index
          const l = window.location;
          l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
            encodeURIComponent(l.pathname + l.search + l.hash));
        </script>
    ═══════════════════════════════════════════════════════════════════════════
    -->
    <script>
    // Decode the ?p= redirect written by 404.html (GitHub Pages trick).
    // Must run before any module scripts so window.location is correct
    // when i18n.js and page-loader.js read it.
    (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
            // Replace current history entry with the real path (no reload)
            window.history.replaceState(null, '', p);
        }
    }());
    </script>

    <script type="module">
        import { initI18n } from './js/i18n.js';

        import { initSocials } from './js/social-loader.js';

        import { initPageLoader } from './js/page-loader.js';
        import { initFooter } from './js/footer-loader.js';
        import { mountSlideshow } from './js/slideshow.js';

        async function init() {
            // Step 1: Load language.
            // detectLang() inside initI18n() checks URL path first, so navigating
            // directly to /de/about correctly picks up German before anything else runs.
            await initI18n();

            // Step 2: Initialize chrome (nav, banner, socials, footer)
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();

            // Step 3: Load the page (reads current URL to decide what to show)
            initPageLoader();
        }

        init();
    </script>

    <!-- ── Shop integration ── -->
    <link rel="stylesheet" href="/test/shop/css/shop.css">
    <script src="/test/shop/js/config.js"></script>
    <script>
      (function() {
        function loadScript(src) {
          return new Promise(function(resolve) {
            var s = document.createElement("script");
            s.src = src; s.onload = resolve;
            s.onerror = function(){ console.warn("[Shop] failed:", src); resolve(); };
            document.head.appendChild(s);
          });
        }
        var modules = (typeof CONFIG !== "undefined" && CONFIG.modules || [])
          .concat(["/test/shop/js/lang-bridge.js", "/test/shop/js/shop.js"]);
        var chain = Promise.resolve();
        modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
        chain.then(function(){
          document.dispatchEvent(new Event("lumio:ready"));
        });
      })();
    </script>
    <script>
      document.addEventListener("lumio:ready", function() {
        if (typeof Shipping === "undefined" || typeof Currency === "undefined" || typeof Shop === "undefined") return;
        Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]).then(function() {
          Shop.renderCurrencySelector("#currency-selector-slot");
          Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false, cartUrl: "/test/cart.html?lang=" + (window.__PAGE_LANG__ || localStorage.getItem("dornori-lang") || "en") });
        });
      });
