<div class="featured-shop-section">
    <div class="webshop-container" style="max-width: 1280px; margin: 0 auto; padding: 2rem 1rem;">
        <h2 class="webshop-section-title" style="text-align: center; margin-bottom: 2rem;">Featured Lighting</h2>
        
        <div class="webshop-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">
            
            <!-- Product 1: Arc Floor Lamp -->
            <div class="webshop-product-card" data-product-id="arc-floor-lamp">
                <div class="webshop-card-img-wrap">
                    <img class="webshop-card-img" src="https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&q=80" alt="Arc Floor Lamp" loading="lazy">
                </div>
                <div class="webshop-card-body">
                    <h3 class="webshop-card-title">Arc Floor Lamp</h3>
                    <div class="webshop-variants" data-product-id="arc-floor-lamp">
                        <button class="webshop-variant-btn active" data-variant-id="matte-black">Matte Black</button>
                        <button class="webshop-variant-btn" data-variant-id="brushed-gold">Brushed Gold</button>
                    </div>
                    <div class="webshop-card-footer">
                        <span class="webshop-card-price" data-base-price="249">€249</span>
                        <div class="webshop-qty-control">
                            <button class="webshop-qty-btn webshop-qty-btn--minus">−</button>
                            <span class="webshop-qty-val">1</span>
                            <button class="webshop-qty-btn webshop-qty-btn--plus">+</button>
                        </div>
                    </div>
                    <button class="webshop-card-atc webshop-btn webshop-btn--primary webshop-btn--full">Add to Cart</button>
                </div>
            </div>

            <!-- Product 2: Globe Pendant -->
            <div class="webshop-product-card" data-product-id="globe-pendant">
                <div class="webshop-card-img-wrap">
                    <img class="webshop-card-img" src="https://images.unsplash.com/photo-1565814329452-e1efa11c5b89?w=400&q=80" alt="Globe Pendant" loading="lazy">
                </div>
                <div class="webshop-card-body">
                    <h3 class="webshop-card-title">Globe Pendant</h3>
                    <div class="webshop-colors" data-product-id="globe-pendant">
                        <button class="webshop-color webshop-color--active" data-color="Smoke" style="background:#555;"></button>
                        <button class="webshop-color" data-color="Clear" style="background:#eee;"></button>
                        <button class="webshop-color" data-color="Amber" style="background:#b87c4f;"></button>
                    </div>
                    <div class="webshop-card-footer">
                        <span class="webshop-card-price" data-base-price="139">€139</span>
                        <div class="webshop-qty-control">
                            <button class="webshop-qty-btn webshop-qty-btn--minus">−</button>
                            <span class="webshop-qty-val">1</span>
                            <button class="webshop-qty-btn webshop-qty-btn--plus">+</button>
                        </div>
                    </div>
                    <button class="webshop-card-atc webshop-btn webshop-btn--primary webshop-btn--full">Add to Cart</button>
                </div>
            </div>

            <!-- Product 3: Concrete Desk Lamp -->
            <div class="webshop-product-card" data-product-id="concrete-desk-lamp">
                <div class="webshop-card-img-wrap">
                    <img class="webshop-card-img" src="https://images.unsplash.com/photo-1544457070-4cd773b4d71e?w=400&q=80" alt="Concrete Desk Lamp" loading="lazy">
                </div>
                <div class="webshop-card-body">
                    <h3 class="webshop-card-title">Concrete Desk Lamp</h3>
                    <div class="webshop-variants" data-product-id="concrete-desk-lamp">
                        <button class="webshop-variant-btn active" data-variant-id="raw-concrete">Raw Concrete</button>
                        <button class="webshop-variant-btn" data-variant-id="washed-white">Washed White</button>
                        <button class="webshop-variant-btn soldout" data-variant-id="obsidian-black" disabled>Obsidian Black (Sold Out)</button>
                    </div>
                    <div class="webshop-card-footer">
                        <span class="webshop-card-price" data-base-price="89">€89</span>
                        <div class="webshop-qty-control">
                            <button class="webshop-qty-btn webshop-qty-btn--minus">−</button>
                            <span class="webshop-qty-val">1</span>
                            <button class="webshop-qty-btn webshop-qty-btn--plus">+</button>
                        </div>
                    </div>
                    <button class="webshop-card-atc webshop-btn webshop-btn--primary webshop-btn--full">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// This script wires up the product cards using the global Shop object
(function() {
    if (typeof Shop === 'undefined') {
        console.warn('Shop not loaded yet, waiting for webshop:ready event');
        document.addEventListener('webshop:ready', initFeaturedProducts);
    } else {
        initFeaturedProducts();
    }

    async function initFeaturedProducts() {
        // Wait for language to load
        await Shop.loadLang();
        
        // Get product data from shop cache or fetch
        const products = {};
        const productIds = ['arc-floor-lamp', 'globe-pendant', 'concrete-desk-lamp'];
        for (const id of productIds) {
            const p = await Shop.getProduct(id);
            if (p) products[id] = p;
        }

        // Wire up each card
        document.querySelectorAll('.webshop-product-card').forEach(card => {
            const productId = card.dataset.productId;
            const product = products[productId];
            if (!product) return;

            let qty = 1;
            let selectedVariantId = null;
            let selectedColor = null;

            // Variant buttons
            const variantBtns = card.querySelectorAll('.webshop-variant-btn:not([disabled])');
            variantBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    variantBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedVariantId = btn.dataset.variantId;
                    updatePriceAndImage();
                });
            });
            if (variantBtns.length) selectedVariantId = variantBtns[0].dataset.variantId;

            // Color buttons
            const colorBtns = card.querySelectorAll('.webshop-color:not([disabled])');
            colorBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    colorBtns.forEach(b => b.classList.remove('webshop-color--active'));
                    btn.classList.add('webshop-color--active');
                    selectedColor = btn.dataset.color;
                    updatePriceAndImage();
                });
            });
            if (colorBtns.length) selectedColor = colorBtns[0].dataset.color;

            function updatePriceAndImage() {
                const priceSpan = card.querySelector('.webshop-card-price');
                const mainImg = card.querySelector('.webshop-card-img');
                if (selectedVariantId && product.variants) {
                    const variant = product.variants.find(v => v.id === selectedVariantId);
                    if (variant) {
                        priceSpan.textContent = Shop.fmt(variant.price);
                        if (variant.image) mainImg.src = variant.image;
                    }
                } else if (selectedColor && product.colors) {
                    // For color-only products, price might not change, but image could
                    const colorImage = Shop.colorImageSrc(product, selectedColor);
                    if (colorImage) mainImg.src = colorImage;
                }
            }

            // Qty controls
            const minusBtn = card.querySelector('.webshop-qty-btn--minus');
            const plusBtn = card.querySelector('.webshop-qty-btn--plus');
            const qtySpan = card.querySelector('.webshop-qty-val');
            minusBtn?.addEventListener('click', () => {
                qty = Math.max(1, qty - 1);
                qtySpan.textContent = qty;
            });
            plusBtn?.addEventListener('click', () => {
                const maxStock = selectedVariantId ? Shop.variantStock(product, selectedVariantId) : product.stock;
                qty = Math.min(qty + 1, maxStock || 99);
                qtySpan.textContent = qty;
            });

            // Add to cart button
            const atcBtn = card.querySelector('.webshop-card-atc');
            atcBtn?.addEventListener('click', () => {
                Shop.addToCart(product, qty, selectedVariantId, selectedColor);
                Shop.toast(`${Shop.pName(product)} ${Shop.t('added', 'added to cart')}`);
            });
        });
    }
})();
</script>
