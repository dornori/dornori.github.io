<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO – Curated Lighting</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .lumio-hero {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      padding: 72px 0 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .lumio-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 120%, var(--c-accent-light) 0%, transparent 70%);
      pointer-events: none;
    }
    .lumio-hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--c-accent);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .lumio-hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .lumio-hero-title em { font-style: italic; color: var(--c-accent); }
    .lumio-hero-sub {
      color: var(--c-text-3);
      font-size: 1.05rem;
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .lumio-free-ship-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--c-accent-light);
      border: 1px solid var(--c-accent);
      color: var(--c-accent-dark);
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header class="lumio-page-header">
    <div class="lumio-container">
      <div class="lumio-page-header__inner">
        <a href="index.html" class="lumio-logo">LUM<span>IO</span></a>
        <div style="display:flex; gap:10px; align-items:center;">
          <!--
            Language buttons: hidden by CONFIG.features.showLanguageSwitcher = false (default).
            Language is auto-detected from browser Accept-Language → stored pref → URL ?lang=.
            Set CONFIG.features.showLanguageSwitcher = true in config.js to show these.
          -->
          <div class="lumio-lang-switcher" aria-hidden="true" style="display:none;">
            <button class="lumio-lang-btn" data-lang="en">EN</button>
            <button class="lumio-lang-btn" data-lang="no">NO</button>
            <button class="lumio-lang-btn" data-lang="nl">NL</button>
          </div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <section class="lumio-hero">
    <div class="lumio-container">
      <p class="lumio-hero-eyebrow">New Collection 2025</p>
      <h1 class="lumio-hero-title">Light that <em>lives</em><br>with you</h1>
      <p class="lumio-hero-sub">Handpicked lamps and luminaires for every corner of your home.</p>
      <div class="lumio-free-ship-badge">✦ Free shipping on orders over €150</div>
    </div>
  </section>

  <main class="lumio-page-main">
    <div class="lumio-container">
      <div id="shop"></div>
    </div>
  </main>

  <footer style="background:var(--c-text);color:var(--c-white);padding:40px 0;margin-top:40px;">
    <div class="lumio-container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
      <span class="lumio-logo" style="font-size:1.2rem;">LUM<span style="color:var(--c-accent)">IO</span></span>
      <span style="font-size:0.82rem;color:rgba(255,255,255,.45);">© 2025 LUMIO. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/shop.js"></script>
  <script>
    Promise.all([
      Shipping.load(),
      Currency.init(),   // auto-detects from IP; cached in localStorage
      Shop.loadLang(),   // auto-detects from browser Accept-Language + URL ?lang=
    ]).then(() => {
      // Wire language buttons (hidden by default; functional for URL embeds)
      Shop.wireLanguageSwitcher(".lumio-lang-btn");

      Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
      Shop.renderCurrencySelector("#currency-selector-slot");
      Shop.renderShop("shop", { showFilter: true });
    });

    // Payment outcome hooks (used by cart.html checkout flow)
    document.addEventListener("payment:success", e => console.log("[Payment] Success:", e.detail));
    document.addEventListener("payment:cancel",  e => console.log("[Payment] Cancelled:", e.detail));
    document.addEventListener("payment:error",   e => console.error("[Payment] Error:", e.detail));
  </script>
</body>
</html>
