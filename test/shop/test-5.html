<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO – Shopping Cart</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

  <header class="lumio-page-header">
    <div class="lumio-container">
      <div class="lumio-page-header__inner">
        <a href="index.html" class="lumio-logo">LUM<span>IO</span></a>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="lumio-lang-switcher" id="lang-switcher-slot"></div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="lumio-page-main">
    <div class="lumio-container">
      <div id="back-btn-slot"></div>
      <div class="lumio-checkout-panel">
        <h2 class="lumio-panel-title">Shopping Cart</h2>
        <div class="lumio-cart-table-wrap">
          <table class="lumio-cart-table" id="cart-table">
            <thead><tr><th style="width:80px"></th><th>Item</th><th>Qty</th><th>Price</th><th></th></tr></thead>
            <tbody id="cart-tbody"></tbody>
          </table>
          <div id="cart-empty-state" style="display:none;" class="lumio-cart-empty">
            <div class="lumio-cart-empty__icon">🛒</div>
            <h2>Your cart is empty</h2>
            <a href="index.html" class="lumio-btn lumio-btn--primary">Continue Shopping</a>
          </div>
        </div>
        <div class="lumio-cart-totals-bar" id="cart-totals-bar">
          <div class="lumio-cart-totals-bar__row"><span>Subtotal</span><span id="cart-subtotal">€0.00</span></div>
          <div class="lumio-cart-totals-bar__row"><span>Tax (25%)</span><span id="cart-tax">€0.00</span></div>
          <div class="lumio-cart-totals-bar__row lumio-cart-totals-bar__row--total"><span>Total</span><span id="cart-total">€0.00</span></div>
        </div>
        <div class="lumio-cart-actions">
          <button class="lumio-btn lumio-btn--back-shop" onclick="window.location.href='index.html'">← Back to Shop</button>
          <button class="lumio-btn lumio-btn--primary lumio-btn--checkout" id="clear-cart-btn">Clear Cart</button>
        </div>
      </div>
      <div class="lumio-mini-cart" id="mini-cart-demo" style="margin-top:32px;"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script"); s.src = src;
          s.onload = resolve; s.onerror = function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("lumio:ready")); });
    })();
  </script>
  <script>
  document.addEventListener("lumio:ready", async function() {
    await Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]);
    Shop.wireLanguageSwitcher(".lumio-lang-btn");
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    Shop.renderBackButton("#back-btn-slot", { href: "index.html" });

    function renderCart() {
      const cart = Shop.getCart();
      const tbody = document.getElementById("cart-tbody");
      const empty = document.getElementById("cart-empty-state");
      const table = document.getElementById("cart-table");
      const bar = document.getElementById("cart-totals-bar");

      if (!cart.length) {
        table.style.display = "none"; empty.style.display = "block";
        if(bar) bar.style.display = "none";
        return;
      }
      table.style.display = ""; empty.style.display = "none";
      if(bar) bar.style.display = "";

      tbody.innerHTML = cart.map(item => `
        <tr>
          <td><img class="lumio-cart-item-img" src="${item.image}" alt="${item.name}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;"></td>
          <td>
            <div class="lumio-cart-item-name">${item.name}</div>
            ${item.selectedColor ? `<div class="lumio-cart-item-color">${item.selectedColor}</div>` : ""}
            <div style="font-size:.75rem;color:var(--c-text-3)">${Shop.fmtWeight(item.weight)}</div>
          </td>
          <td>
            <div class="lumio-qty-control">
              <button class="lumio-qty-btn lumio-qty-btn--minus" data-key="${item.cartKey}">−</button>
              <span class="lumio-qty-val">${item.qty}</span>
              <button class="lumio-qty-btn lumio-qty-btn--plus" data-key="${item.cartKey}">+</button>
            </div>
          </td>
          <td class="lumio-cart-item-total">${Shop.fmt(item.price * item.qty)}</td>
          <td><button class="lumio-cart-remove" data-key="${item.cartKey}">✕</button></td>
        </tr>
      `).join("");

      const { subtotal, tax, total } = Shop.calculateTotals(cart);
      document.getElementById("cart-subtotal").textContent = Shop.fmt(subtotal);
      document.getElementById("cart-tax").textContent = Shop.fmt(tax);
      document.getElementById("cart-total").textContent = Shop.fmt(total);

      tbody.querySelectorAll(".lumio-qty-btn--minus").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = Shop.getCart().find(i => i.cartKey === btn.dataset.key);
          if(item) Shop.updateQty(btn.dataset.key, item.qty - 1);
        });
      });
      tbody.querySelectorAll(".lumio-qty-btn--plus").forEach(btn => {
        btn.addEventListener("click", () => {
          const item = Shop.getCart().find(i => i.cartKey === btn.dataset.key);
          if(item) Shop.updateQty(btn.dataset.key, item.qty + 1);
        });
      });
      tbody.querySelectorAll(".lumio-cart-remove").forEach(btn => {
        btn.addEventListener("click", () => Shop.removeFromCart(btn.dataset.key));
      });
    }

    document.getElementById("clear-cart-btn").addEventListener("click", () => {
      Shop.clearCart();
      Shop.toast("Cart cleared");
    });

    Shop.renderMiniCart("mini-cart-demo");
    renderCart();
    document.addEventListener("shop:cartUpdated", renderCart);
    document.addEventListener("currency:changed", renderCart);
  });
  </script>
</body>
</html>
