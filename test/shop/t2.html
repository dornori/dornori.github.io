<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori | UFO Silver Shadow – 4 Finishes</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .color-showcase { background: #f5f0ea; padding: 60px 0; text-align: center; }
    .color-showcase h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; }
    .color-swatch-row { display: flex; justify-content: center; gap: 24px; margin: 40px 0 20px; flex-wrap: wrap; }
    .color-swatch { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 3px solid transparent; }
    .color-swatch:hover { transform: scale(1.05); }
    .color-swatch.active { border-color: #c8a96e; transform: scale(1.08); }
    .color-label { font-size: 0.8rem; margin-top: 8px; color: #666; }
  </style>
</head>
<body>

<div class="color-showcase">
  <div class="lumio-container">
    <h2>Choose Your Finish</h2>
    <p>Four striking colors · Same transformable magic</p>
    <div class="color-swatch-row" id="swatch-row"></div>
  </div>
</div>

<header class="lumio-page-header">
  <div class="lumio-container">
    <div class="lumio-page-header__inner">
      <a href="#" class="lumio-logo">DORN<span>ORI</span></a>
      <div><div id="currency-slot"></div></div>
    </div>
  </div>
</header>

<main class="lumio-page-main">
  <div class="lumio-container"><div id="product-root"></div></div>
</main>

<script src="js/config.js"></script>
<script>
  (function(){
    function load(s){return new Promise(r=>{let script=document.createElement("script");script.src=s;script.onload=r;document.head.appendChild(script);});}
    let modules=(CONFIG.modules||[]).concat(["js/lang-bridge.js","js/shop.js"]);
    let p=Promise.resolve();modules.forEach(m=>{p=p.then(()=>load(m));});
    p.then(()=>document.dispatchEvent(new Event("ready")));
  })();
</script>
<script>
document.addEventListener("ready",async()=>{
  await Promise.all([Shipping.load(),Currency.init(),Shop.loadLang()]);
  Shop.renderCurrencySelector("#currency-slot");
  
  const colors = [
    { id: "ufo-red-white", name: "Red Phantom", bg: "#8B3A3A" },
    { id: "ufo-gray-silver", name: "Silver Shadow", bg: "#A9A9A9" },
    { id: "ufo-black-white", name: "Midnight Black", bg: "#1a1a1a" },
    { id: "ufo-blue-blue", name: "Space Blue", bg: "#2C3E6B" }
  ];
  
  const swatchRow = document.getElementById("swatch-row");
  colors.forEach(c => {
    const swatch = document.createElement("div");
    swatch.style.cssText = `text-align:center;cursor:pointer;`;
    swatch.innerHTML = `
      <div class="color-swatch" style="background:${c.bg};"></div>
      <div class="color-label">${c.name}</div>
    `;
    swatch.onclick = () => {
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      swatch.querySelector(".color-swatch").classList.add("active");
      Shop.renderProductInfo("product-root", c.id);
    };
    swatchRow.appendChild(swatch);
  });
  
  Shop.renderProductInfo("product-root", "ufo-gray-silver");
  setTimeout(() => document.querySelector(".color-swatch")?.classList.add("active"), 100);
});
</script>
</body>
</html>
