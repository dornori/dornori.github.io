<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — LUMIO</title>
  <link rel="stylesheet" href="css/shop.css">
  <script src="js/config.js"></script>
  <script src="js/shop.js"></script>
  <style>
    /* Additional styles for Review step */
    .review-items-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
      padding: 24px;
      background: var(--c-surface);
      border-radius: var(--radius-lg);
    }
    .review-item {
      display: flex;
      gap: 16px;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--c-border);
    }
    .review-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .review-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .review-item-info {
      flex: 1;
    }
    .review-item-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      margin-bottom: 4px;
    }
    .review-item-meta {
      font-size: 0.85rem;
      color: var(--c-text-3);
    }
    .review-item-price {
      font-weight: 600;
      color: var(--c-accent-dark);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header class="lumio-page-header">
    <div class="lumio-container lumio-page-header__inner">
      <div class="lumio-logo">LUMIO <span>Shop</span></div>
      <div id="lang-slot"></div>
      <div id="currency-slot"></div>
    </div>
  </header>

  <div class="lumio-container lumio-page-main">

    <!-- Progress Steps -->
    <div class="lumio-steps" id="checkout-steps">
      <div class="lumio-step lumio-step--active" data-step="1">
        <div class="lumio-step__num">1</div>
        <div class="lumio-step__label">Shipping</div>
      </div>
      <div class="lumio-step" data-step="2">
        <div class="lumio-step__num">2</div>
        <div class="lumio-step__label">Review</div>
      </div>
      <div class="lumio-step" data-step="3">
        <div class="lumio-step__num">3</div>
        <div class="lumio-step__label">Payment</div>
      </div>
    </div>

    <div class="lumio-cart-layout">

      <!-- STEP 1: SHIPPING -->
      <div id="step-1" class="step-content">
        <h2 class="lumio-section-title">Shipping Information</h2>
        
        <div class="lumio-checkbox-group">
          <input type="checkbox" id="business-order">
          <label for="business-order" class="lumio-checkbox-label">This is a business order</label>
        </div>

        <div class="lumio-form">
          <div class="lumio-form-row">
            <div class="lumio-form-group">
              <label>First Name</label>
              <input type="text" id="first-name" required>
            </div>
            <div class="lumio-form-group">
              <label>Last Name</label>
              <input type="text" id="last-name" required>
            </div>
          </div>
          <div class="lumio-form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
          </div>
          <div class="lumio-form-group">
            <label>Street Address</label>
            <input type="text" id="address" required>
          </div>
          <div class="lumio-form-row">
            <div class="lumio-form-group">
              <label>City</label>
              <input type="text" id="city" required>
            </div>
            <div class="lumio-form-group">
              <label>Postal Code</label>
              <input type="text" id="postal" required>
            </div>
          </div>
          <div class="lumio-form-group">
            <label>Country</label>
            <select id="country" required>
              <option value="">Select country...</option>
              <!-- Add your countries here or populate via JS -->
            </select>
          </div>
        </div>

        <button class="lumio-btn lumio-btn--primary lumio-btn--full" onclick="goToStep(2)">Next: Review Order →</button>
      </div>

      <!-- STEP 2: REVIEW -->
      <div id="step-2" class="step-content" style="display: none;">
        <h2 class="lumio-section-title">Order Summary</h2>
        
        <div id="review-order-items" class="review-items-list">
          <!-- Populated by JS: items with small images -->
        </div>

        <!-- Right sidebar: Mini shopping cart -->
        <div class="lumio-summary-panel">
          <h3>Shopping Cart</h3>
          <div id="review-mini-cart"></div>
          <div id="review-totals"></div>
          
          <button class="lumio-btn lumio-btn--primary lumio-btn--full" onclick="goToStep(3)" style="margin-top:20px;">Continue to Payment →</button>
          <button class="lumio-btn lumio-btn--outline lumio-btn--full" onclick="goToStep(1)" style="margin-top:8px;">← Back to Shipping</button>
        </div>
      </div>

      <!-- STEP 3: PAYMENT -->
      <div id="step-3" class="step-content" style="display: none;">
        <h2 class="lumio-section-title">Payment Options</h2>
        
        <div id="lumio-paypal-container">
          <!-- PayPal or Stripe will be rendered here by Payment.render() -->
        </div>

        <!-- Right sidebar: Clean Order Summary (totals only) -->
        <div class="lumio-summary-panel">
          <h3>Order Summary</h3>
          <div id="payment-order-summary"></div>
          
          <button class="lumio-btn lumio-btn--outline lumio-btn--full" onclick="goToStep(2)" style="margin-top:20px;">← Back to Review</button>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="lumio-container">
      LUMIO © 2025 LUMIO. All rights reserved.
    </div>
  </footer>

  <script>
    // Simple step navigation
    function goToStep(step) {
      document.querySelectorAll('.step-content').forEach(el => el.style.display = 'none');
      document.getElementById('step-' + step).style.display = 'block';

      // Update active step indicator
      document.querySelectorAll('.lumio-step').forEach(s => s.classList.remove('lumio-step--active'));
      document.querySelector(`.lumio-step[data-step="${step}"]`).classList.add('lumio-step--active');

      if (step === 2) {
        renderReviewStep();
      } else if (step === 3) {
        renderPaymentStep();
      }
    }

    // Render Review step (top images + mini cart sidebar)
    function renderReviewStep() {
      const cart = Shop.getCart();
      if (!cart.length) return;

      // Top: Detailed items with small images
      let itemsHtml = '';
      cart.forEach(item => {
        itemsHtml += `
          <div class="review-item">
            <img src="${item.image}" alt="${item.name}" onerror="this.src='images/placeholder.svg'">
            <div class="review-item-info">
              <div class="review-item-name">${item.name}</div>
              ${item.selectedColor ? `<div class="review-item-meta">${item.selectedColor} • Qty: ${item.qty}</div>` : `<div class="review-item-meta">Qty: ${item.qty}</div>`}
            </div>
            <div class="review-item-price">${Shop.fmt(item.price * item.qty)}</div>
          </div>`;
      });
      document.getElementById('review-order-items').innerHTML = itemsHtml;

      // Sidebar mini cart (reuse logic or simple list)
      const miniHtml = cart.map(item => `
        <div style="display:flex;gap:12px;margin-bottom:12px;">
          <img src="${item.image}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;" onerror="this.src='images/placeholder.svg'">
          <div style="flex:1;">
            <div style="font-size:0.9rem;">${item.name}</div>
            <div style="font-size:0.8rem;color:#666;">${item.selectedColor || ''} × ${item.qty}</div>
          </div>
          <div style="font-weight:600;">${Shop.fmt(item.price * item.qty)}</div>
        </div>
      `).join('');
      
      document.getElementById('review-mini-cart').innerHTML = miniHtml;

      // Totals
      const totals = Shop.calculateTotals(cart);
      document.getElementById('review-totals').innerHTML = `
        <div class="lumio-summary-row"><span>Subtotal</span><span>${Shop.fmt(totals.subtotal)}</span></div>
        <div class="lumio-summary-row"><span>Shipping</span><span>${totals.isFreeShipping ? 'FREE' : Shop.fmt(totals.shipping)}</span></div>
        <div class="lumio-summary-row"><span>VAT (25%)</span><span>${Shop.fmt(totals.tax)}</span></div>
        <div class="lumio-summary-row lumio-summary-row--total"><span>Total</span><span>${Shop.fmt(totals.total)}</span></div>
      `;
    }

    // Render Payment step (clean summary)
    function renderPaymentStep() {
      const cart = Shop.getCart();
      const totals = Shop.calculateTotals(cart);

      const summaryHtml = `
        <div class="lumio-summary-row"><span>Subtotal</span><span>${Shop.fmt(totals.subtotal)}</span></div>
        <div class="lumio-summary-row"><span>Shipping</span><span>${totals.isFreeShipping ? 'FREE' : Shop.fmt(totals.shipping)}</span></div>
        <div class="lumio-summary-row"><span>VAT (25%)</span><span>${Shop.fmt(totals.tax)}</span></div>
        <div class="lumio-summary-row lumio-summary-row--total"><span>Total</span><span>${Shop.fmt(totals.total)}</span></div>
      `;
      document.getElementById('payment-order-summary').innerHTML = summaryHtml;

      // Render payment processor (PayPal example)
      const totalsData = Shop.calculateTotals(cart);
      const orderRef = Shop.generateOrderRef();
      Payment.render(cart, totalsData, orderRef, "#lumio-paypal-container");
    }

    // Boot the cart page
    window.addEventListener('load', async () => {
      await Promise.all([
        Shipping.load(),
        Currency.init(),
        Shop.loadLang()
      ]);

      Shop.renderCurrencySelector("#currency-slot");
      // You can add language switcher if needed

      // Start on step 1
      goToStep(1);
    });
  </script>
</body>
</html>
