<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori | Mushroom Garden Lamp – Red/Red</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .hero-mock {
      background: linear-gradient(135deg, #2d1a1a 0%, #4a2a2a 100%);
      color: white;
      padding: 60px 0 40px;
      text-align: center;
      margin-bottom: 40px;
    }
    .hero-mock h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 12px;
    }
    .hero-mock p {
      color: rgba(255,255,255,0.7);
      max-width: 600px;
      margin: 0 auto;
    }
    .mock-tag {
      display: inline-block;
      background: #c8a96e;
      color: #1a1714;
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="pdp-magnifier" id="magnifier"><img id="magnifier-img" src="" alt=""></div>

<div class="pdp-lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="pdp-lightbox__inner">
    <button class="pdp-lightbox__close" id="lightbox-close">✕</button>
    <div class="pdp-lightbox__tabs">
      <button class="pdp-lightbox__tab active" data-tab="images">Images</button>
      <button class="pdp-lightbox__tab" data-tab="video">Video</button>
    </div>
    <div class="pdp-lightbox__body">
      <div id="tab-images">
        <div class="pdp-lightbox-gallery">
          <div class="pdp-lightbox-main"><img id="lb-main-img" src="" alt=""></div>
          <div class="pdp-lightbox-thumbs" id="lb-thumbs"></div>
          <div class="pdp-lightbox-details" id="lb-details"></div>
        </div>
      </div>
      <div id="tab-video" style="display:none;"><div class="pdp-video-wrap" id="video-container"></div></div>
    </div>
  </div>
</div>

<header class="lumio-page-header">
  <div class="lumio-container">
    <div class="lumio-page-header__inner">
      <a href="#" class="lumio-logo">DORN<span>ORI</span></a>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="lumio-lang-switcher" id="lang-switcher-slot"></div>
        <div id="currency-selector-slot"></div>
      </div>
    </div>
  </div>
</header>

<section class="hero-mock">
  <div class="lumio-container">
    <span class="mock-tag">🍄 Whimsical Design | Solar Option | Garden Ready</span>
    <h1>Mushroom Garden Lamp</h1>
    <p>A playful yet elegant mushroom-shaped lamp that brings warmth to any garden path or patio. Available in multiple color combinations with warm 2200K glow.</p>
  </div>
</section>

<main class="lumio-page-main">
  <div class="lumio-container">
    <div id="product-info"></div>
  </div>
</main>

<footer style="background:var(--c-text);color:var(--c-white);padding:40px 0;margin-top:60px;text-align:center;">
  <div class="lumio-container">© 2025 Dornori — Curated Outdoor Lighting</div>
</footer>

<script src="js/config.js"></script>
<script>
  (function() {
    function loadScript(src) {
      return new Promise(function(resolve) {
        var s = document.createElement("script"); s.src = src;
        s.onload = resolve; s.onerror = function(){ resolve(); };
        document.head.appendChild(s);
      });
    }
    var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
    var chain = Promise.resolve();
    modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
    chain.then(function(){ document.dispatchEvent(new Event("dornori:ready")); });
  })();
</script>
<script>
document.addEventListener("dornori:ready", async function() {
  await Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]);
  Shop.wireLanguageSwitcher(".lumio-lang-btn");
  Shop.renderCurrencySelector("#currency-selector-slot");
  Shop.renderProductInfo("product-info", "mushroom-red-red");
});
</script>
</body>
</html>
