<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO – Checkout Form</title>
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

  <header class="lumio-page-header">
    <div class="lumio-container">
      <div class="lumio-page-header__inner">
        <a href="index.html" class="lumio-logo">LUM<span>IO</span></a>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="lumio-lang-switcher" id="lang-switcher-slot"></div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="lumio-page-main">
    <div class="lumio-container">
      <div id="back-btn-slot"></div>

      <div class="lumio-steps">
        <div class="lumio-step lumio-step--active"><div class="lumio-step__num">1</div><div class="lumio-step__label">Cart</div></div>
        <div class="lumio-step"><div class="lumio-step__num">2</div><div class="lumio-step__label">Details</div></div>
        <div class="lumio-step"><div class="lumio-step__num">3</div><div class="lumio-step__label">Pay</div></div>
      </div>

      <div class="lumio-cart-layout">
        <div class="lumio-checkout-panel">
          <h2 class="lumio-panel-title">Customer Details</h2>
          <div class="lumio-form">
            <div class="lumio-form-row">
              <div class="lumio-form-group"><label>First Name</label><input type="text" id="first_name" placeholder="John"></div>
              <div class="lumio-form-group"><label>Last Name</label><input type="text" id="last_name" placeholder="Doe"></div>
            </div>
            <div class="lumio-form-row">
              <div class="lumio-form-group"><label>Email</label><input type="email" id="email" placeholder="hello@example.com"></div>
              <div class="lumio-form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+123456789"></div>
            </div>
            <div class="lumio-form-group"><label>Address</label><input type="text" id="address" placeholder="Street and number"></div>
            <div class="lumio-form-row">
              <div class="lumio-form-group"><label>City</label><input type="text" id="city" placeholder="Oslo"></div>
              <div class="lumio-form-group"><label>Postal Code</label><input type="text" id="postal_code" placeholder="0150"></div>
            </div>
            <div class="lumio-form-group"><label>Country</label><select id="country"><option value="">Select country...</option></select></div>
          </div>
          <div class="lumio-step2-actions" style="margin-top:24px;">
            <button class="lumio-btn lumio-btn--outline" onclick="window.location.href='cart-page.html'">← Back</button>
            <button class="lumio-btn lumio-btn--primary" id="simulate-order">Simulate Order →</button>
          </div>
        </div>
        <div class="lumio-summary-panel">
          <h2>Order Summary</h2>
          <div id="checkout-summary-items"></div>
          <div class="lumio-summary-row"><span>Subtotal</span><span id="summary-subtotal">€0.00</span></div>
          <div class="lumio-summary-row"><span>Tax (25%)</span><span id="summary-tax">€0.00</span></div>
          <div class="lumio-summary-row lumio-summary-row--total"><span>Total</span><span id="summary-total">€0.00</span></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script"); s.src = src;
          s.onload = resolve; s.onerror = function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("lumio:ready")); });
    })();
  </script>
  <script>
  document.addEventListener("lumio:ready", async function() {
    await Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]);
    Shop.wireLanguageSwitcher(".lumio-lang-btn");
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    Shop.renderBackButton("#back-btn-slot", { href: "cart-page.html" });
    Shipping.populateCountrySelect(document.getElementById("country"), "Select country...");

    function updateSummary() {
      const cart = Shop.getCart();
      const country = document.getElementById("country").value;
      const { subtotal, tax, total } = Shop.calculateTotals(cart, false, country || null);
      document.getElementById("summary-subtotal").textContent = Shop.fmt(subtotal);
      document.getElementById("summary-tax").textContent = Shop.fmt(tax);
      document.getElementById("summary-total").textContent = Shop.fmt(total);
      const itemsDiv = document.getElementById("checkout-summary-items");
      itemsDiv.innerHTML = cart.map(item => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--c-border);font-size:0.85rem;">
          <span>${item.qty}× ${item.name}${item.selectedColor ? ` (${item.selectedColor})` : ""}</span>
          <span>${Shop.fmt(item.price * item.qty)}</span>
        </div>
      `).join("");
    }

    document.getElementById("country").addEventListener("change", updateSummary);
    document.getElementById("simulate-order").addEventListener("click", () => {
      const cart = Shop.getCart();
      if(!cart.length) { Shop.toast("Cart is empty"); return; }
      const orderRef = Shop.generateOrderRef();
      localStorage.setItem("lumio_last_order", orderRef);
      Shop.clearCart();
      Shop.toast(`Order ${orderRef} placed! (demo)`);
      setTimeout(() => { window.location.href = "success.html?ref=" + orderRef + "&status=success"; }, 800);
    });

    updateSummary();
    document.addEventListener("shop:cartUpdated", updateSummary);
    document.addEventListener("currency:changed", updateSummary);
  });
  </script>
</body>
</html>
