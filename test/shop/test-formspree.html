<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspree Test - Exact Same as embed-form.js</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; line-height: 1.6; }
    form { background: #f9f9f9; padding: 30px; border-radius: 12px; }
    input, textarea, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 1rem; }
    button { 
      background: #c8a96e; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600;
    }
    button:hover { background: #a88a50; }
    .result { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: 500; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <h1>Formspree Test (Exact same method as embed-form.js)</h1>
  <p><strong>Replace YOUR_REAL_FORM_ID with your actual Formspree ID</strong></p>

  <form id="testForm">
    <input type="hidden" name="_subject" value="Test Order from LUMIO">

    <label>Email:</label>
    <input type="email" name="email" value="test@example.com" required>

    <label>First Name:</label>
    <input type="text" name="first_name" value="Test" required>

    <label>Order Reference:</label>
    <input type="text" name="order_ref" value="LM-TEST-999" readonly>

    <label>Cart Items:</label>
    <textarea name="cart_items" rows="3">2× Arc Floor Lamp @ €299.00, 1× Globe Pendant @ €129.00</textarea>

    <label>Total:</label>
    <input type="text" name="total" value="€428.00" readonly>

    <button type="submit">Send Test to Formspree</button>
  </form>

  <div id="result" class="result"></div>

  <script>
    const form = document.getElementById('testForm');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      resultDiv.textContent = "Sending to Formspree...";
      resultDiv.className = "result";

      const payload = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/YOUR_REAL_FORM_ID', {   // ← CHANGE THIS LINE
          method: 'POST',
          body: payload,
          headers: { 
            'Accept': 'application/json' 
          }
        });

        if (response.ok) {
          resultDiv.innerHTML = `✅ <strong>Success!</strong><br>Formspree received the test order.<br>Check your Formspree dashboard or email inbox.`;
          resultDiv.className = "result success";
          console.log("✅ Test submission successful");
        } else {
          resultDiv.innerHTML = `❌ Failed with status: ${response.status}`;
          resultDiv.className = "result error";
        }
      } catch (err) {
        resultDiv.innerHTML = `❌ Fetch Error:<br>${err.message}<br><small>This usually means CORS or ad-blocker issue.</small>`;
        resultDiv.className = "result error";
        console.error("Fetch error:", err);
      }
    });
  </script>

</body>
</html>
