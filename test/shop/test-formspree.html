<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formspree Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
    form { background: #f9f9f9; padding: 30px; border-radius: 12px; }
    input, button { padding: 12px; margin: 8px 0; width: 100%; font-size: 1rem; }
    button { background: #c8a96e; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #a88a50; }
    .result { margin-top: 20px; padding: 15px; border-radius: 8px; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <h1>Formspree Test (Same as embed-form.js)</h1>
  <p>Make sure you replace <strong>YOUR_FORM_ID_HERE</strong> with your actual Formspree ID.</p>

  <form id="testForm">
    <input type="hidden" name="_subject" value="Test Order from LUMIO Shop">
    
    <label>Order Reference:</label>
    <input type="text" name="order_ref" value="LM-TEST-12345" readonly>

    <label>Email:</label>
    <input type="email" name="email" value="test@example.com" required>

    <label>First Name:</label>
    <input type="text" name="first_name" value="John" required>

    <label>Last Name:</label>
    <input type="text" name="last_name" value="Doe" required>

    <label>Cart Items:</label>
    <textarea name="cart_items" rows="4">2× Arc Floor Lamp @ €299.00
1× Globe Pendant @ €129.00</textarea>

    <label>Total:</label>
    <input type="text" name="total" value="€428.00" readonly>

    <button type="submit">Send Test to Formspree</button>
  </form>

  <div id="result" class="result"></div>

  <script>
    const form = document.getElementById('testForm');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      resultDiv.textContent = "Sending...";
      resultDiv.className = "result";

      const formData = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/YOUR_FORM_ID_HERE', {   // ← CHANGE THIS LINE
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        if (response.ok) {
          resultDiv.innerHTML = `<strong>✅ Success!</strong><br>Formspree received your test order.<br>Check your Formspree dashboard or email.`;
          resultDiv.className = "result success";
          console.log("✅ Test submission successful");
        } else {
          resultDiv.innerHTML = `<strong>❌ Failed</strong><br>Status: ${response.status}`;
          resultDiv.className = "result error";
        }
      } catch (err) {
        resultDiv.innerHTML = `<strong>❌ Fetch Error</strong><br>${err.message}<br><small>This is common when testing from localhost.</small>`;
        resultDiv.className = "result error";
        console.error("Fetch error:", err);
      }
    });
  </script>

</body>
</html>
