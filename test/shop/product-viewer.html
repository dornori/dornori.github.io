<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEBSHOP – Quick View</title>
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/product-viewer.css">
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--c-bg); color: var(--c-text); }

    .demo-header { background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
    .demo-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    .demo-header-inner { display: flex; justify-content: space-between; align-items: center; }
    .demo-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.08em; color: var(--c-text); text-decoration: none; }
    .demo-logo span { color: var(--c-accent); }

    .demo-hero { text-align: center; padding: 60px 0 40px; }
    .demo-hero h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); font-weight: 400; margin-bottom: 16px; }
    .demo-hero p { color: var(--c-text-3); font-size: 1rem; max-width: 600px; margin: 0 auto; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; padding: 40px 0 80px; }

    .product-viewer-trigger {
      background: var(--c-surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 1px 3px rgba(26,23,20,.08);
      border: 1px solid var(--c-border);
    }
    .product-viewer-trigger:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,23,20,.14); }

    .product-trigger-image { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

    .product-trigger-info { padding: 20px; text-align: center; }
    .product-trigger-name { font-family: var(--font-display); font-size: 1.15rem; font-weight: 400; margin-bottom: 6px; }
    .product-trigger-price { font-size: 1.05rem; font-weight: 600; color: var(--c-accent); margin-bottom: 14px; }

    .product-trigger-btn {
      display: inline-block; padding: 10px 24px;
      background: var(--c-text); color: var(--c-white);
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .product-trigger-btn:hover { background: var(--c-accent); transform: translateY(-1px); }

    .products-loading { text-align: center; padding: 60px; color: var(--c-text-3); font-size: 0.9rem; }

    .demo-footer { background: var(--c-text); color: var(--c-white); padding: 40px 0; text-align: center; margin-top: 40px; }
    .demo-footer p { font-size: 0.82rem; color: rgba(255,255,255,.45); }

    @media (max-width: 768px) { .products-grid { gap: 20px; } }
  </style>
</head>
<body>

  <header class="demo-header">
    <div class="demo-container">
      <div class="demo-header-inner">
        <a href="index.html" class="demo-logo">LUM<span>IO</span></a>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="webshop-lang-switcher" id="lang-switcher-slot"></div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="demo-container">
      <div class="demo-hero">
        <h1>Shop Our Collection</h1>
        <p>Click any product to see the Quick View overlay with magnifier, variants, bundle, and related products.</p>
      </div>
      <div class="products-grid" id="products-grid">
        <div class="products-loading">Loading products…</div>
      </div>
    </div>
  </main>

  <footer class="demo-footer">
    <div class="demo-container">
      <p>© 2025 WEBSHOP · Quick View overlay demo</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s = document.createElement("script"); s.src = src;
          s.onload = resolve; s.onerror = function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      /* load modules then product-viewer last so Shop is available */
      var modules = (CONFIG.modules || []).concat(["js/lang-bridge.js", "js/shop.js", "js/product-viewer.js"]);
      var chain = Promise.resolve();
      modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("webshop:ready")); });
    })();
  </script>
  <script>
  document.addEventListener("webshop:ready", async function() {

    /* ── Boot ── */
    if (typeof Currency !== "undefined") await Currency.init();
    await Shop.loadLang();
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    buildLangSwitcher();
    Shop.wireLanguageSwitcher(".webshop-lang-btn");

    /* ── Load products and render trigger grid ── */
    const allProducts = await Shop.loadProducts();
    /* Only show main lamp products in the grid (skip accessories) */
    const mainProducts = allProducts.filter(p => p.category !== "accessory");

    renderGrid(mainProducts);

    /* Re-render names/prices on lang or currency change */
    document.addEventListener("shop:langChanged", () => {
      buildLangSwitcher();
      Shop.wireLanguageSwitcher(".webshop-lang-btn");
      renderGrid(mainProducts);
    });
    document.addEventListener("currency:changed", () => renderGrid(mainProducts));

    function buildLangSwitcher() {
      const slot = document.getElementById("lang-switcher-slot"); if (!slot) return;
      const langs = CONFIG.supportedLanguages || ["en"];
      const cur   = CONFIG.language || "en";
      slot.innerHTML = langs.map(l =>
        `<button class="webshop-lang-btn${l === cur ? " active" : ""}" data-lang="${l}">${l.toUpperCase()}</button>`
      ).join("");
    }

    function renderGrid(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach(p => {
        const price = p.variants?.[0]?.price ?? p.price;
        const card  = document.createElement("div");
        card.className        = "product-viewer-trigger";
        card.dataset.productId = p.id;
        card.innerHTML = `
          <img class="product-trigger-image" src="${p.image}" alt="${Shop.pName(p)}"
            onerror="this.style.background='var(--c-bg-alt)'">
          <div class="product-trigger-info">
            <h3 class="product-trigger-name">${Shop.pName(p)}</h3>
            <div class="product-trigger-price">${Shop.fmt(price)}</div>
            <button class="product-trigger-btn">${Shop.t("quick_view","Quick View")}</button>
          </div>`;
        card.addEventListener("click", () => ProductViewer.openViewer(p.id));
        grid.appendChild(card);
      });

      /* Re-wire ProductViewer for any newly rendered triggers */
      if (typeof ProductViewer !== "undefined") ProductViewer.init(".product-viewer-trigger");
    }

  });
  </script>
</body>
</html>
