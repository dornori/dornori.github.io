<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori | UFO Midnight Black – Bundle & Save</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .bundle-hero { background: #1a1714; color: #c8a96e; padding: 50px 0; text-align: center; }
    .bundle-hero h1 { font-size: 3rem; font-family: 'DM Serif Display', serif; color: white; }
    .bundle-hero .save { font-size: 1.8rem; font-weight: bold; margin-top: 10px; }
    .promo-badge { background: #c8a96e; color: #1a1714; padding: 8px 24px; border-radius: 40px; display: inline-block; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>

<div class="bundle-hero">
  <div class="lumio-container">
    <h1>UFO Midnight Black</h1>
    <div class="save">✨ SAVE 10% ON BUNDLE ✨</div>
    <span class="promo-badge">Lamp + Dimmer + Bulb → €287 (was €319)</span>
  </div>
</div>

<header class="lumio-page-header">
  <div class="lumio-container">
    <div class="lumio-page-header__inner">
      <a href="#" class="lumio-logo">DORN<span>ORI</span></a>
      <div><div id="currency-slot"></div></div>
    </div>
  </div>
</header>

<main class="lumio-page-main">
  <div class="lumio-container"><div id="product-root"></div></div>
</main>

<script src="js/config.js"></script>
<script>
  (function(){
    function load(s){return new Promise(r=>{let script=document.createElement("script");script.src=s;script.onload=r;document.head.appendChild(script);});}
    let modules=(CONFIG.modules||[]).concat(["js/lang-bridge.js","js/shop.js"]);
    let p=Promise.resolve();modules.forEach(m=>{p=p.then(()=>load(m));});
    p.then(()=>document.dispatchEvent(new Event("ready")));
  })();
</script>
<script>
document.addEventListener("ready",async()=>{
  await Promise.all([Shipping.load(),Currency.init(),Shop.loadLang()]);
  Shop.renderCurrencySelector("#currency-slot");
  Shop.renderProductInfo("product-root","ufo-black-white");
});
</script>
</body>
</html>
