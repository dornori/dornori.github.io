<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">LUMIO – Arc Floor Lamp</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .pdp-magnifier {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      background: var(--c-surface);
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--c-accent);
      display: none;
    }
    .pdp-magnifier img {
      position: absolute;
      top: 0;
      left: 0;
      max-width: none;
      display: block;
    }
    .pdp-gallery__main-wrap {
      cursor: crosshair;
      position: relative;
      overflow: hidden;
    }
    .pdp-related-card__buy-btn {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .pdp-accordion-item .pdp-accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .pdp-accordion-item.open .pdp-accordion-body {
      max-height: 600px;
    }
    .pdp-accordion-item.open .pdp-accordion-trigger svg {
      transform: rotate(180deg);
    }
    [data-i18n] { cursor: default; }
  </style>
</head>
<body>

  <div class="pdp-magnifier" id="magnifier">
    <img id="magnifier-img" src="" alt="">
  </div>

  <div class="pdp-lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="pdp-lightbox__inner">
      <button class="pdp-lightbox__close" id="lightbox-close" aria-label="Close">✕</button>
      <div class="pdp-lightbox__tabs">
        <button class="pdp-lightbox__tab active" data-tab="images" data-i18n="images_tab">Images</button>
        <button class="pdp-lightbox__tab" data-tab="video" data-i18n="video_tab">Video</button>
      </div>
      <div class="pdp-lightbox__body">
        <div id="tab-images">
          <div class="pdp-lightbox-gallery">
            <div class="pdp-lightbox-main">
              <img id="lb-main-img" src="" alt="">
            </div>
            <div class="pdp-lightbox-thumbs" id="lb-thumbs"></div>
            <div class="pdp-lightbox-details" id="lb-details"></div>
          </div>
        </div>
        <div id="tab-video" style="display:none;">
          <div class="pdp-video-wrap" id="video-container"></div>
        </div>
      </div>
    </div>
  </div>

  <header class="lumio-page-header">
    <div class="lumio-container">
      <div class="lumio-page-header__inner">
        <a href="index.html" class="lumio-logo">LUM<span>IO</span></a>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="lumio-lang-switcher" id="lang-switcher-slot"></div>
          <div id="currency-selector-slot"></div>
          <div id="cart-icon-slot"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="lumio-page-main">
    <div class="lumio-container">
      <div class="pdp-wrapper">
        <div class="pdp-main lumio-fade-in" id="pdp-main-section">
          <div class="pdp-gallery" id="pdp-gallery">
            <div class="pdp-gallery__main-wrap" id="gallery-main-wrap">
              <img class="pdp-gallery__main-img" id="gallery-main-img" src="" alt="">
            </div>
            <div class="pdp-gallery__thumbs" id="gallery-thumbs"></div>
          </div>
          <div class="pdp-details" id="pdp-details">
            <p class="pdp-category" id="pdp-category"></p>
            <h1 class="pdp-name" id="pdp-name"></h1>
            <p class="pdp-price" id="pdp-price"></p>
            <p class="pdp-desc" id="pdp-desc"></p>
            <div id="pdp-variants-wrap">
              <p class="pdp-option-label" data-i18n="finish_label">Finish</p>
              <div class="pdp-variants" id="pdp-variants"></div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;">
              <div class="lumio-qty-control lumio-qty-control--lg">
                <button class="lumio-qty-btn lumio-qty-btn--minus" id="qty-minus">−</button>
                <span class="lumio-qty-val" id="qty-val">1</span>
                <button class="lumio-qty-btn lumio-qty-btn--plus" id="qty-plus">+</button>
              </div>
              <button class="lumio-btn lumio-btn--primary pdp-atc-btn" id="atc-btn" data-i18n="add_to_cart">Add to Cart</button>
            </div>
            <div class="pdp-perks" id="pdp-perks"></div>
          </div>
        </div>

        <div class="pdp-section lumio-fade-in lumio-fade-in-1">
          <h2 class="pdp-section-title" id="bundle-title" data-i18n="frequently_bought_together">Frequently Bought Together</h2>
          <div class="pdp-bundle-items-list" id="bundle-items"></div>
          <div class="pdp-bundle-actions">
            <button class="lumio-btn lumio-btn--primary pdp-bundle-add-all-btn" id="bundle-add-all" data-i18n="add_both_to_cart">Add Both to Cart</button>
          </div>
        </div>

        <div class="pdp-section lumio-fade-in lumio-fade-in-2">
          <h2 class="pdp-section-title" id="related-title" data-i18n="related_products_title">Products Related to This Item</h2>
          <div class="pdp-related-grid" id="related-grid"></div>
        </div>

        <div class="pdp-section lumio-fade-in lumio-fade-in-3">
          <div id="specs-accordion"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise(function(resolve) {
          var s=document.createElement("script"); s.src=src;
          s.onload=resolve; s.onerror=function(){ resolve(); };
          document.head.appendChild(s);
        });
      }
      var modules=(CONFIG.modules||[]).concat(["js/lang-bridge.js","js/shop.js"]);
      var chain=Promise.resolve();
      modules.forEach(function(src){ chain=chain.then(function(){ return loadScript(src); }); });
      chain.then(function(){ document.dispatchEvent(new Event("lumio:ready")); });
    })();
  </script>
  <script>
  const PRODUCT_ID = "arc-floor-lamp";
  let PRODUCT_DATA = null;
  let PRODUCT_LANG_DATA = null;
  
  const PRODUCT_IMAGES = [
    "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=800&q=80",
    "https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=800&q=80",
    "https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?w=800&q=80",
    "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800&q=80"
  ];
  
  const PRODUCT_VARIANTS = [
    { id: "matte-black", price: 249, stock: 8, image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=800&q=80" },
    { id: "brushed-gold", price: 279, stock: 4, image: "https://images.unsplash.com/photo-1524484485831-a92ffc0de03f?w=800&q=80" }
  ];
  
  const PRODUCT_BUNDLED = [
    { id: "dimmer-switch", price: 24, weight: 0.1, image: "https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=400&q=80" },
    { id: "replacement-bulb-e27", price: 12, weight: 0.05, image: "https://images.unsplash.com/photo-1573833040204-4e8b9f53bef3?w=400&q=80" }
  ];
  
  const PRODUCT_RELATED = [
    { id: "globe-pendant", price: 139, image: "https://images.unsplash.com/photo-1565814329452-e1efa11c5b89?w=400&q=80" },
    { id: "half-moon-sconce", price: 195, image: "https://images.unsplash.com/photo-1540932239986-30128078f3c5?w=400&q=80" },
    { id: "concrete-desk-lamp", price: 89, image: "https://images.unsplash.com/photo-1544457070-4cd773b4d71e?w=400&q=80" }
  ];

  document.addEventListener("lumio:ready", async function() {
    if (typeof Shop === "undefined") return;
    
    await Shop.loadLang();
    
    const langData = Shop.PRODUCT_LANG || {};
    PRODUCT_LANG_DATA = langData[PRODUCT_ID] || {};
    
    PRODUCT_DATA = {
      id: PRODUCT_ID,
      name: Shop.pName({ id: PRODUCT_ID }) || "Product",
      description: Shop.pDesc({ id: PRODUCT_ID }) || "",
      category: Shop.pCategory({ id: PRODUCT_ID }) || "",
      price: 249,
      weight: 4.2,
      stock: 12,
      image: PRODUCT_IMAGES[0],
      images: PRODUCT_IMAGES,
      variants: PRODUCT_VARIANTS,
      bundled: PRODUCT_BUNDLED,
      related: PRODUCT_RELATED
    };
    
    Shop.wireLanguageSwitcher(".lumio-lang-btn");
    Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false });
    Shop.renderCurrencySelector("#currency-selector-slot");
    buildLangSwitcher();
    applyI18n();
    renderAllContent();
  });

  function buildLangSwitcher() {
    const slot = document.getElementById("lang-switcher-slot");
    if (!slot) return;
    const langs = CONFIG.supportedLanguages || ["en"], current = CONFIG.language || "en";
    slot.innerHTML = langs.map(l=>`<button class="lumio-lang-btn${l===current?" active":""}" data-lang="${l}">${l.toUpperCase()}</button>`).join("");
    document.querySelectorAll(".lumio-lang-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const code = btn.dataset.lang;
        await Shop.switchLanguage(code);
        location.reload();
      });
    });
  }

  function applyI18n() {
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const v = Shop.t(el.dataset.i18n);
      if (v) el.textContent = v;
    });
  }

  function fmt(price) {
    if (typeof Shop !== "undefined" && Shop.fmt) return Shop.fmt(price);
    return "€" + price.toFixed(2);
  }

  function renderAllContent() {
    document.getElementById("pdp-category").textContent = PRODUCT_DATA.category;
    document.getElementById("pdp-name").textContent = PRODUCT_DATA.name;
    document.getElementById("pdp-desc").textContent = PRODUCT_DATA.description;
    document.getElementById("pdp-price").textContent = fmt(PRODUCT_DATA.price);
    document.title = `LUMIO – ${PRODUCT_DATA.name}`;
    document.getElementById("gallery-main-img").src = PRODUCT_DATA.images[0];
    
    renderThumbs();
    renderVariants();
    renderPerks();
    renderBundle();
    renderRelated();
    renderSpecsAccordion();
    initMagnifier();
    initLightbox();
    initCart();
  }

  function renderThumbs() {
    const thumbsWrap = document.getElementById("gallery-thumbs");
    thumbsWrap.innerHTML = PRODUCT_DATA.images.map((src, i) => `
      <img class="pdp-gallery__thumb${i === 0 ? " active" : ""}" src="${src}" alt="View ${i+1}" data-idx="${i}">
    `).join("");
    thumbsWrap.querySelectorAll(".pdp-gallery__thumb").forEach(img => {
      img.addEventListener("click", () => {
        const idx = +img.dataset.idx;
        document.getElementById("gallery-main-img").src = PRODUCT_DATA.images[idx];
        document.querySelectorAll(".pdp-gallery__thumb").forEach(t => t.classList.remove("active"));
        img.classList.add("active");
        const highSrc = PRODUCT_DATA.images[idx].replace('w=800', 'w=1600');
        document.getElementById("magnifier-img").src = highSrc;
      });
    });
  }

  function renderVariants() {
    const variantsEl = document.getElementById("pdp-variants");
    if (!PRODUCT_DATA.variants || PRODUCT_DATA.variants.length === 0) {
      variantsEl.style.display = "none";
      return;
    }
    const variantLabels = PRODUCT_LANG_DATA.variants || {};
    variantsEl.innerHTML = PRODUCT_DATA.variants.map(v => `
      <button class="pdp-variant-btn${v.id === PRODUCT_DATA.variants[0].id ? " active" : ""}" data-vid="${v.id}">${variantLabels[v.id] || v.id}</button>
    `).join("");
  }

  function renderPerks() {
    const perksEl = document.getElementById("pdp-perks");
    const perks = PRODUCT_LANG_DATA.perks || {};
    const defaultPerks = {
      free_shipping: "Free shipping over €150",
      returns: "30-day returns",
      warranty: "2-year warranty"
    };
    perksEl.innerHTML = `
      <span>${perks.free_shipping || defaultPerks.free_shipping}</span>
      <span>${perks.returns || defaultPerks.returns}</span>
      <span>${perks.warranty || defaultPerks.warranty}</span>
    `;
  }

  function renderBundle() {
    const bundleEl = document.getElementById("bundle-items");
    const bundleItems = PRODUCT_LANG_DATA.bundle_items || [];
    if (bundleItems.length === 0) {
      document.querySelector(".pdp-section.lumio-fade-in-1").style.display = "none";
      return;
    }
    bundleEl.innerHTML = bundleItems.map((item, i) => `
      <div class="pdp-bundle-item">
        <img src="${PRODUCT_BUNDLED[i]?.image || ''}" alt="${item.name}" onerror="this.style.background='var(--c-bg-alt)'">
        <div class="pdp-bundle-item__info">
          <div class="pdp-bundle-item__name">${item.name}</div>
          <div class="pdp-bundle-item__price">${fmt(PRODUCT_BUNDLED[i]?.price || 0)} · ${item.desc || ""}</div>
        </div>
      </div>
    `).join("");
  }

  function renderRelated() {
    const relatedEl = document.getElementById("related-grid");
    const relatedNames = PRODUCT_LANG_DATA.related_names || {};
    const buyNowText = "BUY NOW";
    relatedEl.innerHTML = PRODUCT_RELATED.map(r => `
      <div class="pdp-related-card">
        <div class="pdp-related-card__img-wrap">
          <img src="${r.image}" alt="${relatedNames[r.id] || r.id}">
          <div class="pdp-related-card__overlay">
            <button class="pdp-related-card__buy-btn" data-rid="${r.id}" data-rname="${relatedNames[r.id] || r.id}" data-rprice="${r.price}">${buyNowText}</button>
          </div>
        </div>
        <div class="pdp-related-card__info">
          <div class="pdp-related-card__name">${relatedNames[r.id] || r.id}</div>
          <div class="pdp-related-card__price">${fmt(r.price)}</div>
        </div>
      </div>
    `).join("");
    
    relatedEl.querySelectorAll(".pdp-related-card__buy-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (typeof Shop === "undefined") return;
        const item = { id: btn.dataset.rid, name: btn.dataset.rname, price: +btn.dataset.rprice, weight: 1, image: btn.closest('.pdp-related-card')?.querySelector('img')?.src, stock: 99 };
        Shop.addToCart(item, 1);
        Shop.toast(`${item.name} added to cart`);
      });
    });
  }

  function renderSpecsAccordion() {
    const accordionEl = document.getElementById("specs-accordion");
    const sections = PRODUCT_LANG_DATA.specs_sections || {};
    const specs = PRODUCT_LANG_DATA.specs || {};
    
    let accordionHtml = "";
    for (const [sectionKey, sectionTitle] of Object.entries(sections)) {
      const sectionSpecs = specs[sectionKey] || {};
      const specRows = Object.entries(sectionSpecs).filter(([_, value]) => value && value.trim() !== "");
      
      if (specRows.length === 0) continue;
      
      accordionHtml += `
        <div class="pdp-accordion-item">
          <button class="pdp-accordion-trigger">
            <span>${sectionTitle}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="pdp-accordion-body">
            <table class="pdp-spec-table">
              <tbody>
                ${specRows.map(([key, value]) => {
                  const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                  return `<tr><td>${label}</td><td>${value}</td></tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }
    
    if (accordionHtml === "") {
      accordionEl.innerHTML = '<p style="padding:20px;text-align:center;color:var(--c-text-3);">No specifications available.</p>';
    } else {
      accordionEl.innerHTML = accordionHtml;
    }
    
    accordionEl.querySelectorAll(".pdp-accordion-trigger").forEach(btn => {
      btn.addEventListener("click", () => {
        btn.closest(".pdp-accordion-item").classList.toggle("open");
      });
    });
  }

  function initMagnifier() {
    const magEl = document.getElementById("magnifier");
    const magImg = document.getElementById("magnifier-img");
    const mainWrap = document.getElementById("gallery-main-wrap");
    const mainImg = document.getElementById("gallery-main-img");
    
    let highResSrc = mainImg.src;
    if (highResSrc.includes('w=800')) highResSrc = highResSrc.replace('w=800', 'w=1600');
    magImg.src = highResSrc;
    
    function updateMagnifierSize() {
      const rect = mainWrap.getBoundingClientRect();
      const maxSize = Math.min(window.innerWidth * 0.4, 500);
      const size = Math.min(maxSize, rect.width * 1.2);
      magEl.style.width = size + "px";
      magEl.style.height = size + "px";
    }
    
    mainWrap.addEventListener("mousemove", (e) => {
      const rect = mainWrap.getBoundingClientRect();
      const xPct = (e.clientX - rect.left) / rect.width;
      const yPct = (e.clientY - rect.top) / rect.height;
      
      updateMagnifierSize();
      const lensW = magEl.offsetWidth;
      const lensH = magEl.offsetHeight;
      
      let mLeft = rect.right + 20;
      let mTop = rect.top + (rect.height / 2) - (lensH / 2);
      if (mLeft + lensW > window.innerWidth - 20) mLeft = rect.left - lensW - 20;
      mLeft = Math.max(10, Math.min(mLeft, window.innerWidth - lensW - 10));
      mTop = Math.max(10, Math.min(mTop, window.innerHeight - lensH - 10));
      
      magEl.style.left = mLeft + "px";
      magEl.style.top = mTop + "px";
      magEl.style.display = "block";
      
      const naturalW = magImg.naturalWidth;
      const naturalH = magImg.naturalHeight;
      if (naturalW && naturalH) {
        const zoom = 4;
        magImg.style.width = (naturalW * zoom) + "px";
        magImg.style.height = (naturalH * zoom) + "px";
        magImg.style.left = -(xPct * naturalW * zoom - lensW / 2) + "px";
        magImg.style.top = -(yPct * naturalH * zoom - lensH / 2) + "px";
      }
    });
    
    mainWrap.addEventListener("mouseleave", () => { magEl.style.display = "none"; });
    window.addEventListener('resize', updateMagnifierSize);
  }

  function initLightbox() {
    const lightbox = document.getElementById("lightbox");
    const mainWrap = document.getElementById("gallery-main-wrap");
    
    mainWrap.addEventListener("click", () => {
      document.getElementById("lb-main-img").src = document.getElementById("gallery-main-img").src;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    });
    
    document.getElementById("lightbox-close").addEventListener("click", () => {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    });
    
    lightbox.addEventListener("click", (e) => { if(e.target === lightbox) lightbox.classList.remove("open"); });
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") lightbox.classList.remove("open"); });
  }

  function initCart() {
    let qty = 1;
    const qtyVal = document.getElementById("qty-val");
    document.getElementById("qty-minus").addEventListener("click", () => { if(qty > 1){ qty--; qtyVal.textContent = qty; } });
    document.getElementById("qty-plus").addEventListener("click", () => { if(qty < PRODUCT_DATA.stock){ qty++; qtyVal.textContent = qty; } });
    document.getElementById("atc-btn").addEventListener("click", () => {
      if (typeof Shop !== "undefined") {
        Shop.addToCart(PRODUCT_DATA, qty, null, null, PRODUCT_DATA.image);
        Shop.toast(`${PRODUCT_DATA.name} added to cart`);
      }
    });
    document.getElementById("bundle-add-all")?.addEventListener("click", () => {
      if (typeof Shop !== "undefined") {
        Shop.addToCart(PRODUCT_DATA, 1);
        PRODUCT_BUNDLED.forEach(b => { Shop.addToCart({ id: b.id, name: b.id, price: b.price, weight: b.weight, image: b.image, stock: 99 }, 1); });
        Shop.toast(`${PRODUCT_DATA.name} + bundle added to cart`);
      }
    });
  }
  </script>
</body>
</html>
