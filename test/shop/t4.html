<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori | UFO Space Blue – Technical Specs</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .tech-hero { background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%); color: white; padding: 60px 0; text-align: center; }
    .tech-hero h1 { font-size: 2.8rem; font-family: 'DM Serif Display', serif; }
    .spec-highlight { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
    .spec-highlight div { text-align: center; }
    .spec-highlight .number { font-size: 2rem; font-weight: bold; color: #c8a96e; }
    .spec-highlight .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    .note { background: #f5f0ea; padding: 20px; text-align: center; margin: 40px 0; border-radius: 16px; }
  </style>
</head>
<body>

<div class="tech-hero">
  <div class="lumio-container">
    <h1>UFO Space Blue</h1>
    <p>Engineered for the elements · Designed for life outdoors</p>
    <div class="spec-highlight">
      <div><div class="number">IP65</div><div class="label">Weather Rating</div></div>
      <div><div class="number">45-150cm</div><div class="label">Height Range</div></div>
      <div><div class="number">3000K</div><div class="label">Warm Light</div></div>
      <div><div class="number">12W</div><div class="label">Power</div></div>
    </div>
  </div>
</div>

<header class="lumio-page-header">
  <div class="lumio-container">
    <div class="lumio-page-header__inner">
      <a href="#" class="lumio-logo">DORN<span>ORI</span></a>
      <div><div id="currency-slot"></div></div>
    </div>
  </div>
</header>

<main class="lumio-page-main">
  <div class="lumio-container">
    <div class="note">💡 Pro tip: Pair with our inline dimmer for full brightness control (1–100%)</div>
    <div id="product-root"></div>
  </div>
</main>

<script src="js/config.js"></script>
<script>
  (function(){
    function load(s){return new Promise(r=>{let script=document.createElement("script");script.src=s;script.onload=r;document.head.appendChild(script);});}
    let modules=(CONFIG.modules||[]).concat(["js/lang-bridge.js","js/shop.js"]);
    let p=Promise.resolve();modules.forEach(m=>{p=p.then(()=>load(m));});
    p.then(()=>document.dispatchEvent(new Event("ready")));
  })();
</script>
<script>
document.addEventListener("ready",async()=>{
  await Promise.all([Shipping.load(),Currency.init(),Shop.loadLang()]);
  Shop.renderCurrencySelector("#currency-slot");
  Shop.renderProductInfo("product-root","ufo-blue-blue");
  
  // Auto-open all accordion items after render
  setTimeout(() => {
    document.querySelectorAll(".pdp-accordion-trigger").forEach(btn => btn.click());
  }, 500);
});
</script>
</body>
</html>
