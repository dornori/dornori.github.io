<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori | UFO Red Phantom – Full Experience</title>
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .hero { background: #0a0a0a; color: white; padding: 80px 0; text-align: center; }
    .hero h1 { font-size: 3.5rem; font-family: 'DM Serif Display', serif; }
    .hero p { color: #aaa; max-width: 500px; margin: 20px auto; }
    .badge { background: #c8a96e; color: #0a0a0a; padding: 4px 16px; border-radius: 40px; display: inline-block; font-size: 0.75rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="hero">
  <div class="lumio-container">
    <span class="badge">✦ TRANSFORMABLE DESIGN ✦</span>
    <h1>UFO Red Phantom</h1>
    <p>Telescopic outdoor lamp · 45cm → 150cm · Weatherproof · LED integrated</p>
  </div>
</div>

<header class="lumio-page-header">
  <div class="lumio-container">
    <div class="lumio-page-header__inner">
      <a href="#" class="lumio-logo">DORN<span>ORI</span></a>
      <div style="display:flex;gap:12px;"><div id="lang-switcher-slot"></div><div id="currency-slot"></div></div>
    </div>
  </div>
</header>

<main class="lumio-page-main">
  <div class="lumio-container"><div id="product-root"></div></div>
</main>

<script src="js/config.js"></script>
<script>
  (function(){
    function load(s){return new Promise(r=>{let script=document.createElement("script");script.src=s;script.onload=r;document.head.appendChild(script);});}
    let modules=(CONFIG.modules||[]).concat(["js/lang-bridge.js","js/shop.js"]);
    let p=Promise.resolve();modules.forEach(m=>{p=p.then(()=>load(m));});
    p.then(()=>document.dispatchEvent(new Event("ready")));
  })();
</script>
<script>
document.addEventListener("ready",async()=>{
  await Promise.all([Shipping.load(),Currency.init(),Shop.loadLang()]);
  Shop.renderCurrencySelector("#currency-slot");
  Shop.renderProductInfo("product-root","ufo-red-white");
});
</script>
</body>
</html>
