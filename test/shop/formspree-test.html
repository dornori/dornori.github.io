<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO — Formspree + Turnstile Test (0x4AAAAAACxsga5y-bJ_qkzC)</title>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>

  <style>
    :root {
      --c-bg:       #0f0e0c;
      --c-surface:  #1a1916;
      --c-border:   #2e2b26;
      --c-accent:   #c8a96e;
      --c-accent-d: #a3834a;
      --c-text:     #f0ebe2;
      --c-text-2:   #b5ad9f;
      --c-text-3:   #756d61;
      --c-ok:       #4a9c6d;
      --c-warn:     #c8a96e;
      --c-err:      #c05050;
      --font-mono:  "JetBrains Mono", monospace;
      --radius:     8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 40px 20px;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 8px; color: var(--c-accent); }
    .subtitle { color: var(--c-text-3); margin-bottom: 24px; font-size: 0.85rem; }

    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--c-text-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .field input, .field select {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--c-text);
      font-family: var(--font-mono);
    }
    .field input:focus { border-color: var(--c-accent); outline: none; }

    #turnstile-container {
      min-height: 70px;
      margin: 20px 0;
    }

    .btn {
      background: var(--c-accent);
      color: #0f0e0c;
      border: none;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: var(--radius);
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .log {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.6;
      margin-top: 20px;
    }
    .log-line { margin-bottom: 6px; }
    .ok  { color: var(--c-ok); }
    .err { color: var(--c-err); }
    .warn { color: var(--c-warn); }
  </style>
</head>
<body>

<div class="container">

  <div class="card">
    <h1>LUMIO Formspree + Turnstile Test</h1>
    <p class="subtitle">Click "Run Test" to render Turnstile and send a test submission to Formspree.</p>

    <div class="field">
      <label>Formspree Form ID</label>
      <input id="form-id" type="text" value="xwvaleqz" placeholder="xwvaleqz">
    </div>

    <div class="field">
      <label>Turnstile Site Key</label>
      <input id="sitekey" type="text" value="0x4AAAAAACxsga5y-bJ_qkzC" placeholder="0x4AAAAAACxsga5y-bJ_qkzC">
      <small style="color:#756d61; font-size:0.75rem;">
        Use <code>1x00000000000000000000AA</code> = always pass<br>
        Use <code>2x00000000000000000000AB</code> = always block
      </small>
    </div>

    <div id="turnstile-container"></div>

    <button id="test-btn" class="btn">▶ Run Test</button>
  </div>

  <div class="card">
    <h2 style="font-size:1rem; margin-bottom:12px;">Live Log</h2>
    <div id="log" class="log"></div>
  </div>

</div>

<script>
  let currentWidgetId = null;

  function log(message, type = "") {
    const logEl = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    const line = document.createElement("div");
    line.className = `log-line ${type}`;
    line.innerHTML = `<strong>[${time}]</strong> ${message}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLog() {
    document.getElementById("log").innerHTML = "";
  }

  async function runTest() {
    const btn = document.getElementById("test-btn");
    const formId = document.getElementById("form-id").value.trim();
    const sitekey = document.getElementById("sitekey").value.trim();
    const endpoint = `https://formspree.io/f/${formId}`;

    if (!formId) {
      log("❌ Please enter a Formspree Form ID", "err");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Running test...";
    clearLog();

    log("🚀 Starting Formspree + Turnstile test...", "ok");
    log(`Endpoint: ${endpoint}`);

    const container = document.getElementById("turnstile-container");
    container.innerHTML = "";

    // Wait for Turnstile SDK
    if (typeof window.turnstile === "undefined") {
      log("Waiting for Turnstile script to load...", "warn");
      await new Promise(resolve => {
        const check = setInterval(() => {
          if (typeof window.turnstile !== "undefined") {
            clearInterval(check);
            resolve();
          }
        }, 200);
      });
    }

    log("✅ Turnstile SDK ready");

    // Render widget
    log("Rendering Turnstile widget...");
    currentWidgetId = window.turnstile.render(container, {
      sitekey: sitekey,
      theme: "dark",
      callback: async (token) => {
        log(`✅ Turnstile passed! Token received: ${token.substring(0, 30)}...`, "ok");
        await submitToFormspree(endpoint, token);
      },
      "error-callback": () => {
        log("❌ Turnstile error occurred", "err");
        btn.disabled = false;
        btn.textContent = "▶ Run Test Again";
      },
      "expired-callback": () => {
        log("⚠️ Turnstile token expired", "warn");
        btn.disabled = false;
        btn.textContent = "▶ Run Test Again";
      }
    });

    log("👀 Please complete the captcha challenge above");
  }

  async function submitToFormspree(endpoint, token) {
    const btn = document.getElementById("test-btn");

    const formData = new FormData();
    formData.append("_subject", "[TEST] Formspree + Turnstile from LUMIO");
    formData.append("test_source", "formspree-test-fixed.html");
    formData.append("test_timestamp", new Date().toISOString());
    formData.append("message", "This is a test submission from the fixed test page.");
    if (token) formData.append("cf-turnstile-response", token);

    log("Sending POST to Formspree...");

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      const result = await response.json().catch(() => ({}));

      if (response.ok) {
        log("🎉 SUCCESS! Submission accepted by Formspree", "ok");
        log("✅ Check your Formspree dashboard / email inbox", "ok");
      } else {
        log(`❌ Formspree rejected: ${response.status} ${result?.errors ? JSON.stringify(result.errors) : ''}`, "err");
      }
    } catch (err) {
      log(`❌ Network error: ${err.message}`, "err");
      log("Note: On localhost CORS may block it. Deploy to Netlify/Vercel for real test.", "warn");
    }

    btn.disabled = false;
    btn.textContent = "▶ Run Test Again";
  }

  // Attach button
  document.getElementById("test-btn").addEventListener("click", runTest);

  // Auto log on load
  log("Page loaded. Ready to test.", "ok");
</script>

</body>
</html>
