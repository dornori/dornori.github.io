<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Formspree Test</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>

<style>
body { font-family: monospace; background:#111; color:#eee; padding:40px; }
button { padding:10px 20px; }
#log { margin-top:20px; white-space:pre-wrap; }
</style>
</head>
<body>

<h2>Formspree Test</h2>

<div id="captcha"></div>
<button onclick="run()">Run Test</button>

<div id="log"></div>

<script>
function log(msg){
  document.getElementById("log").textContent += msg + "\n";
}

function run(){
  log("Starting...");

  const sitekey = "1x00000000000000000000AA";
  const endpoint = "https://formspree.io/f/xwvaleqz";

  document.getElementById("captcha").innerHTML = "";

  turnstile.render("#captcha", {
    sitekey,
    callback: (token) => {
      log("Captcha OK");
      send(token, endpoint);
    }
  });
}

async function send(token, endpoint){
  const payload = {
    _subject: "TEST",
    test: "hello world",
    "cf-turnstile-response": token
  };

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(()=>({}));

    log("Status: " + res.status);

    if(res.ok){
      log("SUCCESS ✅");
    } else {
      log("ERROR ❌ " + JSON.stringify(data));
    }

  } catch(err){
    log("NETWORK ERROR: " + err.message);
  }
}
</script>

</body>
</html>
