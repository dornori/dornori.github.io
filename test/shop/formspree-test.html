<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO — Formspree + Turnstile Connection Test</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
</head>
<body>

<button onclick="startTest()">Run Test</button>
<div id="log"></div>

<script>
function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
}

/* ── Main test flow ── */
function startTest() {
  const endpoint  = "https://formspree.io/f/xwvaleqz";

  if (typeof window.turnstile === "undefined") {
    log("Turnstile not loaded");
    return;
  }

  turnstile.render(document.body, {
    sitekey: "1x00000000000000000000AA",
    callback: (token) => {
      log("Captcha OK");
      submitToFormspree(endpoint, "[TEST]", token);
    }
  });
}

/* ── FIXED FUNCTION ── */
async function submitToFormspree(endpoint, subject, token) {

  const ts = new Date().toISOString();

  const payload = {
    _subject: subject,
    test_timestamp: ts,
    test_source: "formspree-test.html",
    test_note: "This is an automated test",
    ...(token && { "cf-turnstile-response": token })
  };

  log("Sending...");

  try {
    const response = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const body = await response.json().catch(() => ({}));

    log("Status: " + response.status);

    if (response.ok) {
      log("SUCCESS ✅");
    } else {
      log("ERROR ❌ " + JSON.stringify(body));
    }

  } catch (err) {
    log("NETWORK ERROR: " + err.message);
  }
}
</script>

</body>
</html>
