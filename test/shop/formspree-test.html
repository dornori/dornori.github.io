<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIO — Formspree + Turnstile Connection Test</title>

  <!-- Cloudflare Turnstile - MUST load before any Turnstile code -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    :root {
      --c-bg:       #0f0e0c;
      --c-surface:  #1a1916;
      --c-border:   #2e2b26;
      --c-accent:   #c8a96e;
      --c-accent-d: #a3834a;
      --c-text:     #f0ebe2;
      --c-text-2:   #b5ad9f;
      --c-text-3:   #756d61;
      --c-ok:       #4a9c6d;
      --c-warn:     #c8a96e;
      --c-err:      #c05050;
      --font-mono:  "JetBrains Mono", "Fira Mono", "Courier New", monospace;
      --radius:     8px;
      --transition: 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 40px 16px 60px;
    }

    .page { width: 100%; max-width: 700px; }

    /* Header */
    .hd {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .logo {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--c-accent);
      text-transform: uppercase;
    }
    .hd-sep { flex: 1; height: 1px; background: var(--c-border); }
    .hd-badge {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-text-3);
      border: 1px solid var(--c-border);
      padding: 3px 9px;
      border-radius: 100px;
    }

    /* Card */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--c-text-3);
      margin-bottom: 20px;
    }

    /* Form fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--c-text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--c-text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .field input:focus { border-color: var(--c-accent); }
    .field .hint {
      font-size: 0.7rem;
      color: var(--c-text-3);
      margin-top: 5px;
      line-height: 1.5;
    }
    .field .hint code {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.7rem;
    }

    /* Turnstile container */
    #turnstile-wrap {
      min-height: 0;
      margin-bottom: 20px;
      transition: min-height 0.2s;
      display: flex;
      justify-content: center;
    }
    #turnstile-wrap.has-widget { min-height: 68px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }
    .btn--primary {
      background: var(--c-accent);
      color: #0f0e0c;
      width: 100%;
      justify-content: center;
    }
    .btn--primary:hover:not(:disabled) { background: var(--c-accent-d); }
    .btn--primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn--ghost {
      background: transparent;
      color: var(--c-text-3);
      border: 1px solid var(--c-border);
      font-size: 0.75rem;
      padding: 7px 14px;
    }
    .btn--ghost:hover { border-color: var(--c-text-3); color: var(--c-text); }

    /* Log terminal */
    .log {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      max-height: 320px;
      overflow-y: auto;
      margin-top: 0;
      font-size: 0.78rem;
      line-height: 1.75;
    }
    .log:empty::before {
      content: "▸ Waiting for test run…";
      color: var(--c-text-3);
    }
    .log-line { display: flex; gap: 10px; font-family: monospace; }
    .log-line .ts { color: var(--c-text-3); flex-shrink: 0; }
    .log-line .msg { color: var(--c-text-2); }
    .log-line.ok .msg { color: var(--c-ok); }
    .log-line.err .msg { color: var(--c-err); }
    .log-line.warn .msg { color: var(--c-warn); }
    .log-line.head .msg { color: var(--c-text); font-weight: 600; }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--c-border);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c-text-3);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.ok  { background: var(--c-ok); box-shadow: 0 0 6px var(--c-ok); }
    .status-dot.err { background: var(--c-err); box-shadow: 0 0 6px var(--c-err); }
    .status-dot.spin {
      background: var(--c-accent);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
