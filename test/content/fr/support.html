<style>
  .support-iframe-wrap { width: 100%; border: none; margin: 0; padding: 0; }
  .support-iframe-wrap iframe {
    width: 100%; border: none;
    min-height: 680px;
    display: block;
    transition: height 0.2s ease;
  }
</style>

<div class="support-iframe-wrap">
  <iframe
    id="support-form-frame"
    src=""
    title="Dornori Support"
    scrolling="no"
    allowtransparency="true">
  </iframe>
</div>

<script>
(function () {
  var frame = document.getElementById('support-form-frame');
  if (!frame) return;

  var LANG_KEY  = 'dornori-lang';
  var THEME_KEY = 'dornori-theme';

  function getLang()  { return localStorage.getItem(LANG_KEY)  || document.documentElement.lang || 'en'; }
  function getTheme() { return localStorage.getItem(THEME_KEY) || document.documentElement.getAttribute('data-theme') || 'cutting-mat'; }

  function buildSrc() {
    return '/test/form.html?lang=' + encodeURIComponent(getLang()) + '&theme=' + encodeURIComponent(getTheme());
  }

  // Set initial src
  frame.src = buildSrc();

  // Auto-resize to content
  function applyHeight(h) {
    if (h && h > 200) frame.style.height = h + 'px';
  }
  frame.addEventListener('load', function () {
    setTimeout(function () {
      try { applyHeight(frame.contentWindow.document.body.scrollHeight); } catch(e) {}
    }, 300);
  });

  // Listen for height + resolved messages from iframe
  window.addEventListener('message', function (e) {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'dornori-support-height') {
      applyHeight(e.data.height);
    }
    if (e.data.type === 'dornori-support-resolved') {
      // Navigate shell to home when iframe reports resolution
      if (typeof window.showHome === 'function') window.showHome();
    }
  });

  // ── Theme relay ──────────────────────────────────────────────────────────
  // Watch profileSelect changes in parent shell and forward to iframe
  function relayTheme(theme) {
    if (frame.contentWindow) {
      try {
        frame.contentWindow.postMessage({ type: 'dornori-theme-change', theme: theme }, '*');
      } catch(e) {}
    }
  }

  function relayLang(lang) {
    if (frame.contentWindow) {
      try {
        frame.contentWindow.postMessage({ type: 'dornori-lang-change', lang: lang }, '*');
      } catch(e) {}
    }
  }

  // Observe profileSelect in the document (nav-loader renders it into topBar)
  function attachProfileListener() {
    var sel = document.getElementById('profileSelect');
    if (sel && !sel.__supportRelayAttached) {
      sel.addEventListener('change', function () { relayTheme(sel.value); });
      sel.__supportRelayAttached = true;
    }
  }

  // MutationObserver picks up when nav-loader injects topBar content
  if (typeof MutationObserver !== 'undefined') {
    var observer = new MutationObserver(function () { attachProfileListener(); });
    observer.observe(document.body, { childList: true, subtree: true });
  }
  // Also try immediately (in case nav rendered before this script runs)
  attachProfileListener();

  // Intercept localStorage writes so theme/lang changes hit the iframe
  // even when triggered programmatically (not via the select element)
  var _origSet = Storage.prototype.setItem;
  Storage.prototype.setItem = function (key, value) {
    _origSet.call(this, key, value);
    if (key === THEME_KEY) relayTheme(value);
    if (key === LANG_KEY)  relayLang(value);
  };

  // ── data-theme attribute observer on <html> ─────────────────────────────
  // nav-loader sets data-theme directly on document.documentElement; catch that too
  if (typeof MutationObserver !== 'undefined') {
    new MutationObserver(function (mutations) {
      mutations.forEach(function (m) {
        if (m.attributeName === 'data-theme') {
          relayTheme(document.documentElement.getAttribute('data-theme'));
        }
        if (m.attributeName === 'lang') {
          relayLang(document.documentElement.getAttribute('lang'));
        }
      });
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme', 'lang'] });
  }
})();
</script>
