<!DOCTYPE html>
<html>
  <head>
    <title>Turnstile AJAX Demo</title>
    <!-- Turnstile script -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <form id="form" method="POST" action="https://formspree.io/f/xwvaleqz">
      <input type="email" name="email" placeholder="email@example.com" required />

      <!-- Turnstile widget (automatically adds hidden cf-turnstile-response input) -->
      <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC"></div>

      <br />
      <button type="submit">Submit</button>
    </form>

   <script>
  const form = document.getElementById("form");

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    // Get the Turnstile response token
    const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
    
    if (!turnstileToken) {
      console.error("Please complete the Turnstile challenge");
      alert("Please complete the security check first");
      return;
    }

    // Prepare data as JSON (what Formspore expects for fetch)
    const formData = {
      email: form.email.value,
      "cf-turnstile-response": turnstileToken
    };

    fetch(form.action, {
      method: "POST",
      headers: {
        "Accept": "application/json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(formData)
    })
    .then(function (response) {
      if (response.ok) {
        return response.json();
      }
      throw new Error("Form submission failed");
    })
    .then(function (data) {
      console.log("Formspree response:", data);
      alert("Success! Form submitted.");
      form.reset();
      // Reset Turnstile widget for next submission
      if (typeof turnstile !== 'undefined') {
        turnstile.reset();
      }
    })
    .catch(function (error) {
      console.error("Error:", error);
      alert("Submission failed. Please try again.");
    });
  });
</script>
  </body>
</html>
