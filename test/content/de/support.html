<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Support</title>
    <style>
        /* Support form — uses parent shell's CSS variable tokens from profiles.css */
        .sf-wrap        { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--text); }
        .sf-header      { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #000 45%) 100%);
                          padding: 2rem; border-radius: 1.25rem 1.25rem 0 0; color: #fff; display:flex; align-items:center; gap:1rem; }
        .sf-header i    { font-size: 2.25rem; }
        .sf-body        { background: var(--glass); border: 1px solid var(--border); border-top:none;
                          border-radius: 0 0 1.25rem 1.25rem; padding: 2rem; }
        .sf-progress-track { height:.5rem; background:color-mix(in srgb,var(--border) 50%,transparent 50%);
                             border-radius:9999px; overflow:hidden; margin-bottom:2rem; }
        .sf-progress-fill  { height:100%; background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#ea580c 40%));
                             transition:width .3s; }
        .sf-progress-row   { display:flex; justify-content:space-between; margin-bottom:.5rem; font-size:.85rem; }
        .sf-progress-step  { color:var(--accent); font-weight:600; }
        .sf-progress-note  { color:var(--text-muted); }
        .sf-cat-grid    { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.85rem; }
        .sf-btn         { width:100%; text-align:left; padding:1rem 1.25rem; border:1px solid var(--border);
                          border-radius:.875rem; background:transparent; color:var(--text); cursor:pointer;
                          display:flex; align-items:center; gap:.75rem; font-weight:500; font-size:.95rem;
                          transition:border-color .15s, background .15s; }
        .sf-btn:hover   { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent 92%); }
        .sf-btn i       { color:var(--accent); flex-shrink:0; }
        .sf-opt         { width:100%; text-align:left; padding:.9rem 1.2rem; border:1px solid var(--border);
                          border-radius:.875rem; background:transparent; color:var(--text); cursor:pointer;
                          display:flex; justify-content:space-between; align-items:center; font-size:.95rem;
                          transition:border-color .15s, background .15s; margin-bottom:.6rem; }
        .sf-opt:hover   { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent 92%); }
        .sf-opt i       { color:var(--accent); flex-shrink:0; }
        .sf-q-label     { font-size:.8rem; color:var(--accent); margin-bottom:.5rem; }
        .sf-q-text      { font-size:1.1rem; font-weight:600; color:var(--text); margin-bottom:1.25rem; }
        .sf-input       { width:100%; padding:.8rem 1.1rem; border:1px solid var(--border); border-radius:.875rem;
                          background:color-mix(in srgb,var(--bg) 70%,transparent 30%); color:var(--text);
                          font-size:.95rem; outline:none; transition:border-color .15s, box-shadow .15s;
                          box-sizing:border-box; }
        .sf-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent 80%); }
        .sf-input.sf-input-error { border-color:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.18); }
        .sf-label       { display:block; font-size:.85rem; font-weight:600; color:var(--text); margin-bottom:.25rem; }
        .sf-field-error { font-size:.78rem; color:#ef4444; margin-top:.3rem; min-height:1rem; }
        .sf-submit      { width:100%; background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#ea580c 45%));
                          color:var(--bg); font-weight:700; padding:.875rem; border-radius:.875rem; border:none;
                          font-size:1rem; cursor:pointer; transition:opacity .15s; }
        .sf-submit:hover { opacity:.88; }
        .sf-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .sf-reset       { font-size:.82rem; background:transparent; border:1px solid var(--border); color:var(--text-muted);
                          border-radius:9999px; padding:.35rem .9rem; cursor:pointer; transition:color .15s; }
        .sf-reset:hover { color:var(--text); }
        .sf-hidden      { display:none !important; }
        .sf-grid2       { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
        .sf-field       { display:flex; flex-direction:column; gap:.25rem; margin-bottom:1.25rem; }
        .sf-note        { font-size:.82rem; color:var(--text-muted); text-align:center; margin-top:1.5rem; }
        .sf-loading     { text-align:center; padding:2.5rem; color:var(--text-muted); }
        .sf-toast       { position:fixed; bottom:20px; right:20px; z-index:9999; background:var(--header-bg);
                          color:var(--text); border:1px solid var(--border); padding:10px 18px;
                          border-radius:40px; font-size:.88rem; opacity:0; transition:opacity .2s; pointer-events:none; }
        #sf-status { padding: 1rem; margin-top: 1rem; border-radius: 4px; }
        .sf-status-success { background: #d4edda; color: #155724; }
        .sf-status-error { background: #f8d7da; color: #721c24; }
        .sf-status-sending { background: #fff3cd; color: #856404; }

        /* Turnstile widget container */
        .sf-turnstile-wrap {
            margin-bottom: 1.25rem;
        }
        .sf-turnstile-wrap .cf-turnstile {
            display: block;
        }
        .sf-turnstile-error {
            font-size:.78rem; color:#ef4444; margin-top:.3rem;
        }

        @media(max-width:520px){ .sf-grid2{ grid-template-columns:1fr; } .sf-cat-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div id="sf-toast" class="sf-toast"></div>

<div class="sf-wrap">

    <!-- Header -->
    <div class="sf-header">
        <i class="fas fa-headset"></i>
        <div>
            <div id="sf-title" style="font-size:1.4rem;font-weight:700;">…</div>
            <div id="sf-subtitle" style="opacity:.8;font-size:.9rem;margin-top:.2rem;">…</div>
        </div>
    </div>

    <!-- Body -->
    <div class="sf-body">

        <!-- Progress -->
        <div class="sf-progress-row">
            <span class="sf-progress-note"><i class="far fa-clock"></i> Avg. resolution 2 min</span>
            <span id="sf-step-label" class="sf-progress-step">Step 1: Choose category</span>
        </div>
        <div class="sf-progress-track"><div id="sf-prog" class="sf-progress-fill" style="width:5%"></div></div>

        <!-- Loading -->
        <div id="sf-loading" class="sf-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:1.75rem;color:var(--accent)"></i>
            <p style="margin-top:.75rem">Loading…</p>
        </div>

        <!-- Step 1: categories -->
        <div id="sf-s1" class="sf-hidden">
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;">
                Select your issue <span style="color:var(--accent)">▼</span>
            </div>
            <div id="sf-cats" class="sf-cat-grid"></div>
            <p class="sf-note"><i class="fas fa-shield-alt"></i> Most issues resolved in under 2 minutes</p>
        </div>

        <!-- Step 2: troubleshooting -->
        <div id="sf-s2" class="sf-hidden"></div>

        <!-- Step 3: contact form -->
        <div id="sf-s3" class="sf-hidden">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                <i class="fas fa-headset" style="font-size:1.4rem;color:var(--accent)"></i>
                <span style="font-size:1.25rem;font-weight:700;">Need human help?</span>
            </div>
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem;">Our support team responds within 4 hours (Mon–Fri).</p>

            <div class="sf-grid2">
                <div class="sf-field">
                    <label class="sf-label" for="sf-name">Full name <span style="color:#ef4444">*</span></label>
                    <input id="sf-name" type="text" class="sf-input" autocomplete="name" maxlength="120" required>
                    <span class="sf-field-error" id="sf-name-err"></span>
                </div>
                <div class="sf-field">
                    <label class="sf-label" for="sf-email">Email address <span style="color:#ef4444">*</span></label>
                    <input id="sf-email" type="email" class="sf-input" autocomplete="email" maxlength="254" required>
                    <span class="sf-field-error" id="sf-email-err"></span>
                </div>
            </div>

            <div class="sf-field">
                <label class="sf-label" for="sf-order">Order number <span style="color:var(--text-muted);font-weight:400;">(digits only)</span></label>
                <input id="sf-order" type="text" class="sf-input" inputmode="numeric" maxlength="20" placeholder="e.g. 100234">
                <span class="sf-field-error" id="sf-order-err"></span>
            </div>

            <div class="sf-field">
                <label class="sf-label">Troubleshooting summary</label>
                <div id="sf-summary-box" style="padding:.8rem 1.1rem;border:1px solid var(--border);border-radius:.875rem;background:color-mix(in srgb,var(--bg) 40%,transparent 60%);font-size:.85rem;color:var(--text-muted);white-space:pre-wrap;line-height:1.6;min-height:80px;"></div>
            </div>
            <div class="sf-field">
                <label class="sf-label" for="sf-desc">Additional comments</label>
                <textarea id="sf-desc" rows="3" class="sf-input" style="resize:vertical" maxlength="2000" placeholder="Anything else you&#39;d like to add…"></textarea>
                <span class="sf-field-error" id="sf-desc-err"></span>
            </div>

            <!-- Cloudflare Turnstile CAPTCHA -->
            <div class="sf-turnstile-wrap">
                <div id="sf-turnstile-container"></div>
                <span class="sf-turnstile-error sf-hidden" id="sf-turnstile-err">Please complete the security check.</span>
            </div>

            <button id="sf-submit" class="sf-submit" style="margin-top:.5rem;">📧 Submit</button>
            <div id="sf-status"></div>
        </div>

    </div><!-- /sf-body -->

    <div style="text-align:right;margin-top:.75rem;">
        <button class="sf-reset" onclick="sfReset()"><i class="fas fa-redo-alt"></i> Start over</button>
    </div>

</div><!-- /sf-wrap -->

<!-- FA icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
// ============================================================
// SUPPORT FORM — Turnstile + validation edition
//
// Security measures applied:
//   1. Cloudflare Turnstile CAPTCHA (rendered explicitly after
//      the form step is shown, so the widget is never hidden
//      at render time — Turnstile errors on hidden containers)
//   2. Client-side field validation before any network request:
//        • name   — non-empty, max 120 chars, HTML-stripped
//        • email  — RFC-5322-ish regex + max 254 chars
//        • order  — digits only (or empty), max 20 digits
//        • desc   — max 4000 chars, HTML-stripped
//   3. All string values are HTML-stripped (tags removed) before
//      being placed into the payload, so injected markup never
//      reaches the worker or gets echoed back into the page.
//   4. The Turnstile token is sent to the worker as
//      payload.cfTurnstileToken; the worker MUST verify it
//      server-side against the Turnstile /siteverify endpoint.
// ============================================================

// ── Turnstile site key — read from CONFIG (config.js) ──────
// config.js is loaded before this content fragment via the shell's
// <script src="/shop/js/config.js">, so CONFIG is available.
// Falls back to Cloudflare's always-pass test key just in case.
const TURNSTILE_SITE_KEY = (typeof CONFIG !== 'undefined' && CONFIG.turnstile && CONFIG.turnstile.sitekey)
    ? CONFIG.turnstile.sitekey
    : '1x00000000000000000000AA';

// ── Worker endpoint — also read from CONFIG ─────────────────
const workerUrl = (typeof CONFIG !== 'undefined' && CONFIG.queue && CONFIG.queue.endpoint)
    ? CONFIG.queue.endpoint
    : "https://edge-form-handler-api.dornori-info.workers.dev";

let turnstileWidgetId = null;
let turnstileToken    = null;   // set by the Turnstile success callback

// ── Security helpers ───────────────────────────────────────

/**
 * Strip all HTML tags from a string and decode common entities.
 * This prevents injected markup from reaching the worker payload
 * or being rendered back into the page.
 */
function stripHtml(str) {
    if (typeof str !== 'string') return '';
    // Remove tags
    let clean = str.replace(/<[^>]*>/g, '');
    // Decode a small set of entities so the worker sees plain text
    clean = clean
        .replace(/&amp;/g,  '&')
        .replace(/&lt;/g,   '<')
        .replace(/&gt;/g,   '>')
        .replace(/&quot;/g, '"')
        .replace(/&#039;/g, "'")
        .replace(/&nbsp;/g, ' ');
    return clean.trim();
}

/**
 * Validate an e-mail address.
 * Uses a practical RFC-5322-ish pattern (covers 99 %+ of real addresses).
 */
function isValidEmail(email) {
    // Must have exactly one @, a domain part with at least one dot,
    // and no whitespace.
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email) && email.length <= 254;
}

/**
 * Show / clear a field error.
 * Returns true when an error is shown (i.e. validation failed).
 */
function setFieldError(inputId, errorId, message) {
    const input = document.getElementById(inputId);
    const errEl = document.getElementById(errorId);
    if (!input || !errEl) return !!message;

    if (message) {
        input.classList.add('sf-input-error');
        errEl.textContent = message;
        return true;
    } else {
        input.classList.remove('sf-input-error');
        errEl.textContent = '';
        return false;
    }
}

/**
 * Validate all contact-form fields.
 * Returns { valid: bool, sanitised: { name, email, order, message } }.
 */
function validateForm() {
    let hasError = false;

    // ── Name ──────────────────────────────────────────────
    const rawName = document.getElementById('sf-name').value;
    const name    = stripHtml(rawName).slice(0, 120);
    if (!name) {
        hasError = setFieldError('sf-name', 'sf-name-err', 'Full name is required.') || hasError;
    } else {
        setFieldError('sf-name', 'sf-name-err', '');
    }

    // ── Email ─────────────────────────────────────────────
    const rawEmail = document.getElementById('sf-email').value.trim();
    const email    = stripHtml(rawEmail).slice(0, 254);
    if (!email) {
        hasError = setFieldError('sf-email', 'sf-email-err', 'Email address is required.') || hasError;
    } else if (!isValidEmail(email)) {
        hasError = setFieldError('sf-email', 'sf-email-err', 'Please enter a valid email address.') || hasError;
    } else {
        setFieldError('sf-email', 'sf-email-err', '');
    }

    // ── Order number (digits only, optional) ─────────────
    const rawOrder = document.getElementById('sf-order').value.trim();
    const order    = stripHtml(rawOrder).slice(0, 20);
    if (order && !/^\d+$/.test(order)) {
        hasError = setFieldError('sf-order', 'sf-order-err', 'Order number must contain digits only.') || hasError;
    } else {
        setFieldError('sf-order', 'sf-order-err', '');
    }

    // ── Description ───────────────────────────────────────
    const rawDesc = document.getElementById('sf-desc').value;
    const desc    = stripHtml(rawDesc).slice(0, 4000);
    if (rawDesc.length > 4000) {
        hasError = setFieldError('sf-desc', 'sf-desc-err', 'Description is too long (max 4000 characters).') || hasError;
    } else {
        setFieldError('sf-desc', 'sf-desc-err', '');
    }

    // ── Turnstile ─────────────────────────────────────────
    const turnstileErr = document.getElementById('sf-turnstile-err');
    if (!turnstileToken) {
        if (turnstileErr) {
            turnstileErr.classList.remove('sf-hidden');
        }
        hasError = true;
    } else {
        if (turnstileErr) turnstileErr.classList.add('sf-hidden');
    }

    return {
        valid: !hasError,
        sanitised: { name, email, order, message: desc }
    };
}

// ── Toast notification ─────────────────────────────────────
function showToast(msg, ms) {
    var t = document.getElementById('sf-toast');
    if (!t) return;
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; }, ms || 3000);
}

// ── Status div for form feedback ──────────────────────────
function getStatusDiv() {
    let div = document.getElementById('sf-status');
    if (!div) {
        div = document.createElement('div');
        div.id = 'sf-status';
        document.getElementById('sf-s3').appendChild(div);
    }
    return div;
}

// ── Turnstile initialisation ───────────────────────────────
/**
 * Render the Turnstile widget into #sf-turnstile-container.
 * Called the first time showContactForm() is invoked, and also
 * when the form is reset (widget is reset, not re-rendered).
 *
 * We render explicitly (not with data-sitekey) so we can:
 *   • Wait until the container is visible (Turnstile requires this)
 *   • Capture the widget ID for later reset calls
 *   • Capture the token via callback instead of polling
 */
function initTurnstile() {
    const container = document.getElementById('sf-turnstile-container');
    if (!container) return;

    // If already rendered, just reset it (gets a fresh token)
    if (turnstileWidgetId !== null && window.turnstile) {
        turnstileToken = null;
        window.turnstile.reset(turnstileWidgetId);
        return;
    }

    // Wait for the Turnstile script to be ready
    if (!window.turnstile) {
        // Script not ready yet; retry in 200 ms
        setTimeout(initTurnstile, 200);
        return;
    }

    turnstileToken   = null;
    turnstileWidgetId = window.turnstile.render(container, {
        sitekey:           TURNSTILE_SITE_KEY,
        theme:             'auto',
        callback:          function(token) {
            turnstileToken = token;
            // Hide any "please complete the check" error
            const errEl = document.getElementById('sf-turnstile-err');
            if (errEl) errEl.classList.add('sf-hidden');
        },
        'expired-callback': function() {
            // Token has expired; require the user to solve again
            turnstileToken = null;
        },
        'error-callback':   function() {
            // Widget encountered an error (network issue, etc.)
            turnstileToken = null;
        }
    });
}

// ── Load form data from JSON ──────────────────────────────
let currentCategory = null;
let currentQuestions = [];
let currentQIndex = 0;
let summary = [];

async function loadFormData() {
    try {
        const response = await fetch('../../lang/de/form.json');
        const data = await response.json();

        document.getElementById('sf-title').textContent  = data.title    || '';
        document.getElementById('sf-subtitle').textContent = data.subtitle || '';

        document.getElementById('sf-loading').style.display = 'none';

        const container = document.getElementById('sf-cats');
        container.innerHTML = '';
        data.categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'sf-btn';
            btn.innerHTML = '<i class="fas fa-chevron-circle-right"></i> ' + escapeHtml(cat.title);
            btn.onclick = () => startCategory(cat, data);
            container.appendChild(btn);
        });

        document.getElementById('sf-s1').classList.remove('sf-hidden');
        document.getElementById('sf-prog').style.width = '5%';
        document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';
    } catch (err) {
        document.getElementById('sf-loading').innerHTML = '<p style="color:red">Failed to load. Please refresh.</p>';
    }
}

function startCategory(cat, data) {
    currentCategory  = cat;
    currentQuestions = cat.questions || [];
    currentQIndex    = 0;
    summary          = ['Category: ' + cat.title, '---'];
    showQuestion();
}

function showQuestion() {
    if (!currentQuestions.length || currentQIndex >= currentQuestions.length) {
        showContactForm();
        return;
    }

    const q = currentQuestions[currentQIndex];
    let html = '<div class="sf-q-label"><i class="fas fa-question-circle"></i> Question ' + (currentQIndex + 1) + '/' + currentQuestions.length + '</div>';
    html += '<div class="sf-q-text">' + escapeHtml(q.text) + '</div>';

    q.options.forEach((opt, idx) => {
        html += '<button class="sf-opt" onclick="selectAnswer(' + idx + ')"><span>' + escapeHtml(opt.text) + '</span><i class="fas fa-arrow-right"></i></button>';
    });
    html += '<div style="margin-top:1rem"><button class="sf-reset" onclick="sfReset()"><i class="fas fa-undo-alt"></i> Start over</button></div>';

    document.getElementById('sf-s2').innerHTML = html;
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.remove('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '45%';
    document.getElementById('sf-step-label').textContent = 'Step 2: Troubleshooting';
}

window.selectAnswer = function(optionIndex) {
    const q   = currentQuestions[currentQIndex];
    const opt = q.options[optionIndex];

    summary.push('Q: ' + q.text);
    summary.push('A: ' + opt.text);

    if (opt.resolves === true || opt.next === 'resolved_end') {
        showToast('✓ Issue resolved!', 1500);
        setTimeout(() => { window.location.href = '/'; }, 2000);
        return;
    }

    if (opt.next === 'contact') {
        showContactForm();
        return;
    }

    currentQIndex++;
    showQuestion();
};

function showContactForm() {
    const summaryBox = document.getElementById('sf-summary-box');
    if (summaryBox) {
        summaryBox.textContent = summary.join('\n') || '(No troubleshooting steps recorded)';
    }

    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.remove('sf-hidden');
    document.getElementById('sf-prog').style.width = '85%';
    document.getElementById('sf-step-label').textContent = 'Step 3: Contact support';

    // Render (or reset) Turnstile now that the container is visible
    initTurnstile();
}

// ─── SEND FUNCTIONS ───────────────────────────────────────
async function sendSupportRequest() {
    const statusDiv = getStatusDiv();

    // ── Validate + sanitise ────────────────────────────────
    const { valid, sanitised } = validateForm();
    if (!valid) {
        statusDiv.className  = 'sf-status-error';
        statusDiv.textContent = '✗ Please fix the errors above before submitting.';
        return;
    }

    // ── Disable buttons while sending ─────────────────────
    const submitBtn = document.getElementById('sf-submit');
    if (submitBtn) submitBtn.disabled = true;

    statusDiv.className  = 'sf-status-sending';
    statusDiv.textContent = 'Sending…';

    const summaryBox = document.getElementById('sf-summary-box');
    const payload = {
        category:         'ticket',
        name:             sanitised.name,
        email:            sanitised.email,
        order:            sanitised.order,
        summary:          summaryBox ? summaryBox.textContent : '',
        message:          sanitised.message,
        ua:               navigator.userAgent,
        cfTurnstileToken: turnstileToken
    };

    try {
        const response = await fetch(workerUrl, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });

        const result = await response.text();

        if (response.ok) {
            statusDiv.className  = 'sf-status-success';
            statusDiv.textContent = '✓ Request received! We aim to respond within 2 business days (EU consumer regulation max: 30 days).';

            // Clear form fields
            document.getElementById('sf-name').value  = '';
            document.getElementById('sf-email').value = '';
            document.getElementById('sf-order').value = '';
            // Reset Turnstile for a potential second submission
            turnstileToken = null;
            if (turnstileWidgetId !== null && window.turnstile) {
                window.turnstile.reset(turnstileWidgetId);
            }
        } else {
            statusDiv.className  = 'sf-status-error';
            statusDiv.textContent = '✗ Error: ' + escapeHtml(result);
        }
    } catch (err) {
        statusDiv.className  = 'sf-status-error';
        statusDiv.textContent = '✗ Network error: ' + escapeHtml(err.message);
    } finally {
        // Re-enable buttons
        if (submitBtn) submitBtn.disabled = false;
    }
}

// ── Event delegation for buttons ──────────────────────────
document.addEventListener('click', async function(e) {
    const queueBtn = e.target.closest('#sf-submit');
    if (queueBtn) {
        e.preventDefault();
        await sendSupportRequest();
        return;
    }


});

// ── Reset function ─────────────────────────────────────────
window.sfReset = function() {
    currentCategory  = null;
    currentQuestions = [];
    currentQIndex    = 0;
    summary          = [];

    document.getElementById('sf-s1').classList.remove('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '5%';
    document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';

    // Reset Turnstile token
    turnstileToken = null;
    if (turnstileWidgetId !== null && window.turnstile) {
        window.turnstile.reset(turnstileWidgetId);
    }

    // Clear field errors
    ['sf-name', 'sf-email', 'sf-order', 'sf-desc'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('sf-input-error');
    });
    ['sf-name-err', 'sf-email-err', 'sf-order-err', 'sf-desc-err'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
    });

    showToast('Session reset', 1500);
};

// ── HTML escape utility (for dynamic content) ─────────────
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
    });
}

// ── Boot ───────────────────────────────────────────────────
loadFormData();
</script>
