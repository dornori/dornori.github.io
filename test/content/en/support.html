<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Support</title>
    <style>
        /* Support form — uses parent shell's CSS variable tokens from profiles.css */
        .sf-wrap        { font-family: ui-sans-serif, system-ui, sans-serif; color: var(--text); }
        .sf-header      { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #000 45%) 100%);
                          padding: 2rem; border-radius: 1.25rem 1.25rem 0 0; color: #fff; display:flex; align-items:center; gap:1rem; }
        .sf-header i    { font-size: 2.25rem; }
        .sf-body        { background: var(--glass); border: 1px solid var(--border); border-top:none;
                          border-radius: 0 0 1.25rem 1.25rem; padding: 2rem; }
        .sf-progress-track { height:.5rem; background:color-mix(in srgb,var(--border) 50%,transparent 50%);
                             border-radius:9999px; overflow:hidden; margin-bottom:2rem; }
        .sf-progress-fill  { height:100%; background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#ea580c 40%));
                             transition:width .3s; }
        .sf-progress-row   { display:flex; justify-content:space-between; margin-bottom:.5rem; font-size:.85rem; }
        .sf-progress-step  { color:var(--accent); font-weight:600; }
        .sf-progress-note  { color:var(--text-muted); }
        .sf-cat-grid    { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.85rem; }
        .sf-btn         { width:100%; text-align:left; padding:1rem 1.25rem; border:1px solid var(--border);
                          border-radius:.875rem; background:transparent; color:var(--text); cursor:pointer;
                          display:flex; align-items:center; gap:.75rem; font-weight:500; font-size:.95rem;
                          transition:border-color .15s, background .15s; }
        .sf-btn:hover   { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent 92%); }
        .sf-btn i       { color:var(--accent); flex-shrink:0; }
        .sf-opt         { width:100%; text-align:left; padding:.9rem 1.2rem; border:1px solid var(--border);
                          border-radius:.875rem; background:transparent; color:var(--text); cursor:pointer;
                          display:flex; justify-content:space-between; align-items:center; font-size:.95rem;
                          transition:border-color .15s, background .15s; margin-bottom:.6rem; }
        .sf-opt:hover   { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent 92%); }
        .sf-opt i       { color:var(--accent); flex-shrink:0; }
        .sf-q-label     { font-size:.8rem; color:var(--accent); margin-bottom:.5rem; }
        .sf-q-text      { font-size:1.1rem; font-weight:600; color:var(--text); margin-bottom:1.25rem; }
        .sf-input       { width:100%; padding:.8rem 1.1rem; border:1px solid var(--border); border-radius:.875rem;
                          background:color-mix(in srgb,var(--bg) 70%,transparent 30%); color:var(--text);
                          font-size:.95rem; outline:none; transition:border-color .15s, box-shadow .15s;
                          box-sizing:border-box; }
        .sf-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent 80%); }
        .sf-label       { display:block; font-size:.85rem; font-weight:600; color:var(--text); margin-bottom:.25rem; }
        .sf-submit      { width:100%; background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#ea580c 45%));
                          color:var(--bg); font-weight:700; padding:.875rem; border-radius:.875rem; border:none;
                          font-size:1rem; cursor:pointer; transition:opacity .15s; }
        .sf-submit:hover { opacity:.88; }
        .sf-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .sf-reset       { font-size:.82rem; background:transparent; border:1px solid var(--border); color:var(--text-muted);
                          border-radius:9999px; padding:.35rem .9rem; cursor:pointer; transition:color .15s; }
        .sf-reset:hover { color:var(--text); }
        .sf-hidden      { display:none !important; }
        .sf-grid2       { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
        .sf-field       { display:flex; flex-direction:column; gap:.25rem; margin-bottom:1.25rem; }
        .sf-note        { font-size:.82rem; color:var(--text-muted); text-align:center; margin-top:1.5rem; }
        .sf-loading     { text-align:center; padding:2.5rem; color:var(--text-muted); }
        .sf-toast       { position:fixed; bottom:20px; right:20px; z-index:9999; background:var(--header-bg);
                          color:var(--text); border:1px solid var(--border); padding:10px 18px;
                          border-radius:40px; font-size:.88rem; opacity:0; transition:opacity .2s; pointer-events:none; }
        #sf-status { padding: 1rem; margin-top: 1rem; border-radius: 4px; }
        .sf-status-success { background: #d4edda; color: #155724; }
        .sf-status-error { background: #f8d7da; color: #721c24; }
        .sf-status-sending { background: #fff3cd; color: #856404; }
        @media(max-width:520px){ .sf-grid2{ grid-template-columns:1fr; } .sf-cat-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>

<div id="sf-toast" class="sf-toast"></div>

<div class="sf-wrap">

    <!-- Header -->
    <div class="sf-header">
        <i class="fas fa-headset"></i>
        <div>
            <div id="sf-title" style="font-size:1.4rem;font-weight:700;">…</div>
            <div id="sf-subtitle" style="opacity:.8;font-size:.9rem;margin-top:.2rem;">…</div>
        </div>
    </div>

    <!-- Body -->
    <div class="sf-body">

        <!-- Progress -->
        <div class="sf-progress-row">
            <span class="sf-progress-note"><i class="far fa-clock"></i> Avg. resolution 2 min</span>
            <span id="sf-step-label" class="sf-progress-step">Step 1: Choose category</span>
        </div>
        <div class="sf-progress-track"><div id="sf-prog" class="sf-progress-fill" style="width:5%"></div></div>

        <!-- Loading -->
        <div id="sf-loading" class="sf-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:1.75rem;color:var(--accent)"></i>
            <p style="margin-top:.75rem">Loading…</p>
        </div>

        <!-- Step 1: categories -->
        <div id="sf-s1" class="sf-hidden">
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;">
                Select your issue <span style="color:var(--accent)">▼</span>
            </div>
            <div id="sf-cats" class="sf-cat-grid"></div>
            <p class="sf-note"><i class="fas fa-shield-alt"></i> Most issues resolved in under 2 minutes</p>
        </div>

        <!-- Step 2: troubleshooting -->
        <div id="sf-s2" class="sf-hidden"></div>

        <!-- Step 3: contact form -->
        <div id="sf-s3" class="sf-hidden">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                <i class="fas fa-headset" style="font-size:1.4rem;color:var(--accent)"></i>
                <span style="font-size:1.25rem;font-weight:700;">Need human help?</span>
            </div>
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem;">Our support team responds within 4 hours (Mon–Fri).</p>
            <div class="sf-grid2">
                <div class="sf-field">
                    <label class="sf-label">Full name <span style="color:#ef4444">*</span></label>
                    <input id="sf-name" type="text" class="sf-input" required>
                </div>
                <div class="sf-field">
                    <label class="sf-label">Email address <span style="color:#ef4444">*</span></label>
                    <input id="sf-email" type="email" class="sf-input" required>
                </div>
            </div>
            <div class="sf-field">
                <label class="sf-label">Order number</label>
                <input id="sf-order" type="text" class="sf-input">
            </div>
            <div class="sf-field">
                <label class="sf-label">Issue description</label>
                <textarea id="sf-desc" rows="5" class="sf-input" style="resize:vertical"></textarea>
            </div>
            <button id="sf-submit" class="sf-submit">Submit Support Request</button>
            <div id="sf-status"></div>
        </div>

    </div><!-- /sf-body -->

    <div style="text-align:right;margin-top:.75rem;">
        <button class="sf-reset" onclick="sfReset()"><i class="fas fa-redo-alt"></i> Start over</button>
    </div>

</div><!-- /sf-wrap -->

<!-- FA icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
// ============================================================
// SUPPORT FORM - DIRECT SEND (NO QUEUE)
// Uses the same worker but bypasses queue (direct email)
// ============================================================

const workerUrl = "https://edge-form-handler-api.dornori-info.workers.dev";

// ── Toast notification ─────────────────────────────────────
function showToast(msg, ms) {
    var t = document.getElementById('sf-toast');
    if (!t) return;
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; }, ms || 3000);
}

// ── Status div for form feedback ──────────────────────────
function getStatusDiv() {
    let div = document.getElementById('sf-status');
    if (!div) {
        div = document.createElement('div');
        div.id = 'sf-status';
        document.getElementById('sf-s3').appendChild(div);
    }
    return div;
}

// ── Load form data from JSON ──────────────────────────────
let currentCategory = null;
let currentQuestions = [];
let currentQIndex = 0;
let summary = [];

async function loadFormData() {
    try {
        const response = await fetch('/test/data/form.json');
        const data = await response.json();
        
        document.getElementById('sf-title').textContent = data.title || '';
        document.getElementById('sf-subtitle').textContent = data.subtitle || '';
        
        document.getElementById('sf-loading').style.display = 'none';
        
        const container = document.getElementById('sf-cats');
        container.innerHTML = '';
        data.categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'sf-btn';
            btn.innerHTML = '<i class="fas fa-chevron-circle-right"></i> ' + cat.title;
            btn.onclick = () => startCategory(cat, data);
            container.appendChild(btn);
        });
        
        document.getElementById('sf-s1').classList.remove('sf-hidden');
        document.getElementById('sf-prog').style.width = '5%';
        document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';
    } catch (err) {
        document.getElementById('sf-loading').innerHTML = '<p style="color:red">Failed to load. Please refresh.</p>';
    }
}

function startCategory(cat, data) {
    currentCategory = cat;
    currentQuestions = cat.questions || [];
    currentQIndex = 0;
    summary = ['Category: ' + cat.title, '---'];
    showQuestion();
}

function showQuestion() {
    if (!currentQuestions.length || currentQIndex >= currentQuestions.length) {
        showContactForm();
        return;
    }
    
    const q = currentQuestions[currentQIndex];
    let html = '<div class="sf-q-label"><i class="fas fa-question-circle"></i> Question ' + (currentQIndex + 1) + '/' + currentQuestions.length + '</div>';
    html += '<div class="sf-q-text">' + escapeHtml(q.text) + '</div>';
    
    q.options.forEach((opt, idx) => {
        html += '<button class="sf-opt" onclick="selectAnswer(' + idx + ')"><span>' + escapeHtml(opt.text) + '</span><i class="fas fa-arrow-right"></i></button>';
    });
    html += '<div style="margin-top:1rem"><button class="sf-reset" onclick="sfReset()"><i class="fas fa-undo-alt"></i> Start over</button></div>';
    
    document.getElementById('sf-s2').innerHTML = html;
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.remove('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '45%';
    document.getElementById('sf-step-label').textContent = 'Step 2: Troubleshooting';
}

window.selectAnswer = function(optionIndex) {
    const q = currentQuestions[currentQIndex];
    const opt = q.options[optionIndex];
    
    summary.push('Q: ' + q.text);
    summary.push('A: ' + opt.text);
    
    if (opt.resolves === true || opt.next === 'resolved_end') {
        showToast('✓ Issue resolved!', 1500);
        setTimeout(() => { window.location.href = '/test/'; }, 2000);
        return;
    }
    
    if (opt.next === 'contact') {
        showContactForm();
        return;
    }
    
    currentQIndex++;
    showQuestion();
};

function showContactForm() {
    const descField = document.getElementById('sf-desc');
    if (descField) {
        descField.value = summary.join('\n') + '\n\nUA: ' + navigator.userAgent;
    }
    
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.remove('sf-hidden');
    document.getElementById('sf-prog').style.width = '85%';
    document.getElementById('sf-step-label').textContent = 'Step 3: Contact support';
}

// ─── DIRECT SEND FUNCTION (SAME PATTERN AS WORKING FORM) ───
async function sendSupportRequest() {
    const name = document.getElementById('sf-name').value.trim();
    const email = document.getElementById('sf-email').value.trim();
    const statusDiv = getStatusDiv();

    if (!email || !name) {
        statusDiv.className = "sf-status-error";
        statusDiv.textContent = "✗ Please fill in name and email";
        return;
    }

    statusDiv.className = "sf-status-sending";
    statusDiv.textContent = "Sending...";

    const payload = {
        category: "ticket",
        name: name,
        email: email,
        order: document.getElementById('sf-order').value.trim(),
        message: document.getElementById('sf-desc').value
    };

    try {
        const response = await fetch(workerUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await response.text();

        if (response.ok) {
            statusDiv.className = "sf-status-success";
            statusDiv.textContent = "✓ Support request sent! Check your email.";
            setTimeout(() => { window.location.href = '/test/'; }, 3000);
        } else {
            statusDiv.className = "sf-status-error";
            statusDiv.textContent = "✗ Error: " + result;
        }
    } catch (err) {
        statusDiv.className = "sf-status-error";
        statusDiv.textContent = "✗ Network error: " + err.message;
    }
}

// ── Reset function ─────────────────────────────────────────
window.sfReset = function() {
    currentCategory = null;
    currentQuestions = [];
    currentQIndex = 0;
    summary = [];
    document.getElementById('sf-s1').classList.remove('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '5%';
    document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';
    showToast('Session reset', 1500);
};

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ─── EVENT DELEGATION (works for nested/injected pages) ───
document.addEventListener('click', async function(e) {
    const btn = e.target.closest('#sf-submit');
    if (!btn) return;
    
    e.preventDefault();
    await sendSupportRequest();
});

// ─── Also attach directly if button already exists ─────────
if (document.getElementById('sf-submit')) {
    document.getElementById('sf-submit').addEventListener('click', function(e) {
        e.preventDefault();
        sendSupportRequest();
    });
}

// ── Load everything ────────────────────────────────────────
loadFormData();
</script>

</body>
</html>
