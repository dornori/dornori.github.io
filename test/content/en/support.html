<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori Support</title>
    <style>
        .sf-wrap { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 800px; margin: 0 auto; }
        .sf-header { background: #c8a96e; padding: 2rem; border-radius: 1.25rem 1.25rem 0 0; color: #fff; display: flex; align-items: center; gap: 1rem; }
        .sf-header i { font-size: 2.25rem; }
        .sf-body { background: #fff; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 1.25rem 1.25rem; padding: 2rem; }
        .sf-progress-track { height: .5rem; background: #e5e7eb; border-radius: 9999px; overflow: hidden; margin-bottom: 2rem; }
        .sf-progress-fill { height: 100%; background: #c8a96e; transition: width .3s; width: 5%; }
        .sf-progress-row { display: flex; justify-content: space-between; margin-bottom: .5rem; font-size: .85rem; }
        .sf-progress-step { color: #c8a96e; font-weight: 600; }
        .sf-progress-note { color: #6b7280; }
        .sf-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: .85rem; }
        .sf-btn { width: 100%; text-align: left; padding: 1rem 1.25rem; border: 1px solid #e5e7eb; border-radius: .875rem; background: transparent; cursor: pointer; display: flex; align-items: center; gap: .75rem; }
        .sf-btn:hover { border-color: #c8a96e; background: rgba(200, 169, 110, 0.08); }
        .sf-btn i { color: #c8a96e; }
        .sf-opt { width: 100%; text-align: left; padding: .9rem 1.2rem; border: 1px solid #e5e7eb; border-radius: .875rem; background: transparent; cursor: pointer; display: flex; justify-content: space-between; margin-bottom: .6rem; }
        .sf-opt:hover { border-color: #c8a96e; background: rgba(200, 169, 110, 0.08); }
        .sf-opt i { color: #c8a96e; }
        .sf-q-label { font-size: .8rem; color: #c8a96e; margin-bottom: .5rem; }
        .sf-q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }
        .sf-input { width: 100%; padding: .8rem 1.1rem; border: 1px solid #e5e7eb; border-radius: .875rem; font-size: .95rem; box-sizing: border-box; }
        .sf-input:focus { border-color: #c8a96e; outline: none; }
        .sf-label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
        .sf-submit { width: 100%; background: #c8a96e; color: #fff; font-weight: 700; padding: .875rem; border-radius: .875rem; border: none; font-size: 1rem; cursor: pointer; }
        .sf-submit:hover { opacity: .88; }
        .sf-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .sf-reset { font-size: .82rem; background: transparent; border: 1px solid #e5e7eb; border-radius: 9999px; padding: .35rem .9rem; cursor: pointer; }
        .sf-hidden { display: none !important; }
        .sf-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .sf-field { margin-bottom: 1.25rem; }
        .sf-note { font-size: .82rem; color: #6b7280; text-align: center; margin-top: 1.5rem; }
        .sf-loading { text-align: center; padding: 2.5rem; color: #6b7280; }
        .sf-toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: #fff; padding: 10px 18px; border-radius: 40px; font-size: .88rem; opacity: 0; transition: opacity .2s; pointer-events: none; }
        @media(max-width:520px){ .sf-grid2 { grid-template-columns: 1fr; } .sf-cat-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="sf-toast" class="sf-toast"></div>

<div class="sf-wrap">
    <div class="sf-header">
        <i class="fas fa-headset"></i>
        <div>
            <div id="sf-title" style="font-size:1.4rem;font-weight:700;">…</div>
            <div id="sf-subtitle" style="opacity:.8;font-size:.9rem;margin-top:.2rem;">…</div>
        </div>
    </div>

    <div class="sf-body">
        <div class="sf-progress-row">
            <span class="sf-progress-note"><i class="far fa-clock"></i> Avg. resolution 2 min</span>
            <span id="sf-step-label" class="sf-progress-step">Step 1: Choose category</span>
        </div>
        <div class="sf-progress-track"><div id="sf-prog" class="sf-progress-fill"></div></div>

        <div id="sf-loading" class="sf-loading">
            <i class="fas fa-spinner fa-spin" style="font-size:1.75rem;color:#c8a96e"></i>
            <p style="margin-top:.75rem">Loading…</p>
        </div>

        <div id="sf-s1" class="sf-hidden">
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;">Select your issue <span style="color:#c8a96e">▼</span></div>
            <div id="sf-cats" class="sf-cat-grid"></div>
            <p class="sf-note"><i class="fas fa-shield-alt"></i> Most issues resolved in under 2 minutes</p>
        </div>

        <div id="sf-s2" class="sf-hidden"></div>

        <div id="sf-s3" class="sf-hidden">
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;">
                <i class="fas fa-headset" style="font-size:1.4rem;color:#c8a96e"></i>
                <span style="font-size:1.25rem;font-weight:700;">Need human help?</span>
            </div>
            <p style="color:#6b7280;font-size:.9rem;margin-bottom:1.5rem;">Our support team responds within 4 hours (Mon–Fri).</p>
            <div class="sf-grid2">
                <div class="sf-field">
                    <label class="sf-label">Full name <span style="color:#ef4444">*</span></label>
                    <input id="sf-name" type="text" class="sf-input" required>
                </div>
                <div class="sf-field">
                    <label class="sf-label">Email address <span style="color:#ef4444">*</span></label>
                    <input id="sf-email" type="email" class="sf-input" required>
                </div>
            </div>
            <div class="sf-field">
                <label class="sf-label">Order number</label>
                <input id="sf-order" type="text" class="sf-input">
            </div>
            <div class="sf-field">
                <label class="sf-label">Issue description</label>
                <textarea id="sf-desc" rows="5" class="sf-input" style="resize:vertical"></textarea>
            </div>
            <button id="sf-submit" class="sf-submit">Submit Support Request</button>
        </div>
    </div>

    <div style="text-align:right;margin-top:.75rem;">
        <button class="sf-reset" onclick="sfReset()"><i class="fas fa-redo-alt"></i> Start over</button>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
const API_URL = 'https://edge-form-handler-api.dornori-info.workers.dev';

// Simple toast function
function showToast(msg, ms) {
    var t = document.getElementById('sf-toast');
    if (!t) return;
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; }, ms || 3000);
}

// Load form data
async function loadFormData() {
    try {
        const response = await fetch('/test/data/form.json');
        const data = await response.json();
        
        document.getElementById('sf-title').textContent = data.title || '';
        document.getElementById('sf-subtitle').textContent = data.subtitle || '';
        
        document.getElementById('sf-loading').style.display = 'none';
        
        // Render categories
        const container = document.getElementById('sf-cats');
        container.innerHTML = '';
        data.categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'sf-btn';
            btn.innerHTML = '<i class="fas fa-chevron-circle-right"></i> ' + cat.title;
            btn.onclick = () => startCategory(cat, data);
            container.appendChild(btn);
        });
        
        document.getElementById('sf-s1').classList.remove('sf-hidden');
        document.getElementById('sf-prog').style.width = '5%';
        document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';
    } catch (err) {
        document.getElementById('sf-loading').innerHTML = '<p style="color:red">Failed to load. Please refresh.</p>';
    }
}

let currentCategory = null;
let currentQuestions = [];
let currentQIndex = 0;
let summary = [];

function startCategory(cat, data) {
    currentCategory = cat;
    currentQuestions = cat.questions || [];
    currentQIndex = 0;
    summary = ['Category: ' + cat.title, '---'];
    showQuestion();
}

function showQuestion() {
    if (!currentQuestions.length || currentQIndex >= currentQuestions.length) {
        showContactForm();
        return;
    }
    
    const q = currentQuestions[currentQIndex];
    let html = '<div class="sf-q-label"><i class="fas fa-question-circle"></i> Question ' + (currentQIndex + 1) + '/' + currentQuestions.length + '</div>';
    html += '<div class="sf-q-text">' + escapeHtml(q.text) + '</div>';
    
    q.options.forEach((opt, idx) => {
        html += '<button class="sf-opt" onclick="selectAnswer(' + idx + ')"><span>' + escapeHtml(opt.text) + '</span><i class="fas fa-arrow-right"></i></button>';
    });
    html += '<div style="margin-top:1rem"><button class="sf-reset" onclick="resetSession()"><i class="fas fa-undo-alt"></i> Start over</button></div>';
    
    document.getElementById('sf-s2').innerHTML = html;
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.remove('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '45%';
    document.getElementById('sf-step-label').textContent = 'Step 2: Troubleshooting';
}

window.selectAnswer = function(optionIndex) {
    const q = currentQuestions[currentQIndex];
    const opt = q.options[optionIndex];
    
    summary.push('Q: ' + q.text);
    summary.push('A: ' + opt.text);
    
    if (opt.resolves === true || opt.next === 'resolved_end') {
        showToast('✓ Issue resolved!', 1500);
        setTimeout(() => { window.location.href = '/test/'; }, 2000);
        return;
    }
    
    if (opt.next === 'contact') {
        showContactForm();
        return;
    }
    
    currentQIndex++;
    showQuestion();
};

function showContactForm() {
    const descField = document.getElementById('sf-desc');
    if (descField) {
        descField.value = summary.join('\n') + '\n\nUA: ' + navigator.userAgent;
    }
    
    document.getElementById('sf-s1').classList.add('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.remove('sf-hidden');
    document.getElementById('sf-prog').style.width = '85%';
    document.getElementById('sf-step-label').textContent = 'Step 3: Contact support';
}

window.sfReset = function() {
    currentCategory = null;
    currentQuestions = [];
    currentQIndex = 0;
    summary = [];
    document.getElementById('sf-s1').classList.remove('sf-hidden');
    document.getElementById('sf-s2').classList.add('sf-hidden');
    document.getElementById('sf-s3').classList.add('sf-hidden');
    document.getElementById('sf-prog').style.width = '5%';
    document.getElementById('sf-step-label').textContent = 'Step 1: Choose category';
    showToast('Session reset', 1500);
};

// THE WORKING SUBMIT FUNCTION (copied from your contact form pattern)
document.addEventListener('DOMContentLoaded', function() {
    const submitBtn = document.getElementById('sf-submit');
    if (submitBtn) {
        submitBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('sf-name').value.trim();
            const email = document.getElementById('sf-email').value.trim();
            
            if (!name || !email) {
                showToast('Please provide your name and email.', 3000);
                return;
            }
            
            const btn = this;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            const payload = {
                category: 'ticket',
                name: name,
                email: email,
                order: document.getElementById('sf-order').value.trim(),
                subject: 'Dornori Support: ' + (currentCategory ? currentCategory.title : 'General'),
                message: document.getElementById('sf-desc').value
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                await response.text(); // Just consume the response
                
                if (response.ok) {
                    showToast('Support request sent! Check your email.', 3000);
                    setTimeout(() => { window.location.href = '/test/'; }, 2000);
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (err) {
                console.error(err);
                showToast('Failed to send. Email support@dornori.com directly.', 4000);
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    }
});

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Start
loadFormData();
</script>

</body>
</html>
