<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dornori Support - Troubleshooting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="../js/form.js" defer></script>
</head>
<body class="bg-zinc-100 min-h-screen py-12">

  <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-amber-500 to-orange-600 text-white px-8 py-10">
      <h1 class="text-4xl font-bold flex items-center gap-3">
        <i class="fas fa-lightbulb"></i> Dornori Support
      </h1>
      <p id="subtitle" class="text-orange-100 mt-3 text-lg"></p>
    </div>

    <div class="p-8 md:p-10">
      <div class="mb-10">
        <div class="flex justify-between text-sm text-gray-500 mb-2">
          <span>Support Assistant</span>
          <span id="progressText">Step 1 of 5</span>
        </div>
        <div class="h-2.5 bg-gray-200 rounded-full">
          <div id="progressBar" class="h-full bg-gradient-to-r from-amber-500 to-orange-600 w-1/5 transition-all"></div>
        </div>
      </div>

      <div id="step1" class="step active">
        <h2 id="mainTitle" class="text-2xl font-semibold mb-6"></h2>
        <div id="categoryButtons" class="grid grid-cols-1 gap-3"></div>
      </div>

      <div id="troubleshooting" class="step"></div>

      <div id="emailForm" class="step">
        <h2 class="text-2xl font-semibold mb-2">Still need help?</h2>
        <p class="text-gray-600 mb-8">Fill out the form below and our team will assist you.</p>
        
        <form id="contactForm" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Name</label>
              <input type="text" id="name" required class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl focus:ring-orange-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
              <input type="email" id="email" required class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl focus:ring-orange-500">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Message</label>
            <textarea id="message" rows="7" required class="w-full px-5 py-3.5 border border-gray-300 rounded-2xl focus:ring-orange-500"></textarea>
          </div>
          <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-semibold py-4 rounded-2xl text-lg">
            Send Support Request
          </button>
        </form>
      </div>

      <div id="successMessage" class="step hidden text-center py-16">
        <div class="text-7xl mb-6">✅</div>
        <h2 class="text-3xl font-bold text-green-600">Thank You!</h2>
        <p class="mt-4 text-gray-600">Your message was sent successfully.<br>We will reply within 24-48 hours.</p>
        <button onclick="resetForm()" class="mt-10 px-8 py-3 bg-gray-100 hover:bg-gray-200 rounded-2xl">New Request</button>
      </div>
    </div>
  </div>
</body>
</html>
