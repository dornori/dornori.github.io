    <style>
        /* ── Cart icon in header ── */
        #cart-icon-slot .lumio-cart-icon { position:static; transform:none; background:transparent; border:1px solid var(--border); border-radius:4px; padding:6px 10px; }
        #cart-icon-slot .lumio-cart-icon__badge { background:var(--accent,#F5F29B); color:#000; }
    </style>
    <style>
        /* Cart icon integration */
        #main-header { display: flex !important; align-items: center !important; justify-content: space-between !important; flex-wrap: wrap; }
        .cart-icon-header-slot { margin-left: auto; display: inline-flex; align-items: center; }
        .webshop-cart-icon-wrap { position: relative !important; top: auto !important; right: auto !important; display: inline-block; }
        .webshop-cart-icon { width: 44px; height: 44px; background: rgba(0,0,0,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; text-decoration: none; color: var(--c-text); }
        .webshop-cart-icon:hover { background: var(--accent); color: white; }
        .webshop-cart-icon-wrap:hover .webshop-cart-hover-panel,
        .webshop-cart-hover-panel:hover { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; transform: translateY(0) !important; }
        .webshop-cart-hover-panel { position: absolute; top: calc(100% + 8px); right: 0; left: auto; width: 300px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.13); padding: 12px; opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-6px); transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s; z-index: 10000; }
        .webshop-cart-hover-panel::before { content: ''; position: absolute; top: -6px; right: 16px; width: 12px; height: 12px; background: var(--c-surface); border-left: 1px solid var(--c-border); border-top: 1px solid var(--c-border); transform: rotate(45deg); }
        .webshop-currency-selector { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 4px 8px; margin-left: 8px; }
        .webshop-currency-selector__select { background: transparent; border: none; font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div id="topBar"><div id="currency-selector-slot"></div></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"><div id="cart-icon-slot"></div></nav>
    </header>

    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport">
        <div id="home-view" class="hidden"></div>

        <div id="page-view">
            <div id="page-content-inner" class="view-inner">
                <div id="page-loading-spinner" style="text-align:center;padding:60px 20px;">
                    <div style="display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin .8s linear infinite;"></div>
                    <p style="margin-top:20px;font-family:var(--font-mono);">Loading&hellip;</p>
                </div>
            </div>
            <div style="margin-top:50px;">
                <button class="nav-link" style="border:1px solid var(--border);padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>

        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item">
                        <span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script>
        window.__PAGE_LANG__ = 'de';
        window.__PAGE_SLUG__ = 'cart';
    </script>
    <!-- Shop modules -->
    <script src="/test/shop/js/config.js"></script>
    <script src="/test/shop/js/lang-bridge.js"></script>
    <script>
        (function() {
            if (typeof CONFIG !== 'undefined') {
                CONFIG.data.shippingCsv = '/test/shop/data/shipping.csv';
                CONFIG.data.currenciesCsv = '/test/shop/data/currencies.csv';
                CONFIG.data.langUiDir = '/test/shop/data/lang/ui/';
                CONFIG.data.langProductsDir = '/test/shop/data/lang/products/';
                CONFIG.data.productsJson = '/test/shop/data/products.json';
                CONFIG.modules = [
                    '/test/shop/js/modules/currency.js',
                    '/test/shop/js/modules/shipping.js',
                    '/test/shop/js/modules/payment.js'
                ];
                CONFIG.storageKeys.parentLangKey = 'dornori-lang';
                CONFIG.storageKeys.shopLangKey = 'dornori-lang';
                CONFIG.defaultLanguage = window.__PAGE_LANG__ || 'en';
                CONFIG.language = window.__PAGE_LANG__ || 'en';
                CONFIG.features.showLanguageSwitcher = false;
                CONFIG.features.showCurrencySelector = true;
            }
        })();
    </script>
    <script>
        (function() {
            function loadScript(src) {
                return new Promise(function(resolve) {
                    var s = document.createElement("script");
                    s.src = src;
                    s.onload = resolve;
                    s.onerror = function() { console.warn("[Shop] Module failed:", src); resolve(); };
                    document.head.appendChild(s);
                });
            }
            var modules = (typeof CONFIG !== 'undefined' && CONFIG.modules) || [];
            modules = modules.concat(['/test/shop/js/shop.js']);
            var chain = Promise.resolve();
            modules.forEach(function(src) { 
                chain = chain.then(function() { return loadScript(src); }); 
            });
            chain.then(function() { 
                document.dispatchEvent(new Event("webshop:ready")); 
            });
        })();
    </script>

    <script>
        document.addEventListener("webshop:ready", async function() {
            try {
                if (typeof Currency !== 'undefined') {
                    await Currency.init();
                    await Currency.waitForReady();
                }
                if (typeof Shipping !== 'undefined') {
                    await Shipping.load();
                }
                await Shop.loadLang();
                
                if (typeof Shop !== 'undefined' && typeof Shop.renderCartIcon === 'function') {
                    Shop.renderCartIcon({ 
                        target: "#cart-icon-slot", 
                        fixed: false,
                        cartUrl: "/test/shop/cart.html"
                    });
                }
                
                const topBar = document.getElementById('topBar');
                if (topBar && typeof Currency !== 'undefined' && CONFIG.features.showCurrencySelector !== false) {
                    if (!topBar.querySelector('.webshop-currency-selector')) {
                        const currencyContainer = document.createElement('div');
                        currencyContainer.id = 'currency-selector-slot';
                        topBar.appendChild(currencyContainer);
                        if (typeof Shop !== 'undefined' && typeof Shop.renderCurrencySelector === 'function') {
                            Shop.renderCurrencySelector('#currency-selector-slot');
                        }
                    }
                }
                console.log("[Shop] Cart initialized for", window.__PAGE_LANG__);
            } catch(e) {
                console.warn("[Shop] Init error:", e);
            }
        });
    </script>


    <script type="module">
        import { initI18n }         from '/test/js/i18n.js';
        import { initNavigation }   from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials }      from '/test/js/social-loader.js';
        import { initEmbedForms }   from '/test/js/embed-form.js';
        import { initPageLoader }   from '/test/js/page-loader.js';
        import { initFooter }       from '/test/js/footer-loader.js';

        async function init() {
            const forceLang = window.__PAGE_LANG__;
            localStorage.setItem('dornori-lang', forceLang);

            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
        }

        init().catch(err => {
            console.error('Init error:', err);
            document.getElementById('page-content-inner').innerHTML =
                '<h1>Error</h1><p>Could not load page. <a href="/test/">Return home</a></p>';
        });
    </script>

    <!-- ── Shop integration ── -->
    <link rel="stylesheet" href="/test/shop/css/shop.css">
    <script src="/test/shop/js/config.js"></script>
    <script>
      (function() {
        function loadScript(src) {
          return new Promise(function(resolve) {
            var s = document.createElement("script");
            s.src = src; s.onload = resolve;
            s.onerror = function(){ console.warn("[Shop] failed:", src); resolve(); };
            document.head.appendChild(s);
          });
        }
        var shopBase = "/test/shop/";
        if (typeof CONFIG !== "undefined" && CONFIG.data) {
          Object.keys(CONFIG.data).forEach(function(k) {
            if (!CONFIG.data[k].startsWith("/")) CONFIG.data[k] = shopBase + CONFIG.data[k];
          });
        }
        var modules = (typeof CONFIG !== "undefined" && CONFIG.modules || [])
          .map(function(src){ return src.startsWith("/") ? src : shopBase + src; })
          .concat(["/test/shop/js/lang-bridge.js", "/test/shop/js/shop.js"]);
        var chain = Promise.resolve();
        modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
        chain.then(function(){ document.dispatchEvent(new Event("lumio:ready")); });
      })();
    </script>
    <script>
      document.addEventListener("lumio:ready", function() {
        if (typeof Shipping === "undefined" || typeof Currency === "undefined" || typeof Shop === "undefined") return;
        Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]).then(function() {
          Shop.renderCurrencySelector("#currency-selector-slot");
          Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false, cartUrl: "/test/de/warenkorb/" });
          // Keep shop language in sync when the parent site switches language
          var _origSetLang = window.setLang;
          window.setLang = async function (code) {
            if (_origSetLang) await _origSetLang(code);
            if (typeof Shop !== 'undefined') {
              try { await Shop.switchLanguage(code); } catch (e) {}
            }
          };

          // Also catch cross-tab / same-tab storage writes
          window.addEventListener('storage', function (e) {
            if (e.key === 'dornori-lang' && e.newValue && typeof Shop !== 'undefined') {
              Shop.switchLanguage(e.newValue).catch(function () {});
            }
          });
          // Also wire the cart init once the content fragment has been injected
          document.addEventListener("lumio:cartPageReady", function onCartReady() {
            document.removeEventListener("lumio:cartPageReady", onCartReady);
            // The content fragment fires lumio:cartPageReady; re-dispatch lumio:ready
            // so the inline cart bootstrap script inside the fragment can wire up
            var ev = new Event("lumio:ready");
            document.dispatchEvent(ev);
          });
        });
      });
    </script>
</body>
</html>
