    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* =========================================================
           INTEGRATION CSS – Cart icon (right side) + Currency selector
           ========================================================= */
        
        /* Header layout */
        #main-header {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            flex-wrap: wrap;
        }
        
        /* Cart sits inline inside the nav, right after the last menu item */
        .cart-icon-header-slot {
            display: inline-flex;
            align-items: center;
            margin-left: 12px;
            margin-right: 16px;
        }
        
        /* Cart icon wrapper – remove fixed positioning, keep relative for dropdown */
        .webshop-cart-icon-wrap {
            position: relative !important;
            top: auto !important;
            right: auto !important;
            display: inline-block;
        }
        
        /* Style the cart icon button */
        .webshop-cart-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        .webshop-cart-icon:hover {
            background: var(--accent);
            transform: scale(1.02);
        }
        
        /* Hover dropdown panel – ensure it's visible on hover */
        .webshop-cart-icon-wrap:hover .webshop-cart-hover-panel,
        .webshop-cart-hover-panel:hover {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transform: translateY(0) !important;
        }
        
        .webshop-cart-hover-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            left: auto;
            width: 300px;
            background: var(--c-surface, #faf8f5);
            border: 1px solid var(--c-border, #d8d0c4);
            border-radius: var(--radius, 8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            padding: 12px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
            z-index: 10000;
        }
        
        /* Arrow pointing up */
        .webshop-cart-hover-panel::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 16px;
            width: 12px;
            height: 12px;
            background: var(--c-surface, #faf8f5);
            border-left: 1px solid var(--c-border, #d8d0c4);
            border-top: 1px solid var(--c-border, #d8d0c4);
            transform: rotate(45deg);
        }
        
        /* Currency selector in topBar */
        .webshop-currency-selector {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 4px 8px;
            margin-left: 8px;
        }
        .webshop-currency-selector__label svg {
            stroke: var(--text);
            opacity: 0.7;
        }
        .webshop-currency-selector__select {
            background: transparent;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            letter-spacing: 0.04em;
            padding: 2px 4px;
        }
        .webshop-currency-selector__select:focus {
            outline: none;
        }
        .webshop-currency-selector__select option {
            background: var(--bg);
            color: var(--text);
        }
    </style>
