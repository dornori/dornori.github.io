<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori | revolutionary outdoor lighting</title>
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">
    <meta name="description" content="Discover Dornori's exclusive collection of revolutionary outdoor lighting. High-quality craftsmanship meets modern design. Shop the latest live drops now.">
    <meta property="og:title" content="Dornori - Official Store">
    <meta property="og:description" content="Explore the new era of outdoor lighting with Dornori.">
    <meta property="og:image" content="https://dornori.com/assets/images/preview-image.jpg">
    <link rel="stylesheet" href="css/profiles.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>

    <!-- Settings-reveal top bar (profile selector rendered by nav-loader) -->
    <div id="topBar"></div>

    <!-- Banner — desktop nav rides the bottom edge -->
    <header id="main-header">
        <img src="assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img" onclick="window.showHome()">
        <nav class="top-nav"></nav>
    </header>

    <!-- Mobile nav bar — sits just below the banner, scrolls/locks with it -->
    <nav class="mobile-nav" id="mobile-nav"></nav>

    <main id="viewport">
        <div id="home-view">
            <!-- Content loaded from /content/home.html -->
        </div>

        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top: 50px;">
                <button class="nav-link" style="border:1px solid var(--border); padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>

        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item">
                        <span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initNavigation }   from './js/nav-loader.js';
        import { initStickyBanner } from './js/sticky-banner.js';
        import { initSocials }      from './js/social-loader.js';
        import { initEmbedForms }   from './js/embed-form.js';
        import { initPageLoader }   from './js/page-loader.js';
        import { initFooter }       from './js/footer-loader.js';
        import { mountSlideshow }   from './js/slideshow.js';

        initNavigation();
        initStickyBanner();
        initSocials();
        initPageLoader();
        initFooter();
        initEmbedForms();

        // Load home content and mount any gallery/slideshow elements inside it
        fetch('/content/home.html')
            .then(response => response.text())
            .then(html => {
                const homeView = document.getElementById('home-view');
                homeView.innerHTML = html;
                homeView.querySelectorAll('.slideshow-root').forEach(mountSlideshow);
            })
            .catch(error => console.error('Failed to load home content:', error));
    </script>
</body>
</html>
