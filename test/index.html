<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <script type="module">
        import config from './js/config.js';
        const saved = localStorage.getItem('dornori-lang');
        const langs = config.languages.map(l => l.code);
        const lang = (saved && langs.includes(saved)) ? saved : config.default_language;
        window.location.href = config.base_path + lang + '/';
    </script>
</head>
<body></body>
</html>
