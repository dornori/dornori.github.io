<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <script>
        (function() {
            // Get the current path to determine base folder (works from any depth)
            var path = window.location.pathname;
            var base = path.substring(0, path.lastIndexOf('/') + 1);
            var languages = ['en', 'de', 'nl', 'fr'];
            var storageKey = 'dornori-lang';
            var preferred = localStorage.getItem(storageKey);
            if (!preferred) {
                var browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
                preferred = languages.includes(browserLang) ? browserLang : 'en';
            }
            window.location.replace(base + preferred + '/');
        })();
    </script>
</head>
<body></body>
</html>
