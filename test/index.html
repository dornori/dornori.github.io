<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <script type="module">
        import SITE_CONFIG from './js/config.js';
        
        const path = window.location.pathname;
        const base = path.substring(0, path.lastIndexOf('/') + 1);
        const languages = SITE_CONFIG.languages.map(l => l.code);
        const storageKey = SITE_CONFIG.storageKey;
        
        let preferred = localStorage.getItem(storageKey);
        if (!preferred) {
            const browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
            preferred = languages.includes(browserLang) ? browserLang : 'en';
        }
        window.location.replace(base + preferred + '/');
    </script>
</head>
<body></body>
</html>
