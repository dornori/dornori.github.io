<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Rising Star Lamp</title>
    <script>
        // Auto-detect and redirect to language folder
        const saved = localStorage.getItem('dornori-lang') || '';
        const browser = (navigator.languages || [navigator.language])[0].split('-')[0].toLowerCase();
        const supported = ['en', 'nl', 'de', 'fr'];
        const lang = supported.includes(saved) ? saved : (supported.includes(browser) ? browser : 'en');
        
        window.location.replace(`/${lang}/`);
    </script>
</head>
<body>
    <p>Redirecting to Dornori...</p>
</body>
</html>
