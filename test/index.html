  <style>
    /* ── Demo page chrome ─────────────────────────── */
    .demo-section {
      background: var(--c-surface);
      border-radius: var(--radius-xl);
      padding: 48px;
      margin-bottom: 40px;
      border: 1px solid var(--c-border);
      scroll-margin-top: 80px;
    }
    @media (max-width: 700px) { .demo-section { padding: 24px; } }

    .demo-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .badge-new     { background: #d4f0e0; color: #2a6644; }
    .badge-changed { background: var(--c-accent-light); color: var(--c-accent-dark); }
    .badge-comp    { background: #e8e4f8; color: #5a3e9e; }
    .badge-ref     { background: var(--c-surface-2); color: var(--c-text-2); }

    .demo-title { font-family: var(--font-display); font-size: 1.7rem; font-weight: 400; margin-bottom: 8px; line-height: 1.2; }
    .demo-desc  { font-size: 0.88rem; color: var(--c-text-3); line-height: 1.7; margin-bottom: 24px; max-width: 620px; }
    .demo-desc code { background: var(--c-surface-2); border-radius: 4px; padding: 1px 6px; font-size: 0.85em; color: var(--c-text-2); }

    .demo-code { background: #1a1714; border-radius: var(--radius-lg); padding: 20px 24px; margin-top: 16px; overflow-x: auto; }
    .demo-code pre { font-family: 'Fira Code', monospace; font-size: 0.79rem; line-height: 1.85; color: rgba(255,255,255,.72); white-space: pre; margin: 0; }
    .c-hl  { color: #c8a96e; }
    .c-cm  { color: rgba(255,255,255,.3); }
    .c-str { color: #a8d8a8; }
    .c-kw  { color: #9ec8f8; }

    .demo-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
    .demo-2col-a { grid-template-columns: 55fr 45fr; }
    .demo-2col-b { grid-template-columns: 45fr 55fr; }
    @media (max-width: 820px) { .demo-2col, .demo-2col-a, .demo-2col-b { grid-template-columns: 1fr; } }

    .demo-note {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--c-accent-light); border: 1px solid var(--c-accent);
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 0.82rem; color: var(--c-accent-dark); margin-bottom: 24px; line-height: 1.5;
    }

    .demo-toc { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px; }
    .demo-toc a {
      padding: 7px 16px; border: 1px solid var(--c-border); border-radius: 100px;
      font-size: 0.78rem; font-weight: 500; color: var(--c-text-2);
      text-decoration: none; background: var(--c-surface); transition: all var(--transition);
    }
    .demo-toc a:hover { background: var(--c-text); color: white; border-color: var(--c-text); }

    .live-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2a6644; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .live-label::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #4a7c59; display: inline-block; }

    .demo-card-wrap .webshop-product-card { border: 1px solid var(--c-border); border-radius: var(--radius-lg); overflow: hidden; }

    /* Language switcher (shown on example page for demo purposes) */
    .webshop-lang-switcher { display: flex; gap: 6px; align-items: center; }
    .webshop-lang-btn {
      padding: 4px 10px; border: 1px solid var(--c-border); border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 600; color: var(--c-text-3);
      background: transparent; cursor: pointer; letter-spacing: 0.06em; transition: all var(--transition);
    }
    .webshop-lang-btn.active, .webshop-lang-btn:hover { background: var(--c-text); color: white; border-color: var(--c-text); }
    /* Mobile: ATC row wraps so qty control and button stack vertically */
    @media (max-width: 480px) {
      .pdp-atc-row { flex-wrap: wrap; }
      .pdp-atc-btn { width: 100%; }
      .webshop-product-info .webshop-btn--primary,
      .webshop-product-info .webshop-btn--outline { margin-top: 6px; }
    }
  </style>

    
</head>
<body>

    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"></nav>
            <div id=""></cart-icon-slotdiv>
    </header>

            </div>

    <script type="module">
        import { initI18n } from '/test/js/i18n.js';
        import { initNavigation } from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials } from '/test/js/social-loader.js';
        import { initEmbedForms } from '/test/js/embed-form.js';
        import { initPageLoader } from '/test/js/page-loader.js';
        import { initFooter } from '/test/js/footer-loader.js';

        async function init() {
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
        }

        init();
    </script>

    
    <!-- Shop integration -->
    <script src="/test/shop/js/config.js">
    (function () {
        function loadScript(src) {
            return new Promise(function (resolve) {
                var s = document.createElement('script');
                s.src = src; s.onload = resolve; s.onerror = resolve;
                document.head.appendChild(s);
            });
        }
        var modules = CONFIG.modules.concat(['/test/shop/js/lang-bridge.js', '/test/shop/js/shop.js']);
        var chain = Promise.resolve();
        modules.forEach(function (src) { chain = chain.then(function () { return loadScript(src); }); });
        chain.then(function () { document.dispatchEvent(new Event('webshop:ready')); });
    })();
  
    function mountShopComponents() {
        if (typeof Shop === 'undefined') return;
        document.querySelectorAll('[data-shop-mount="grid"]').forEach(function (el, i) {
            if (el.dataset.shopMounted) return;
            el.dataset.shopMounted = '1';
            if (!el.id) el.id = 'shop-grid-' + Date.now() + '-' + i;
            Shop.renderShop(el.id, { showFilter: el.getAttribute('data-filter') !== 'false' });
        });
        document.querySelectorAll('[data-shop-mount="product"]').forEach(function (el, i) {
            if (el.dataset.shopMounted) return;
            el.dataset.shopMounted = '1';
            if (!el.id) el.id = 'shop-product-' + Date.now() + '-' + i;
            var pid = el.getAttribute('data-product-id');
            if (pid) Shop.renderProductInfo(el.id, pid);
        });
    }
    document.addEventListener('webshop:ready', function () {
        Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]).then(function () {
            Shop.renderCartIcon({ target: '#cart-icon-slot', fixed: false, cartUrl: '/test/en/cart/', onCartClick: () => window.viewPage('cart') });
            Shop.renderCurrencySelector('#topbar-currency-slot');
            mountShopComponents();
        });
    });
    document.addEventListener('dornori:pageLoaded', mountShopComponents);
    </script>
