<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dornori — Build your own Star-A rising kinetic lamp. Real engineering for kids 7–12. STEM kits with motors, wiring, and 3D printed parts.">
    
    <!-- Canonical will be updated dynamically by JS -->
    <link rel="canonical" href="https://dornori.com/">
    
    <title>Dornori — Build Your Own Rising Star Lamp</title>
    
    <!-- Existing favicon and manifest links (keep yours) -->
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="assets/icons/site.webmanifest">

    <!-- Your CSS files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profiles.css">
</head>
<body>
    
    <!-- Your existing header / banner -->
    <header id="main-header">
        <img id="banner-img" src="assets/images/dornori_header.jpg" alt="Dornori Banner" class="billboard-logo">
        
        <!-- Top navigation (desktop) -->
        <nav class="top-nav"></nav>
        
        <!-- Mobile navigation -->
        <nav id="mobile-nav" class="mobile-nav"></nav>
    </header>

    <!-- Top settings bar (your existing one) -->
    <div id="topBar"></div>

    <!-- Main content area -->
    <main>
        <!-- HOME VIEW -->
        <div id="home-view">
            <div class="headline">
                "In darkness let's shine a light,<br>
                to brighten the world and illuminate minds."
            </div>
            
            <!-- Your waitlist / subscribe form -->
            <div class="waitlist-card">
                <!-- Your existing form HTML goes here, or it is injected by embed-form.js -->
                <div class="embed-form-root"></div>
            </div>
        </div>

        <!-- DYNAMIC PAGE VIEW -->
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
        </div>
    </main>

    <!-- Social dock -->
    <div id="social-dock" class="social-dock"></div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            
            <div class="footer-bottom">
                <div class="copyright-text">
                    © 2026 DORNORI. ALL RIGHTS RESERVED.
                </div>
                <div class="technical-credits">
                    <div class="credit-item">
                        Performance &amp; Security by Cloudflare
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/nav-loader.js"></script>
    <script type="module" src="js/page-loader.js"></script>
    <script type="module" src="js/footer-loader.js"></script>
    <script type="module" src="js/social-loader.js"></script>
    <script type="module" src="js/sticky-banner.js"></script>
    <script type="module" src="js/embed-form.js"></script>
    
    <!-- SEO + Canonical Script (NEW) -->
    <script>
        function updateSEO() {
            const mainDomain = 'https://dornori.com';
            let path = window.location.pathname;
            if (path === '' || path === '/') path = '';
            else if (!path.startsWith('/')) path = '/' + path;

            // Update canonical
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.rel = 'canonical';
                document.head.appendChild(canonical);
            }
            canonical.href = mainDomain + path;

            // Update title based on route (fallback + improvement)
            const slug = path.replace(/^\/|\/$/g, '') || 'home';
            const titleMap = {
                'home': 'Dornori — Build Your Own Rising Star Lamp',
                'about': 'About Dornori — Real Engineering for Kids',
                'complete-assembly-kit': 'Star-A Complete Assembly Kit — Pre-printed + Electronics',
                'pre-assembled-kit': 'Star-A Ready to Use — Fully Assembled Kinetic Lamp',
                'replacement-parts': 'Star-A Replacement Parts & Upgrades',
                'mission-statement': 'Dornori Mission Statement',
                'terms': 'Terms of Service',
                'privacy': 'Privacy Policy',
                'children': 'Child Safety Guidelines',
                'returns': 'Returns & Refunds Policy',
                // Add more as you enable pages in config.js
            };
            document.title = titleMap[slug] || 'Dornori';
        }

        // Run on initial load
        updateSEO();

        // Re-run when browser back/forward is used
        window.addEventListener('popstate', updateSEO);
    </script>

    <!-- Make sure your page-loader also calls updateSEO after loading content -->
</body>
</html>
