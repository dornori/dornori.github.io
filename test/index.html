    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    
    <style>
        /* Just positioning — all component styles come from shop.css */
        .banner-cart-edge {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 100;
        }
        @media (max-width: 768px) {

<body>

<div id="topBar"></div>

<header id="main-header">
    <!-- Cart icon positioned at banner edge — slot will be filled by Shop.renderCartIcon() -->
    <div class="banner-cart-edge" id="cart-icon-slot"></div>

    <div class="billboard-logo-wrap" onclick="window.showHome()">
        <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
        <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
    </div>
    <nav class="top-nav" aria-label="Main navigation"></nav>
</header>

<nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

<main id="viewport">
    <div id="home-view">
        <div style="text-align: center; padding: 60px 20px;">
            <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite;"></div>
            <p style="margin-top: 20px; font-family: var(--font-mono);">Loading Dornori...</p>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <div id="page-view" class="hidden">
        <div id="page-content-inner" class="view-inner"></div>
        <div style="margin-top: 50px;">
            <button class="nav-link" style="border:1px solid var(--border); padding:10px 20px;" onclick="window.showHome()">Return Home</button>
        </div>
    </div>

    <div class="social-dock" id="social-dock"></div>
</main>

<footer class="site-footer">
    <div class="footer-container">
        <div id="footer-links" class="footer-links"></div>
        <div class="footer-bottom">
            <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
            <div class="technical-credits">
                <span class="credit-item">
                    <span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong>
                </span>
            </div>
        </div>
    </div>
</footer>

<!-- Load all required JS in correct order -->
<script src="js/config.js"></script>
<script src="js/lang-bridge.js"></script>
<script src="js/modules/currency.js"></script>
<script src="js/modules/shipping.js"></script>
<script src="js/modules/payment.js"></script>
<script src="js/shop.js"></script>

<script>
    // Initialize everything and render the cart icon
    (async function initWebshop() {
        try {
            // Initialize currency (loads rates from CSV)
            if (typeof Currency !== 'undefined') {
                await Currency.init();
                await Currency.waitForReady();
            }
            
            // Initialize shipping (loads countries from CSV)
            if (typeof Shipping !== 'undefined') {
                await Shipping.load();
            }
            
            // Load language and products for Shop
            if (typeof Shop !== 'undefined') {
                await Shop.loadLang();
                
                // Now render the cart icon in the banner slot
                // renderCartIcon creates the floating cart button with hover dropdown
                Shop.renderCartIcon({ 
                    target: "#cart-icon-slot", 
                    fixed: false,      // not fixed, positioned by our .banner-cart-edge
                    cartUrl: "cart.html" 
                });
            }
        } catch (e) {
            console.warn("[Init] Error during webshop initialization:", e);
            // Fallback: show simple cart link if Shop failed to load
            const slot = document.getElementById('cart-icon-slot');
            if (slot) {
                slot.innerHTML = '<a href="cart.html" class="webshop-cart-icon" style="display:inline-flex;width:48px;height:48px;background:var(--c-text);border-radius:50%;align-items:center;justify-content:center;color:white;">🛒</a>';
            }
        }
    })();
</script>

<script type="module">
    import { initI18n } from '/test/js/i18n.js';
    import { initNavigation } from '/test/js/nav-loader.js';
    import { initStickyBanner } from '/test/js/sticky-banner.js';
    import { initSocials } from '/test/js/social-loader.js';
    import { initEmbedForms } from '/test/js/embed-form.js';
    import { initPageLoader } from '/test/js/page-loader.js';
    import { initFooter } from '/test/js/footer-loader.js';

    async function init() {
        await initI18n();
        initNavigation();
        initStickyBanner();
        initSocials();
        initFooter();
        initEmbedForms();
        initPageLoader();
    }

    init();
</script>
</body>
</html>
