<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <script type="module">
        import SITE_CONFIG from '/test/js/config.js';
        
        const BASE_PATH = SITE_CONFIG.base_path;
        const LANGUAGES = SITE_CONFIG.getLanguageCodes();
        const DEFAULT_LANG = SITE_CONFIG.default_language;
        
        let savedLang = localStorage.getItem('dornori-lang');
        
        if (!savedLang || !LANGUAGES.includes(savedLang)) {
            savedLang = DEFAULT_LANG;
        }
        
        window.location.href = BASE_PATH + savedLang + '/';
    </script>
</head>
<body></body>
</html>
