<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dornori — Build Your Own Rising Star Lamp</title>
    <meta name="description" content="Discover Dornori's Star-A: a real kinetic outdoor lamp you build yourself. DC motor, 3D-printed parts, real electronics. For kids 7–12 and their grown-ups.">

    <!-- Open Graph -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://dornori.com">
    <meta property="og:title"       content="Dornori — Build Your Own Rising Star Lamp">
    <meta property="og:description" content="A kinetic outdoor lamp you build yourself. Real components, real engineering, for kids 7–12.">
    <meta property="og:image"       content="https://dornori.com/assets/images/preview-image.jpg">

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="Dornori — Build Your Own Rising Star Lamp">
    <meta name="twitter:description" content="A kinetic outdoor lamp you build yourself. Real components, real engineering, for kids 7–12.">
    <meta name="twitter:image"       content="https://dornori.com/assets/images/preview-image.jpg">

    <!-- Favicons -->
    <link rel="icon"             href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon"             href="/assets/icons/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest"         href="/assets/icons/site.webmanifest">

    <link rel="canonical" href="https://dornori.com">

    <!-- Structured data — Organisation -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Dornori",
        "url": "https://dornori.com",
        "logo": "https://dornori.com/assets/images/dornori-logo-transparent.webp",
        "sameAs": [
            "https://instagram.com/dornori.info",
            "https://x.com/dornori_info",
            "https://youtube.com/@dornori_info",
            "https://facebook.com/Dornori.info"
        ]
    }
    </script>

    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Shop cart icon -->
    <script src="shop/js/config.js"></script>
    <script src="shop/js/modules/currency.js"></script>
    <script src="shop/js/modules/shipping.js"></script>
    <script src="shop/js/modules/payment.js"></script>
    <script src="shop/js/shop.js"></script>
    <link rel="stylesheet" href="shop/css/shop.css">

    <style>
        /* Cart icon embedded in top-nav */
        #nav-cart-slot .webshop-cart-icon-wrap { position: relative; }
        #nav-cart-slot .webshop-cart-icon {
            width: 38px;
            height: 38px;
            background: transparent;
            color: var(--text, #e8e0d0);
            box-shadow: none;
            border: 1px solid var(--border, rgba(255,255,255,.15));
        }
        #nav-cart-slot .webshop-cart-icon:hover {
            background: var(--accent, #c8a96e);
            color: #0e0d0b;
            transform: none;
            box-shadow: none;
        }
        #nav-cart-slot .webshop-cart-hover-panel {
            right: 0;
            top: calc(100% + 8px);
        }
    </style>
</head>
<body>

    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"></nav>
    </header>

    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport">
        <div id="home-view">
            <div style="text-align: center; padding: 60px 20px;">
                <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--border); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite;"></div>
                <p style="margin-top: 20px; font-family: var(--font-mono);">Loading Dornori...</p>
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>

        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top: 50px;">
                <button class="nav-link" style="border:1px solid var(--border); padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>

        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item">
                        <span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initI18n } from '/test/js/i18n.js';
        import { initNavigation } from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials } from '/test/js/social-loader.js';
        import { initEmbedForms } from '/test/js/embed-form.js';
        import { initPageLoader } from '/test/js/page-loader.js';
        import { initFooter } from '/test/js/footer-loader.js';

        async function init() {
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
        }

        init().then(() => {
            // Inject cart icon into the top-nav after navigation is rendered
            const nav = document.querySelector('.top-nav');
            if (nav && window.Shop) {
                const slot = document.createElement('div');
                slot.id = 'nav-cart-slot';
                slot.style.cssText = 'display:inline-flex;align-items:center;margin-left:8px';
                nav.appendChild(slot);
                Shop.renderCartIcon({
                    target: '#nav-cart-slot',
                    fixed: false,
                    cartUrl: '/test/shop/cart.html'
                });
            }
        });
    </script>
</body>
</html>
