<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <script type="module">
        import SITE_CONFIG from './js/config.js';
        const savedLang = localStorage.getItem('dornori-lang');
        let lang = SITE_CONFIG.default_language;
        if (savedLang && SITE_CONFIG.languages.some(l => l.code === savedLang)) {
            lang = savedLang;
        }
        window.location.href = SITE_CONFIG.appearance.base_path + lang + '/';
    </script>
</head>
<body></body>
</html>
