<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Build Your Own Rising Star Lamp</title>
    <meta name="description" content="Dornori — Build Your Own Rising Star Lamp">
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">
    <!-- Shop CSS -->
    <link rel="stylesheet" href="/test/shop/css/shop.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>

    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"></nav>
        <!-- Cart icon slot - will be populated by shop.js -->
        <div id="cart-icon-slot" class="cart-icon-header-slot"></div>
    </header>

    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport">
        <div id="home-view">
            <div style="text-align:center;padding:60px 20px;">
                <div style="display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin .8s linear infinite;"></div>
                <p style="margin-top:20px;font-family:var(--font-mono);">Loading&hellip;</p>
            </div>
        </div>
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top:50px;">
                <button class="nav-link" style="border:1px solid var(--border);padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Cart icon header positioning */
        .cart-icon-header-slot {
            display: inline-flex;
            align-items: center;
            margin-left: auto;
        }
        
        /* Override cart icon fixed positioning for header */
        .webshop-cart-icon-wrap--fixed {
            position: relative !important;
            top: auto !important;
            right: auto !important;
        }
        
        /* Keep dropdown positioned correctly */
        .webshop-cart-hover-panel {
            right: 0;
            left: auto;
        }
        
        .webshop-cart-icon-wrap--fixed::before {
            display: none;
        }
        
        /* Top bar adjustments for currency selector */
        #topBar .webshop-currency-selector {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.3);
            margin-left: 8px;
        }
        
        #topBar .webshop-currency-selector__select {
            color: var(--text);
        }
        
        #topBar .webshop-currency-selector__label svg {
            stroke: var(--text);
        }
    </style>

    <script>
        window.__PAGE_LANG__ = 'en';
        window.__PAGE_SLUG__ = '';
        
        // Shop configuration - points to shop directory
        window.SHOP_CONFIG = {
            basePath: '/test/shop/',
            dataPath: '/test/shop/data/',
            jsPath: '/test/shop/js/'
        };
    </script>

    <!-- Load shop modules -->
    <script src="/test/shop/js/config.js"></script>
    <script src="/test/shop/js/lang-bridge.js"></script>
    
    <!-- Override CONFIG paths for integration -->
    <script>
        (function() {
            if (typeof CONFIG !== 'undefined') {
                // Update paths to point to shop directory
                CONFIG.data.shippingCsv = '/test/shop/data/shipping.csv';
                CONFIG.data.currenciesCsv = '/test/shop/data/currencies.csv';
                CONFIG.data.langUiDir = '/test/shop/data/lang/ui/';
                CONFIG.data.langProductsDir = '/test/shop/data/lang/products/';
                CONFIG.data.productsJson = '/test/shop/data/products.json';
                CONFIG.modules = [
                    '/test/shop/js/modules/currency.js',
                    '/test/shop/js/modules/shipping.js',
                    '/test/shop/js/modules/payment.js'
                ];
                // Keep language consistent with main site
                CONFIG.storageKeys.parentLangKey = 'dornori-lang';
                CONFIG.storageKeys.shopLangKey = 'dornori-lang';
                CONFIG.defaultLanguage = 'en';
                CONFIG.features.showLanguageSwitcher = false;
                CONFIG.features.showCurrencySelector = true;
            }
        })();
    </script>
    
    <!-- Load shop engine -->
    <script>
        (function() {
            function loadScript(src) {
                return new Promise(function(resolve) {
                    var s = document.createElement("script");
                    s.src = src;
                    s.onload = resolve;
                    s.onerror = function() { console.warn("[Shop] Module failed:", src); resolve(); };
                    document.head.appendChild(s);
                });
            }
            
            var modules = (typeof CONFIG !== 'undefined' && CONFIG.modules) || [];
            modules = modules.concat(['/test/shop/js/shop.js']);
            var chain = Promise.resolve();
            modules.forEach(function(src) { 
                chain = chain.then(function() { return loadScript(src); }); 
            });
            chain.then(function() { 
                document.dispatchEvent(new Event("webshop:ready")); 
            });
        })();
    </script>
    
    <script>
        // Initialize shop components on main page
        document.addEventListener("webshop:ready", async function() {
            try {
                // Initialize currency and shipping
                if (typeof Currency !== 'undefined') {
                    await Currency.init();
                    await Currency.waitForReady();
                }
                if (typeof Shipping !== 'undefined') {
                    await Shipping.load();
                }
                await Shop.loadLang();
                
                // Render cart icon (non-fixed, in header)
                if (typeof Shop !== 'undefined' && typeof Shop.renderCartIcon === 'function') {
                    Shop.renderCartIcon({ 
                        target: "#cart-icon-slot", 
                        fixed: false,
                        cartUrl: "/test/shop/cart.html"
                    });
                }
                
                // Render currency selector in the top bar (settings area)
                const topBar = document.getElementById('topBar');
                if (topBar && typeof Currency !== 'undefined' && CONFIG.features.showCurrencySelector !== false) {
                    // Check if currency selector already exists
                    if (!topBar.querySelector('.webshop-currency-selector')) {
                        const currencyContainer = document.createElement('div');
                        currencyContainer.id = 'currency-selector-slot';
                        // Add after the language selector (which is the last element)
                        topBar.appendChild(currencyContainer);
                        if (typeof Shop !== 'undefined' && typeof Shop.renderCurrencySelector === 'function') {
                            Shop.renderCurrencySelector('#currency-selector-slot');
                        } else if (typeof Currency !== 'undefined') {
                            // Fallback: render basic currency selector
                            renderBasicCurrencySelector(currencyContainer);
                        }
                    }
                }
                
                console.log("[Integration] Shop components initialized");
            } catch(e) {
                console.warn("[Integration] Shop init error:", e);
            }
        });
        
        // Fallback currency selector if Shop.renderCurrencySelector is not available
        function renderBasicCurrencySelector(container) {
            if (!container || typeof Currency === 'undefined') return;
            
            async function build() {
                await Currency.waitForReady();
                const active = Currency.getActive();
                container.className = "webshop-currency-selector";
                container.innerHTML = `
                    <label class="webshop-currency-selector__label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14">
                            <circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 0 0 20M12 2a15 15 0 0 1 0 20M2 12h20"/>
                        </svg>
                    </label>
                    <select class="webshop-currency-selector__select" aria-label="Currency">
                        ${Currency.list().map(c => `<option value="${c.code}"${c.code===active?" selected":""}>${c.code} ${c.symbol}</option>`).join("")}
                    </select>`;
                container.querySelector("select").addEventListener("change", e => Currency.setActive(e.target.value));
            }
            build();
            document.addEventListener("currency:changed", build);
        }
    </script>

    <!-- Main site modules -->
    <script type="module">
        import { initI18n }        from '/test/js/i18n.js';
        import { initNavigation }  from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials }     from '/test/js/social-loader.js';
        import { initEmbedForms }  from '/test/js/embed-form.js';
        import { initPageLoader }  from '/test/js/page-loader.js';
        import { initFooter }      from '/test/js/footer-loader.js';

        async function init() {
            // Set language from localStorage if exists
            const savedLang = localStorage.getItem('dornori-lang');
            if (savedLang) {
                window.__PAGE_LANG__ = savedLang;
            } else {
                localStorage.setItem('dornori-lang', 'en');
            }
            
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
        }

        init().catch(err => {
            console.error('Init error:', err);
        });
    </script>
</body>
</html>
