<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>
    <script>
        // Check localStorage for user's language preference
        const savedLang = localStorage.getItem('dornori-lang');
        if (savedLang && ['en', 'de', 'nl', 'fr'].includes(savedLang)) {
            window.location.href = '/test/' + savedLang + '/';
        } else {
            // Default to English
            window.location.href = '/test/en/';
        }
    </script>
</head>
<body></body>
</html>
