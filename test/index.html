    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* =========================================================
           INTEGRATION CSS – Cart icon (right side) + Currency selector
           ========================================================= */
        
        /* Header layout */
        #main-header {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            flex-wrap: wrap;
        }
        
        /* Cart sits inline inside the nav, right after the last menu item */
        .cart-icon-header-slot {
            display: inline-flex;
            align-items: center;
            margin-left: 12px;
            margin-right: 16px;
            position: relative;
        }
        
        /* Cart icon wrapper – remove fixed positioning, keep relative for dropdown */
        .webshop-cart-icon-wrap {
            position: relative !important;
            top: auto !important;
            right: auto !important;
            display: inline-block;
        }
        
        /* Style the cart icon button */
        .webshop-cart-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text);
        }
        .webshop-cart-icon:hover {
            background: var(--accent);
            transform: scale(1.02);
        }
        
        /* Hover dropdown panel – ensure it's visible on hover */
        .webshop-cart-icon-wrap:hover .webshop-cart-hover-panel,
        .webshop-cart-hover-panel:hover {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transform: translateY(0) !important;
        }
        
        .webshop-cart-hover-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            left: auto;
            width: 300px;
            background: var(--c-surface, #faf8f5);
            border: 1px solid var(--c-border, #d8d0c4);
            border-radius: var(--radius, 8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.13);
            padding: 12px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
            z-index: 10000;
        }
        
        /* Arrow pointing up */
        .webshop-cart-hover-panel::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 16px;
            width: 12px;
            height: 12px;
            background: var(--c-surface, #faf8f5);
            border-left: 1px solid var(--c-border, #d8d0c4);
            border-top: 1px solid var(--c-border, #d8d0c4);
            transform: rotate(45deg);
        }
        
        /* Currency selector in topBar */
        .webshop-currency-selector {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 4px 8px;
            margin-left: 8px;
        }
        .webshop-currency-selector__label svg {
            stroke: var(--text);
            opacity: 0.7;
        }
        .webshop-currency-selector__select {
            background: transparent;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            letter-spacing: 0.04em;
            padding: 2px 4px;
        }
        .webshop-currency-selector__select:focus {
            outline: none;
        }
        .webshop-currency-selector__select option {
            background: var(--bg);
            color: var(--text);
        }
        
        /* Price update loading state */
        [data-base-price].currency-loading {
            opacity: 0.6;
            position: relative;
        }
        [data-base-price].currency-loading::after {
            content: '⟳';
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-left: 4px;
            font-size: 0.8em;
        }
    </style>

    <script>
        // Detect saved lang before paint to prevent flash of wrong state
        (function(){
            var STORAGE_KEY = 'dornori-lang';
            var BASE        = '/test/';
            var l = localStorage.getItem(STORAGE_KEY) || 'en';
            window.__PAGE_LANG__ = l;
            document.documentElement.setAttribute('lang', l);
            // Cart URL slugs
            var cartSlugs = {"en":"cart","nl":"winkelwagen","de":"warenkorb","fr":"panier"};
            var slug = cartSlugs[l] || 'cart';
            window.__CART_URL__ = BASE + l + '/' + slug + '/';
        })();
        window.__PAGE_SLUG__ = '';
        window.SHOP_CONFIG = {
            basePath: '/test/shop/',
            dataPath: '/test/shop/data/',
            jsPath: '/test/shop/js/'
        };
        
        // Keep track of cart icon instance to prevent duplicates
        window.__cartIconInstance = null;
    </script>

    <!-- Shop modules -->
    <script src="/test/shop/js/config.js" defer></script>
    <script src="/test/shop/js/lang-bridge.js" defer></script>
    
    <script>
        (function() {
            if (typeof CONFIG !== 'undefined') {
                CONFIG.data.shippingCsv = '/test/shop/data/shipping.csv';
                CONFIG.data.currenciesCsv = '/test/shop/data/currencies.csv';
                CONFIG.data.langUiDir = '/test/shop/data/lang/ui/';
                CONFIG.data.langProductsDir = '/test/shop/data/lang/products/';
                CONFIG.data.productsJson = '/test/shop/data/products.json';
                CONFIG.modules = [
                    '/test/shop/js/modules/currency.js',
                    '/test/shop/js/modules/shipping.js',
                    '/test/shop/js/modules/payment.js'
                ];
                CONFIG.storageKeys.parentLangKey = 'dornori-lang';
                CONFIG.storageKeys.shopLangKey = 'dornori-lang';
                CONFIG.defaultLanguage = 'en';
                CONFIG.features.showLanguageSwitcher = false;
                CONFIG.features.showCurrencySelector = true;
            }
        })();
    </script>
    
    <script>
        // Global function to update all prices
        window.updateAllPrices = function() {
            var priceElements = document.querySelectorAll('[data-base-price]');
            if (typeof Shop !== 'undefined' && Shop.fmt && typeof Currency !== 'undefined' && Currency.ready) {
                priceElements.forEach(function(el) {
                    var base = parseFloat(el.dataset.basePrice);
                    if (!isNaN(base)) {
                        var oldText = el.textContent;
                        var newText = Shop.fmt(base);
                        if (oldText !== newText) {
                            el.textContent = newText;
                        }
                        el.classList.remove('currency-loading');
                    }
                });
                return true;
            } else {
                // Add loading indicator
                priceElements.forEach(function(el) {
                    el.classList.add('currency-loading');
                });
                return false;
            }
        };
        
        // Clean cart icon before re-rendering
        function cleanupCartIcon() {
            var cartSlot = document.getElementById('cart-icon-slot');
            if (cartSlot) {
                // Remove all existing cart icons
                var existingIcons = cartSlot.querySelectorAll('.webshop-cart-icon-wrap');
                existingIcons.forEach(function(icon) {
                    icon.remove();
                });
            }
            window.__cartIconInstance = null;
        }
        
        // Render cart icon with cleanup
        function renderCartIconWithCleanup() {
            if (typeof Shop !== 'undefined' && typeof Shop.renderCartIcon === 'function') {
                cleanupCartIcon();
                
                var getCartUrl = function() {
                    var l = window.LANG || localStorage.getItem("dornori-lang") || window.__PAGE_LANG__ || "en";
                    var m = {
                        "en": "/test/en/cart/",
                        "nl": "/test/nl/winkelwagen/",
                        "de": "/test/de/warenkorb/",
                        "fr": "/test/fr/panier/"
                    };
                    return m[l] || "/test/en/cart/";
                };
                
                Shop.renderCartIcon({ 
                    target: "#cart-icon-slot", 
                    fixed: false,
                    cartUrl: getCartUrl()
                });
                console.log('[Shop] Cart icon rendered for language:', getCartUrl());
                return true;
            }
            return false;
        }
        
        // Load all shop modules in parallel
        (function() {
            function loadScript(src) {
                return new Promise(function(resolve) {
                    var s = document.createElement("script");
                    s.src = src;
                    s.onload = resolve;
                    s.onerror = function() { console.warn("[Shop] Module failed:", src); resolve(); };
                    document.head.appendChild(s);
                });
            }
            var modules = (typeof CONFIG !== 'undefined' && CONFIG.modules) || [
                '/test/shop/js/modules/currency.js',
                '/test/shop/js/modules/shipping.js',
                '/test/shop/js/modules/payment.js'
            ];
            Promise.all(modules.map(loadScript)).then(function() {
                return loadScript('/test/shop/js/shop.js');
            }).then(function() {
                document.dispatchEvent(new Event("webshop:ready"));
            });
        })();
    </script>
    
    <script>
        document.addEventListener("webshop:ready", async function() {
            try {
                console.log('[Shop] webshop:ready event fired');
                
                // Initialize Currency FIRST and ensure it's COMPLETELY ready
                if (typeof Currency !== 'undefined') {
                    console.log('[Shop] Initializing Currency...');
                    
                    // Check if currency already initialized (for language switches)
                    if (!Currency.ready) {
                        await Currency.init();
                        console.log('[Shop] Currency.init() completed');
                        await Currency.waitForReady();
                        console.log('[Shop] Currency.waitForReady() completed');
                    } else {
                        console.log('[Shop] Currency already initialized, reusing');
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 100));
                } else {
                    console.warn('[Shop] Currency module not found');
                }
                
                // Initialize other modules in parallel
                await Promise.all([
                    typeof Shipping !== 'undefined' ? Shipping.load() : Promise.resolve(),
                    Shop.loadLang()
                ]);
                
                console.log('[Shop] All modules initialized');
                
                // Render cart icon with cleanup
                renderCartIconWithCleanup();
                
                // Fix product links in cart hover panel
                (function() {
                    function fixProductLinks(root) {
                        (root || document).querySelectorAll('a[href*="product.html?id="]').forEach(function(a) {
                            var id = a.getAttribute('href').split('product.html?id=')[1];
                            if (id && !a.getAttribute('href').includes('/test/en/product/')) {
                                a.setAttribute('href', '/test/en/product/?id=' + id);
                            }
                        });
                    }
                    fixProductLinks(document);
                    new MutationObserver(function(mutations) {
                        mutations.forEach(function(m) {
                            m.addedNodes.forEach(function(n) { 
                                if (n.nodeType === 1) fixProductLinks(n); 
                            });
                        });
                    }).observe(document.body, { childList: true, subtree: true });
                })();
                
                // Mount currency selector
                function mountCurrencySelector() {
                    var slot = document.getElementById('topBar-currency-slot') || document.getElementById('currency-selector-slot');
                    if (!slot) return false;
                    
                    // Don't remount if already mounted
                    if (slot.querySelector('select, .webshop-currency-selector')) return true;
                    
                    if (typeof Currency === 'undefined' || typeof Shop === 'undefined') return false;
                    if (typeof Shop.renderCurrencySelector === 'function') {
                        Shop.renderCurrencySelector(slot);
                    } else if (typeof renderBasicCurrencySelector === 'function') {
                        renderBasicCurrencySelector(slot);
                    }
                    return true;
                }
                
                if (!mountCurrencySelector()) {
                    var _currencyObserver = new MutationObserver(function() {
                        if (mountCurrencySelector()) _currencyObserver.disconnect();
                    });
                    _currencyObserver.observe(document.body, { childList: true, subtree: true });
                    setTimeout(function() { _currencyObserver.disconnect(); }, 10000);
                }
                
                // Handle language changes - CLEANUP and RE-RENDER properly
                document.addEventListener("shop:langChanged", function() {
                    console.log('[Shop] Language changed, re-rendering cart icon...');
                    
                    // Small delay to ensure language is fully applied
                    setTimeout(function() {
                        // Re-render cart icon (cleanup happens inside the function)
                        renderCartIconWithCleanup();
                        
                        // Also re-render any prices on the page
                        window.updateAllPrices();
                    }, 50);
                });
                
                // Update prices when currency changes
                document.addEventListener("currency:changed", function() {
                    window.updateAllPrices();
                    if (typeof Shop !== 'undefined' && Shop.getCart) {
                        document.dispatchEvent(new CustomEvent("shop:cartUpdated", { 
                            detail: { cart: Shop.getCart() } 
                        }));
                    }
                });
                
                // Initial price update
                window.updateAllPrices();
                
                // Retry price updates for any late-loading elements
                var retryCount = 0;
                var priceInterval = setInterval(function() {
                    var success = window.updateAllPrices();
                    retryCount++;
                    if (success || retryCount > 20) {
                        clearInterval(priceInterval);
                    }
                }, 500);
                
                console.log("[Integration] Shop components initialized successfully");
                
            } catch(e) {
                console.warn("[Integration] Shop init error:", e);
                setTimeout(function() {
                    if (typeof window.updateAllPrices === 'function') {
                        window.updateAllPrices();
                    }
                    renderCartIconWithCleanup();
                }, 1000);
            }
        });
        
        // Basic currency selector fallback
        function renderBasicCurrencySelector(container) {
            if (!container || typeof Currency === 'undefined') return;
            async function build() {
                await Currency.waitForReady();
                const active = Currency.getActive();
                container.className = "profile-selector-wrap";
                container.innerHTML = "CURRENCY " +
                    `<select class="profile-select" aria-label="Currency">
                        ${Currency.list().map(function(c) { 
                            return '<option value="' + c.code + '"' + (c.code === active ? ' selected' : '') + '>' + c.code + ' ' + c.symbol + '</option>';
                        }).join("")}
                    </select>`;
                container.querySelector("select").addEventListener("change", function(e) {
                    Currency.setActive(e.target.value);
                });
            }
            build();
            document.addEventListener("currency:changed", build);
        }
        
        // Expose to global scope
        window.renderBasicCurrencySelector = renderBasicCurrencySelector;
        window.renderCartIconWithCleanup = renderCartIconWithCleanup;
        window.cleanupCartIcon = cleanupCartIcon;
    </script>

    <script type="module">
        import { initI18n } from '/test/js/i18n.js';
        import { initNavigation } from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials } from '/test/js/social-loader.js';
        import { initEmbedForms } from '/test/js/embed-form.js';
        import { initPageLoader } from '/test/js/page-loader.js';
        import { initFooter } from '/test/js/footer-loader.js';

        async function init() {
            // Set default language if not present
            const savedLang = localStorage.getItem('dornori-lang');
            if (!savedLang) {
                localStorage.setItem('dornori-lang', 'en');
            }
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            initPageLoader();
        }
        
        init().catch(function(err) {
            console.error('Init error:', err);
        });
    </script>
