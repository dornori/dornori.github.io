<svg width="200" height="200" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Document background -->
  <rect 
    x="20" y="20" 
    width="160" height="185" 
    rx="18" 
    fill="#2C3E50" 
    stroke="#1F2A38" 
    stroke-width="14"/>

  <!-- Folded top-right corner -->
  <polygon 
    points="165,20 180,38 180,20" 
    fill="#1F2A38" 
    stroke="#1F2A38" 
    stroke-width="8"/>

  <!-- Inner light area -->
  <rect 
    x="35" y="38" 
    width="130" height="125" 
    rx="8" 
    fill="#ECF0F1"/>

  <!-- Big "3D" text -->
  <text 
    x="43" y="88" 
    font-family="Arial Black, sans-serif" 
    font-size="66" 
    font-weight="900" 
    fill="#3498DB" 
    letter-spacing="-4.5px">3D</text>

  <!-- Small "FILES" text right under "3D" -->
  <text 
    x="68" y="115" 
    font-family="Arial, sans-serif" 
    font-size="11" 
    font-weight="700" 
    fill="#3498DB" 
    letter-spacing="3px">FILES</text>

  <!-- New wider, symmetrical download arrow with motion effect -->
  <!-- Main shaft (wider and centered) -->
  <rect 
    x="123" y="87" 
    width="19" 
    height="53" 
    rx="3" 
    fill="#2ECC71"/>

  <!-- Larger, balanced arrowhead -->
  <polygon 
    points="109.5,135 133,163 156.5,135" 
    fill="#2ECC71"/>

  <!-- Motion lines (subtle downward speed effect) -->
  <rect 
    x="127" y="70" 
    width="11" 
    height="9" 
    rx="1" 
    fill="#2ECC71" 
    opacity="0.7"/>
  
  <rect 
    x="127" y="56" 
    width="11" 
    height="9" 
    rx="1" 
    fill="#2ECC71" 
    opacity="0.45"/>

  <!-- File stack right under "FILES" -->
  <!-- STL -->
  <rect 
    x="49" y="157" 
    width="101" height="14" 
    rx="2" 
    fill="#1C2833"/>
  <text 
    x="55" y="167.5" 
    font-family="Arial, sans-serif" 
    font-size="8" 
    fill="#ECF0F1" 
    letter-spacing="1.2px" 
    font-weight="600">STL</text>

  <!-- OBJ -->
  <rect 
    x="49" y="172.5" 
    width="101" height="14" 
    rx="2" 
    fill="#1C2833"/>
  <text 
    x="55" y="183" 
    font-family="Arial, sans-serif" 
    font-size="8" 
    fill="#ECF0F1" 
    letter-spacing="1.2px" 
    font-weight="600">OBJ</text>

  <!-- 3MF -->
  <rect 
    x="49" y="188" 
    width="101" height="14" 
    rx="2" 
    fill="#1C2833"/>
  <text 
    x="55" y="198.5" 
    font-family="Arial, sans-serif" 
    font-size="8" 
    fill="#ECF0F1" 
    letter-spacing="1.2px" 
    font-weight="600">3MF</text>
</svg>