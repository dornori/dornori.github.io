<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">About Us Icon</title>
  <desc id="desc">Colorful team icon representing About Us</desc>
  
  <!-- Soft outer glow -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#E0E7FF" stroke-width="16" opacity="0.5"/>
  
  <!-- Main vibrant circle with modern gradient -->
  <defs>
    <linearGradient id="mainGradient" x1="25%" y1="20%" x2="85%" y2="85%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="45%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  
  <circle cx="100" cy="100" r="82" fill="url(#mainGradient)"/>
  
  <!-- White inner circle -->
  <circle cx="100" cy="100" r="57" fill="#FFFFFF"/>
  
  <!-- Three stylized diverse people (team) -->
  
  <!-- Person 1 - Left (Indigo) -->
  <circle cx="68" cy="79" r="13.5" fill="#4F46E5"/>
  <rect x="60.5" y="91" width="14.5" height="27" rx="6" fill="#4F46E5"/>
  
  <!-- Person 2 - Center (Pink/Magenta) - slightly taller -->
  <circle cx="100" cy="69" r="14.5" fill="#DB2777"/>
  <rect x="92" y="83" width="16" height="30" rx="6" fill="#DB2777"/>
  
  <!-- Person 3 - Right (Orange) -->
  <circle cx="132" cy="80" r="13" fill="#EA580C"/>
  <rect x="126" y="92" width="13.5" height="26" rx="6" fill="#EA580C"/>
  
  <!-- Small decorative accent circles -->
  <circle cx="49" cy="49" r="4.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="148" cy="51" r="4" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="53" cy="142" r="3" fill="#FFFFFF" opacity="0.7"/>
</svg>
