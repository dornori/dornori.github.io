<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart &amp; Checkout — Dornori</title>
    <meta name="description" content="Your shopping cart — Dornori">
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">
    <link rel="stylesheet" href="/test/shop/shop/css/shop.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
</head>
<body>
    <div id="topBar"></div>
    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.location.href='/test/en/'">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"></nav>
        <a href="/test/en/cart/" class="cart-icon-slot" id="cart-icon-slot" aria-label="Shopping cart"></a>
    </header>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport" style="padding-top: 0;">
        <div id="cart-page-content">
            <!-- Cart content loaded below -->
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script>window.__PAGE_LANG__ = 'en';</script>

    <script src="/test/shop/shop/js/config.js"></script>
    <script type="module">
        import { initI18n }        from '/test/js/i18n.js';
        import { initNavigation }  from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials }     from '/test/js/social-loader.js';
        import { initFooter }      from '/test/js/footer-loader.js';

        async function init() {
            localStorage.setItem('dornori-lang', 'en');
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();

            // Load shop modules
            const shopModules = (CONFIG.modules || []).concat(['js/lang-bridge.js', 'js/shop.js']);
            const base = '/test/shop/shop/';
            let chain = Promise.resolve();
            shopModules.forEach(src => {
                chain = chain.then(() => new Promise(resolve => {
                    const s = document.createElement('script');
                    s.src = base + src;
                    s.onload = resolve; s.onerror = resolve;
                    document.head.appendChild(s);
                }));
            });
            chain.then(() => {
                document.dispatchEvent(new Event('webshop:ready'));
                if (typeof Shop !== 'undefined') {
                    Shop.renderCartIcon({ target: '#cart-icon-slot', fixed: false });
                }
                // Inject cart page body
                loadCartPage();
            });
        }

        function loadCartPage() {
            fetch('/test/content/en/cart.html')
                .then(r => r.text())
                .then(html => {
                    // Extract the <body> content from the cart page
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const cartMain = doc.querySelector('main.webshop-page-main');
                    const target = document.getElementById('cart-page-content');
                    if (cartMain && target) {
                        target.innerHTML = cartMain.innerHTML;
                    }
                    // Run inline scripts from the cart content
                    const cartScripts = doc.querySelectorAll('body script');
                    cartScripts.forEach(s => {
                        // skip config.js (already loaded) and module loader (already done)
                        if (s.src && s.src.includes('config.js')) return;
                        if (!s.src && s.textContent.includes('loadScript')) return;
                        if (!s.src && s.textContent.includes('challenges.cloudflare')) return;
                        if (s.src) {
                            const ns = document.createElement('script');
                            ns.src = s.src;
                            document.body.appendChild(ns);
                        } else {
                            const ns = document.createElement('script');
                            ns.textContent = s.textContent;
                            document.body.appendChild(ns);
                        }
                    });
                    // Trigger cart initialisation
                    document.dispatchEvent(new Event('webshop:ready'));
                })
                .catch(err => console.error('[Cart page load error]', err));
        }

        init();
    </script>
</body>
</html>
