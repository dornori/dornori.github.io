<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Build Your Own Rising Star Lamp</title>
    <meta name="description" content="Dornori — Build Your Own Rising Star Lamp">
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <style>
        /* ── Cart icon in header ── */
        #cart-icon-slot .lumio-cart-icon { position:static; transform:none; background:transparent; border:1px solid var(--border); border-radius:4px; padding:6px 10px; }
        #cart-icon-slot .lumio-cart-icon__badge { background:var(--accent,#F5F29B); color:#000; }
    </style>
</head>
<body>
    <div id="topBar"><div id="currency-selector-slot"></div></div>
    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img src="/test/assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori" id="banner-img">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"><div id="cart-icon-slot"></div></nav>
    </header>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>
    <main id="viewport">
        <div id="home-view">
            <div style="text-align:center;padding:60px 20px;">
                <div style="display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin .8s linear infinite;"></div>
                <p style="margin-top:20px;font-family:var(--font-mono);">Loading&hellip;</p>
            </div>
        </div>
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top:50px;">
                <button class="nav-link" style="border:1px solid var(--border);padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>
    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script>window.__PAGE_LANG__ = 'en';</script>
    <script type="module">
        import { initI18n }        from '/test/js/i18n.js';
        import { initNavigation }  from '/test/js/nav-loader.js';
        import { initStickyBanner } from '/test/js/sticky-banner.js';
        import { initSocials }     from '/test/js/social-loader.js';
        import { initEmbedForms }  from '/test/js/embed-form.js';
        import { initPageLoader }  from '/test/js/page-loader.js';
        import { initFooter }      from '/test/js/footer-loader.js';
        async function init() {
            localStorage.setItem('dornori-lang', 'en');
            await initI18n();
            initNavigation(); initStickyBanner(); initSocials();
            initFooter(); initEmbedForms(); initPageLoader();
        }
        init();
    </script>

    <!-- ── Shop integration ── -->
    <link rel="stylesheet" href="/test/shop/css/shop.css">
    <script src="/test/shop/js/config.js"></script>
    <script>
      (function() {
        function loadScript(src) {
          return new Promise(function(resolve) {
            var s = document.createElement("script");
            s.src = src; s.onload = resolve;
            s.onerror = function(){ console.warn("[Shop] failed:", src); resolve(); };
            document.head.appendChild(s);
          });
        }
        var shopBase = "/test/shop/";
        if (typeof CONFIG !== "undefined" && CONFIG.data) {
          Object.keys(CONFIG.data).forEach(function(k) {
            if (!CONFIG.data[k].startsWith("/")) CONFIG.data[k] = shopBase + CONFIG.data[k];
          });
        }
        var modules = (typeof CONFIG !== "undefined" && CONFIG.modules || [])
          .map(function(src){ return src.startsWith("/") ? src : shopBase + src; })
          .concat(["/test/shop/js/lang-bridge.js", "/test/shop/js/shop.js"]);
        var chain = Promise.resolve();
        modules.forEach(function(src){ chain = chain.then(function(){ return loadScript(src); }); });
        chain.then(function(){
          document.dispatchEvent(new Event("lumio:ready"));
        });
      })();
    </script>
    <script>
      document.addEventListener("lumio:ready", function() {
        if (typeof Shipping === "undefined" || typeof Currency === "undefined" || typeof Shop === "undefined") return;
        Promise.all([Shipping.load(), Currency.init(), Shop.loadLang()]).then(function() {
          Shop.renderCurrencySelector("#currency-selector-slot");
          Shop.renderCartIcon({ target: "#cart-icon-slot", fixed: false, cartUrl: "/test/en/cart/" });
        });
      });
    </script>
</body>
</html>
