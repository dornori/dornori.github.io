<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori</title>

    <!-- Dynamic asset paths -->
    <script>
        window.BASE_PATH = (function() {
            const path = window.location.pathname;
            const parts = path.split('/').filter(Boolean);
            if (parts.length >= 2) return '/' + parts[0] + '/';
            return '/';
        })();
    </script>

    <link rel="stylesheet" id="css-profiles" href="">
    <link rel="stylesheet" id="css-main" href="">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>

    <!-- GitHub Pages decoder -->
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (p) window.history.replaceState(null, '', p);
        })();
    </script>

    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img id="banner-img" class="billboard-logo" alt="Dornori">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav"></nav>
    </header>

    <nav class="mobile-nav" id="mobile-nav"></nav>

    <main id="viewport">
        <div id="page-view">
            <div id="page-content-inner" class="view-inner"></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        // Dynamic paths
        const base = window.BASE_PATH || '/';
        document.getElementById('css-profiles').href = base + 'css/profiles.css';
        document.getElementById('css-main').href = base + 'css/main.css';
        document.getElementById('banner-img').src = base + 'assets/images/dornori-logo-transparent.webp';

        import { initI18n } from base + 'js/i18n.js';
        import { initNavigation } from base + 'js/nav-loader.js';
        import { initStickyBanner } from base + 'js/sticky-banner.js';
        import { initSocials } from base + 'js/social-loader.js';
        import { initEmbedForms } from base + 'js/embed-form.js';
        import { initFooter } from base + 'js/footer-loader.js';

        async function init() {
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();

            // Load content from same folder
            try {
                const res = await fetch('content.html');
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById('page-content-inner').innerHTML = html;
                }
            } catch (e) {
                console.error("Failed to load content.html");
            }
        }

        init();
    </script>
</body>
</html>
