<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Build Your Own Rising Star Lamp</title>
    <meta name="description" content="Discover Dornori's Star-A: a real kinetic outdoor lamp you build yourself.">
    <link rel="canonical" href="https://dornori.com/test/en/">
    <link rel="stylesheet" href="../../css/profiles.css">
    <link rel="stylesheet" href="../../css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
    <div id="topBar"></div>
    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.location.href='./'">
            <img src="../../assets/images/dornori-logo-transparent.webp" class="billboard-logo" alt="Dornori">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation"></nav>
    </header>
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>
    <main id="viewport">
        <div id="home-view">
            <div class="headline">
                "In darkness let's shine a light,<br>
                to brighten the world and illuminate minds."
            </div>
            <div class="waitlist-card">
                <div class="embed-form-root"></div>
            </div>
        </div>
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top: 50px;">
                <button class="nav-link" style="border:1px solid var(--border); padding:10px 20px;" onclick="window.location.href='./'">Return Home</button>
            </div>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>
    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
    <script type="module">
        import { initI18n } from '../../js/i18n.js';
        import { initNavigation } from '../../js/nav-loader.js';
        import { initStickyBanner } from '../../js/sticky-banner.js';
        import { initSocials } from '../../js/social-loader.js';
        import { initEmbedForms } from '../../js/embed-form.js';
        import { initFooter } from '../../js/footer-loader.js';
        import { mountSlideshow } from '../../js/slideshow.js';
        
        async function init() {
            await initI18n();
            initNavigation();
            initStickyBanner();
            initSocials();
            initFooter();
            initEmbedForms();
            document.querySelectorAll('.slideshow-root').forEach(mountSlideshow);
            document.getElementById('page-view')?.classList.add('hidden');
            document.getElementById('home-view')?.classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
