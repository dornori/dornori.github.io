<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dornori — Loading...</title>
</head>
<body>
    <script>
        // Simple redirect to main index.html (hosting rewrite is preferred)
        const l = window.location;
        l.replace(l.origin + l.pathname.split('/')[0] ? '/' : '/' + '?path=' + encodeURIComponent(l.pathname));
    </script>
</body>
</html>
