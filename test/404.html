<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Loading…</title>
    <meta name="robots" content="noindex">

    <link rel="icon"             href="/assets/icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest"         href="/assets/icons/site.webmanifest">

    <link rel="stylesheet" href="/test/css/profiles.css">
    <link rel="stylesheet" href="/test/css/main.css">

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <script>
        // GitHub Pages 404 trick: store the full URL so the SPA shell can read it
        // after redirecting to the root index.html.
        // We store path + search + hash in sessionStorage, then redirect to root.
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;
            // Store so the SPA can pick it up after redirect
            sessionStorage.setItem('spa_redirect', JSON.stringify({
                path: path, search: search, hash: hash
            }));
            // Redirect to root SPA shell, preserving the path for the module to handle
            // We redirect to /test/ (the base) but the path-loader will read sessionStorage
            var base = '/test/';
            window.location.replace(base + '?_r=' + encodeURIComponent(path));
        })();
    </script>
</head>
<body>
    <div style="text-align:center;padding:80px 20px;font-family:monospace;">
        <div style="display:inline-block;width:40px;height:40px;border:3px solid #444;border-radius:50%;border-top-color:#F5F29B;animation:spin .8s linear infinite;"></div>
        <p style="margin-top:20px;color:#888;">Redirecting…</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
