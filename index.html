<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORNORi | Engineered Luxury</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        :root {
            --accent: #ffb347; 
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 179, 71, 0.15);
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
            
            /* Official Brand Colors for the Multicolor Logic */
            --c-ig: #E1306C; --c-tt: #00f2ea; --c-x: #ffffff;
            --c-yt: #FF0000; --c-fb: #1877F2; --c-pt: #FF424D; 
            --c-igg: #eb1478; --c-web: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, transparent 0%, var(--bg) 95%),
                linear-gradient(rgba(255,179,71,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,179,71,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        /* --- ULTRA-WIDE CINEMATIC BANNER --- */
        header { 
            width: 100%; 
            padding: 60px 40px 20px; 
            display: flex; 
            justify-content: center; 
        }

        @keyframes amber-pulse {
            0% { filter: drop-shadow(0 0 15px rgba(255, 179, 71, 0.2)) brightness(0.9); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 179, 71, 0.4)) brightness(1.15); }
            100% { filter: drop-shadow(0 0 15px rgba(255, 179, 71, 0.2)) brightness(0.9); }
        }

        @keyframes neon-cycle {
            0% { filter: drop-shadow(0 0 40px var(--c-ig)); }
            25% { filter: drop-shadow(0 0 40px var(--c-yt)); }
            50% { filter: drop-shadow(0 0 40px var(--c-fb)); }
            75% { filter: drop-shadow(0 0 40px var(--c-web)); }
            100% { filter: drop-shadow(0 0 40px var(--c-ig)); }
        }

        .billboard-logo {
            max-width: 900px; /* Wider footprint */
            width: 95%; 
            height: auto;
            cursor: crosshair;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: amber-pulse 5s ease-in-out infinite;
        }
        .billboard-logo:hover { transform: scale(1.02); animation: neon-cycle 4s linear infinite; }

        /* --- CONTENT --- */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 20px 40px; text-align: center; }
        .headline { font-size: clamp(1.1rem, 3.5vw, 1.8rem); font-weight: 200; color: #aaa; max-width: 800px; line-height: 1.6; margin-bottom: 40px; letter-spacing: 0.02em; }

        /* --- FORM --- */
        .waitlist-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 500px; position: relative; }
        .waitlist-card::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 12px; height: 12px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        .input-row { display: flex; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; padding: 18px; color: #fff; outline: none; font-size: 0.9rem; }
        .submit-btn { background: var(--accent); color: #000; border: none; padding: 0 30px; font-family: var(--font-mono); font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.75rem; }
        .submit-btn:hover { background: #fff; letter-spacing: 1px; }

        /* --- SOCIAL DOCK --- */
        .social-dock { padding: 40px 20px 80px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .social-link {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 179, 71, 0.15); background: rgba(255, 179, 71, 0.03); 
            color: var(--accent); transition: all 0.4s ease;
        }
        .social-link svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.2; }
        .social-link:hover { transform: translateY(-5px); }

        /* Individual Brand Colors on Hover */
        .social-link[data-type="ig"]:hover { color: var(--c-ig); border-color: var(--c-ig); box-shadow: 0 10px 25px -5px var(--c-ig); }
        .social-link[data-type="tt"]:hover { color: var(--c-tt); border-color: var(--c-tt); box-shadow: 0 10px 25px -5px var(--c-tt); }
        .social-link[data-type="x"]:hover { color: var(--c-x); border-color: var(--c-x); box-shadow: 0 10px 25px -5px var(--c-x); }
        .social-link[data-type="yt"]:hover { color: var(--c-yt); border-color: var(--c-yt); box-shadow: 0 10px 25px -5px var(--c-yt); }
        .social-link[data-type="fb"]:hover { color: var(--c-fb); border-color: var(--c-fb); box-shadow: 0 10px 25px -5px var(--c-fb); }
        .social-link[data-type="pt"]:hover { color: var(--c-pt); border-color: var(--c-pt); box-shadow: 0 10px 25px -5px var(--c-pt); }
        .social-link[data-type="igg"]:hover { color: var(--c-igg); border-color: var(--c-igg); box-shadow: 0 10px 25px -5px var(--c-igg); }
        .social-link[data-type="web"]:hover { color: var(--c-web); border-color: var(--c-web); box-shadow: 0 10px 25px -5px var(--c-web); }

        .hidden { display: none; }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; border: none; gap: 10px; }
            input { border: 1px solid var(--border); text-align: center; }
            .submit-btn { padding: 18px; }
        }
    </style>
</head>
<body>

    <script>
        /** * UPDATED ACCOUNTS
         */
        const instagram = "dornori.info";
        const tiktok    = "";
        const x_twitter = "dornori_info"; 
        const youtube   = "dornori_info";
        const facebook  = "profile.php?id=61585253280713";
        const patreon   = "";
        const indiegogo = ""; 
        const website   = "dornori.com"; 
        
        const SOCIAL_DATA = [
            { id: 'ig',  user: instagram, base: 'https://instagram.com/' },
            { id: 'tt',  user: tiktok,    base: 'https://tiktok.com/@' },
            { id: 'x',   user: x_twitter, base: 'https://x.com/' },
            { id: 'yt',  user: youtube,   base: 'https://youtube.com/@' },
            { id: 'fb',  user: facebook,  base: 'https://facebook.com/' },
            { id: 'pt',  user: patreon,   base: 'https://patreon.com/' },
            { id: 'igg', user: indiegogo, base: 'https://indiegogo.com/' },
            { id: 'web', user: website,   base: 'https://' }
        ];

        const ICONS = {
            ig:  '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path></svg>',
            tt:  '<svg viewBox="0 0 24 24"><path d="M9 12V4h10v4h-6v12a4 4 0 1 1-4-4z"></path></svg>',
            x:   '<svg viewBox="0 0 24 24"><path d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768 M12.456 12.456l6.774 6.774"></path></svg>',
            yt:  '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',
            fb:  '<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>',
            pt:  '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>',
            igg: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-2.76 0-5-2.24-5-5s2.24-5 5-5c1.35 0 2.58.54 3.49 1.42L13.11 10.8c-.31-.31-.72-.51-1.11-.51-1.1 0-2 .9-2 2s.9 2 2 2c.42 0 .81-.13 1.13-.35l2.25 2.25C14.47 16.41 13.31 17 12 17z"/></svg>',
            web: '<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>'
        };
    </script>

    <header>
        <img src="images/dornori-banner-stretched.jpg" class="billboard-logo" alt="DORNORi">
    </header>

    <main>
        <h2 class="headline">Lighting that understands the architecture of the night.</h2>

        <div class="waitlist-card">
            <div id="form-container">
                <form id="waitlist-form" action="https://formspree.io/f/xnjopbbb" method="POST">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC" data-theme="dark"></div>
                    <div class="input-row">
                        <input type="email" name="email" placeholder="Subscribe to Newsletter" required>
                        <button type="submit" class="submit-btn" id="sub-btn">Join</button>
                    </div>
                </form>
            </div>
            <div id="success-container" class="hidden">
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px;">THANKS FOR SUBSCRIBING</p>
            </div>
        </div>
    </main>

    <div class="social-dock" id="social-dock"></div>

    <script>
        const dock = document.getElementById('social-dock');
        SOCIAL_DATA.forEach(item => {
            if (item.user && item.user.trim() !== "") {
                const a = document.createElement('a');
                a.href = item.base + item.user;
                a.target = "_blank";
                a.className = 'social-link';
                a.setAttribute('data-type', item.id);
                a.innerHTML = ICONS[item.id];
                dock.appendChild(a);
            }
        });

        const form = document.getElementById('waitlist-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sub-btn');
            btn.innerText = "...";
            const res = await fetch(form.action, { 
                method: 'POST', 
                body: new FormData(form), 
                headers: { 'Accept': 'application/json' } 
            });
            if (res.ok) {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
