<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori | Engineered Light</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ffb347; /* Industrial Amber */
            --bg: #0d0d0d;
            --panel: #151515;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Technical Grid Background */
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Ambient Glow (Static, not following mouse) */
        body::after {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 179, 71, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }

        .product-header img {
            width: 120px;
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* THE COMMAND PANEL */
        .control-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 4px; /* Sharp, industrial edges */
            position: relative;
        }

        .control-panel::before {
            content: "SYSTEM_READY";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg);
            padding: 0 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #444;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 18px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            background: #fff;
            color: #000;
            padding: 18px;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--accent); }

        /* THE SOCIAL UTILITY BAR */
        .utility-bar {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .util-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--border);
            text-decoration: none;
            color: #888;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .util-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .util-link:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .utility-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="product-header">
            <img src="images/dornori-logo-ONE.jpg" alt="Dornori Logo">
        </div>

        <h1>DORNORi</h1>
        <p class="tagline">Next-Gen Outdoor Lighting</p>

        <div class="control-panel">
            <div id="form-container">
                <form id="waitlist-form" action="https://formspree.io/f/xnjopbbb" method="POST">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC" data-theme="dark"></div>
                    <input type="email" name="email" placeholder="USER_EMAIL_INTAKE" required>
                    <button type="submit" id="submit-btn">Initialize Access</button>
                </form>
            </div>

            <div id="success-msg" class="hidden">
                <p style="font-family: 'JetBrains Mono'; color: var(--accent);">REGISTRATION_COMPLETE</p>
                <h3 style="margin-top:10px;">Welcome to the Inner Circle.</h3>
            </div>
        </div>

        <div class="utility-bar">
            <a href="#" class="util-link">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path></svg>
                Instagram
            </a>
            <a href="#" class="util-link">
                <svg viewBox="0 0 24 24"><path d="M9 12V4h10v4h-6v12a4 4 0 1 1-4-4z"></path></svg>
                TikTok
            </a>
            <a href="#" class="util-link">
                <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                YouTube
            </a>
            <a href="#" class="util-link">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                Patreon
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById('waitlist-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('submit-btn').innerText = "TRANSMITTING...";
            
            const res = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
