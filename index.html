  <style>
    * {

    }

    body {
      height: 100vh;
      background: url("https://scontent.fprg6-1.fna.fbcdn.net/v/t39.30808-6/606075525_122105622237175109_4027975078715659146_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=b895b5&_nc_ohc=sBYyQegItzUQ7kNvwH6Y4q5&_nc_oc=Adr18z-2aW4twl6bB8waoWNEkhoOOO14r6mJtxuXwfFGRlm5LG16Mfd5nFSigUwhU1Q&_nc_zt=23&_nc_ht=scontent.fprg6-1.fna&_nc_gid=vhhreufhY_oA02GUzJ2S2A&_nc_ss=7a32e&oh=00_Afxhi4JWKaWfwTsPT_Q1uHO4UQrOKx2pAdZnR2C3dCPn0w&oe=69CF0AF1") no-repeat center center/cover;
      position: relative;
      color: #fff;
    }

    /* dark overlay for readability */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(2px);
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 20px;
    }

    .top-links {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    .top-links a {
      color: #ddd;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .top-links a:hover {
      color: #fff;
    }

    .content {
      text-align: center;
      margin-top: auto;
      margin-bottom: 60px;
    }

    .content h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .content p {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 30px;
    }

    .email-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .email-box input {
      padding: 14px 16px;
      border-radius: 8px;
      border: none;
      outline: none;
      width: 260px;
      font-size: 14px;
    }

    .email-box button {
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #f5b942, #ff7a18);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .email-box button:hover {
      opacity: 0.85;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Top navigation -->
    <div class="top-links">
      <a href="#">About</a>
      <a href="#">Product</a>
      <a href="#">Docs</a>
      <a href="#">Contact</a>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1>Dornori</h1>
      <p>Build something people actually want.</p>

<form id="my-form" action="https://formspree.io/f/xnjopbbb" method="POST">
  <label>Email:</label>
  <input type="email" name="email" required>
  <button id="submit-btn" type="submit">Subscribe</button>
  <p id="status"></p>
</form>
    
    </div>


<script>
  const form = document.getElementById("my-form");
  
  async function handleSubmit(event) {
    event.preventDefault(); // Stop the page from reloading
    const status = document.getElementById("status");
    const data = new FormData(event.target);
    const button = document.getElementById("submit-btn");

    button.disabled = true;
    status.innerHTML = "Sending...";

    fetch(event.target.action, {
      method: 'POST',
      body: data,
      headers: {
          'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        // SUCCESS: This is where you do your custom redirect!
        window.location.href = "https://yourusername.github.io/thanks.html";
      } else {
        response.json().then(data => {
          if (Object.hasOwn(data, 'errors')) {
            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
          } else {
            status.innerHTML = "Oops! There was a problem submitting your form";
          }
        })
      }
    }).catch(error => {
      status.innerHTML = "Oops! There was a problem connecting to the server";
    });
  }
  
  form.addEventListener("submit", handleSubmit);
</script>



    
    <!-- Footer -->
    <div class="footer">

  </div>

  </script>
</body>
</html>
