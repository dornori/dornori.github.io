<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dornori | The Future is Lit</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #ff7a18;
      --secondary: #f5b942;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
      height: 100vh;
      background: #050505; 
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient Background Motion */
    .bg-visuals {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
      animation: float 15s infinite alternate ease-in-out;
    }

    .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -10%; right: -10%; animation-delay: -3s; }

    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(60px, 40px) scale(1.1); }
    }

    /* Main Card */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      padding: 50px 40px;
      border-radius: 32px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area img {
      width: 180px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 15px rgba(245, 185, 66, 0.3));
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
      background: linear-gradient(to bottom, #fff 40%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #999;
      font-size: 1.1rem;
      margin-bottom: 35px;
    }

    /* Modern Input Group */
    .input-wrapper {
      position: relative;
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 6px;
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--secondary);
      box-shadow: 0 0 0 1px var(--secondary);
    }

    input {
      background: transparent;
      border: none;
      padding: 14px 18px;
      color: #fff;
      font-size: 16px;
      outline: none;
      width: 100%;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    button:hover {
      background: var(--secondary);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Social Dock */
    .social-dock {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .social-dock a {
      color: #666;
      transition: 0.3s;
    }

    .social-dock a:hover {
      color: #fff;
      transform: translateY(-3px);
    }

    /* Success State */
    .success-box {
      display: none;
      padding: 20px;
    }

    .checkmark-svg {
      width: 65px;
      height: 65px;
      stroke: #4bb543;
      stroke-width: 2;
      fill: none;
      margin: 0 auto 15px;
    }

    .path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 2s ease-in-out forwards;
    }

    @keyframes dash { to { stroke-dashoffset: 0; } }
    .hidden { display: none !important; }

    #status {
      font-size: 13px;
      margin-top: 15px;
      color: #ff4d4d;
    }
  </style>
</head>

<body>
  <div class="bg-visuals">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="glass-card">
    <div id="form-content">
      <div class="logo-area">
        <img src="images/dornori-logo-ONE.jpg" alt="Dornori Logo">
      </div>
      <h1>Dornori</h1>
      <p>Build something people actually want.</p>

      <form id="subscribe-form" action="https://formspree.io/f/xnjopbbb" method="POST">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC" data-theme="dark"></div>
        
        <div class="input-wrapper">
          <input type="email" name="email" placeholder="name@email.com" required>
          <button id="submit-btn" type="submit">Join the inner circle</button>
        </div>
        <input type="text" name="_gotcha" style="display:none">
      </form>
      <div id="status"></div>
    </div>

    <div id="success-state" class="success-box">
      <svg class="checkmark-svg" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="25" fill="none" stroke="#4bb543" stroke-width="2"/>
        <path class="path" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
      </svg>
      <h2 style="margin-bottom: 8px;">You're in.</h2>
      <p style="margin-bottom: 0;">Welcome to the next generation.</p>
    </div>

    <div class="social-dock">
      <a href="#"><i data-lucide="twitter"></i></a>
      <a href="#"><i data-lucide="github"></i></a>
      <a href="#"><i data-lucide="instagram"></i></a>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    const form = document.getElementById("subscribe-form");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const formContent = document.getElementById("form-content");
    const successState = document.getElementById("success-state");

    form.onsubmit = async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.innerText = "Syncing...";

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          formContent.classList.add("hidden");
          successState.style.display = "block";
        } else {
          const result = await response.json();
          status.innerText = result.errors ? result.errors[0].message : "Error joining.";
          submitBtn.disabled = false;
          submitBtn.innerText = "Try again";
        }
      } catch (err) {
        status.innerText = "Network failure.";
        submitBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
