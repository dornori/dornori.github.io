<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DORNORi | Engineered Luxury</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        :root {
            --accent: #ffb347; /* Dornori Amber */
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: ui-monospace, "SF Mono", Menlo, monospace;

            /* Neon Spectrum for Hover */
            --neon-1: #E1306C; --neon-2: #00f2ea; --neon-3: #1877F2; --neon-4: #FF0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, transparent 0%, var(--bg) 95%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 45px 45px, 45px 45px;
        }

        /* --- THE REACTIVE LOGO --- */
        header { width: 100%; padding: 100px 20px 60px; display: flex; justify-content: center; }

        @keyframes amber-pulse {
            0% { filter: drop-shadow(0 0 15px rgba(255, 179, 71, 0.2)) brightness(0.9); }
            50% { filter: drop-shadow(0 0 45px rgba(255, 179, 71, 0.6)) brightness(1.3); }
            100% { filter: drop-shadow(0 0 15px rgba(255, 179, 71, 0.2)) brightness(0.9); }
        }

        @keyframes neon-cycle {
            0% { filter: drop-shadow(0 0 35px var(--neon-1)); }
            25% { filter: drop-shadow(0 0 35px var(--neon-2)); }
            50% { filter: drop-shadow(0 0 35px var(--neon-3)); }
            75% { filter: drop-shadow(0 0 35px var(--neon-4)); }
            100% { filter: drop-shadow(0 0 35px var(--neon-1)); }
        }

        .billboard-logo {
            max-width: 520px; width: 85%; height: auto;
            border-radius: 8px; cursor: crosshair;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: amber-pulse 5s ease-in-out infinite;
        }

        .billboard-logo:hover { transform: scale(1.04); animation: neon-cycle 4s linear infinite; }

        /* --- CONTENT --- */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .status-header { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.6em; color: var(--accent); text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .headline { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 200; color: #888; max-width: 650px; line-height: 1.5; margin-bottom: 50px; }

        /* --- FORM --- */
        .waitlist-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); padding: 45px; width: 100%; max-width: 460px; position: relative; }
        .waitlist-card::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }
        .input-row { display: flex; gap: 12px; margin-top: 20px; }
        input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 18px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
        .submit-btn { background: #fff; color: #000; border: none; padding: 0 30px; font-family: var(--font-mono); font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--accent); }

        /* --- AMBER SOCIAL DOCK --- */
        .social-dock { padding: 60px 20px; display: flex; gap: 15px; justify-content: center; }

        .social-link {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 179, 71, 0.2); /* Faint Amber Border */
            background: rgba(255, 179, 71, 0.03); 
            color: var(--accent); /* ALL ICONS NOW BRIGHT YELLOW/AMBER */
            opacity: 0.7; /* Subtly dimmed until hover */
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none; border-radius: 4px;
        }

        .social-link svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; }
        
        /* HOVER STATES: Switch from Amber to Neon */
        .social-link:hover { opacity: 1; transform: translateY(-10px); }
        
        .g-ig:hover { color: var(--neon-1); border-color: var(--neon-1); box-shadow: 0 10px 25px -5px var(--neon-1); }
        .g-tt:hover { color: var(--neon-2); border-color: var(--neon-2); box-shadow: 0 10px 25px -5px var(--neon-2); }
        .g-x:hover { color: #fff; border-color: #fff; box-shadow: 0 10px 25px -5px #fff; }
        .g-yt:hover { color: var(--neon-4); border-color: var(--neon-4); box-shadow: 0 10px 25px -5px var(--neon-4); }
        .g-fb:hover { color: var(--neon-3); border-color: var(--neon-3); box-shadow: 0 10px 25px -5px var(--neon-3); }
        .g-pt:hover { color: #FF424D; border-color: #FF424D; box-shadow: 0 10px 25px -5px #FF424D; }
        .g-igg:hover { color: #eb1478; border-color: #eb1478; box-shadow: 0 10px 25px -5px #eb1478; }

        .hidden { display: none; }

        @media (max-width: 500px) {
            header { padding: 60px 20px; }
            .input-row { flex-direction: column; }
            .submit-btn { padding: 18px; }
            .social-dock { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <header>
        <img src="images/dornori-logo-ONE.jpg" class="billboard-logo" alt="DORNORi">
    </header>

    <main>
        <div class="status-header">
            <div class="dot"></div> System Active
        </div>
        
        <h2 class="headline">Lighting that understands the architecture of the night.</h2>

        <div class="waitlist-card">
            <div id="form-container">
                <form id="waitlist-form" action="https://formspree.io/f/xnjopbbb" method="POST">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC" data-theme="dark"></div>
                    <div class="input-row">
                        <input type="email" name="email" placeholder="Email for Auth" required>
                        <button type="submit" class="submit-btn" id="sub-btn">Request Access</button>
                    </div>
                </form>
            </div>
            
            <div id="success-container" class="hidden">
                <p style="color: var(--accent); font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 2px;">CONNECTION_ESTABLISHED</p>
            </div>
        </div>
    </main>

    <div class="social-dock">
        <a href="#" class="social-link g-ig" title="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path></svg></a>
        <a href="#" class="social-link g-tt" title="TikTok"><svg viewBox="0 0 24 24"><path d="M9 12V4h10v4h-6v12a4 4 0 1 1-4-4z"></path></svg></a>
        <a href="#" class="social-link g-x" title="X"><svg viewBox="0 0 24 24"><path d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768 M12.456 12.456l6.774 6.774"></path></svg></a>
        <a href="#" class="social-link g-yt" title="YouTube"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></a>
        <a href="#" class="social-link g-fb" title="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg></a>
        <a href="#" class="social-link g-pt" title="Patreon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg></a>
        <a href="#" class="social-link g-igg" title="Indiegogo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v10M7 12h10"></path></svg></a>
    </div>

    <script>
        const form = document.getElementById('waitlist-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('sub-btn').innerText = "...";
            const res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });
            if (res.ok) {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
