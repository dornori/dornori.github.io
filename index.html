<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dornori | Join the Future</title>

  <style>
    :root {
      --primary: #ff7a18;
      --secondary: #f5b942;
      --bg-overlay: rgba(0, 0, 0, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: url("https://scontent.fprg6-1.fna.fbcdn.net/v/t39.30808-6/606075525_122105622237175109_4027975078715659146_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=b895b5&_nc_ohc=sBYyQegItzUQ7kNvwH6Y4q5&_nc_oc=Adr18z-2aW4twl6bB8waoWNEkhoOOO14r6mJtxuXwfFGRlm5LG16Mfd5nFSigUwhU1Q&_nc_zt=23&_nc_ht=scontent.fprg6-1.fna&_nc_gid=vhhreufhY_oA02GUzJ2S2A&_nc_ss=7a32e&oh=00_Afxhi4JWKaWfwTsPT_Q1uHO4UQrOKx2pAdZnR2C3dCPn0w&oe=69CF0AF1") no-repeat center center/cover;
      position: relative;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(4px);
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 20px;
      z-index: 1;
    }

    .top-links {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
    }

    .top-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: 0.3s;
    }

    .top-links a:hover {
      color: var(--secondary);
    }

    .content {
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .content h1 {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -1px;
      background: linear-gradient(to bottom, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content p {
      font-size: 18px;
      color: #999;
      margin-bottom: 40px;
    }

    /* Form Styling */
    .email-box {
      position: relative;
      display: flex;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.4s ease;
    }

    .email-box:focus-within {
      border-color: var(--secondary);
      background: rgba(255, 255, 255, 0.08);
    }

    .email-box input {
      flex: 1;
      background: transparent;
      padding: 12px 16px;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
    }

    .email-box button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .email-box button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(245, 185, 66, 0.3);
    }

    .email-box button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Success States */
    #status {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .hidden { display: none !important; }

    /* The Animated Checkmark */
    .success-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .checkmark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #4bb543;
      stroke-miterlimit: 10;
      box-shadow: inset 0px 0px 0px #4bb543;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }

    .checkmark__circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #4bb543;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark__check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    @keyframes stroke { 100% { stroke-dashoffset: 0; } }
    @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-links">
      <a href="#">About</a>
      <a href="#">Product</a>
      <a href="#">Docs</a>
      <a href="#">Contact</a>
    </div>

    <div class="content">
      <h1>Dornori</h1>
      <p>Build something people actually want.</p>

      <form id="my-form" action="https://formspree.io/f/xnjopbbb" method="POST" class="email-box">
        <input type="email" name="email" placeholder="Enter your email address" required>
        <button id="submit-btn" type="submit">Subscribe</button>
      </form>

      <div id="success-state" class="success-wrapper hidden">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
          <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
        <p style="margin-top:10px; color:#4bb543; font-weight:600;">You're on the list!</p>
      </div>

      <p id="status"></p>
    </div>

    <div class="footer">
      © 2026 DORNORI. ALL RIGHTS RESERVED.
    </div>
  </div>

  <script>
    const form = document.getElementById("my-form");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const successState = document.getElementById("success-state");

    async function handleSubmit(event) {
      event.preventDefault();
      const data = new FormData(event.target);
      
      // UI Update: Loading
      submitBtn.disabled = true;
      submitBtn.innerText = "Joining...";
      status.innerHTML = "";

      fetch(event.target.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          // Hide form and show checkmark
          form.classList.add("hidden");
          successState.classList.remove("hidden");
        } else {
          response.json().then(data => {
            submitBtn.disabled = false;
            submitBtn.innerText = "Subscribe";
            if (Object.hasOwn(data, 'errors')) {
              status.style.color = "#ff4d4d";
              status.innerHTML = data["errors"].map(err => err["message"]).join(", ");
            } else {
              status.innerHTML = "Oops! Something went wrong.";
            }
          })
        }
      }).catch(error => {
        submitBtn.disabled = false;
        submitBtn.innerText = "Subscribe";
        status.style.color = "#ff4d4d";
        status.innerHTML = "Connection error. Please try again.";
      });
    }

    form.addEventListener("submit", handleSubmit);
  </script>
</body>
</html>
