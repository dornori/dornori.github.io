<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori | revolutionary outdoor lighting</title>
    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">
    <meta name="description" content="Discover Dornori's exclusive collection of revolutionary outdoor lighting. High-quality craftsmanship meets modern design. Shop the latest live drops now.">
    <meta property="og:title" content="Dornori - Official Store">
    <meta property="og:description" content="Explore the new era of outdoor lighting with Dornori.">
    <meta property="og:image" content="https://dornori.com/assets/images/preview-image.jpg">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>

    <!-- Settings-reveal top bar (theme toggle lives here) -->
    <div id="topBar">
        <button id="themeToggle" aria-label="Toggle dark / light mode">
            <span class="toggle-track">
                <span class="toggle-thumb"></span>
            </span>
            <span id="toggleLabel">LIGHT MODE</span>
        </button>
    </div>

    <!-- Banner header — nav rides the bottom edge, scrolls with banner -->
    <header id="main-header">
        <img src="assets/images/dornori_header.jpg" class="billboard-logo" alt="Dornori" id="banner-img" onclick="window.showHome()">
        <nav class="top-nav"></nav>
    </header>

    <main id="viewport">
        <div id="home-view">
            <h2 class="headline">"In darkness let's shine a light,</h2>
            <h2 class="headline">to brighten the world and illuminate minds."</h2>
            <div class="waitlist-card">
                <div id="form-container">
                    <form id="waitlist-form">
                        <div id="captcha-container"></div>
                        <div class="input-row">
                            <input type="email" name="email" placeholder="Subscribe" required>
                            <button type="submit" class="submit-btn" id="sub-btn">Join</button>
                        </div>
                        <p class="disclaimer-text">
                            By subscribing, you accept our 
                            <button type="button" class="link-btn" onclick="window.viewPage('terms')">Terms</button> & 
                            <button type="button" class="link-btn" onclick="window.viewPage('privacy')">Privacy Policy</button>.
                        </p>
                        <div style="display: flex; justify-content: center; width: 100%;">
                            <span class="credit-item">
                                <span class="status-dot"></span>POWERED BY <strong>FORMSPREE</strong>
                            </span>
                        </div>
                    </form>
                </div>
                <div id="success-container" class="hidden">
                    <p style="font-family: var(--font-mono); color: var(--accent);">Thanks for Subscribing!</p>
                </div>
            </div>
        </div>

        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top: 50px;">
                <button class="nav-link" style="border:1px solid var(--border); padding:10px 20px;" onclick="window.showHome()">Return Home</button>
            </div>
        </div>

        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item">
                        <span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong>
                    </span>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initNavigation }   from './js/nav-loader.js';
        import { initStickyBanner } from './js/sticky-banner.js';
        import { initSocials }      from './js/social-loader.js';
        import { initFormHandler }  from './js/form-handler.js';
        import { initPageLoader }   from './js/page-loader.js';
        import { initFooter }       from './js/footer-loader.js';

        initNavigation();
        initStickyBanner();
        initSocials();
        initFormHandler();
        initPageLoader();
        initFooter();
    </script>
</body>
</html>
