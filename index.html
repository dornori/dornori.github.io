<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dornori | Build the Future</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    :root {
      --primary: #ff7a18;
      --secondary: #f5b942;
      --bg-overlay: rgba(0, 0, 0, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      /* Updated to your local images folder */
      background: url("images/dornori-logo-ONE.png") no-repeat center center/cover;
      position: relative;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 20px;
      z-index: 1;
    }

    .top-links {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
    }

    .top-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: 0.3s;
    }

    .top-links a:hover { color: var(--secondary); }

    .content {
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }

    .content h1 {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -1px;
      background: linear-gradient(to bottom, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content p {
      font-size: 18px;
      color: #999;
      margin-bottom: 30px;
    }

    /* Form Design */
    #my-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .input-group {
      display: flex;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.4s;
    }

    .input-group:focus-within {
      border-color: var(--secondary);
      background: rgba(255, 255, 255, 0.08);
    }

    .input-group input {
      flex: 1;
      background: transparent;
      padding: 12px 16px;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
    }

    .input-group button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .input-group button:hover { opacity: 0.9; transform: scale(1.02); }
    .input-group button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Turnstile Widget Styling */
    .cf-turnstile {
      margin-bottom: 10px;
    }

    /* Success Checkmark Animation */
    .success-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .checkmark {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      stroke: #4bb543;
      stroke-width: 3;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke: #4bb543; }
    .checkmark-check { stroke-dasharray: 48; stroke-dashoffset: 48; }

    @keyframes stroke { 100% { stroke-dashoffset: 0; } }

    #status { font-size: 14px; margin-top: 10px; min-height: 20px; }
    .hidden { display: none !important; }

    .footer { text-align: center; font-size: 12px; color: #555; }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-links">
      <a href="#">About</a>
      <a href="#">Product</a>
      <a href="#">Docs</a>
      <a href="#">Contact</a>
    </div>

    <div class="content">
      <h1>Dornori</h1>
      <p>Build something people actually want.</p>

      <form id="my-form" action="https://formspree.io/f/xnjopbbb" method="POST">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACxsga5y-bJ_qkzC"></div>
        
        <input type="text" name="_gotcha" style="display:none">

        <div class="input-group">
          <input type="email" name="email" placeholder="Enter your email" required>
          <button id="submit-btn" type="submit">Subscribe</button>
        </div>
      </form>

      <div id="success-state" class="success-wrapper hidden">
        <svg class="checkmark" viewBox="0 0 52 52">
          <circle class="checkmark-circle" cx="26" cy="26" r="25" />
          <path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
        </svg>
        <p style="color:#4bb543; font-weight:600; margin-top:10px;">Subscribed Successfully!</p>
      </div>

      <p id="status"></p>
    </div>

    <div class="footer">© 2026 DORNORI. ALL RIGHTS RESERVED.</div>
  </div>

  <script>
    const form = document.getElementById("my-form");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const successState = document.getElementById("success-state");

    form.onsubmit = async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.innerText = "Verifying...";

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.classList.add("hidden");
          successState.classList.remove("hidden");
          status.innerHTML = "";
        } else {
          const data = await response.json();
          submitBtn.disabled = false;
          submitBtn.innerText = "Subscribe";
          status.style.color = "#ff4d4d";
          status.innerHTML = data.errors ? data.errors[0].message : "Submission failed.";
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerText = "Subscribe";
        status.innerHTML = "Network error. Try again.";
      }
    };
  </script>
</body>
</html>
