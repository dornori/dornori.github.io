<div class="home-hero">
    <p class="headline">
        "In darkness let's shine a light,<br>
        to brighten the world and illuminate minds."
    </p>

    <div class="waitlist-card">
        <form id="waitlist-form" method="POST">
            <div class="input-row">
                <input 
                    type="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required>
                <button type="submit" class="submit-btn" id="sub-btn">JOIN</button>
            </div>
            <div id="captcha-container"></div>
        </form>

        <div id="success-container" class="hidden">
            <p>Thank you! You're on the list.</p>
        </div>

        <p class="disclaimer-text">
            By subscribing, you accept our 
            <button class="link-btn" onclick="window.viewPage('terms')">Terms</button> &amp; 
            <button class="link-btn" onclick="window.viewPage('privacy')">Privacy Policy</button>.
        </p>
    </div>
</div>

<script>
(function () {
    var form        = document.getElementById('waitlist-form');
    var btn         = document.getElementById('sub-btn');
    var captchaSlot = document.getElementById('captcha-container');
    var successWrap = document.getElementById('success-container');
    var widgetId    = null;

    var sitekey  = CONFIG.turnstile.sitekey;
    var endpoint = CONFIG.queue.endpoint;

    async function submit(token) {
        btn.textContent = '…';
        btn.disabled    = true;
        var email = form.querySelector('input[name="email"]').value.trim();
        try {
            await fetch(endpoint, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ category: 'newsletter', email: email, cfTurnstileToken: token })
            });
        } finally {
            form.style.display = 'none';
            successWrap.classList.remove('hidden');
        }
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        btn.textContent = 'VERIFYING…';

        if (widgetId !== null) {
            window.turnstile.reset(widgetId);
            return;
        }

        widgetId = window.turnstile.render(captchaSlot, {
            sitekey:            sitekey,
            theme:              'auto',
            callback:           function (token) { submit(token); },
            'expired-callback': function ()      { btn.textContent = 'JOIN'; btn.disabled = false; },
            'error-callback':   function ()      { btn.textContent = 'RETRY'; btn.disabled = false; }
        });
    });
})();
</script>
