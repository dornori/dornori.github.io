<!DOCTYPE html>
<html lang="en" data-theme="cutting-mat">
<head>
    <style>
      html:not(.at-top){scrollbar-width:auto;}
      html:not(.at-top)::-webkit-scrollbar{display:block;}
      html:not(.at-top) body{scrollbar-width:auto;}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dornori — Build Your Own Rising Star Lamp</title>
    <meta name="description" content="Design and build your own Dornori Rising Star lamp. Available as a full DIY kit, pre-printed parts, or ready-assembled. Ships worldwide.">

    <style>
        :root,
        [data-theme="cutting-mat"] {
            --bg:         #1a3a2a;
            --accent:     #a8d5b5;
            --border:     rgba(255, 255, 255, 0.28);
            --text:       #e8f2ec;
            --text-muted: #9dc8ae;
            --header-bg:  #112b1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main#viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #home-view p {
            margin-top: 20px;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            color: var(--text-muted);
        }
    </style>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Dornori — Build Your Own Rising Star Lamp">
    <meta property="og:description" content="Design and build your own Dornori Rising Star lamp. Available as a full DIY kit, pre-printed parts, or ready-assembled. Ships worldwide.">
    <link rel="canonical" href="https://dornori.com/en/">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body>
    


    <div id="topBar"></div>

    <header id="main-header">
        <div class="billboard-logo-wrap" onclick="window.showHome()">
            <img id="banner-img" class="billboard-logo" alt="Dornori">
            <span class="billboard-wordmark">Dornor<span class="i-wrap">ı<span class="dot"></span></span></span>
        </div>
        <nav class="top-nav" aria-label="Main navigation">
            <div id="cart-icon-slot" class="cart-icon-header-slot"></div>
        </nav>
    </header>

    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation"></nav>

    <main id="viewport">
        <div id="home-view">
            <div style="text-align:center;padding:80px 20px;">
                <div class="loading-spinner"></div>
                <p>Loading…</p>
            </div>
        </div>
        <div id="page-view" class="hidden">
            <div id="page-content-inner" class="view-inner"></div>
            <div style="margin-top:50px;">
                <button class="nav-link" onclick="window.showHome()">Return Home</button>
            </div>
        </div>
        <div class="social-dock" id="social-dock"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div id="footer-links" class="footer-links"></div>
            <div class="footer-bottom">
                <p class="copyright-text">&copy; 2026 DORNORI. ALL RIGHTS RESERVED.</p>
                <div class="technical-credits">
                    <span class="credit-item"><span class="status-dot"></span>Performance &amp; Security by <strong>Cloudflare</strong></span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        window.__PAGE_LANG__ = 'en';
        window.__PAGE_SLUG__ = 'kit';
    </script>
    <script src="../../js/page-init.js" defer></script>
    <script src="../../js/site-boot.js" defer></script>
</body>
</html>
